format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-2
  summary: |-
    "The FNS unit can have no more than two active authorized representatives for the case." "Any FNS unit that resides in an Alcohol and Drug Treatment Center (ADTC) may only have one authorized representative." "The head of household's signature is required on the DSS-1688 when" the representative lacks Power of Attorney, the Power of Attorney is limited to a specific purpose not including FNS benefits, or the Power of Attorney is time-limited and will expire within 30 days.
rules:
  - name: general_active_authorized_representative_limit
    kind: parameter
    dtype: Count
    source: FNS 175.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-2
              excerpt: "no more than two active authorized representatives"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          2

  - name: alcohol_drug_treatment_center_active_authorized_representative_limit
    kind: parameter
    dtype: Count
    source: FNS 175.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-2
              excerpt: "may only have one authorized representative"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          1

  - name: power_of_attorney_expiration_signature_window_days
    kind: parameter
    dtype: Integer
    source: FNS 175.04(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-2
              excerpt: "will expire within 30 days"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          30

  - name: max_active_authorized_representatives
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: FNS 175.03(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          if household_resides_in_alcohol_and_drug_treatment_center: alcohol_drug_treatment_center_active_authorized_representative_limit else: general_active_authorized_representative_limit

  - name: active_authorized_representative_limit_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 175.03(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          active_authorized_representative_count <= max_active_authorized_representatives

  - name: head_of_household_signature_required_on_dss_1688
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 175.04(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          authorized_representative_does_not_have_power_of_attorney
          or power_of_attorney_limited_to_specific_purpose_not_including_applying_for_or_using_fns_benefits
          or (power_of_attorney_authorization_is_time_limited and power_of_attorney_days_until_expiration <= power_of_attorney_expiration_signature_window_days)
