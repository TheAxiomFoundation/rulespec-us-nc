format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-1
  summary: |-
    175.01 AUTHORIZED REPRESENTATIVE REQUIREMENTS. An authorized representative is designated by the FNS unit to apply for benefits, use FNS benefits to purchase food for the FNS unit, or both. An apply/apply-and-use representative must be an adult not included in the FNS unit. A person currently disqualified for an Intentional Program Violation cannot make application or report changes unless no other suitable applicant/recipient exists and the county director approves in writing on DSS-1688. A retailer authorized to accept FNS benefits and an agency employee involved in certification and/or issuance cannot serve unless the county DSS director approves in writing on DSS-1688 after determining no other suitable authorized representative is available. For use-only representatives, another adult household member can serve, and a currently IPV-disqualified individual can serve without director approval.
rules:
  - name: person_may_be_authorized_representative_to_apply
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 175.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-1
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          person_is_adult
          and not person_is_included_in_fns_unit
          and (not person_is_currently_disqualified_for_intentional_program_violation or (no_other_suitable_applicant_or_recipient_available_to_represent_fns_unit and county_director_approved_application_representative_in_writing_on_dss_1688))
          and (not person_is_retailer_authorized_to_accept_fns_benefits or (no_other_suitable_authorized_representative_available_for_fns_unit and county_dss_director_approved_retailer_representative_in_writing_on_dss_1688))
          and (not person_is_agency_employee_involved_in_fns_certification_or_issuance or (no_other_suitable_authorized_representative_available_for_fns_unit and county_dss_director_approved_agency_employee_representative_in_writing_on_dss_1688))
  - name: person_may_be_authorized_representative_to_use_benefits_only
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 175.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-1
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          person_is_adult_household_member_for_using_fns_benefits
          or person_is_currently_disqualified_for_intentional_program_violation
