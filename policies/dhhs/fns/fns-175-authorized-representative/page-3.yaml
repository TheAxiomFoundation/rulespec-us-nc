format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
  summary: |-
    "The head of household's signature is not required on the DSS-1688 when" specified authorized-representative circumstances exist. "Do not complete the DSS-1688 for FNS unit members designated as authorized representative to use the benefits." If evidence shows false information, misrepresentation, or improper use, prohibit service "for one calendar year" with written notice "30 calendar days prior"; ADTC or group-home representatives are exempt. When an FNS case terminates, evaluate deactivating the authorized representative's EBT card.
rules:
  - name: dss_1688_head_signature_not_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 175 B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          authorized_representative_designated_by_adtc_or_group_home
          or authorized_representative_has_full_power_of_attorney_for_fns_unit
          or authorized_representative_has_legal_guardianship_of_disabled_person_not_capable_of_signing_and_is_appropriate
          or simplified_reporting_head_of_household_deceased_and_remaining_members_are_minors
          or simplified_reporting_requirements_make_head_of_household_unavailable_to_sign_and_authorized_representative_is_appropriate

  - name: authorized_representative_ebt_card_deactivation_need_must_be_evaluated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 175.06
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          food_and_nutrition_services_case_terminates

  - name: dss_1688_must_not_be_completed_for_unit_member_authorized_representative_to_use_benefits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 175 C
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          fns_unit_member_designated_as_authorized_representative_to_use_benefits

  - name: authorized_representative_prohibition_duration_calendar_years
    kind: parameter
    dtype: Count
    source: FNS 175.05
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "for one calendar year"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          1

  - name: authorized_representative_removal_notice_prior_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 175.05 B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "30 calendar days prior"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          30

  - name: authorized_representative_misconduct_removal_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 175.05
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          (authorized_representative_provided_false_information
          or authorized_representative_misrepresented_fns_unit_circumstances
          or authorized_representative_improperly_used_fns_benefits)
          and not authorized_representative_designated_for_residents_of_adtc_or_group_home

  - name: authorized_representative_prohibition_calendar_years
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: FNS 175.05
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          if authorized_representative_misconduct_removal_applies: authorized_representative_prohibition_duration_calendar_years else: 0

  - name: authorized_representative_removal_notice_calendar_days_prior
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: FNS 175.05 B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
              excerpt: "June 1, 2021"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-175-authorized-representative/page-3
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          if authorized_representative_misconduct_removal_applies: authorized_representative_removal_notice_prior_calendar_days else: 0
