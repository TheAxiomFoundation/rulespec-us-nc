  kind: parameter
  dtype: Count
  period: Month
  source: FNS 260.07(B)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-31
          excerpt: The 36-month period
  versions:
