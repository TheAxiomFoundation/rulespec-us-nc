format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-31
  summary: '"If during the certification period an individual has a change in circumstances
    that results in the loss of an exemption from the time limit, do not assign countable
    months until the individuals is screened to determine whether any other exception
    applies at their next recertification." "If during the certification period an
    individual subject to the time limit has a change in circumstance that results
    in the individual now meeting an exemption, act promptly to apply the exemption
    and do not assign countable months once the county receives information that is
    not questionable. If it is determined that the information is questionable, then
    act promptly to verify the information. Once verified, apply the exemption and
    do not assign countable months." NC FAST tracks "The 36-month period," "3-month
    limit (countable months)," and "Bonus months (3 additional months)."'
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-31#abawd_countable_month_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
