format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-10
  summary: |-
    D. ABAWD Exemption: Pregnant. An individual who is pregnant is exempt from the ABAWD time limit. There is no minimum length of pregnancy to meet the exemption.
    E. ABAWD Exemption: Exempt from FNS work registration requirements. An individual exempt from general work registration requirements under FNS Manual § 240 is exempt from the ABAWD time limit, unless the exemption was solely due to age 60 or older.
    F. ABAWD Exemption: Unfit for employment. The State agency may determine an individual medically certified as physically or mentally unfit for employment if receiving public or private disability benefits.
rules:
  - name: pregnant_abawd_time_limit_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.D.1-D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-10
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_is_pregnant
