format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
  summary: |-
    "ABAWDs who have regained eligibility and are not meeting the FNS work requirements outlined in 260.04 can gain an additional 3 consecutive months once during the 3-year period of eligibility." Bonus months apply only to ABAWDs who regained eligibility but are no longer fulfilling the FNS work requirement, must be consecutive months, and only full months of benefits count. Benefits for individuals regaining eligibility through bonus months are prorated from the later of the day the 30 days of work were completed or the date of application.
rules:
  - name: bonus_month_count
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 260.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
              excerpt: "additional 3 consecutive months"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          3

  - name: bonus_months_may_be_used
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_abawd
          and person_regained_eligibility
          and person_not_meeting_fns_work_requirements
          and person_has_not_used_bonus_months_in_current_three_year_period

  - name: full_benefit_month_counts_as_bonus_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.05(B)(1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_receives_full_month_of_benefits

  - name: bonus_month_sequence_starts_when_working_abawd_reports_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.05(B)(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_was_working
          and person_reports_no_longer_in_compliance_with_abawd_fns_work_requirements

  - name: bonus_month_sequence_starts_when_work_program_abawd_determined_noncompliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.05(B)(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_was_participating_in_work_program
          and person_determined_no_longer_in_compliance_with_abawd_fns_work_requirements

  - name: bonus_month_regained_eligibility_benefit_start_is_later_of_work_completion_or_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 260.05(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
              excerpt: "from the day the 30 days of work were completed or from the date of application (whichever comes last)"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_regaining_eligibility_through_bonus_months
          and day_is_later_of_thirty_days_of_work_completed_or_application_date

  - name: new_thirty_six_month_period_regained_eligibility_benefits_begin_first_month_covered_by_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.05(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
              excerpt: "through a new 36-month period, beginning with the first month covered by the application"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_regaining_eligibility_through_new_thirty_six_month_period
          and month_is_first_month_covered_by_application_in_new_thirty_six_month_period

  - name: currently_exempt_regained_eligibility_benefits_begin_first_application_month_with_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.05(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_regaining_eligibility_because_currently_exempt
          and month_is_first_month_covered_by_application
          and abawd_exemption_met_for_at_least_part_of_month

  - name: now_working_regained_eligibility_benefits_begin_first_application_month_with_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.05(C)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_regaining_eligibility_because_now_working
          and month_is_first_month_covered_by_application
          and individual_is_working
