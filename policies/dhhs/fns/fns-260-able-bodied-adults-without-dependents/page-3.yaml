format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
  summary: |-
    ABAWD Work Requirement Exemptions ... individuals may also be subject to the ABAWD work requirements and time limits, unless they meet an ABAWD exemption. Post-H.R.1 exemptions include already exempt from general work requirements under FNS 240.03 except those aged 60-64 are no longer exempt on this basis alone; younger than age 18 or age 65 and older; living with someone under age 14; unfitness, disability, pregnancy; and Indian, Urban Indian, or California Indian status.
rules:
  - name: abawd_minimum_age_exemption_threshold
    kind: parameter
    dtype: Count
    source: FNS 260 ABAWD Work Requirement Exemptions, Age row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: Younger than age 18
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          18

  - name: abawd_upper_age_exemption_threshold
    kind: parameter
    dtype: Count
    source: FNS 260 ABAWD Work Requirement Exemptions, Age row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: age 65 and older
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          65

  - name: abawd_dependent_child_age_threshold
    kind: parameter
    dtype: Count
    source: FNS 260 ABAWD Work Requirement Exemptions, Dependent age row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: under age 14
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          14

  - name: general_work_age_only_lower_bound
    kind: parameter
    dtype: Count
    source: FNS 260 ABAWD Work Requirement Exemptions, General row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: aged 60-64
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          60

  - name: general_work_age_only_upper_bound
    kind: parameter
    dtype: Count
    source: FNS 260 ABAWD Work Requirement Exemptions, General row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: aged 60-64
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          64

  - name: general_work_exemption_counts_for_abawd
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD Work Requirement Exemptions, General row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: Already exempt from general work requirements under FNS 240.03. No changes; except those aged 60-64 are no longer exempt on this basis alone.
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_already_exempt_from_general_work_requirements_under_fns_240_03
          and not (
            person_general_work_exemption_basis_is_age_only
            and person_age_years >= general_work_age_only_lower_bound
            and person_age_years <= general_work_age_only_upper_bound
          )

  - name: person_meets_abawd_age_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD Work Requirement Exemptions, Age row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: Younger than age 18 or age 65 and older
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_age_years < abawd_minimum_age_exemption_threshold
          or person_age_years >= abawd_upper_age_exemption_threshold

  - name: person_lives_with_underage_household_member_for_abawd_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD Work Requirement Exemptions, Dependent age row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: Living with someone under age 14 in household
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          youngest_person_living_in_household_age_years < abawd_dependent_child_age_threshold

  - name: person_unfit_for_abawd_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD Work Requirement Exemptions, Ability to work and Other populations rows
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: Obviously mentally or physically unfit for employment as determined by the State agency or statement from medical personnel verifying unfitness.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: receiving VA disability benefits at any rating
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: individuals experiencing chronic homelessness have physical or mental barriers to work and may be found exempt as unfit
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_obviously_mentally_or_physically_unfit_for_employment_as_determined_by_state_agency
          or person_has_medical_personnel_statement_verifying_unfitness_for_employment
          or person_receives_temporary_or_permanent_disability_benefits
          or (person_is_veteran and person_receives_va_disability_benefits_at_any_rating)
          or (person_experiencing_chronic_homelessness and person_has_physical_or_mental_barriers_to_work)

  - name: person_exempt_from_abawd_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD Work Requirement Exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: individuals may also be subject to the ABAWD work requirements and time limits, unless they meet an ABAWD exemption
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: Pregnant
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-3
              excerpt: Indian, Urban Indian, or California Indian
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          general_work_exemption_counts_for_abawd
          or person_meets_abawd_age_exemption
          or person_lives_with_underage_household_member_for_abawd_exemption
          or person_unfit_for_abawd_work_requirement
          or person_is_pregnant
          or person_is_indian
          or person_is_urban_indian
          or person_is_california_indian
