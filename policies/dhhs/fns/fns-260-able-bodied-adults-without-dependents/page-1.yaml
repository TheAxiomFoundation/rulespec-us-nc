format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1
  summary: |-
    FNS 260.00 states that federal law limits a time-limited participant, commonly referred to as an ABAWD, to any three countable months in a 36-month period unless the person meets ABAWD work requirements. It defines an ABAWD as an FNS applicant or recipient, aged 18 to 64, who does not meet the criteria for an exemption from general SNAP work registration requirements in FNS Manual § 240.03 or exceptions from the ABAWD time limit in FNS Manual § 260.01. Revisions to FNS Manual § 260 are effective December 1, 2025.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1#able_bodied_adult_without_dependents
      reason: The final ABAWD definition depends on exemption criteria in FNS Manual § 240.03 and ABAWD time-limit exceptions in FNS Manual § 260.01, which are not available in the copied RuleSpec context.
      source_values:
        - us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1#abawd_minimum_age
        - us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1#abawd_maximum_age
rules:
  - name: abawd_minimum_age
    kind: parameter
    dtype: Integer
    source: FNS 260.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1
              excerpt: "aged 18 to 64"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          18

  - name: abawd_maximum_age
    kind: parameter
    dtype: Integer
    source: FNS 260.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1
              excerpt: "aged 18 to 64"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          64

  - name: abawd_countable_month_limit
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 260.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1
              excerpt: "any three countable months in a 36-month period"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          3

  - name: abawd_time_limit_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 260.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1
              excerpt: "any three countable months in a 36-month period"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          36

  - name: abawd_basic_person_criteria_before_exemptions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1
              excerpt: "An ABAWD is a FNS applicant or recipient, aged 18 to 64"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_fns_applicant_or_recipient
          and person_age >= abawd_minimum_age
          and person_age <= abawd_maximum_age

  - name: abawd_time_limit_blocks_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.00
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-1
              excerpt: "can participate in FNS to any three countable months in a 36-month period unless the person meets the ABAWD work requirements"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_time_limited_participant
          and countable_months_measurement_period_in_months == abawd_time_limit_period_months
          and countable_months_in_measurement_period > abawd_countable_month_limit
          and not person_meets_abawd_work_requirements
