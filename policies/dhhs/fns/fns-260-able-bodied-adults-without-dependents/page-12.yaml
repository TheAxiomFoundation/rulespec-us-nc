format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
  summary: |-
    "Chronic medical conditions: Individual reports cancer, heart disease, kidney disease, liver disease, or other serious chronic conditions and describes ongoing treatment ... or symptoms that limit ability to maintain a regular work schedule." "Individuals with an active substance use disorder that functionally impairs their ability to work are determined to be an individual obviously physically or mentally unfit for employment..." "Involvement in an alcohol or drug treatment program is not required..."
rules:
  - name: chronic_medical_condition_obviously_unfit_for_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item a.iv
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_reports_serious_chronic_condition
          and chronic_condition_treatment_or_symptoms_limit_regular_work_schedule
  - name: serious_mental_illness_obviously_unfit_for_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item a.v
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_reports_serious_mental_illness_diagnosis
          and serious_mental_illness_symptoms_would_interfere_with_employment
  - name: cognitive_or_developmental_disability_obviously_unfit_for_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item a.vi
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_has_cognitive_or_developmental_disability
          and individual_demonstrates_difficulty_understanding_interview_or_completing_application
  - name: combined_medical_vocational_profile_obviously_unfit_for_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item a.vii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
              excerpt: "Individuals aged 55-64 with a limited education (less than a high school degree or equivalent), no substantial gainful work activity in the past five years"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_is_aged_55_to_64
          and individual_has_less_than_high_school_degree_or_equivalent
          and no_substantial_gainful_work_activity_in_past_five_years
          and individual_has_health_condition_limiting_work_capacity
  - name: recent_hospitalization_or_medical_crisis_obviously_unfit_for_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item a.viii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_was_recently_hospitalized_or_recovering_from_acute_medical_event
  - name: substance_use_disorder_obviously_unfit_for_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_has_active_substance_use_disorder
          and substance_use_disorder_functionally_impairs_ability_to_work
  - name: alcohol_or_drug_treatment_program_not_required_for_abawd_work_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          true
  - name: experiencing_chronic_homelessness
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, item c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_lacks_fixed_and_regular_nighttime_residence
  - name: person_obviously_physically_or_mentally_unfit_for_employment_for_abawd_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, Section 260, page 12, items a.iv-a.viii and b-c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-12
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          chronic_medical_condition_obviously_unfit_for_work
          or serious_mental_illness_obviously_unfit_for_work
          or cognitive_or_developmental_disability_obviously_unfit_for_work
          or combined_medical_vocational_profile_obviously_unfit_for_work
          or recent_hospitalization_or_medical_crisis_obviously_unfit_for_work
          or substance_use_disorder_obviously_unfit_for_employment
          or experiencing_chronic_homelessness
