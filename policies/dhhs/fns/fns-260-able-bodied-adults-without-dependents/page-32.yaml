format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
  summary: |-
    status changes if a change in situation occurs, e.g., if it becomes known to the agency that the individual is now exempt. If the ABAWD temporarily fails to meet the work requirement (with good cause), do not count as a non-compliant month.

    260.08 ABAWD MORE THAN A JOB NC SERVICES PROGRAM ... optional program that counties may participate in ...

    260.09 COMPONENT ACTIVITIES FOR ABAWDS The following activities are optional for each county. ... A. ... WIA ... minimum of 20 hours each week. B. ... community college program ... minimum of 20 hours each week. C. ... community work experience ... required number of hours a month. Determine the number of hours that are required monthly by dividing the FNS benefit amount by the current federal minimum wage.
rules:
  - name: good_cause_temporary_work_requirement_failure_counts_as_non_compliant_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.07/260.08 page 32
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          temporarily_fails_to_meet_work_requirement
          and not has_good_cause_for_temporary_work_requirement_failure
  - name: wia_component_minimum_hours_per_week
    kind: parameter
    dtype: Decimal
    period: Week
    source: FNS 260.09(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
              excerpt: "WIA) for a minimum of 20 hours each week"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          20
  - name: community_college_component_minimum_hours_per_week
    kind: parameter
    dtype: Decimal
    period: Week
    source: FNS 260.09(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
              excerpt: "community college program ... for a minimum of 20 hours each week"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          20
  - name: meets_wia_component_activity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 260.09(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32#wia_component_minimum_hours_per_week
              output: wia_component_minimum_hours_per_week
              hash: sha256:local
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          placed_in_wia_program
          and actively_participates_in_wia_program
          and wia_program_hours_per_week >= wia_component_minimum_hours_per_week
  - name: meets_community_college_component_activity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 260.09(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32#community_college_component_minimum_hours_per_week
              output: community_college_component_minimum_hours_per_week
              hash: sha256:local
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          placed_in_community_college_program
          and actively_participates_in_community_college_program
          and community_college_program_hours_per_week >= community_college_component_minimum_hours_per_week
  - name: community_work_experience_required_hours_per_month
    kind: derived
    entity: Household
    dtype: Decimal
    period: Month
    source: FNS 260.09(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
              excerpt: "Determine the number of hours that are required monthly by dividing the FNS benefit amount by the current federal minimum wage."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-32
              excerpt: "If the ABAWD is a member of a household where others are receiving FNS benefits, divide the entire household FNS benefit amount by hourly minimum wage."
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          fns_benefit_amount / current_federal_minimum_wage
