format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-6
  summary: '"All FNS participants must be screened at certification and recertification
    for the work registration exemptions ... and ABAWD exemptions ... First, screen
    ... for an exemption from the general work registration requirements ... Then,
    sequentially, screen ... for an exemption from the ABAWD work requirements ...
    Do not assign countable months unless the participant has been screened and it
    is determined that no exemption applies ... The Consolidated Work Notice (DSS-8569)
    must be provided ... at certification, recertification, and whenever a previously
    exempt household member or new household member becomes subject to work requirements
    ... Apply the time limit to participants who have received FNS benefits while
    not meeting the ABAWD work requirements for three months in a 36-month periods."'
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-6#abawd_countable_month_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-6#abawd_time_limit_applies
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: abawd_time_limit_window_months
  kind: parameter
  dtype: Count
  source: FNS 260, Screening for Exemptions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-6
          excerpt: three months in a 36-month periods
  versions:
  - effective_from: '2025-12-01'
    formula: '36'
- name: work_requirement_exemption_screening_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 260, Screening for Exemptions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-6
  versions:
  - effective_from: '2025-12-01'
    formula: 'person_is_fns_participant

      and (certification_review_is_occurring or recertification_review_is_occurring)'
- name: countable_month_assignment_allowed
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 260, Screening for Exemptions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-6
  versions:
  - effective_from: '2025-12-01'
    formula: 'participant_screened_for_work_registration_exemptions

      and participant_screened_for_abawd_exemptions

      and no_exemption_applies_after_required_screening'
- name: consolidated_work_notice_and_verbal_explanation_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 260, Screening for Exemptions
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-6
  versions:
  - effective_from: '2025-12-01'
    formula: "person_is_fns_participant\nand (\n  certification_review_is_occurring\n\
      \  or recertification_review_is_occurring\n  or previously_exempt_household_member_becomes_subject_to_work_requirements\n\
      \  or new_household_member_becomes_subject_to_work_requirements\n)"
