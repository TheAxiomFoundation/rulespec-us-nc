format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-27
  summary: |-
    Individuals subject to the ABAWD work requirements are required to report changes by the 10th of the month following the month of change when hours working fall below 20 hours per week. At reapplication, the worker must ask whether the applicant completed ABAWD work requirements within 30 consecutive days or more since losing FNS eligibility.
rules:
  - name: abawd_reportable_weekly_work_hours_threshold
    kind: parameter
    dtype: Integer
    source: FNS 260, page 27, item A.7.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-27
              excerpt: "hours working fall below 20 hours per week"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          20

  - name: abawd_hours_drop_reporting_deadline_day_of_following_month
    kind: parameter
    dtype: Integer
    source: FNS 260, page 27, item A.7.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-27
              excerpt: "by the 10th of the month following the month of change"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          10

  - name: abawd_reapplication_work_requirement_consecutive_day_threshold
    kind: parameter
    dtype: Count
    source: FNS 260, page 27, item B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-27
              excerpt: "within 30 consecutive days or more"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          30

  - name: abawd_hours_drop_report_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, page 27, item A.7.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-27
              excerpt: "Individuals subject to the ABAWD work requirements are required to report changes ... when the number of hours working fall below 20 hours per week"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_subject_to_abawd_work_requirements
          and weekly_work_hours < abawd_reportable_weekly_work_hours_threshold

  - name: abawd_hours_drop_reporting_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, page 27, item A.7.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-27
              excerpt: "required to report changes by the 10th of the month following the month of change"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          not abawd_hours_drop_report_required
          or (report_made_in_month_following_change and report_day_of_month <= abawd_hours_drop_reporting_deadline_day_of_following_month)

  - name: completed_abawd_work_requirements_for_reapplication_duration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260, page 27, item B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-27
              excerpt: "completed the ABAWD work requirements within 30 consecutive days or more at any time since losing FNS eligibility"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          maximum_consecutive_days_completed_abawd_work_requirements_since_losing_fns_eligibility >= abawd_reapplication_work_requirement_consecutive_day_threshold
