format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
  summary: |-
    "Short-term or long-term disability benefits from private insurance." "Requesting additional verification is not required if information regarding the receipt of disability benefits is already known to the agency through data exchanges." "When an individual's unfitness for work is obvious during the certification or recertification interview, the State agency does not need to require a statement or verification from medical personnel. The eligibility worker's determination that unfitness is obvious is sufficient to establish the exemption." Conditions can indicate obvious inability "to work at least 80 hours per month or 20 hours per week on average."
rules:
  - name: obvious_unfitness_monthly_work_hours_minimum
    kind: parameter
    dtype: Count
    source: FNS 260 ABAWD, Section 260, page 11, obvious unfitness indicators
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
              excerpt: "80 hours per month"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          80

  - name: obvious_unfitness_weekly_average_work_hours_minimum
    kind: parameter
    dtype: Count
    source: FNS 260 ABAWD, Section 260, page 11, obvious unfitness indicators
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
              excerpt: "20 hours per week on average"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          20

  - name: private_disability_benefits_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 11, disability benefit exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_receives_short_term_disability_benefits_from_private_insurance
          or person_receives_long_term_disability_benefits_from_private_insurance

  - name: disability_benefit_receipt_additional_verification_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 11, verification of disability benefit receipt
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          disability_benefit_receipt_known_to_agency_through_data_exchange

  - name: disability_benefit_receipt_proof_may_be_requested
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 11, verification of disability benefit receipt
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          not disability_benefit_receipt_known_to_county

  - name: unable_to_work_required_abawd_hours_for_obvious_unfitness
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 11, obvious unfitness indicators
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
              excerpt: "unable to work at least 80 hours per month or 20 hours per week on average"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          available_work_hours_per_month < obvious_unfitness_monthly_work_hours_minimum
          or average_available_work_hours_per_week < obvious_unfitness_weekly_average_work_hours_minimum

  - name: obvious_unfitness_for_work_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 11, obvious physical or mental unfitness for work
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-11
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          eligibility_worker_determines_unfitness_for_work_is_obvious
          and unable_to_work_required_abawd_hours_for_obvious_unfitness
