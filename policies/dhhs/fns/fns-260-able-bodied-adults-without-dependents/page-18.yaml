    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-18
  summary: |-
    "First, screen the individual for any exemptions from the general work requirements under FNS Manual § 240 ... Second, if the individual is not exempt from general work requirements, screen specifically for ABAWD exemptions under FNS Manual § 260.01. Continue screening even after identifying one exemption, to identify all applicable exemptions. When multiple exemptions apply, document all exemptions in NC FAST and apply the exemption that will be in effect the longest. Use open-ended questions and active listening to identify potential exemptions."
