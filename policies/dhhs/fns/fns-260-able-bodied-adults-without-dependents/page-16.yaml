format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-16
  summary: |-
    An individual is a "California Indian" under 25 USC. § 1679(a) if they are a member of a federally recognized Indian tribe in California; are a qualifying descendant of an Indian residing in California on June 1, 1852; hold specified Indian trust interests in California; or are a listed Indian of California on rancheria/reservation asset distribution plans, or a descendant of such an Indian. Effective November 1, 2025, implementation guidance directs screening for the Indian, Urban Indian, and California Indian exemption at applications.
rules:
  - name: urban_indian_criteria_member_or_descendant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 4 criteria (a), page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-16
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          member_of_tribe_band_or_other_organized_group_of_indians
          or descendant_in_first_or_second_degree_of_member_of_tribe_band_or_group
  - name: urban_indian
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 4 criteria, page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-16
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          urban_indian_criteria_member_or_descendant
          or person_is_eskimo_aleut_or_other_alaska_native
          or person_determined_indian_by_secretary_of_interior_regulations
          or person_determined_indian_by_secretary_of_health_and_human_services_regulations
  - name: california_indian_descendant_path
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 4.4.a.ii, page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-16
              excerpt: "descendant of an Indian who was residing in California on June 1, 1852"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          descendant_of_indian_residing_in_california_on_june_first_eighteen_fifty_two
          and member_of_indian_community_served_by_local_indian_health_service_program
          and regarded_as_indian_by_community_in_which_descendant_lives
  - name: california_indian
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 4.4.a, page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-16
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          member_of_federally_recognized_indian_tribe_in_california
          or california_indian_descendant_path
          or indian_holds_trust_interests_in_california_public_domain_national_forest_or_reservation_allotments
          or indian_of_california_listed_on_rancheria_or_reservation_asset_distribution_plans_or_descendant
