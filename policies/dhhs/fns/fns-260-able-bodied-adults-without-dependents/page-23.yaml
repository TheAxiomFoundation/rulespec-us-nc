format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-23
  summary: |-
    "ABAWDs participating in a work program can combine job search and/or job search training (9 hours maximum) with other ABAWD qualifying activities to allow ABAWDs to meet the 20-hour weekly work requirement." Qualifying Work Program Activities include WIOA programs, section 236 Trade Act programs, and More Than A Job NC education or training; each row requires 20 hours, and More Than A Job job search activities must be less than half of required hours.
rules:
  - name: abawd_weekly_work_requirement_hours
    kind: parameter
    dtype: Integer
    period: Week
    source: FNS 260, Section C.vi and Qualifying Work Program Activities chart
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-23
              excerpt: "20-hour weekly work requirement"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          20

  - name: job_search_training_combination_cap_hours
    kind: parameter
    dtype: Integer
    period: Week
    source: FNS 260, Section C.vi
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-23
              excerpt: "job search and/or job search training (9 hours maximum)"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          9

  - name: abawd_qualifying_work_program_activity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 260, Qualifying Work Program Activities chart
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-23
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          activity_is_wioa_program
          or activity_is_section_236_trade_act_program
          or activity_is_more_than_a_job_nc_education_or_training_with_required_snap_e_t_plan_conditions

  - name: abawd_work_program_combined_hours_meet_weekly_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 260, Section C.vi and Qualifying Work Program Activities chart
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-23
              excerpt: "combine job search and/or job search training (9 hours maximum) with other ABAWD qualifying activities"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          abawd_qualifying_work_program_activity
          and (other_abawd_qualifying_activity_hours_per_week + min(job_search_or_job_search_training_hours_per_week, job_search_training_combination_cap_hours)) >= abawd_weekly_work_requirement_hours
