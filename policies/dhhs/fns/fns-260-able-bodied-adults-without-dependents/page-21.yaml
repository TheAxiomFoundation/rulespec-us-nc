format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-21
  summary: "\"Each month of the ABAWD\u2019s participation must be evaluated individually.\
    \ If the individual is exempt for one day or more, they are exempt for the entire\
    \ month. A countable ABAWD month is any month that the individual: 1. Received\
    \ a full month (not prorated) of FNS benefits; and 2. Was not exempt from ABAWD\
    \ requirements; and 3. Did not fulfill the work requirements.\" Non-countable\
    \ months include prorated months and months meeting ABAWD work requirements, including\
    \ working an average of 20 hours per week (80 hours in the month)."
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-21#abawd_countable_month_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: abawd_monthly_exemption_day_threshold
  kind: parameter
  dtype: Count
  period: Month
  source: FNS 260.04.A
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-21
          excerpt: exempt for one day or more
  versions:
  - effective_from: '2025-12-01'
    formula: '1'
- name: abawd_weekly_work_hours_threshold
  kind: parameter
  dtype: Count
  period: Week
  source: FNS 260.04.B.2.a
  metadata:
