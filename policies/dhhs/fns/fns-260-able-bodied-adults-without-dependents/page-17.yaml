format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
  summary: |-
    If clear information shows that an individual within their certification period meets the American Indian exemption, apply the exemption promptly and do not assign a countable ABAWD month. Self-attestation of this exemption must be accepted unless questionable; the declaration is questionable only if inconsistent with NC FAST information or prior known statements. FNS participants must be screened for all exemptions from general work registration requirements and ABAWD work requirements at initial application and recertification; recertification screening is not optional and is independent from the interview.
rules:
  - name: american_indian_self_attestation_questionable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.02, American Indian exemption verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          american_indian_self_declaration_inconsistent_with_nc_fast_information
          or american_indian_self_declaration_inconsistent_with_prior_known_statements

  - name: american_indian_self_attestation_must_be_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.02, American Indian exemption verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_self_attests_status_as_indian_urban_indian_or_california_indian
          and not american_indian_self_attestation_questionable

  - name: american_indian_exemption_applies_during_certification_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.02, meeting the exception during the certification period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_is_within_certification_period
          and clear_information_individual_meets_american_indian_exemption

  - name: countable_abawd_month_must_not_be_assigned_due_to_american_indian_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.02, meeting the exception during the certification period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          american_indian_exemption_applies_during_certification_period

  - name: fns_participant_exemption_screening_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.02 ABAWD exemption screening requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_is_fns_participant
          and (screening_occurs_at_initial_application or screening_occurs_at_recertification)

  - name: recertification_exemption_screening_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.02 ABAWD exemption screening requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_is_fns_participant
          and screening_occurs_at_recertification

  - name: exemption_screening_independent_from_interview
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.02 ABAWD exemption screening requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-17
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          exemption_screening_performed_independently_from_application_or_recertification_interview
