format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
  summary: |-
    "When the individual's housing situation, as described, creates barriers that prevent working 20 hours per week, they are determined to be an individual obviously physically or mentally unfit for employment ... Domestic Violence and obvious unfitness. Survivors of recent acts of domestic violence, sexual harassment, sexual assault, or stalking that have impacted their physical or mental health and currently interferes with their ability to maintain work, are determined to be obviously physically or mentally unfit for employment ... No medical verification is required when unfitness is obvious ... Not obviously unfit - medical statement is required."
rules:
  - name: weekly_work_hours_obvious_unfitness_threshold
    kind: parameter
    dtype: Count
    period: Week
    source: FNS 260 ABAWD, Section 260, page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
              excerpt: "prevent working 20 hours per week"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          20

  - name: obviously_unfit_due_to_housing_barrier
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 13, paragraph 2(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
              excerpt: "prevent working 20 hours per week"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          housing_situation_is_described_unsuitable_sleeping_accommodation
          and maximum_weekly_work_hours_possible_due_to_housing_barrier < weekly_work_hours_obvious_unfitness_threshold

  - name: obviously_unfit_due_to_domestic_violence_impact
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 13, paragraph 2(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          survivor_of_recent_domestic_violence_sexual_harassment_sexual_assault_or_stalking
          and recent_act_impacted_physical_or_mental_health
          and recent_act_currently_interferes_with_ability_to_maintain_work

  - name: obviously_physically_or_mentally_unfit_for_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 13, paragraphs 2(c)-2(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          obviously_unfit_due_to_housing_barrier
          or obviously_unfit_due_to_domestic_violence_impact

  - name: medical_verification_required_for_unfitness
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 13, paragraphs 2(f)-3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_has_indicated_unfit_to_work
          and unfitness_not_obvious_after_thorough_screening
          and not obviously_physically_or_mentally_unfit_for_employment

  - name: acceptable_medical_statement_source
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260, page 13, paragraph 3(a)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-13
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          medical_statement_source_is_physician
          or medical_statement_source_is_physician_assistant
          or medical_statement_source_is_nurse
