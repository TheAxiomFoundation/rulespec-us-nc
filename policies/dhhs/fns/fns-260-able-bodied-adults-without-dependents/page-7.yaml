format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7
  summary: |-
    ABAWD Work Requirements Time-limited participants can meet the ABAWD work requirements in several ways: Working 80 hours a month; participating in a qualifying work program for 80 hours a month; or working and participating in a qualifying work program for a total of 80 hours a month. An individual who meets at least one exemption listed in this section is not subject to the ABAWD time-limit. If an individual is exempt for any part of the month, the individual is exempt for the entire month. Self-attestation must be accepted for verification of ABAWD exemptions, unless questionable.
rules:
  - name: abawd_monthly_work_requirement_hours
    kind: parameter
    dtype: Decimal
    period: Month
    source: FNS 260.01, ABAWD Work Requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7
              excerpt: "Working 80 hours a month"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          80

  - name: abawd_work_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.01, ABAWD Work Requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7#abawd_monthly_work_requirement_hours
              output: abawd_monthly_work_requirement_hours
              hash: sha256:local
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          abawd_monthly_work_hours >= abawd_monthly_work_requirement_hours
          or abawd_monthly_qualifying_work_program_hours >= abawd_monthly_work_requirement_hours
          or abawd_monthly_work_hours + abawd_monthly_qualifying_work_program_hours >= abawd_monthly_work_requirement_hours

  - name: abawd_exempt_for_entire_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_exempt_from_abawd_time_limit_for_any_part_of_month

  - name: not_subject_to_abawd_time_limit_due_to_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_meets_at_least_one_abawd_exemption_listed_in_this_section

  - name: self_attestation_must_be_accepted_for_abawd_exemption_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_self_attests_abawd_exemption
          and not self_attestation_is_questionable

  - name: self_attestation_questionable_determination_permitted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          self_attestation_reviewed_on_case_by_case_basis
