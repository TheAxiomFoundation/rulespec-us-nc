format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8
  summary: |-
    "the Department may not set verification standards that target certain participants as a group in a discriminatory manner for more intensive verification"; "Receipt of temporary or permanent disability benefits still require verification other than self-attestation." "If self-attestation is questionable, attempt to verify using all available information before requiring an individual to provide verification of their exemption status." "Individuals must be given at least 10 days to return additional verification of an ABAWD exemption, but only if the self-attestation was questionable or unfitness for work is not obvious."
rules:
  - name: additional_abawd_exemption_verification_return_period_days
    kind: parameter
    dtype: Integer
    source: FNS 260 ABAWD, Section 260 Change #02-2025, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8
              excerpt: "at least 10 days to return additional verification"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          10

  - name: discriminatory_group_intensive_verification_standard_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260 Change #02-2025, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          verification_standard_targets_certain_participants_as_group_for_more_intensive_verification

  - name: disability_benefits_exception_status_requires_verification_other_than_self_attestation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260 Change #02-2025, note under item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          receives_temporary_or_permanent_disability_benefits

  - name: available_information_verification_attempt_required_before_requesting_exemption_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260 Change #02-2025, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_or_household_member_attests_to_abawd_exemption
          and self_attestation_of_abawd_exemption_is_questionable

  - name: additional_abawd_exemption_verification_return_period_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260 Change #02-2025, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8#additional_abawd_exemption_verification_return_period_days
              output: additional_abawd_exemption_verification_return_period_days
              hash: sha256:local
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          additional_abawd_exemption_verification_return_period_days >= 10
          and (
            self_attestation_of_abawd_exemption_is_questionable
            or unfitness_for_work_is_not_obvious
          )

  - name: application_or_recertification_may_not_be_denied_or_delayed_due_to_exemption_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 260 ABAWD, Section 260 Change #02-2025, item 4(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-8
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          individual_screened_for_all_abawd_exemptions
          and not otherwise_exempt_based_on_self_attestation
          and self_attestation_questionable_due_to_agency_known_information_or_unresolved_prior_conflicting_statements
          and not otherwise_exempt_using_information_available_to_agency
          and not otherwise_exempt_due_to_obvious_mental_or_physical_unfitness
