format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
  summary: '"North Carolina uses a fixed clock to measure the 36-month period. The
    current fixed clock is a 3-year period which is January 1st, 2025 through December
    31st, 2027." "Individuals subject to the ABAWD work requirements are generally
    limited to receiving 3 countable months of FNS benefits during the 36-month fixed
    period." "A countable month is a month during which an individual receives FNS
    benefits for the full benefit month while not fulfilling the ABAWD work requirements,
    without good cause, and without otherwise being exempt..." Countable months are
    cumulative, may be non-consecutive, must not be assigned before exemption screening,
    and overpayment referral is explored only if a non-exempt ABAWD exceeds 3 countable
    months and the household failed to report or timely report a reportable change.'
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20#abawd_countable_month_limit
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20#abawd_countable_month_limit_exceeded
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
  - output: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20#overpayment_referral_exploration_required
    reason: Generated rule depends on an output that validation deferred because it
      flattened thresholded, capped, base-limited, or cross-referenced mechanics,
      or borrowed an unrelated same-named section term.
rules:
- name: fixed_clock_period_month_count
  kind: parameter
  dtype: Count
  period: Month
  source: FNS 260.03, Determining Countable Months
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
          excerpt: North Carolina uses a fixed clock to measure the 36-month period.
  versions:
  - effective_from: '2025-12-01'
    formula: '36'
- name: abawd_weekly_work_hours_reporting_threshold
  kind: parameter
  dtype: Count
  period: Week
  source: FNS 260.03(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
          excerpt: below 20 hours per week
  versions:
  - effective_from: '2025-12-01'
    formula: '20'
- name: abawd_monthly_work_hours_reporting_threshold
  kind: parameter
  dtype: Count
  period: Month
  source: FNS 260.03(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
          excerpt: or 80 hours a month
  versions:
  - effective_from: '2025-12-01'
    formula: '80'
- name: abawd_work_hours_reduction_report_due_day
  kind: parameter
  dtype: Count
  period: Month
  source: FNS 260.03(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
          excerpt: by the 10th of the month following the month
  versions:
  - effective_from: '2025-12-01'
    formula: '10'
- name: countable_month
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 260.03(B)-(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
  versions:
  - effective_from: '2025-12-01'
    formula: 'individual_receives_fns_benefits_for_full_benefit_month

      and individual_is_subject_to_abawd_work_requirements

      and individual_has_been_screened_for_general_work_registration_and_abawd_exemptions

      and no_general_work_registration_or_abawd_exemption_applies

      and not individual_fulfills_abawd_work_requirements

      and not individual_has_good_cause_for_not_fulfilling_abawd_work_requirements'
- name: abawd_work_hours_reduction_report_required
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 260.03(D)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20#abawd_weekly_work_hours_reporting_threshold
          output: abawd_weekly_work_hours_reporting_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20#abawd_monthly_work_hours_reporting_threshold
          output: abawd_monthly_work_hours_reporting_threshold
          hash: sha256:local
  versions:
  - effective_from: '2025-12-01'
    formula: 'work_hours_were_reduced

      and (current_work_hours_per_week < abawd_weekly_work_hours_reporting_threshold
      or current_work_hours_per_month < abawd_monthly_work_hours_reporting_threshold)'
- name: overissuance_not_created_due_to_timely_report_or_discovery
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 260.03, Over issuance situations 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
  versions:
  - effective_from: '2025-12-01'
    formula: 'change_reported_timely_or_discovered_within_household_reporting_timeframe

      and change_requires_notice_of_adverse_action

      and not sufficient_time_to_decrease_or_terminate_benefits_prior_to_next_month'
- name: overissuance_not_created_due_to_non_reportable_change
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 260.03, Over issuance situations 2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-260-able-bodied-adults-without-dependents/page-20
  versions:
  - effective_from: '2025-12-01'
    formula: non_reportable_change_reported_or_discovered
