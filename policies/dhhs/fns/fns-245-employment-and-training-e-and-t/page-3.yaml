format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-3
  summary: |-
    Work Experience: assignments may not replace regular employees; volunteer hours may not exceed monthly FNS allotment divided by minimum wage; mandatory E&T participants may be required to work up to 30 hours per week, with total work and non-work participation limited to 120 hours per month. Education programs must directly link to job readiness; listed examples include ABE, Basic Literacy, and ESL.
rules:
  - name: mandatory_et_work_experience_weekly_hour_limit
    kind: parameter
    dtype: Count
    period: Week
    source: FNS 245 Employment & Training, Section 245 Change #17-2021, Work Experience
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-3
              excerpt: "mandatory E&T participants can be required to work up to 30 hours per week"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          30

  - name: mandatory_et_total_monthly_participation_hour_limit
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 245 Employment & Training, Section 245 Change #17-2021, Work Experience
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-3
              excerpt: "total hours of participation in both work and non-work components is limited to 120 hours per month"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          120

  - name: work_experience_volunteer_monthly_hour_limit
    kind: derived
    entity: Household
    dtype: Float
    period: Month
    source: FNS 245 Employment & Training, Section 245 Change #17-2021, Work Experience
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-3
              excerpt: "dividing the household's monthly FNS allotment by minimum wage"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          household_monthly_fns_allotment / applicable_minimum_wage

  - name: work_experience_assignment_permitted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training, Section 245 Change #17-2021, Work Experience
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-3
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          work_experience_site_has_agreement_with_state_dss
          and not assignment_replaces_regular_employee_performing_similar_work_for_equal_hours

  - name: education_program_acceptable_for_et
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training, Section 245 Change #17-2021, Education Programs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-3
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          education_program_establishes_direct_link_to_job_readiness

  - name: federal_et_education_operating_cost_authorized
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training, Section 245 Change #17-2021, Education Programs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-3
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          education_program_costs_exceed_normal_cost_of_services_to_non_et_participants
          and not federal_et_funds_take_place_of_non_federal_funds_for_existing_educational_services
