format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-7
  summary: |-
    FNS 245 E&T page 7 states that transportation or other items necessary for participation may be arranged, purchased, or paid up to the county-set monthly amount, and payments may be made in advance for anticipated coming-month expenses. It requires termination of volunteer E&T status when listed changes occur or when the FNS unit participant fails to apply for recertification within 30 days after the certification period ends. It also states that FNS recipients participating in the E&T Work Experience component are covered by a statewide workers' compensation policy.
rules:
  - name: monthly_participation_expense_payment_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 245.03, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-7
              excerpt: "items necessary for participation up to whatever amount the county sets per month"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          if person_is_fns_et_participant and expense_item_is_necessary_for_participation: county_set_monthly_participation_expense_amount else: 0

  - name: advance_participation_expense_payment_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245.03, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-7
              excerpt: "payments to FNS E&T participants may be made in advance for anticipated expenses in the coming month"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_fns_et_participant
          and payment_is_for_anticipated_expenses_in_coming_month

  - name: volunteer_et_status_termination_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245.04(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-7
              excerpt: "Reasons for termination of volunteer status are"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-7
              excerpt: "fails to apply for recertification within 30 days after the end of its certification period"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          volunteer_moved_from_employment_and_training_county
          or volunteer_no_longer_wishes_to_volunteer
          or volunteer_does_not_comply_with_et_partner
          or volunteer_terminated_from_fns_for_reason_other_than_work_requirement_disqualification_or_failure_to_reapply
          or fns_unit_participant_failed_to_apply_for_recertification_within_30_days_after_certification_period_end

  - name: work_experience_workers_compensation_coverage_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-7
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_fns_recipient
          and person_participates_in_fns_et_work_experience_component
