format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-1
  summary: |-
    To participate in E&T, FNS recipients must be eligible members of active FNS units, be 16 years of age and older, have a path to employment upon completion, reside in a county operating E&T, and be unemployed seeking employment, underemployed desiring better employment, or work-registration exempt volunteers seeking employment. WFFA applicants and recipients required to participate in employment services and refugees receiving cash assistance while participating in RRP are ineligible.
rules:
  - name: person_may_participate_in_e_and_t
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245.00 Employment and Training (E&T) Work Program
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-1
              excerpt: "To participate in E&T, FNS recipients must meet the following requirements"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-1
              excerpt: "Individuals who are ineligible to participate E&T Program are"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_eligible_member_of_active_fns_unit
          and person_is_16_years_of_age_or_older
          and person_has_path_to_employment_upon_program_completion
          and person_resides_in_county_operating_e_and_t_program
          and (
            person_is_unemployed_fns_recipient_seeking_employment
            or person_is_underemployed_fns_recipient_desiring_better_employment
            or (
              person_is_exempt_from_work_registration
              and person_volunteers_for_e_and_t
              and person_is_seeking_employment
            )
          )
          and not person_is_wffa_applicant_or_recipient_required_to_participate_in_employment_services
          and not person_is_refugee_receiving_cash_assistance_while_participating_in_rrp
