format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-4
  summary: |-
    Vocational and Technical Training includes vocational courses focused on a specific trade with a hands-on approach and technical courses at technical, community or junior colleges. Job retention provides supportive services for up to 90 days to individuals who have secured employment.
rules:
  - name: job_retention_supportive_services_maximum_days
    kind: parameter
    dtype: Integer
    period: Day
    source: FNS 245 Employment & Training, Section 245, p. 4, Job Retention
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-4
              excerpt: "Job retention component provides supportive services for up to 90 days"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-4
              excerpt: "Change #17-2021 September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          90

  - name: job_retention_supportive_services_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 245 Employment & Training, Section 245, p. 4, Job Retention
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-4
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-4
              excerpt: "supportive services for up to 90 days to individuals who have secured employment"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-4
              excerpt: "Change #17-2021 September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_has_secured_employment
          and days_since_employment_secured <= job_retention_supportive_services_maximum_days
