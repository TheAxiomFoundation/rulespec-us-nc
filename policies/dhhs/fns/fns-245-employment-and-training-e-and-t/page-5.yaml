format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-5
  summary: |-
    Job retention is only applicable to individuals who have previously participated in other E&T components and were receiving FNS benefits in the month of or one month prior to beginning job retention services. Job retention is a standalone component; a participant cannot be in job retention and another component simultaneously. Job retention services can be granted even if the individual is no longer a member of an active FNS case, and there is no limit on the number of times an individual may receive job retention services as long as the individual has re-engaged with E&T prior to obtaining new employment. Supportive services can include case management, life skills classes, referrals, fees, clothing, equipment or tools, relocation, transportation, and childcare. Self-employment training improves employability by training participants to set up and operate a small business or other self-employment venture. Pre-apprenticeship prepares individuals to enter and succeed in an Apprenticeship program through an approved training curriculum based on industry standards.
rules:
  - name: job_retention_services_applicable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training (E&T), Section 245, page 5, job retention
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-5
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_previously_participated_in_other_e_t_components
          and person_received_fns_benefits_in_month_of_or_one_month_prior_to_beginning_job_retention
          and not person_is_simultaneously_in_another_e_t_component
          and (not person_has_previously_received_job_retention_services or person_reengaged_with_e_t_prior_to_obtaining_new_employment)

  - name: active_fns_case_membership_not_required_for_job_retention
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training (E&T), Section 245, page 5, job retention active FNS case clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          job_retention_services_applicable

  - name: job_retention_supportive_service_included
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training (E&T), Section 245, page 5, supportive services list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          payment_is_case_management
          or payment_is_life_skill_classes
          or payment_is_referrals_to_other_services
          or payment_is_test_fees
          or payment_is_licensing_and_bonding_fees
          or payment_is_clothing_required_for_job
          or payment_is_equipment_or_tools_required_for_job
          or payment_is_relocation_expenses_for_employment_purposes
          or payment_is_transportation_assistance
          or payment_is_childcare

  - name: self_employment_training_component_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training (E&T), Section 245, page 5, Self-Employment Training
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          training_provides_setting_up_and_operating_small_business_or_self_employment_venture

  - name: pre_apprenticeship_curriculum_component_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 245 Employment & Training (E&T), Section 245, page 5, Pre-Apprenticeship / Apprenticeship
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-245-employment-and-training-e-and-t/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          pre_apprenticeship_prepares_individual_to_enter_and_succeed_in_apprenticeship_program
          and program_has_approved_training_curriculum_based_on_industry_standards
