format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-1
  summary: |-
    "Individuals must meet the following criteria to be eligible for SNAP: Receive SSI ... Age 65 or older ... Not living in an institution ... Residing in North Carolina ... Purchasing and preparing food separately ... Not receiving Food and Nutrition Services, Food Stamps, or SNAP in another state. Meet regular FNS Household Concept Requirements ... All SNAP Cases are one-person households. NOTE: Married individuals living in the same home cannot be considered a separate household."
rules:
  - name: person_eligible_for_snap
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 600.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-1
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-1
              excerpt: "being in an Alcohol/Drug Treatment Center (ADTC) is considered being institutionalized"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-1
              excerpt: "Married individuals living in the same home cannot be considered a separate household."
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_receives_ssi
          and person_is_age_65_or_older
          and not person_lives_in_institution
          and not person_is_in_alcohol_or_drug_treatment_center
          and person_resides_in_north_carolina
          and person_purchases_and_prepares_food_separately_from_others_in_home
          and not person_receives_food_and_nutrition_services_food_stamps_or_snap_in_another_state
          and person_meets_regular_fns_household_concept_requirements
          and not person_cannot_be_included_in_fns_unit_under_fns_210_07
          and person_is_in_one_person_snap_household
          and not person_is_married_living_in_same_home_as_spouse

  - name: income_and_deductions_disregarded_for_snap_allotment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 600.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_eligible_for_snap

  - name: shelter_costs_used_for_snap_allotment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 600.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          person_eligible_for_snap
