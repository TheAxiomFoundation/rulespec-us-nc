format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-8
  summary: |-
    "Certify the case for 36 months." "NC FAST closes the case if the household fails to return the DSS-8232 by the end of the first month following the last month of the certification period." SNAP cases are subject to claims and Quality Control sampling.
rules:
  - name: snap_certification_period_months
    kind: parameter
    dtype: Count
    source: FNS 600, Section 600 Change #01-2025, certification instruction G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-8
              excerpt: "Certify the case for 36 months."
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          36

  - name: snap_case_closes_for_missing_dss_8232
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 600, Section 600 Change #01-2025, certification instruction H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_failed_to_return_dss_8232_by_end_of_first_month_following_certification_period

  - name: snap_case_subject_to_claims
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 600.11 Claims
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_snap_case

  - name: snap_case_subject_to_quality_control_sampling
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 600.12 Quality Control
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-8
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_snap_case
