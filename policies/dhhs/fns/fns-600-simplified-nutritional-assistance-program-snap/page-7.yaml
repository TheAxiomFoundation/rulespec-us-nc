format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-7
  summary: |-
    Household member is deceased: Update appropriate evidence and close the SNAP case. A Notice of Adverse Action is not required.
    A third-party report that the household member is institutionalized, moved out of state, or deceased: Contact the institution, out of state agency, vital records or the household by telephone to verify the reported change. If you are unable to obtain needed verification, send a DSS-8650 to the household to verify the reported change. Send a DSS-8553 to terminate the SNAP case if the change affects SNAP eligibility or the household fails to respond to the DSS-8650.
    Do not interview the individual unless the individual requests an interview. Do not screen SNAP late recertifications for expedited service. Do not prorate SNAP Benefits.
rules:
  - name: snap_case_closure_required_for_deceased_member
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 600, Change #01-2025, deceased household member procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-7
              excerpt: "Change #01-2025 October 01, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-600-simplified-nutritional-assistance-program-snap/page-7
              excerpt: "Household member is deceased: Update appropriate evidence and close the SNAP case."
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_member_is_deceased

  - name: adverse_action_notice_not_required_for_deceased_member
