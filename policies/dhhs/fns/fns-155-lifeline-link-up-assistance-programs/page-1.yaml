format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-155-lifeline-link-up-assistance-programs/page-1
  summary: |-
    155.02 LIFELINE/LINK-UP ASSISTANCE PROGRAMS REQUIREMENTS A. The customers must have an income that is at or below 135% of the federal Poverty Guidelines and receive assistance from one of these programs: 1. Food and Nutrition Services; 2. Medicaid; 3. Supplemental Security Income (SSI); 4. Federal Public Housing Assistance; 5. Veterans or Survivors Pension Benefits; 6. Bureau of Indian Affairs General Assistance; and 7. Tribally Specific programs. B. Head of household must have the telephone service listed in his/her name; and C. Receive the telephone bill.
rules:
  - name: lifeline_income_limit_percentage
    kind: parameter
    dtype: Rate
    source: FNS 155.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-155-lifeline-link-up-assistance-programs/page-1
              excerpt: "at or below 135% of the federal Poverty Guidelines"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-155-lifeline-link-up-assistance-programs/page-1
              excerpt: "June 1, 2021"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          1.35

  - name: income_within_lifeline_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 155.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-155-lifeline-link-up-assistance-programs/page-1
              excerpt: "income that is at or below 135% of the federal Poverty Guidelines"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          customer_income <= lifeline_income_limit_percentage * federal_poverty_guideline_amount_for_customer

  - name: receives_listed_assistance_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 155.02(A)(1)-(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-155-lifeline-link-up-assistance-programs/page-1
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          receives_food_and_nutrition_services
          or receives_medicaid
          or receives_supplemental_security_income
          or receives_federal_public_housing_assistance
          or receives_veterans_or_survivors_pension_benefits
          or receives_bureau_of_indian_affairs_general_assistance
          or receives_tribally_specific_program_assistance

  - name: lifeline_link_up_requirements_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 155.02(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-155-lifeline-link-up-assistance-programs/page-1
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          income_within_lifeline_limit
          and receives_listed_assistance_program
          and head_of_household_has_telephone_service_listed_in_own_name
          and head_of_household_receives_telephone_bill
