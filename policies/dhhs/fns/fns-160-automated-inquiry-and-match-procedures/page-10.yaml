format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
  summary: |-
    "Shredding ... lines are perpendicular to the cutting line. The paper should be shredded into strips that are no wider than 5/16 inch. ... Microfilmed data must be incinerated or melted or shredded to a 1/35 inch by 3/8 inch strip. ... SSA data ... may be destroyed after three years or after all audits have cleared ... Store screen prints ... physically safe ... retrieve screen prints immediately. ... Use the DOC inquiry ... Use the ACTS New Hire Inquiry screen ..."
rules:
  - name: paper_shredding_max_strip_width_inches
    kind: parameter
    dtype: Float
    source: FNS 160, page 10, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
              excerpt: "no wider than 5/16 inch"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          5 / 16

  - name: microfilmed_data_shredded_strip_width_inches
    kind: parameter
    dtype: Float
    source: FNS 160, page 10, item 3 and 160.B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
              excerpt: "shredded to a 1/35 inch by 3/8 inch strip"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          1 / 35

  - name: microfilmed_data_shredded_strip_length_inches
    kind: parameter
    dtype: Float
    source: FNS 160, page 10, item 3 and 160.B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
              excerpt: "shredded to a 1/35 inch by 3/8 inch strip"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          3 / 8

  - name: ssa_data_destruction_retention_years
    kind: parameter
    dtype: Count
    source: FNS 160.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
              excerpt: "may be destroyed after three years or after all audits have cleared"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          3

  - name: paper_shredding_standard_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: FNS 160, page 10, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          paper_inserted_with_lines_perpendicular_to_cutting_line
          and actual_paper_shredded_strip_width_inches <= paper_shredding_max_strip_width_inches

  - name: microfilmed_data_destruction_standard_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: FNS 160, page 10, item 3 and 160.B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          asset_is_microfilmed_data
          and (
            microfilmed_data_incinerated
            or microfilmed_data_melted
            or (
              actual_microfilmed_data_shredded_strip_width_inches <= microfilmed_data_shredded_strip_width_inches
              and actual_microfilmed_data_shredded_strip_length_inches <= microfilmed_data_shredded_strip_length_inches
            )
          )

  - name: ssa_data_destruction_allowed
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: FNS 160.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          asset_is_ssa_data
          and (data_age_years >= ssa_data_destruction_retention_years or all_audits_have_cleared)
          and (
            destruction_method_is_shredding
            or destruction_method_is_incineration
            or material_sealed_in_cardboard_boxes_and_buried_at_landfill_under_management_supervision
            or microfilmed_data_destruction_standard_satisfied
          )

  - name: microfilmed_or_imaged_case_information_security_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: FNS 160.10.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          not asset_is_microfilmed_or_imaged_case_information_data
          or asset_treated_with_same_security_measures_as_case_files

  - name: screen_print_storage_security_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: FNS 160.10.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          not asset_is_screen_print_of_esc_bendex_sdx_tpqy_or_solq_sheet
          or (
            stored_in_area_physically_safe_from_unauthorized_access_during_business_hours
            and stored_in_area_physically_safe_from_unauthorized_access_during_non_business_hours
          )

  - name: shared_printer_screen_print_retrieval_satisfied
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Year
    source: FNS 160.10.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          not screen_print_routed_to_shared_printer_in_common_area
          or screen_print_retrieved_immediately

  - name: doc_inquiry_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          household_reports_absent_parent_in_prison
          or household_reports_drug_felony_conviction

  - name: work_release_income_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          doc_inquiry_indicates_work_release_income

  - name: work_release_income_case_file_documentation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          doc_inquiry_indicates_work_release_income

  - name: acts_new_hire_inquiry_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-10
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          household_at_application
          or household_at_reapplication
          or household_at_full_recertification
