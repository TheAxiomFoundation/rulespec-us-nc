format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-7
  summary: |-
    "Once the caseworker determines that there are resources or income reported on the FRR or BEER Reports, the caseworker must independently verify these resources or income at recertification." Exception: "When the IRS is the payor of income reported on the 1099-INT, consider the information verified. Do not contact the IRS for additional verification." If unreported, send DSS-8650 and allow ten calendar days.
rules:
  - name: client_information_response_period_days
    kind: parameter
    dtype: Integer
    source: FNS 160.08(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-7
              excerpt: "Allow the FNS unit ten calendar days"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          10

  - name: independently_verify_reported_income_or_resource_at_recertification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 160.08(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-7
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-7
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          caseworker_determines_income_or_resource_reported_on_frr_or_beer_report
          and recertification_is_being_worked
          and not income_reported_on_1099_int_has_irs_as_payor

  - name: request_client_financial_institution_and_account_number
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 160.08(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-7
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          resource_or_income_has_not_been_previously_reported
          and attempting_to_obtain_information_from_client
          and dss_8650_requests_financial_institution_name_and_account_number
          and client_information_response_period_days == 10

  - name: document_client_provided_institution_and_account_number
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 160.08(A)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-7
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          fns_unit_provides_financial_institution_name
          and fns_unit_provides_account_number

  - name: send_signed_financial_information_request_to_institution
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 160.08(A)(1)(a)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-7
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          client_signs_dss_3431_request_for_financial_information
