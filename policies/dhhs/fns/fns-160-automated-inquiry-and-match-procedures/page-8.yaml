format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
  summary: |-
    "If the client refuses to sign the DSS-3431, issue a DSS-8553, Notice of Adverse Action ... to terminate the case." If the client does not respond or refuses to provide the institution name, fill in the financial institution and account number on a DSS-3431 and attempt to obtain the client's signature. If the FNS unit signs the DSS-3431, send verification to the appropriate financial institution; if income or resource was previously verified as terminated, no further verification is required.
rules:
  - name: financial_institution_signature_attempt_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160, page 8, item b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          client_did_not_respond_to_request_or_refused_to_provide_institution_name
  - name: financial_institution_verification_request_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160, page 8, item b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          client_did_not_respond_to_request_or_refused_to_provide_institution_name
          and fns_unit_signed_dss_3431
  - name: verification_letter_copy_filing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160, page 8, item b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          financial_institution_verification_request_required
  - name: verification_letter_return_filing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160, page 8, item b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          financial_institution_verification_request_required
          and verification_letter_returned
  - name: adverse_action_notice_to_terminate_case_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160, page 8, items a.ii and b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          client_refuses_to_sign_dss_3431
  - name: no_further_verification_required_for_terminated_verified_income_or_resource
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160, page 8, items b.ii-b.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          income_or_resource_documented_in_case_file
          and income_or_resource_previously_verified
          and income_or_resource_verified_as_terminated
  - name: frr_match_results_documentation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160, page 8, items a.iii and b.i-b.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-8
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          client_refuses_to_sign_dss_3431
          or financial_institution_verification_request_required
          or no_further_verification_required_for_terminated_verified_income_or_resource
