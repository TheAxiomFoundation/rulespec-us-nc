format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
  summary: |-
    Review of these procedures must be conducted annually, and employees are required to sign a Documentation of Annual Security Training. The director appoints security and FRR/BEER control roles and ensures agency security requirements. FRR/BEER Reports contain FTI and require two barriers to access. The FRR/BEER control person must distribute worker copies, keep a sign-out/return log maintained for five years, keep reports locked when not used, ensure timely action, ensure caseworker copies are returned and filed with the control copy, and not destroy reports until all copies are returned. The Security Control Officer conducts internal inspections and semi-annual reviews.
rules:
  - name: annual_security_training_review_frequency
    kind: parameter
    dtype: Count
    source: FNS 160, Section 160 Change 03-2021, page 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
              excerpt: "Review of these procedures must be conducted annually"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          1
  - name: required_fti_access_barrier_count
    kind: parameter
    dtype: Count
    source: FNS 160, Section 160 Change 03-2021, page 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
              excerpt: "The IRS requires two barriers to accessing federal tax information"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          2
  - name: frr_beer_log_retention_years
    kind: parameter
    dtype: Count
    source: FNS 160, Section 160 Change 03-2021, page 6, Responsibilities of the FRR/BEER Control Person
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
              excerpt: "This log must be maintained for five years before it is destroyed."
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          5
  - name: fti_access_security_barrier_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 160, Section 160 Change 03-2021, page 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
              excerpt: "two barriers to accessing federal tax information"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          frr_beer_reports_contain_fti
          and agency_fti_access_barrier_count >= required_fti_access_barrier_count
  - name: frr_beer_control_person_log_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 160, Section 160 Change 03-2021, page 6, Responsibilities of the FRR/BEER Control Person
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
              excerpt: "maintained for five years"
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          person_is_designated_frr_beer_control_person
          and log_indicates_reports_recipient
          and log_indicates_date_signed_out
          and log_indicates_date_information_returned
          and log_retention_years >= frr_beer_log_retention_years
  - name: frr_beer_control_person_copy_control_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 160, Section 160 Change 03-2021, page 6, Responsibilities of the FRR/BEER Control Person
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          person_is_designated_frr_beer_control_person
          and reports_remain_under_lock_and_key_when_not_used_by_caseworker
          and reports_acted_on_within_program_time_frames
          and all_caseworker_copies_returned_and_filed_with_control_copy
          and reports_not_destroyed_until_all_copies_returned
  - name: security_control_officer_review_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 160, Section 160 Change 03-2021, page 6, Responsibilities of the Security Control Officer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-6
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          person_is_security_control_officer
          and internal_inspections_conducted
          and semi_annual_reviews_of_county_dss_staff_conducted
