format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
  summary: |-
    "At application, reapplication and recertification request NC FAST on-line data matches for DES. Use all reported SSN's to obtain online data matches in NC FAST for each FNS unit member's wage and UIB data..." "Follow up on all leads by discussing them with the applicant." "When a discrepancy between the match and the information provided by the applicant is discovered, obtain verification to determine eligibility." "Request NC FAST on-line data matches at application, reapplication, and at each full recertification for every household member using all reported SSN's."
rules:
  - name: des_online_data_match_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 160.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          fns_unit_member_has_reported_ssn
          and (case_action_is_application or case_action_is_reapplication or case_action_is_recertification)

  - name: des_match_findings_documentation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 160.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          des_inquiry_shows_wages_or_uib

  - name: des_lead_follow_up_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 160.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          des_match_produces_lead

  - name: des_discrepancy_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 160.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          des_match_information_discrepancy_discovered

  - name: household_contact_required_for_unreported_or_incorrect_des_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160.02(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          des_wages_or_uib_not_reported_or_incorrect

  - name: prior_reporting_failure_evaluation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 160.02(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          wages_or_uib_verification_available

  - name: bendex_online_data_match_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 160.03(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-160-automated-inquiry-and-match-procedures/page-2
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          household_member_has_reported_ssn
          and (case_action_is_application or case_action_is_reapplication or case_action_is_full_recertification)
