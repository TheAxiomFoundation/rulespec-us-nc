  summary: |-
    Federal regulations require the State to maintain and use an IEVS. Using the social security number (SSN) for all household members, the State matches information with specified agencies. Information gained through the IEVS process is used to verify eligibility, determine FNS benefits due, investigate potential overissuance, and support criminal or civil prosecutions. County DSS is required to conduct NC FAST on-line data matches at application, reapplication or recertification, and when appropriate for reported changes. Complete appropriate action on match reports that are "verified upon receipt" within 30 calendar days; FRR's and BEER's are not considered verified upon receipt and no action is taken until the next recertification.
