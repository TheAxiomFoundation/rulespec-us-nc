format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
  summary: 'Section 805 Change #1-2017 April 1, 2017.

    Establish a claim for the TFNS household if the FNS unit fails to report a move
    to another State and apply for and receive benefits in another State and the other
    State does not establish a claim.

    Voluntary Quit Penalties: first violation one month, second violation three months,
    third or subsequent violation six months, each until the household member complies
    or the period, whichever is later.

    Transfer of Reserve Penalties, Households With Ineligible Individuals, and Households
    With Disqualified Individuals apply only if the change was reportable.'
rules:
- name: first_voluntary_quit_penalty_minimum_months
  kind: parameter
  dtype: Count
  source: FNS 805, page 5, F.1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: For the first violation ... one month
  versions:
  - effective_from: '2017-04-01'
    formula: '1'
- name: second_voluntary_quit_penalty_minimum_months
  kind: parameter
  dtype: Count
  source: FNS 805, page 5, F.2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: For the second violation ... three months
  versions:
  - effective_from: '2017-04-01'
    formula: '3'
- name: third_or_subsequent_voluntary_quit_penalty_minimum_months
  kind: parameter
  dtype: Count
  source: FNS 805, page 5, F.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: For the third or subsequent violation ... six months
  versions:
  - effective_from: '2017-04-01'
    formula: '6'
- name: voluntary_quit_penalty_minimum_disqualification_months
  kind: derived
  entity: Person
  dtype: Count
  period: Month
  source: FNS 805, page 5, F.1-F.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: first violation ... one month ... second ... three months ... third
            or subsequent ... six months
  versions:
  - effective_from: '2017-04-01'
    formula: 'if voluntary_quit_first_violation: first_voluntary_quit_penalty_minimum_months
      else: if voluntary_quit_second_violation: second_voluntary_quit_penalty_minimum_months
      else: if voluntary_quit_third_or_subsequent_violation: third_or_subsequent_voluntary_quit_penalty_minimum_months
      else: 0'
- name: voluntary_quit_disqualification_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 805, page 5, F
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: An individual required to report and subject to the penalty for
            voluntary quit is disqualified
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: until the household member complies or ... whichever is later
  versions:
  - effective_from: '2017-04-01'
    formula: "individual_required_to_report_and_subject_to_voluntary_quit_penalty\n\
      and voluntary_quit_penalty_minimum_disqualification_months > 0\nand (\n  not\
      \ household_member_has_complied\n  or not applicable_voluntary_quit_minimum_period_has_elapsed\n\
      )"
- name: voluntary_quit_claim_may_need_to_be_established
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 805, page 5, F.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: It may be necessary to establish a claim ... unless the penalty
            can still be imposed timely.
  versions:
  - effective_from: '2017-04-01'
    formula: 'individual_failed_to_report_voluntary_quit_timely

      and voluntary_quit_penalty_minimum_disqualification_months > 0

      and not voluntary_quit_penalty_can_still_be_imposed_timely'
- name: recipient_claim_must_be_established
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 805, page 5, items 2-5 and H-I
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: Establish a claim for the TFNS household if the FNS unit fails
            to report a move to another State
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: agency fails to remove a member of a TFNS case
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: Establish an Agency Error Claim for the TFNS household
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: Establish a claim when a household containing an ineligible member
            fails to report
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: Establish a claim when a household containing a disqualified member
            fails to report
  versions:
  - effective_from: '2017-04-01'
    formula: "(\n  household_is_tfns_household\n  and fns_unit_failed_to_report_move_to_another_state\n\
      \  and fns_unit_applied_for_and_received_benefits_in_another_state\n  and other_state_does_not_establish_claim\n\
      )\nor (\n  household_is_tfns_household\n  and agency_failed_to_remove_member_reported_added_to_another_nc_fns_unit\n\
      )\nor (\n  household_is_tfns_household\n  and agency_failed_to_remove_member_reported_receiving_fns_in_another_state\n\
      )\nor (\n  household_is_tfns_household\n  and member_disqualified_for_intentional_program_violation_not_removed_from_budget\n\
      )\nor (\n  household_contains_ineligible_member\n  and household_failed_to_report_change_making_ineligible_member_eligible\n\
      \  and ineligible_member_change_is_reportable\n)\nor (\n  household_contains_disqualified_member\n\
      \  and household_failed_to_report_change_in_income_or_reserve_for_disqualified_member\n\
      \  and disqualified_member_income_or_reserve_change_is_reportable\n)"
- name: agency_error_claim_must_be_established_for_tfns_household
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 805, page 5, item 5
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: Establish an Agency Error Claim for the TFNS household when a member
            disqualified for an Intentional Program Violation is not removed from
            the budget.
  versions:
  - effective_from: '2017-04-01'
    formula: 'household_is_tfns_household

      and member_disqualified_for_intentional_program_violation_not_removed_from_budget'
- name: transfer_of_reserve_penalty_ineligibility_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 805, page 5, G
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-5
          excerpt: household is ineligible for the appropriate number of months only
            if this was a reportable change
  versions:
  - effective_from: '2017-04-01'
    formula: "transfer_of_reserve_change_is_reportable\nand (\n  household_failed_to_report_information_that_would_have_resulted_in_disqualification\n\
      \  or agency_failed_to_act_on_information_that_would_have_resulted_in_disqualification\n\
      )"
