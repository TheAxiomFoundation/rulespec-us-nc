format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
  summary: |-
    Change #1-2017 April 1, 2017. "Do not establish a claim against a Simplified Reporting or SNAP household for moving out of state." For dual benefits in NC and another state, the state where the false statement was made establishes the claim, and the other state establishes a claim if that state does not. Sponsored-alien overissuances from sponsor-supplied incorrect information create joint sponsor and alien-household liability unless good cause, no sponsor fault, or the three-year sponsor-liability period ends. For changed household composition, collection is against the overissued household and adult household members at the time of overissuance.
rules:
  - name: moving_out_of_state_recipient_claim_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, J
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_is_simplified_reporting_or_snap_household
          and household_moved_out_of_state

  - name: nc_establishes_dual_benefit_false_statement_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, J
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_receives_dual_benefits_in_nc_and_another_state
          and false_statement_made_at_second_application_about_first_state_benefits
          and (
            nc_is_state_where_false_statement_was_made
            or not state_where_false_statement_was_made_establishes_claim
          )

  - name: alien_household_solely_liable_for_sponsored_alien_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805.04(A)(1), (A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "good cause or was not at fault"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "If an overissuance occurs three years after the alien's entry"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          overissuance_resulted_from_incorrect_information_provided_by_sponsor
          and (
            sponsor_had_good_cause_for_incorrect_information
            or sponsor_was_not_at_fault_for_supplying_incorrect_information
            or overissuance_occurred_after_sponsor_liability_period_after_alien_entry
          )

  - name: overissued_household_collection_initiated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805.04(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_received_overissuance

  - name: sponsor_jointly_liable_for_sponsored_alien_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805.04(A)(1), (A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "claims established within three years after the alien's entry"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          overissuance_resulted_from_incorrect_information_provided_by_sponsor
          and not sponsor_had_good_cause_for_incorrect_information
          and not sponsor_was_not_at_fault_for_supplying_incorrect_information
          and claim_established_within_sponsor_liability_period_after_alien_entry

  - name: adult_member_collection_initiated_after_composition_change
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805.04(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-3
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_composition_changed
          and person_was_adult_household_member_when_overissuance_occurred
