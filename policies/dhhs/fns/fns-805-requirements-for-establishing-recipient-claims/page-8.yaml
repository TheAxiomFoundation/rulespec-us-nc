format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-8
  summary: |-
    "Receipt of continued benefits during a hearing process when the hearing officer affirms the reduction or termination of benefits"; "Overissuances identified through USDA audit findings"; "Overissuances identified through QC referrals"; failures to report ineligibility, excluded/disqualified-member income or resources, moving to another state and receiving benefits there, categorical eligibility later lost due to unreported income, and improper SSI from SSA action or inaction. "Intentional Program Violation (IPV) - Do not pursue an IPV when information is known to the agency in another eligibility program. An IPV exists when there is clear and convincing evidence" of knowing, willful, deceitful listed actions, including false statements, hiding information, and using an EBT card to receive listed items.
rules:
  - name: recipient_claim_basis
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, page 8, items 3-10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-8
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-8
              excerpt: "April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          (household_received_continued_benefits_during_hearing_process
          and hearing_officer_affirmed_reduction_or_termination_of_benefits
          and not exception_under_section_805_03_d_applies)
          or overissuance_identified_through_usda_audit_findings
          or overissuance_identified_through_qc_referral
          or household_failed_to_report_member_may_be_ineligible_or_disqualified
          or household_failed_to_report_income_or_resources_of_excluded_or_disqualified_member
          or fns_unit_failed_to_report_moving_to_another_state_and_receiving_benefits_from_another_state
          or household_received_fns_solely_because_of_categorical_eligibility_and_later_lost_ssi_or_wffa_due_to_unreported_income
          or ssa_action_or_inaction_caused_improper_ssi_due_to_unreported_income
  - name: intentional_program_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805, page 8, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-8
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-8
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-8
              excerpt: "April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          clear_and_convincing_evidence_of_knowing_willful_and_deceitful_intent
          and not information_known_to_agency_in_another_eligibility_program
          and (made_verbal_or_written_false_statement_to_obtain_ineligible_benefits
          or hid_information_to_obtain_ineligible_benefits
          or used_ebt_card_to_receive_cash
          or used_ebt_card_to_receive_alcoholic_beverages
          or used_ebt_card_to_receive_tobacco_products
          or used_ebt_card_to_receive_illegal_drugs
          or used_ebt_card_to_receive_firearms
          or used_ebt_card_to_receive_ammunition)
