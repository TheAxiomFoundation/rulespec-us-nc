format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-9
  summary: |-
    "Misuse of an EBT card" includes use to pay on a credit/charge account and allowing another person to use the card or benefits. "Trafficking is defined as buying or selling EBT cards or FNS benefits for cash or consideration other than eligible food," attempts to buy or sell benefits online or in public, exchange for firearms, ammunition, explosives, or controlled substances, reselling food bought with benefits, or deposit-container purchases intended to obtain cash. "Establish the claim for the amount that was actually trafficked." Individuals who attempt to sell or trade FNS benefits/cards for cash or items not allowed by USDA regulations are guilty of an IPV.
rules:
  - name: fns_benefit_trafficking
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805, page 9, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-9
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          buys_or_sells_ebt_card_or_fns_benefits_for_cash
          or buys_or_sells_ebt_card_or_fns_benefits_for_consideration_other_than_eligible_food
          or attempts_to_buy_or_sell_fns_benefits_online_or_in_public
          or exchanges_fns_benefits_for_firearms
          or exchanges_fns_benefits_for_ammunition
          or exchanges_fns_benefits_for_explosives
          or exchanges_fns_benefits_for_controlled_substances
          or resells_food_purchased_with_fns_benefits
          or purchases_return_deposit_container_product_with_fns_benefits_intending_to_obtain_cash
  - name: trafficking_claim_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 805, page 9, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-9
              excerpt: "Establish the claim for the amount that was actually trafficked."
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-9
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          if fns_benefit_trafficking: max(0, fns_benefits_amount_actually_trafficked) else: 0
  - name: attempted_sale_or_trade_is_intentional_program_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805, page 9, item 6.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-9
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          attempts_to_sell_or_trade_fns_benefits_or_cards_for_cash
          or attempts_to_sell_or_trade_fns_benefits_or_cards_for_items_not_allowed_by_usda_regulations
  - name: ebt_card_misuse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805, page 9, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-9
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          uses_ebt_card_to_pay_credit_or_charge_account
          or allows_someone_else_to_use_ebt_card_or_fns_benefits
