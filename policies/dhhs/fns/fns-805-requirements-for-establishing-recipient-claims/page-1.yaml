format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
  summary: |-
    "All adult (age 18 and over) household members and any emancipated minor head of household are jointly and separately liable for the value of any overissued benefits." "Establish a recipient claim against a household that received more FNS benefits than it was entitled to receive." "Do not establish a claim against households for non-reportable changes." "There are three types of recipient claims": Agency Error, Inadvertent Household Error, and Intentional Program Violation. "Neither an Agency Error (AE) claim nor an Inadvertent Household Error (IHE) claim is established solely based on the fact that the local agency failed to insure that certain procedural requirements were met."
rules:
  - name: recipient_claim_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805.01(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
              excerpt: "April 1, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_received_more_fns_benefits_than_entitled
          and not overissuance_is_for_non_reportable_change

  - name: agency_error_claim_type_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
              excerpt: "April 1, 2017"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          agency_action_or_inaction
          and (not claim_is_state_issuance_error or state_office_authorized_state_issuance_error_claim_type)

  - name: agency_error_recipient_claim_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805.01(A), (C); FNS 805.02(A); FNS 805.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
              excerpt: "April 1, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          recipient_claim_established
          and agency_error_claim_type_available
          and not claim_based_solely_on_local_agency_procedural_requirements_failure

  - name: inadvertent_household_error_recipient_claim_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805.01(A), (C); FNS 805.02(B); FNS 805.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
              excerpt: "April 1, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          recipient_claim_established
          and household_misunderstanding_or_unintentional_error
          and not claim_based_solely_on_local_agency_procedural_requirements_failure

  - name: intentional_program_violation_recipient_claim_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805.01(A), (C); FNS 805.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
              excerpt: "April 1, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          recipient_claim_established
          and (
            household_intentionally_failed_to_report
            or household_misrepresented_situation
            or household_intentionally_misused_benefits
          )

  - name: recipient_claim_debtor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805.01 General Policy; FNS 805.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
              excerpt: "April 1, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-1
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          person_was_household_member_at_time_of_overissuance
          and (
            person_is_adult_age_18_or_over
            or person_is_emancipated_minor_head_of_household
            or person_is_head_of_household_under_age_18
          )
