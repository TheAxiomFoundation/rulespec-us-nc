format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
  summary: |-
    a. The overissuance occurred after an adult household member left the home; and b. Leaving the home was not a reportable change. Establish a claim, but do not consider the spouse a debtor since he was not living in the home at the time of the overissuance.
    C. Categorically Eligible Households. Establish a claim if the household fails to provide correct or complete information at application or recertification; does not report a change reportable for its category; was receiving FNS solely because of categorical eligibility and was subsequently determined ineligible for Work First Family Assistance or SSI except TFNS. Do not establish a claim due to resources exceeding the FNS limits, unless the household was subsequently found ineligible by Work First Family Assistance or Social Security Administration.
    D. Authorized Representatives. The household and authorized representative are equally liable for any erroneous issuance as a result of incorrect or incomplete information provided by the authorized representative, except when benefits are trafficked or misused by the authorized representative without the FNS unit's knowledge.
    E. Transitional Food and Nutrition Services Households. The household is liable for any overissuance that occurred prior to the TFNS benefit period.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4#agency_not_responsible_for_tfns_period_prior_error_overissuance
      reason: The source assigns responsibility to the agency, but Agency is not a supported RuleSpec entity.
    - output: us-nc:policies/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4#fns_unit_not_responsible_for_tfns_period_prior_error_overissuance
      reason: The source assigns responsibility to the FNS unit, but this source slice does not define a SnapUnit membership relation needed to represent that entity.
rules:
  - name: person_excluded_as_debtor_after_nonreportable_departure
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805, page 4, adult household member departure example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
              excerpt: "do not consider the spouse a debtor since he was not living in the home at the time of the overissuance"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          adult_household_member_left_home_before_overissuance
          and leaving_home_was_not_reportable_change
          and not person_living_in_home_at_time_of_overissuance

  - name: household_categorically_eligible_under_expanded_definition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, page 4, C.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
              excerpt: "Effective June 1, 2001, the definition of categorical eligibility was expanded to include FNS households in which at least one member is authorized to receive Work First cash assistance, Benefit Diversion, or Work First Employment services."
    versions:
      - effective_from: '2001-06-01'
        formula: |-
          household_is_fns_household
          and (
            household_has_member_authorized_to_receive_work_first_cash_assistance
            or household_has_member_authorized_to_receive_benefit_diversion
            or household_has_member_authorized_to_receive_work_first_employment_services
          )

  - name: claim_must_be_established_for_categorically_eligible_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, page 4, C.1-C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_failed_to_provide_correct_or_complete_information_at_application_or_recertification
          or household_failed_to_report_change_reportable_for_its_category
          or (
            household_received_fns_solely_because_of_categorical_eligibility
            and household_subsequently_determined_ineligible_for_work_first_family_assistance_or_ssi
            and not household_receiving_tfns
          )
          or (
            household_resources_exceeded_fns_limits
            and (
              household_subsequently_found_ineligible_by_work_first_family_assistance
              or household_subsequently_found_ineligible_by_social_security_administration
            )
          )

  - name: household_liable_for_authorized_representative_erroneous_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, page 4, D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
              excerpt: "equally liable for any erroneous issuance as a result of incorrect or incomplete information provided by the authorized representative, except when benefits are trafficked or misused"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          erroneous_issuance_resulted_from_authorized_representative_incorrect_or_incomplete_information
          and not benefits_trafficked_or_misused_by_authorized_representative_without_fns_unit_knowledge

  - name: authorized_representative_liable_for_erroneous_issuance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805, page 4, D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
              excerpt: "household and authorized representative are equally liable for any erroneous issuance"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          erroneous_issuance_resulted_from_authorized_representative_incorrect_or_incomplete_information
          and not benefits_trafficked_or_misused_by_authorized_representative_without_fns_unit_knowledge

  - name: authorized_representative_responsible_for_treatment_center_or_trafficking_erroneous_issuance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 805, page 4, D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
              excerpt: "responsible for an erroneous issuance occurring when he is the representative for an alcoholic/drug treatment center, or when he is found guilty of trafficking EBT benefits"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          erroneous_issuance_occurred
          and (
            authorized_representative_for_alcoholic_drug_treatment_center
            or authorized_representative_found_guilty_of_trafficking_ebt_benefits
          )

  - name: household_liable_for_pre_tfns_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, page 4, E.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-4
              excerpt: "The household is liable for any overissuance that occurred prior to the TFNS benefit period."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          overissuance_occurred_prior_to_tfns_benefit_period
