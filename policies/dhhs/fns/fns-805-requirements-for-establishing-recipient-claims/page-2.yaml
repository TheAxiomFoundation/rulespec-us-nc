format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
  summary: |-
    "Do not establish a claim solely because the application is not signed, providing benefits are correct." "The claim amount is less than $125.00 for a non-participating household, unless the referral is discovered by a QC review, the result of trafficking, or the local agency has a state approved claims management plan for less than $125.00." "B. eFunds system errors." "E. The FNS allotment is based on anticipated income and deductions. If the 'anticipation' is incorrect, there is no overissuance..." "I. Neither the agency nor the FNS unit are responsible for overissuances that occur during the period of TFNS benefits..." "However, a claim must be established..."
rules:
  - name: nonparticipating_household_claim_establishment_minimum
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 805 page 2, item A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
              excerpt: "less than $125.00"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          125.00

  - name: unsigned_application_alone_does_not_require_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, item A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          application_is_unsigned
          and benefits_are_correct

  - name: out_of_county_unreported_claim_must_be_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, item A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          debtor_lived_in_county_other_than_certifying_county_at_overissuance
          and debtor_did_not_report_living_in_other_county_at_overissuance
          and certifying_local_agency_issued_benefits

  - name: small_claim_threshold_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, item A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          referral_discovered_by_qc_review
          or claim_result_of_trafficking
          or local_agency_has_state_approved_claims_management_plan_for_claims_under_minimum

  - name: small_nonparticipating_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, item A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_is_non_participating
          and claim_amount < nonparticipating_household_claim_establishment_minimum
          and not small_claim_threshold_exception_applies

  - name: efunds_system_error_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          efunds_system_error_caused_overissuance

  - name: untimely_employment_training_adverse_action_notice_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          agency_failed_to_send_employment_training_adverse_action_notice_timely

  - name: fair_hearing_future_disqualification_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          benefits_continued_because_of_fair_hearing
          and fair_hearing_appealed_employment_training_voluntary_quit_or_workfare_noncompliance
          and proposed_disqualification_is_for_future_period

  - name: anticipated_allotment_error_no_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          allotment_based_on_anticipated_income_and_deductions
          and anticipation_was_incorrect
          and all_eligibility_factors_were_correctly_considered
          and allotment_was_computed_correctly

  - name: ssi_approved_joint_application_information_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          jointly_processed_ssi_and_fns_application_taken_by_social_security_office
          and ssi_application_approved
          and information_reported_to_ssa_at_application_or_during_initial_twelve_month_certification_period

  - name: ssi_denied_joint_application_information_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          jointly_processed_ssi_and_fns_application_taken_by_social_security_office
          and ssi_application_denied
          and information_reported_to_ssa_at_application_or_during_initial_certification_period

  - name: nonreportable_certification_period_change_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_circumstances_changed_during_certification_period
          and household_was_not_required_to_report_change

  - name: tfns_error_overissuance_claim_exclusion_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          overissuance_occurred_during_tfns_benefit_period
          and (overissuance_resulted_from_wffa_check_error or overissuance_resulted_from_fns_allotment_determination_prior_to_tfns)
          and not household_received_dual_benefits_during_tfns_period
          and not ipv_disqualification_should_have_been_imposed_during_tfns_period

  - name: pre_tfns_overissuance_claim_must_be_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          overissuance_received_in_months_prior_to_tfns_benefit_period

  - name: tfns_dual_benefits_or_ipv_claim_must_be_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805 page 2, paragraph I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-2
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_received_dual_benefits_during_tfns_period
          or ipv_disqualification_should_have_been_imposed_during_tfns_period
