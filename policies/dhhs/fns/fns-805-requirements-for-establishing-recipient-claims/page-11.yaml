format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-11
  summary: |-
    Each claim must have a separate Voluntary Repayment Agreement. All FNS claims must be paid off within 36 months, unless a hardship was determined. If a debtor makes a Voluntary Repayment Agreement for 36 months and it is determined at a later date that there is a hardship, the Voluntary Repayment Agreement can be renegotiated for 60 month payments, however the monthly payment must meet the minimum requirements to pay the claim in full within 60 months from the Date of Establishment.
rules:
  - name: standard_fns_claim_payoff_month_limit
    kind: parameter
    dtype: Count
    source: FNS 805, page 11, Voluntary Repayment Agreement payoff period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-11
              excerpt: "All FNS claims must be paid off within 36 months"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          36
  - name: hardship_renegotiated_fns_claim_payoff_month_limit
    kind: parameter
    dtype: Count
    source: FNS 805, page 11, hardship renegotiation payoff period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-11
              excerpt: "renegotiated for 60 month payments"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          60
  - name: fns_claim_payoff_month_limit
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: FNS 805, page 11, FNS claim payoff period and hardship exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-11
              excerpt: "within 36 months, unless a hardship was determined"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-11
              excerpt: "renegotiated for 60 month payments"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          if household_has_fns_claim: if hardship_was_determined: hardship_renegotiated_fns_claim_payoff_month_limit else: standard_fns_claim_payoff_month_limit else: 0
  - name: each_claim_has_separate_voluntary_repayment_agreement_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, page 11, separate Voluntary Repayment Agreement requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-11
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_has_fns_claim and each_claim_has_separate_voluntary_repayment_agreement
  - name: hardship_renegotiation_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 805, page 11, hardship renegotiation condition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-11
              excerpt: "If a debtor makes a Voluntary Repayment Agreement for 36 months and it is determined at a later date that there is a hardship"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          debtor_made_voluntary_repayment_agreement_for_standard_month_limit
          and hardship_was_determined_at_later_date
