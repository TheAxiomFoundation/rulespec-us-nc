format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-7
  summary: 5. Issuing duplicate EBT benefits. 6. Allowing dual participation by a
    FNS unit household or household member by listed failures. 7. Failure to timely
    disqualify a household member found guilty of an IPV. 8. Failure to act on a Disqualified
    Recipient System (DRS) match. 9-11. Overissuances identified through USDA audit
    findings, QC referrals, and State Agency errors. 12-16. Additional agency-error
    situations, including the TFNS-period limitation and categorical-eligibility/WFFA/SSI
    condition. B. Inadvertent Household Error (IHE) - A recipient claim may result
    from, but is not limited to listed situations. Do not code a suspected IPV claim
    as an IHE while waiting for an ADH or prosecution.
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-7#inadvertent_household_error_recipient_claim_may_result
    reason: The IHE branch includes failure to report a change in circumstances required
      by Sections 450 and 550, but those upstream requirements are not available in
      copied RuleSpec context.
rules:
- name: tfns_period_claim_may_be_established
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 805, page 7, item 15
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-7
          excerpt: Do not establish a claim for a TFNS period unless dual benefits
            were received or an IPV disqualification was not enforced.
  versions:
  - effective_from: '2017-04-01'
    formula: 'dual_benefits_were_received

      or ipv_disqualification_was_not_enforced'
- name: suspected_ipv_claim_may_be_coded_as_ihe
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 805, page 7, section B
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-7
          excerpt: Do not code a suspected IPV claim as an IHE while waiting for an
            ADH or prosecution.
  versions:
  - effective_from: '2017-04-01'
    formula: not suspected_ipv_claim_waiting_for_adh_or_prosecution
- name: agency_error_recipient_claim_may_result
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 805, page 7, items 5-16
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-7
  versions:
  - effective_from: '2017-04-01'
    formula: 'duplicate_ebt_benefits_were_issued

      or failed_to_check_for_same_month_participation_in_another_household_local_agency_or_state

      or failed_to_remove_tfns_member_reported_added_to_another_north_carolina_fns_unit

      or failed_to_remove_tfns_member_reported_applied_for_fns_in_another_state

      or failed_to_timely_disqualify_household_member_found_guilty_of_ipv

      or failed_to_act_on_drs_match

      or overissuance_identified_through_usda_audit_findings

      or overissuance_identified_through_qc_referral

      or state_agency_error_occurred

      or failed_to_act_on_change_reported_during_initial_certification_for_joint_ssi_fns_application_at_social_security_office

      or failed_to_exclude_ineligible_member_or_disqualify_disqualified_member

      or failed_to_include_disqualified_members_income_or_resources

      or (tfns_period_claim_may_be_established and claim_is_for_tfns_period)

      or household_received_fns_solely_because_of_categorical_eligibility_and_later_determined_ineligible_for_wffa_or_ssi'
