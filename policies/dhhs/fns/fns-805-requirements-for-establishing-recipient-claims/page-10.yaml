format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
  summary: |-
    IPV claim amounts for trafficking or attempted trafficking are zero when no benefits were actually sold or transferred, or the amount of benefits actually trafficked. IPV claims are entered in EPICS regardless of overissuance; enter $1.00 when there is no overissuance, except do not establish a $1.00 IPV claim when the casehead lacks an SSN. IPV claims must be established by ADH, waiver of ADH, or court action. Enter claim type U when DSS-8556 is mailed, or P when the case is given to the District Attorney or law enforcement.
rules:
  - name: nominal_epics_claim_amount_without_overissuance
    kind: parameter
    dtype: Money
    unit: USD
    source: Section 805.05C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
              excerpt: "Enter $1.00 as the claim amount when there is no overissuance."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          1.00

  - name: trafficking_ipv_claim_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: Section 805.05B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
              excerpt: "Zero for IPV claims when no benefits were actually sold or transferred ... The amount of benefits that were actually trafficked."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          if benefits_were_actually_sold_or_transferred: benefits_actually_trafficked_amount else: 0

  - name: ipv_claim_must_be_entered_in_epics
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 805.05C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          claim_is_ipv

  - name: epics_claim_amount_without_overissuance
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: Section 805.05C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
              excerpt: "Enter $1.00 as the claim amount when there is no overissuance."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
              excerpt: "Do not establish an IPV claim for $1.00 with the casehead does not have a Social Security Number (SSN)."
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10#nominal_epics_claim_amount_without_overissuance
              output: nominal_epics_claim_amount_without_overissuance
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          if claim_is_ipv and no_overissuance and casehead_has_social_security_number: nominal_epics_claim_amount_without_overissuance else: 0

  - name: ipv_claim_established_by_approved_method
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 805.05C.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          ipv_claim_established_by_administrative_disqualification_hearing
          or ipv_claim_established_by_claimant_waiver_of_adh
          or ipv_claim_established_by_court_action

  - name: pending_adh_claim_type_u_must_be_entered
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 805.05C.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          dss_8556_advanced_notice_of_adh_mailed_today

  - name: pending_criminal_court_claim_type_p_must_be_entered
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 805.05C.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-805-requirements-for-establishing-recipient-claims/page-10
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          case_given_to_district_attorney_or_law_enforcement_today
