format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
  summary: |-
    "Has anyone in your home been convicted since August 22, 1996, of a controlled substance felony offense that was committed on or after August 23, 1996?" "Individuals who have been convicted of a felony class other than H or I continue to be permanently disqualified from participating in FNS." "Individuals who have been convicted outside North Carolina continue to be permanently disqualified from participating in FNS." "Has it been at least six months since their release from custody, or if they were never committed to custody, has it been six months since the date of conviction?"
rules:
  - name: controlled_substance_felony_permanent_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 Controlled Substance Felons, Section 270 Change #18-2021, page 5, B.1-B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "convicted since August 22, 1996, of a controlled substance felony offense that was committed on or after August 23, 1996"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "felony class other than H or I continue to be permanently disqualified"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "convicted outside North Carolina continue to be permanently disqualified"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_was_convicted_since_controlled_substance_felony_bar_start
          and controlled_substance_felony_offense_was_committed_on_or_after_applicable_start
          and (
            not conviction_was_class_h_or_i
            or
            not conviction_was_in_north_carolina
          )

  - name: six_month_ineligibility_period_has_elapsed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 Controlled Substance Felons, Section 270 Change #18-2021, page 5, B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "at least six months since their release from custody, or if they were never committed to custody, has it been six months since the date of conviction"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          at_least_six_months_since_release_from_custody
          or (person_was_never_committed_to_custody and at_least_six_months_since_conviction)

  - name: class_h_or_i_north_carolina_felon_status_requires_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 Controlled Substance Felons, Section 270 Change #18-2021, page 5, B.1-B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "If the answer to any or all of the above questions is “yes,” verify the individual’s status as a Class H or I controlled substance felon."
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_was_convicted_since_controlled_substance_felony_bar_start
          or controlled_substance_felony_offense_was_committed_on_or_after_applicable_start
          or conviction_was_class_h_or_i
          or conviction_was_in_north_carolina
          or six_month_ineligibility_period_has_elapsed

  - name: class_h_or_i_north_carolina_controlled_substance_felon_continuing_bar_cleared
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 Controlled Substance Felons, Section 270 Change #18-2021, page 5, B.2-B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "Class H or Class I controlled substance felony charge"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "Was the conviction in North Carolina?"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-5
              excerpt: "Verify that the individual has not been convicted of any other controlled substance felony offense during the six-month period of ineligibility."
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_was_convicted_since_controlled_substance_felony_bar_start
          and controlled_substance_felony_offense_was_committed_on_or_after_applicable_start
          and conviction_was_class_h_or_i
          and conviction_was_in_north_carolina
          and six_month_ineligibility_period_has_elapsed
          and not convicted_of_other_controlled_substance_felony_during_six_month_ineligibility_period
