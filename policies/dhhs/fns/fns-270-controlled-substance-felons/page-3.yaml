format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
  summary: |-
    "If a subsequent conviction of a Class H or I controlled substance felony occurs during the six-month disqualification period, the individual is ineligible ... until six months has elapsed from the most recent conviction." After the minimum period, eligibility cannot be determined until AMHA notice of compliance is received; individuals already in treatment must be referred to AMHA for evaluation.
rules:
  - name: controlled_substance_felony_minimum_disqualification_months
    kind: parameter
    dtype: Count
    source: FNS 270.02 A.1.d-e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "six-month disqualification period"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          6

  - name: person_ineligible_until_six_months_from_most_recent_subsequent_conviction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02 A.1.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "subsequent conviction of a Class H or I controlled substance felony occurs during the six-month disqualification period"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "until six months has elapsed from the most recent conviction"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_has_subsequent_class_h_or_i_controlled_substance_felony_conviction_during_minimum_disqualification_period
          and person_is_within_controlled_substance_felony_minimum_disqualification_months_from_most_recent_conviction

  - name: probation_or_parole_violation_does_not_reset_minimum_disqualification_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02 A.1.e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "convicted of a violation of probation or parole related to a Class H or I controlled substance felony"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "begins with the original date of conviction or release, not from the date of the probation or parole violation"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_was_convicted_of_probation_or_parole_violation_related_to_class_h_or_i_controlled_substance_felony

  - name: person_may_regain_fns_eligibility_after_minimum_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02 A.2.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "After serving the minimum disqualification period"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "until notice of compliance is received from the Area Mental Health Authority"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-3
              excerpt: "Individuals already participating in drug and alcohol treatment programs must be referred to the AMHA for evaluation"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_has_served_minimum_controlled_substance_felony_disqualification_period
          and person_has_amha_notice_of_compliance
          and (not person_already_participating_in_drug_or_alcohol_treatment_program or person_referred_to_amha_for_evaluation)
