format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-1
  summary: |-
    Individuals are considered Controlled Substance Felons if they committed and were convicted under federal or State law on or after August 23, 1996, of a felony with an element of possession, use, or distribution of a controlled substance, or in New Jersey were convicted of a drug related crime and sentenced to serve one year or more in prison. Postponed convictions are not convictions while postponed, deferred prosecutions are not convictions until deferral is removed, and probation or parole violations stemming from the drug felony conviction are not counted.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-270-controlled-substance-felons/page-1#person_permanently_disqualified_from_receiving_fns_benefits
      reason: Permanent disqualification is subject to exceptions in FNS 270.02, which is not supplied in the source context; the exception cannot be represented as a local placeholder.
rules:
  - name: controlled_substance_felon
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.01(A), (B), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-1
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-1
              excerpt: "on or after August 23, 1996"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-1
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          (
            person_committed_and_was_convicted_under_federal_or_state_law_of_felony_with_controlled_substance_element
            or person_was_convicted_in_new_jersey_of_drug_related_crime_and_sentenced_to_serve_one_year_or_more_in_prison
          )
          and conviction_was_for_offense_committed_after_controlled_substance_felon_start_date
          and not conviction_is_postponed_and_still_in_postponed_period
          and not prosecution_is_deferred_and_deferral_has_not_been_removed
          and not charge_is_only_probation_or_parole_violation_stemming_from_drug_felony_conviction
