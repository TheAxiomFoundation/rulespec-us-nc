format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
  summary: |-
    "Verify compliance before approving benefits since assessment and/or participation in a treatment program is an eligibility requirement. Disqualify the individual from FNS if Mental Health provides notification that the individual has failed to follow through with the required assessment and/or treatment; or the individual refuses to sign the consent form; or it has not been six months since release from custody or, if the individual was never committed to custody, six months after the date of conviction if there has been no additional controlled substance felony convictions. Add the disqualified individual back to the FNS case when the disqualification ends."
rules:
  - name: controlled_substance_felon_fns_compliance_verified
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 C-E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_signed_dss_8219_consent_release
          and individual_referred_to_local_amha_for_assessment
          and required_assessment_and_treatment_compliance_verified
  - name: controlled_substance_felon_fns_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "Disqualify the individual from FNS if"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "failed to follow through with the required assessment and/or treatment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "refuses to sign the consent form"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "It has not been six months since release from custody"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "six months after the date of conviction if there has been no additional controlled substance felony convictions"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          mental_health_notified_failed_required_assessment_or_treatment
          or individual_refuses_to_sign_consent_form
          or (individual_was_released_from_custody and not six_months_since_release_from_custody)
          or (individual_was_never_committed_to_custody and (not six_months_after_conviction_elapsed or not no_additional_controlled_substance_felony_convictions))
  - name: controlled_substance_felon_may_be_added_to_application_case
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 G.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "For applications, add the disqualified individual to the FNS case if it has been six months since his release from custody."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "If the individual was never committed to custody, add the disqualified individual six months after the date of conviction if there are no additional controlled substance felony convictions and the treatment provision is met."
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          (individual_was_released_from_custody and six_months_since_release_from_custody)
          or (individual_was_never_committed_to_custody and six_months_after_conviction_elapsed and no_additional_controlled_substance_felony_convictions and treatment_provision_met)
  - name: controlled_substance_felon_may_be_added_to_ongoing_case
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270 G.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "For ongoing cases, add the disqualified individual to the FNS case the month following his sixth month after release from custody."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-6
              excerpt: "If the individual was never committed to custody, add the disqualified individual in the month following his six months after conviction if there have been no additional controlled substance felony convictions and the treatment provision is met."
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          (individual_was_released_from_custody and month_following_sixth_month_after_release_from_custody)
          or (individual_was_never_committed_to_custody and month_following_six_months_after_conviction and no_additional_controlled_substance_felony_convictions and treatment_provision_met)
