format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
  summary: |-
    "If the AMHA determines no ongoing treatment is appropriate and the individual has complied" the disqualification is cured and ongoing treatment is not required. If AMHA determines ongoing treatment is appropriate and available, participation may be a condition of compliance; the disqualification is cured while the individual successfully participates, may recur if participation stops, and is permanently cured when ongoing treatment is successfully completed and no longer required. A $3.00 co-payment applies to outpatient behavioral health services, but providers may not refuse services for inability to pay.
rules:
  - name: outpatient_behavioral_health_copayment
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 270.02, page 4 note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
              excerpt: "A co-payment of $3.00 will be charged"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          3.00

  - name: disqualification_cured_without_ongoing_treatment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02(c)(i), page 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          notified_successfully_completed_or_continuously_participated_required_treatment
          and amha_determines_no_ongoing_treatment_appropriate
          and individual_has_complied

  - name: disqualification_cured_during_ongoing_treatment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02(c)(ii), page 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          notified_successfully_completed_or_continuously_participated_required_treatment
          and amha_determines_ongoing_treatment_appropriate
          and funds_and_programs_are_available
          and amha_determines_ongoing_treatment_is_condition_of_compliance
          and individual_successfully_participates_in_ongoing_treatment_as_determined_by_amha

  - name: disqualification_permanently_cured_after_ongoing_treatment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02(c)(ii), page 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          notified_successfully_completed_or_continuously_participated_required_treatment
          and amha_determines_ongoing_treatment_appropriate
          and funds_and_programs_are_available
          and amha_determines_individual_successfully_completed_ongoing_treatment
          and amha_determines_participation_no_longer_required

  - name: same_conviction_may_be_disqualified_again
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02(c)(ii), page 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          amha_determines_ongoing_treatment_is_condition_of_compliance
          and amha_determines_individual_no_longer_successfully_participating

  - name: same_conviction_barred_as_future_eligibility_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02(c)(i)-(ii), page 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          disqualification_cured_without_ongoing_treatment
          or disqualification_permanently_cured_after_ongoing_treatment

  - name: outpatient_behavioral_health_service_may_not_be_refused_for_copayment_inability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 270.02, page 4 note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-270-controlled-substance-felons/page-4
              excerpt: "$3.00"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_receives_medicaid_benefits
          and outpatient_behavioral_health_services_copayment_applies
          and individual_unable_to_pay_copayment
