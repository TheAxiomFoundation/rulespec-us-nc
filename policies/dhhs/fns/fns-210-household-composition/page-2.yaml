module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-2
  summary: Individuals who live together and purchase and prepare food together are
    required FNS household members. Spouses living together are required household
    members regardless of purchase/preparation. Divorced individuals are no longer
    spouses. Unmarried couples living together without common children are not required
    to be included in the same FNS unit, except common-law marriages validly created
    in another state are treated as legitimate marriages in North Carolina. Children
    21 and under living with natural, adoptive, or stepparents are required household
    members unless 210.04 G conditions are met. Children 17 and younger, other than
    foster children, who live with and are under parental control of a nonparent household
    member are required household members. Adult children age 22 and over living with
    a natural, adoptive, or stepparent may be separate FNS units if they purchase
    and prepare separately.
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-210-household-composition/page-2#child_21_or_under_required_with_parent
    reason: The rule is expressly subject to conditions in 210.04 G, but that cited
      source is not available in copied context; the exception is needed to determine
      the final required-household-member result.
