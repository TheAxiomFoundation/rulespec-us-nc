format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
  summary: |-
    Individuals who may be separate FNS units include adults living with nonparents, minors living with nonparents when not under parental control, certain siblings under 18, unmarried adults living together, specified non-children under 22 with separate purchase and preparation, and certain disabled elderly individuals and spouses when other members' gross income does not exceed 165% of poverty. Boarders are not eligible separately from the household providing board, but may participate with that FNS unit upon request.
rules:
  - name: other_household_members_poverty_gross_income_limit_rate
    kind: parameter
    dtype: Rate
    source: FNS 210.B-G, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
              excerpt: "cannot exceed 165% of the poverty level"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          1.65

  - name: adult_nonparent_living_arrangement_separate_fns_unit_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.B, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          individual_is_age_18_or_over
          and individual_lives_with_anyone_other_than_natural_adoptive_or_stepparent

  - name: minor_nonparent_living_arrangement_separate_fns_unit_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.C, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          individual_is_age_17_or_under
          and individual_lives_with_anyone_other_than_natural_adoptive_or_stepparent
          and not individual_under_parental_control_of_adult_fns_unit_member

  - name: sibling_under_18_separate_fns_unit_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.D, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          natural_adoptive_half_or_stepsiblings_under_18_live_together
          and (one_sibling_is_parent_living_with_his_children or neither_sibling_exerts_parental_control_over_the_other)

  - name: unmarried_adults_living_together_separate_fns_unit_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.E, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          two_adults_live_together
          and adults_are_not_married_to_each_other

  - name: specified_person_separate_purchase_preparation_separate_fns_unit_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.F, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          individual_is_specified_person
          and not individual_is_child_under_age_22
          and individuals_food_is_purchased_and_prepared_separately_by_another_household_member

  - name: elderly_disabled_individual_and_spouse_separate_fns_unit_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.G, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
              excerpt: "cannot exceed 165% of the poverty level"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          individual_is_age_60_or_older
          and individual_has_spouse
          and individual_and_spouse_share_meals_with_others
          and individual_and_spouse_unable_to_purchase_and_prepare_own_meals_because_of_disability
          and other_household_members_gross_income <= other_household_members_poverty_gross_income_limit_rate * poverty_level_for_other_household_members

  - name: boarder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.H, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          individual_lives_with_others
          and individual_pays_reasonable_compensation_to_others_for_lodging_and_meals
          and not individual_is_resident_of_commercial_boarding_house

  - name: boarder_separate_fns_participation_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.H, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          not boarder

  - name: boarder_may_participate_with_fns_unit_providing_boarder_services
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.H, page 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-3
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          boarder
          and fns_unit_providing_boarder_services_requests_boarder_participation
