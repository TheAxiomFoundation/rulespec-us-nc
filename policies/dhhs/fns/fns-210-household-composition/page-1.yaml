  summary: |-
    "All individuals who eat together must be included in the same Food and Nutrition Services (FNS) unit." An FNS unit can be a person living alone, people living together who purchase and prepare meals together, people who will purchase and prepare separately upon receiving FNS benefits, certain people living with others but purchasing and preparing separately, homeless people who purchase food, or certain residents of group homes, shelters, and institutions.
