format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-8
  summary: 'Section 210 Change #20-2021 November 1, 2021: individuals may be disqualified
    for transferring a resource to become eligible, voluntary quit or other work-related
    reasons, or failure/refusal to comply with Employment and Training or Workfare.
    A roomer pays for lodging but not meals, cannot be a required FNS unit member
    under 210.03, is not eligible to be a member of the FNS unit, and may apply separately.
    Households may not participate in FDPIR and Food and Nutrition Services in the
    same month.'
rules:
- name: reduced_work_effort_hour_threshold
  kind: parameter
  dtype: Decimal
  source: FNS 210.I-J, page 8
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-8
          excerpt: reduces his work effort to less than 30 hours per week
  versions:
  - effective_from: '2021-11-01'
    formula: '30'
- name: individual_disqualified_for_transferring_resource
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 210.I, page 8
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-8
  versions:
  - effective_from: '2021-11-01'
    formula: individual_transferred_resource_for_purpose_of_becoming_eligible_for_fns
- name: individual_disqualified_for_voluntary_quit_or_work_related_reasons
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 210.J, page 8
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-8
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-210-household-composition/page-8#reduced_work_effort_hour_threshold
          output: reduced_work_effort_hour_threshold
          hash: sha256:local
  versions:
  - effective_from: '2021-11-01'
    formula: 'individual_voluntarily_quit_job_without_good_cause

      or (individual_voluntarily_reduced_work_effort_without_good_cause and weekly_work_hours
      < reduced_work_effort_hour_threshold)

      or individual_refused_without_good_cause_to_provide_sufficient_employment_status_or_job_availability_information'
- name: individual_disqualified_for_work_registration_workfare
  kind: derived
