          and individual_aware_or_should_reasonably_expect_warrant_issued
          and individual_took_action_to_avoid_being_arrested_or_jailed
          and law_enforcement_agency_actively_seeking_individual
  - name: individual_not_considered_eligible_household_member_due_to_fleeing_felon_or_probation_parole_status
