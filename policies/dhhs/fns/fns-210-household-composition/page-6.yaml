format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-6
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-210-household-composition/page-6#able_bodied_adult_without_dependents_participation_eligible
      reason: The source unit begins mid-sentence and only states that adults without dependents may be ineligible unless they meet ABAWD requirements; the antecedent class and ABAWD requirements are not provided in this source unit.
  summary: |-
    "without dependents may be ineligible to participate in the program unless they meet the ABAWD requirements."
    "Individuals who do not meet the citizenship or non-citizen status requirements as defined in FNS 225 Citizenship and FNS 227 Non-citizen Requirements, are ineligible to participate in the program."
    "Fleeing felons are individuals who are acting with the intent to avoid prosecution, or custody for a crime... or who are violating a condition of probation or parole under a Federal or State law shall not be considered eligible household members."
    "Before an individual is determined to be a 'fleeing' felon, the following criteria must be met" including a felony warrant, awareness or expected awareness, action to avoid arrest or jail, and active law-enforcement seeking.
rules:
  - name: individual_ineligible_due_to_non_citizen_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.B Ineligible Non-citizen
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-6
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-6
              excerpt: "November 1, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          not individual_meets_citizenship_or_non_citizen_status_requirements
  - name: law_enforcement_agency_actively_seeking_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.C.2.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-6
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-6
              excerpt: "November 1, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          state_agency_informed_law_enforcement_intends_to_enforce_outstanding_felony_warrant
          or state_agency_informed_law_enforcement_intends_to_arrest_for_probation_or_parole_violation
  - name: individual_is_fleeing_felon_for_fns_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210.C.1-C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-6
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-6
              excerpt: "November 1, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
