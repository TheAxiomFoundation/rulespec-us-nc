format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-9
  summary: |-
    FNS unit members that receive $3,750 in lottery/gambling winnings are ineligible until they regain eligibility by meeting non-categorical eligibility financial resources and income requirements. Individuals are not eligible for FNS benefits if convicted on or after February 8, 2014 of listed aggravated sexual abuse, murder, sexual assault, or substantially similar State offenses and are not in compliance with the terms of the conviction; a conviction alone does not make the individual ineligible.
rules:
  - name: lottery_gambling_winnings_ineligibility_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 210 Household Composition, Section 210, page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-9
              excerpt: "$3,750 in lottery/gambling winnings"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          3750

  - name: fns_ineligible_due_to_lottery_gambling_winnings
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210 Household Composition, Section 210, page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-9
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-9
              excerpt: "$3,750 in lottery/gambling winnings"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          fns_unit_member_lottery_gambling_winnings_amount >= lottery_gambling_winnings_ineligibility_threshold
          and not regained_eligibility_by_meeting_non_categorical_financial_resources_and_income_requirements

  - name: convicted_of_disqualifying_violent_or_sexual_offense
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210 Household Composition, Section 210(O)(1)(a), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-9
              excerpt: "convicted of at least one of the following offenses on or after February 8, 2014"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          conviction_occurred_on_or_after_february_8_2014
          and (
            convicted_of_aggravated_sexual_abuse_under_18_usc_2241
            or convicted_of_murder_under_18_usc_1111
            or convicted_of_federal_or_state_offense_involving_sexual_assault_under_vawa_1994
            or convicted_of_state_offense_attorney_general_determined_substantially_similar
          )

  - name: fns_ineligible_due_to_violent_or_sexual_offense_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210 Household Composition, Section 210(O)(1), page 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-9
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-9
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          convicted_of_disqualifying_violent_or_sexual_offense
          and not in_compliance_with_terms_of_conviction
