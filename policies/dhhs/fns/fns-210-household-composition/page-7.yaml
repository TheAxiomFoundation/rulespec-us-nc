format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
  summary: |-
    Give the FNS unit at least ten calendar days to provide verification. An individual can only be considered to have violated probation or parole when a judge rules that a violation has occurred. Persons from age 18 through 49 enrolled in an institution of higher education and failing FNS 235 student criteria are ineligible. Persons who fail or refuse to provide or apply for a social security number are disqualified. Controlled-substance felony convictions committed on or after August 23, 1996 permanently disqualify the individual. Fraudulently misrepresenting identity or residence to receive multiple FNS benefits disqualifies a recipient for ten years. A person disqualified for an IPV is not eligible for the disqualification period.
rules:
  - name: verification_response_minimum_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 210, page 7, warrant verification procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
              excerpt: "at least ten calendar days"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          10

  - name: student_minimum_age_for_ineligibility
    kind: parameter
    dtype: Count
    source: FNS 210, page 7, Ineligible Students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
              excerpt: "age of 18 through 49"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          18

  - name: student_maximum_age_for_ineligibility
    kind: parameter
    dtype: Count
    source: FNS 210, page 7, Ineligible Students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
              excerpt: "age of 18 through 49"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          49

  - name: fraud_misrepresentation_disqualification_years
    kind: parameter
    dtype: Count
    source: FNS 210, page 7, Disqualified for Fraudulently Misrepresenting Identity and Residence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
              excerpt: "disqualified for ten years"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          10

  - name: probation_or_parole_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210, page 7, probation or parole violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          judge_has_ruled_probation_or_parole_violation_occurred

  - name: ineligible_student
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210, page 7, Ineligible Students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-210-household-composition/page-7#student_minimum_age_for_ineligibility
              output: student_minimum_age_for_ineligibility
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-210-household-composition/page-7#student_maximum_age_for_ineligibility
              output: student_maximum_age_for_ineligibility
              hash: sha256:local
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          person_age >= student_minimum_age_for_ineligibility
          and person_age <= student_maximum_age_for_ineligibility
          and enrolled_in_institution_of_higher_education
          and fails_student_eligibility_criteria_under_fns_235

  - name: disqualified_for_enumeration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210, page 7, Disqualified for Enumeration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          fails_or_refuses_to_provide_or_apply_for_social_security_number_under_fns_235

  - name: permanently_disqualified_for_controlled_substance_felony
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210, page 7, Disqualified for a Controlled Substance Felony Conviction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
              excerpt: "committed on or after August 23, 1996"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          convicted_of_felony_involving_possession_use_or_distribution_of_controlled_substance
          and controlled_substance_felony_committed_on_or_after_applicable_disqualification_date

  - name: disqualified_for_fraudulent_identity_or_residence_misrepresentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210, page 7, Disqualified for Fraudulently Misrepresenting Identity and Residence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-210-household-composition/page-7#fraud_misrepresentation_disqualification_years
              output: fraud_misrepresentation_disqualification_years
              hash: sha256:local
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          recipient_fraudulently_misrepresented_identity_or_residence_to_receive_multiple_fns_benefits
          and fraud_misrepresentation_disqualification_years == 10

  - name: disqualified_for_intentional_program_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 210, page 7, Disqualified for Intentional Program Violation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-7
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          person_is_disqualified_for_intentional_program_violation
          and current_period_is_within_intentional_program_violation_disqualification_period
