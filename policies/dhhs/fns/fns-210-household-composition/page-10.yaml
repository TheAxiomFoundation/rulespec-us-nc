format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-10
  summary: |-
    Accept the FNS unit's statement as verification of household size and composition. Request additional verification only if questionable. Household size and composition are questionable when inconsistent with statements made by the applicant or with other information in agency case files. If questionable, give DSS-8650, allow at least ten calendar days, accept listed collateral/documentary evidence, offer assistance if needed, and resolve discrepancies before certifying.
rules:
  - name: additional_household_composition_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 210.06 Verification of Household Size and Composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-10
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          household_composition_inconsistent_with_applicant_statement
          or household_composition_inconsistent_with_agency_case_file_information

  - name: fns_unit_statement_accepted_as_household_composition_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 210.06 Verification of Household Size and Composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-10
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          not additional_household_composition_verification_required

  - name: minimum_calendar_days_allowed_for_verification
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 210.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-10
              excerpt: "Allow at least ten calendar days"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          10

  - name: verification_response_period_satisfies_minimum
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 210.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-10
              excerpt: "Allow at least ten calendar days"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          calendar_days_allowed_for_verification >= minimum_calendar_days_allowed_for_verification

  - name: certification_permitted_after_questionable_household_composition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 210.06(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-210-household-composition/page-10
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          not additional_household_composition_verification_required
          or household_composition_discrepancies_resolved
