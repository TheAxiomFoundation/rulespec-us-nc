format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-26
  summary: |-
    FNS units are required to report lottery/gambling winnings of $4,500 or more no later than the 10th day following the month the winnings are received. The FNS unit is ineligible to continue to participate and the case must close based on receipt of the winnings regardless of available resources. On reapplication after losing eligibility due to lottery/gambling winnings, the unit must meet regular financial resource and income eligibility; categorical eligibility rules cannot be applied. If a member of the unit that lost eligibility moves out, the original household composition no longer exists and the separate households may reapply under normal FNS rules, including categorical eligibility if applicable.
rules:
  - name: lottery_gambling_winnings_reporting_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, page 26 item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-26
              excerpt: "$4,500 or more"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          4500

  - name: lottery_gambling_winnings_report_due_day_after_receipt_month
    kind: parameter
    dtype: Integer
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, page 26 item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-26
              excerpt: "no later than the 10th day following the month the winnings are received"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          10

  - name: lottery_gambling_winnings_must_be_reported
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, page 26 item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-26
              excerpt: "winnings of $4,500 or more"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-390-resources/page-26#lottery_gambling_winnings_reporting_threshold
              output: lottery_gambling_winnings_reporting_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          lottery_gambling_winnings_received >= lottery_gambling_winnings_reporting_threshold

  - name: ineligible_to_continue_after_lottery_gambling_winnings
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, page 26 item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-26
              excerpt: "ineligible to continue to participate"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-390-resources/page-26#lottery_gambling_winnings_reporting_threshold
              output: lottery_gambling_winnings_reporting_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          lottery_gambling_winnings_received >= lottery_gambling_winnings_reporting_threshold

  - name: fns_case_must_close_due_to_lottery_gambling_winnings
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, page 26 item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-26
              excerpt: "case must close based on receipt of the lottery/gambling winnings"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-390-resources/page-26#lottery_gambling_winnings_reporting_threshold
              output: lottery_gambling_winnings_reporting_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          lottery_gambling_winnings_received >= lottery_gambling_winnings_reporting_threshold

  - name: reapplication_after_lottery_loss_must_use_regular_financial_rules
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, page 26 C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-26
