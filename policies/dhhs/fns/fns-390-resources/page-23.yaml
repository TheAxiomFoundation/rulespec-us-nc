format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-23
  summary: |-
    "If the other owner fails to respond, do not count the FNS unit member's share." "Resources jointly owned by residents of shelters for battered women and children and a former household member are considered inaccessible if access to the value of the resource is dependent on the agreement of the joint owner who still resides in the former household." "A resulting trust exists when" the stated four conditions hold; if the trust is between spouses with no legal divorce, count the value because a resulting trust cannot exist between spouses.
rules:
  - name: jointly_owned_share_countable_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 390 Resources, p. 23, joint ownership paragraph c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-23
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if jointly_owned_resource and other_owner_fails_to_respond: 0 else: fns_unit_member_share_value
  - name: battered_shelter_joint_resource_inaccessible
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, p. 23, paragraph H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-23
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          resident_of_shelter_for_battered_women_and_children
          and jointly_owned_with_former_household_member
          and access_to_resource_value_depends_on_agreement_of_joint_owner
          and joint_owner_still_resides_in_former_household
  - name: jointly_owned_resource_value_verification_required
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, p. 23, paragraph I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-23
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          jointly_owned_resource
          and (application_stage or reason_to_believe_joint_ownership_changed)
  - name: resulting_trust_exists
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390.18(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-23
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-23
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          resource_in_name_for_benefit_of_another_person
          and person_did_not_contribute_own_funds_to_resource
          and person_retains_no_legal_interest_in_resource
          and person_would_not_benefit_from_use_or_disposal
          and not resulting_trust_is_between_spouses_without_legal_divorce
  - name: resulting_trust_countable_resource_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 390.18, resulting trust counting rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-23
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if resulting_trust_exists: 0 else: resource_value
