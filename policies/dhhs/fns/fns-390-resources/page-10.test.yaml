- name: financial account remainder is countable resource
  period: 2024-10
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#input.financial_account_remainder_after_outstanding_checks: 125
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#financial_account_resource_amount: 125
- name: tax deferred retirement account is excluded from resources
  period: 2024-10
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#input.asset_is_tax_deferred_retirement_account: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#input.asset_resource_amount_before_retirement_account_exclusion: 9000
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#tax_deferred_retirement_account_resource_excluded: holds
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#tax_deferred_retirement_account_countable_resource_amount: 0
- name: non retirement account resource is not excluded by retirement rule
  period: 2024-10
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#input.asset_is_tax_deferred_retirement_account: false
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#input.asset_resource_amount_before_retirement_account_exclusion: 9000
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#tax_deferred_retirement_account_resource_excluded: not_holds
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#tax_deferred_retirement_account_countable_resource_amount: 9000
- name: released retirement funds count as income when reasonably anticipated
  period: 2024-10
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#input.payment_is_funds_released_from_tax_deferred_retirement_account: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#input.payment_can_be_reasonably_anticipated: true
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-10#released_retirement_account_funds_counted_as_income: holds
