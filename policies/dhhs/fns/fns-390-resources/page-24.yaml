format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-24
  summary: |-
    At application and when there is reason to believe the situation has changed, verify availability and ownership of the resource. Document the resulting trust by written agreement, canceled checks or receipts, signed statements from a lending institution/loan office/insurance company, another knowledgeable source, or signed statements from at least two knowledgeable individuals. If necessary verification is not provided, count the entire property value in the FNS unit's resources; if verification is provided and a resulting trust exists, exclude the entire value as inaccessible. A reverse resulting trust exists when a non-FNS unit member has a resource in his name for the benefit of an FNS unit member, did not contribute his own funds, retains no legal interest, and would not benefit from use or disposal.
rules:
  - name: resulting_trust_verification_provided
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390.18(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-24
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          written_agreement_between_fns_unit_member_and_resulting_trust_parties
          or canceled_checks_or_receipts_verify_resulting_trust_terms
          or signed_statement_from_lending_institution_loan_office_or_insurance_company
          or knowledgeable_source_verifies_resulting_trust
          or signed_statements_from_at_least_two_knowledgeable_individuals_verify_resulting_trust
  - name: resulting_trust_property_countable_resource_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 390.18(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-24
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if not resulting_trust_verification_provided: entire_property_value else: if resulting_trust_exists: 0 else: entire_property_value
  - name: resulting_trust_property_excluded_as_inaccessible
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390.18(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-24
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          resulting_trust_verification_provided
          and resulting_trust_exists
  - name: reverse_resulting_trust
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390.19(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-24
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          non_fns_unit_member_has_resource_in_name_for_benefit_of_fns_unit_member
          and non_fns_unit_member_did_not_contribute_own_funds_to_resource
          and non_fns_unit_member_retains_no_legal_interest_in_resource
          and non_fns_unit_member_would_not_benefit_from_use_or_disposal_of_resource
  - name: reverse_resulting_trust_resource_type_within_scope
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390.19(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-24
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          resource_is_any_type
          or resource_is_stock_or_bond
          or resource_is_bank_account
