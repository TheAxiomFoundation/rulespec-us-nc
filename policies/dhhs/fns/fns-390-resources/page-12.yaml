format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-12
  summary: |-
    390.10 TRUST ACCOUNTS ... Verify accessibility of the account ... Count as resources the value of an accessible trust account (less any fees by the trustee or administrator).
    390.11 UNIFORM TRANSFER TO MINORS ACCOUNT These accounts are “custodial accounts” for minors. ... anyone under 21 is considered a minor. The custodian of the account has complete access and may withdraw money ... therefore, the account is a countable resource to the FNS unit of the custodian.
    390.12 PROMISSORY NOTES Determine if any FNS unit has any promissory notes. ... Document who owns the promissory note and how much is owed on the note.
rules:
  - name: uniform_transfer_to_minors_minor_age_limit
    kind: parameter
    dtype: Integer
    source: FNS 390.11 Uniform Transfer to Minors Account
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-12
              excerpt: "anyone under 21 is considered a minor"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          21

  - name: accessible_trust_account_countable_resource_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 390.10 Trust Accounts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-12
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if asset_is_accessible_trust_account: max(0, trust_account_value - trustee_or_administrator_fees) else: 0

  - name: uniform_transfer_to_minors_account_countable_resource
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390.11 Uniform Transfer to Minors Account
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-12
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          asset_is_uniform_transfer_to_minors_account
          and account_holder_age < uniform_transfer_to_minors_minor_age_limit
          and custodian_has_complete_access_to_account
