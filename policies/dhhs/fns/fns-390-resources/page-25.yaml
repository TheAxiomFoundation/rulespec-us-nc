format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
  summary: '"If the FNS unit does not provide the verification necessary to determine
    if a reverse resulting trust exists, count the entire value of the property in
    the FNS unit''s resources..." "FNS units... that contain any member who receives
    lottery/gambling winnings of $4,500 or more are ineligible..."'
rules:
- name: lottery_gambling_winnings_disqualification_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: FNS 390.20(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
          excerpt: lottery/gambling winnings of $4,500 or more
  versions:
  - effective_from: '2024-10-01'
    formula: '4500'
- name: resource_value_counted_when_reverse_resulting_trust_not_verified
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: FNS 390.19(F)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
          excerpt: count the entire value of the property
  versions:
  - effective_from: '2024-10-01'
    formula: 'if reverse_resulting_trust_verification_not_provided: property_value
      else: 0'
- name: resource_value_counted_when_reverse_resulting_trust_verified
  kind: derived
  entity: Asset
  dtype: Money
  period: Month
  unit: USD
  source: FNS 390.19(F)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
          excerpt: If verification is provided and a reverse resulting trust exists,
            count the entire value of the property
  versions:
  - effective_from: '2024-10-01'
    formula: 'if reverse_resulting_trust_verification_provided and reverse_resulting_trust_exists:
      property_value else: 0'
- name: lottery_gambling_winnings_disqualification_applies
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 390.20(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
          excerpt: winnings of $4,500 or more
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-390-resources/page-25#lottery_gambling_winnings_disqualification_threshold
          output: lottery_gambling_winnings_disqualification_threshold
          hash: sha256:local
  versions:
  - effective_from: '2024-10-01'
    formula: 'fns_unit_contains_member_with_lottery_or_gambling_winnings

      and fns_unit_member_allocated_lottery_or_gambling_winnings >= lottery_gambling_winnings_disqualification_threshold'
- name: lottery_gambling_winnings_disqualification_ended
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 390.20(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-25
  versions:
  - effective_from: '2024-10-01'
    formula: 'fns_unit_reapplied_for_benefits

      and fns_unit_meets_non_categorical_financial_resource_requirements

      and fns_unit_meets_non_categorical_income_eligibility_requirements'
