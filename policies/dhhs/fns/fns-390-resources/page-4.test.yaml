- name: deny application when interview is in application month and excess resources
    arise by interview
  period: 2024-10
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.fns_unit_eligible_on_date_of_application: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.fns_unit_ineligible_due_to_excess_resources_by_interview: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.interview_conducted_during_month_of_application: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.interview_conducted_in_month_following_month_of_application: false
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#application_denied_for_excess_resources_at_application_month_interview: holds
- name: approve first month and deny second month when interview is in following month
  period: 2024-11
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.fns_unit_eligible_on_date_of_application: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.fns_unit_ineligible_due_to_excess_resources_by_interview: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.interview_conducted_during_month_of_application: false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.interview_conducted_in_month_following_month_of_application: true
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#first_month_approved_when_following_month_interview_excess_resources: holds
    ? us-nc:policies/dhhs/fns/fns-390-resources/page-4#second_month_assistance_denied_when_following_month_interview_excess_resources
    : holds
- name: bond is countable when no listed exclusion category applies
  period: 2024-10
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_bond: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_able_account: false
    ? us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_agent_orange_settlement_payment_or_similar_fund_disbursed_by_aetna
    : false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_alaska_native_claims_settlement_act_payment: false
    ? us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_vietnam_veterans_child_spina_bifida_or_birth_defect_allowance
    : false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_annuity: false
    ? us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_battered_womens_resource_jointly_owned_with_former_household_member_and_access_depends_on_joint_owner_agreement
    : false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_boat: false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_building: false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_burial_plan_plot_or_space: false
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#resource_is_countable: holds
- name: able account is not countable
  period: 2024-10
  input:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_bond: true
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_able_account: true
    ? us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_agent_orange_settlement_payment_or_similar_fund_disbursed_by_aetna
    : false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_alaska_native_claims_settlement_act_payment: false
    ? us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_vietnam_veterans_child_spina_bifida_or_birth_defect_allowance
    : false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_annuity: false
    ? us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_battered_womens_resource_jointly_owned_with_former_household_member_and_access_depends_on_joint_owner_agreement
    : false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_boat: false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_building: false
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#input.resource_is_burial_plan_plot_or_space: false
  output:
    us-nc:policies/dhhs/fns/fns-390-resources/page-4#resource_is_countable: not_holds
