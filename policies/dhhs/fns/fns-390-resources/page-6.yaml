format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-6
  summary: |-
    FNS 390 Resources page 6 lists whether specific resource categories are counted: educational aid, loans and scholarships are marked Y/N; FEMA payments commingled with non-excluded funds 6 months prior are marked Y; gambling winnings in excess of $4,500 are marked Y; loans are marked Y with notes for remaining cash and educational loans combined with countable funds for more than 6 months.
rules:
  - name: gambling_winnings_excess_resource_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 390 Resources, page 6, gambling winnings row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-6
              excerpt: "Gambling winnings in excess of $4,500"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          4500

  - name: asset_is_countable_resource_on_page_6
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-6
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-6
              excerpt: "Gambling winnings in excess of $4,500"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          (asset_is_fema_payment_commingled_with_non_excluded_funds_for_6_months_prior)
          or (asset_is_gambling_winnings and asset_value > gambling_winnings_excess_resource_threshold)
          or (asset_is_loan_remaining_cash_or_money_in_checking_savings_or_cd)
          or (asset_is_educational_loan_combined_with_countable_funds_for_more_than_6_months)

  - name: asset_is_excluded_resource_on_page_6
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-6
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          asset_is_energy_assistance
          or asset_is_equity_line_of_credit
          or asset_is_mortgage_escrow_account
          or asset_is_excluded_by_law
          or asset_is_farm_equipment
          or asset_is_gi_bill_funds
          or asset_is_gift_card
          or asset_is_heir_property
          or asset_is_household_goods_or_personal_effects
          or asset_is_hud_underwood_v_harris_retroactive_tax_or_subsidy_payment
          or asset_is_individual_development_account
          or asset_is_income_producing_property
          or asset_is_indian_funds_or_lands
          or asset_is_indian_land_held_jointly_with_tribe_or_requires_bia_approval_to_sell
          or asset_is_jointly_owned_resource_and_inaccessible
          or asset_is_land
          or asset_is_land_payment_for_land_held_in_trust_by_us_for_certain_indian_tribes
          or asset_is_life_insurance_cash_value
          or asset_is_lifetime_right_or_life_estate
