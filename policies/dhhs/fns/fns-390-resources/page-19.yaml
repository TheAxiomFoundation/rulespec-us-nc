format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-19
  summary: |-
    390.16 TRANSFER OF RESOURCES. Determine if any member of the FNS unit has transferred any countable resource in the last three months. If the FNS unit states the resource was transferred solely to receive FNS benefits, evaluate the transfer; transfers between FNS unit members or excluded unit members whose resources are countable to the FNS unit are not subject to disqualification. If subject, determine value. If the resource, when added to other countable resources, exceeds the allowable resource limit, determine if sold or traded at, or near, fair market value; if yes, not subject to the disqualification.
rules:
  - name: transfer_lookback_months
    kind: parameter
    dtype: Count
    source: FNS 390.16(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-19
              excerpt: "in the last three months"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          3

  - name: transferred_resource_within_lookback
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390.16(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-19
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          fns_unit_member_transferred_countable_resource
          and transfer_occurred_within_transfer_lookback_months

  - name: transfer_statement_accepted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390.16(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-19
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          applicant_statement_provided
          and not applicant_statement_questionable

  - name: transfer_of_resource_disqualification_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390.16(C)-(D)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-19
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          transferred_resource_within_lookback
          and resource_transferred_solely_to_receive_fns_benefits
          and transferred_resource_is_countable
          and not resource_transferred_between_fns_unit_members_or_excluded_countable_members
          and transferred_resource_plus_other_countable_resources_exceeds_allowable_resource_limit
          and not resource_was_sold_or_traded_at_or_near_fair_market_value
