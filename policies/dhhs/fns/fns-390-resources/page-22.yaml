format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-22
  summary: |-
    If the household can demonstrate access to only a portion of the resource, count that portion. If a legally binding division agreement exists, divide according to it. Jointly owned North Carolina bank accounts are accessible by all joint owners in their entirety unless a trust or legal agreement indicates otherwise. Divide property equity by number of owners unless inaccessibility is established. A resource is totally inaccessible if it cannot be practically subdivided and access depends on a refusing joint owner. If the FNS unit member can dispose of the resource without consent, count it; if consent is required, count it only when the other owner consents.
rules:
  - name: jointly_owned_bank_account_accessible_in_entirety
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 22, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-22
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          asset_is_jointly_owned_bank_account_in_north_carolina
          and not trust_or_legal_agreement_indicates_account_not_accessible_in_entirety

  - name: jointly_owned_resource_totally_inaccessible
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 22, paragraph F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-22
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          resource_cannot_be_practically_subdivided
          and access_depends_on_joint_owner_agreement
          and joint_owner_refuses_to_comply

  - name: jointly_owned_resource_available
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 22, paragraph G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-22
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          fns_unit_member_can_dispose_without_other_owner_consent
          or (other_owner_consent_required_to_dispose and other_owner_consents_to_dispose)

  - name: jointly_owned_resource_countable_value
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 390 Resources, page 22, paragraphs B, C, D, E, F, and G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-22
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if jointly_owned_resource_totally_inaccessible: 0 else: if not jointly_owned_resource_available and not jointly_owned_bank_account_accessible_in_entirety: 0 else: if household_demonstrates_access_to_only_portion: accessible_portion_value else: if legally_binding_division_agreement_exists: resource_value_assigned_to_fns_unit_by_legal_agreement else: if jointly_owned_bank_account_accessible_in_entirety: total_bank_account_value else: equity_value_divided_by_number_of_owners
