format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-17
  summary: |-
    Lists tribal and Indian-claims payment categories, including Grand River Band of Ottawa Indians fund-disposition payments; Yakima Indian Nation and Mescalero Apache payments; Maine Indian Claims Settlement Act payments to the Passamaquoddy Tribe, Penobscot Nation, Houlton Band of Maliseet, or their members; Navajo and Hopi relocation assistance; and specified Turtle Mountain, Blackfeet, Grosventre, Assiniboine, Papago, Fort Belknap, and Fort Peck payments.
rules:
  - name: payment_is_listed_tribal_or_indian_claims_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-17
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          payment_is_from_grand_river_band_of_ottawa_indians_fund_disposition
          or payment_is_to_yakima_indian_nation_or_mescalero_apache_tribe
          or payment_is_maine_indian_claims_settlement_act_payment_to_named_tribe_or_member
          or payment_is_relocation_assistance_to_navajo_or_hopi_member
          or payment_is_to_turtle_mountain_band_of_chippewas_arizona
          or payment_is_to_blackfeet_grosventre_assiniboine_or_papago_tribe
          or payment_is_per_capita_or_interest_payment_to_fort_belknap_or_fort_peck_assiniboine_tribe
          or payment_is_to_listed_sioux_chippewa_navajo_or_shoshone_bannock_tribe
