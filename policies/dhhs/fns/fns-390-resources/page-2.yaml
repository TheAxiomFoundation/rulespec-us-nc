format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
  summary: 'Sponsor of an Alien: if the Affidavit of Support was signed or re-signed
    on or after December 19, 1997, the full amount of the resources of a sponsor and
    spouse if living together is counted to the alien''s FNS unit until the alien
    becomes a citizen, has or can be credited with 40 qualifying quarters, or the
    alien or sponsor dies. Verification: accept client statement for resource value
    unless questionable; questionable means reason to believe reported value is incorrect
    or countable resources equal or exceed the FNS unit''s resource limit. If verification
    is necessary, give the FNS unit ten calendar days. Availability or accessibility
    verification is required at application for jointly owned resources, resulting
    trusts, and resources whose availability or accessibility must be established;
    subsequent verification is not required unless the situation changes or becomes
    questionable.'
rules:
- name: sponsor_resources_counting_qualifying_quarter_threshold
  kind: parameter
  dtype: Count
  source: FNS 390 Resources, Sponsor of an Alien
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
          excerpt: 40 qualifying quarters of social security coverage
  versions:
  - effective_from: '2024-10-01'
    formula: '40'
- name: resource_verification_response_period_days
  kind: parameter
  dtype: Count
  source: FNS 390.02(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
          excerpt: Give the FNS unit ten calendar days
  versions:
  - effective_from: '2024-10-01'
    formula: '10'
- name: alien_has_required_qualifying_quarters_to_end_sponsor_resource_counting
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 390 Resources, Sponsor of an Alien
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
          excerpt: has worked or can be credited with 40 qualifying quarters
  versions:
  - effective_from: '2024-10-01'
    formula: alien_creditable_qualifying_quarters_after_source_exclusions >= sponsor_resources_counting_qualifying_quarter_threshold
- name: sponsor_and_spouse_resources_counted_to_alien_fns_unit
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: FNS 390 Resources, Sponsor of an Alien
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
          excerpt: full amount of the resources of a sponsor and his spouse (if living
            together) is counted
  versions:
  - effective_from: '2024-10-01'
    formula: 'if affidavit_of_support_signed_or_resigned_in_applicable_period and
      not alien_has_become_citizen and not alien_has_required_qualifying_quarters_to_end_sponsor_resource_counting
      and not alien_or_sponsor_has_died: sponsor_resources_amount + (if sponsor_spouse_living_together:
      sponsor_spouse_resources_amount else: 0) else: 0'
- name: resource_value_questionable
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 390.02(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
  versions:
  - effective_from: '2024-10-01'
    formula: 'reason_to_believe_reported_resource_value_incorrect

      or countable_resources_equal_or_exceed_fns_unit_resource_limit'
- name: documentary_resource_value_verification_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 390.02(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
  versions:
  - effective_from: '2024-10-01'
    formula: 'household_is_non_categorically_eligible

      and resource_value_review_occurs_at_application_reapplication_recertification_or_reported_change

      and resource_value_questionable'
- name: resource_value_verification_response_deadline_days
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: FNS 390.02(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
          excerpt: If verification is necessary ... Give the FNS unit ten calendar
            days
  versions:
  - effective_from: '2024-10-01'
    formula: 'if documentary_resource_value_verification_required: resource_verification_response_period_days
      else: 0'
- name: availability_accessibility_verification_required_at_application
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 390.02(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
  versions:
  - effective_from: '2024-10-01'
    formula: "household_is_non_categorically_eligible\nand resource_verification_occurs_at_application\n\
      and (\n  household_has_jointly_owned_resource\n  or household_has_resulting_trust_resource\n\
      \  or household_has_resource_for_which_availability_or_accessibility_must_be_established\n\
      )"
- name: subsequent_availability_accessibility_verification_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 390.02(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-2
  versions:
  - effective_from: '2024-10-01'
    formula: "household_is_non_categorically_eligible\nand subsequent_verification_of_availability_or_accessibility\n\
      and (\n  household_has_jointly_owned_resource\n  or household_has_resulting_trust_resource\n\
      \  or household_has_resource_for_which_availability_or_accessibility_must_be_established\n\
      )\nand (\n  resource_situation_changed\n  or availability_or_accessibility_became_questionable\n\
      )"
