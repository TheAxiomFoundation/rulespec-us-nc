format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-18
  summary: |-
    FNS 390 Resources page 18 lists tribal and Indian-related payments in items I through S, including payments to the Red Lake Band of Chippewas, Saginaw Chippewa Indian Tribe, Chippewas of Mississippi, White Earth Band, Seneca Nation, Puyallup Tribe, Seminole-related tribes, Sac and Fox Tribes, and Chippewas of Lake Superior reservations. Items L, M, and O state $3,000 per capita share/payment limits or exceptions.
rules:
  - name: old_age_assistance_claims_settlement_per_capita_share_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 390 Resources, page 18, item L
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-18
              excerpt: "except for per capita shares in excess of $3,000"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          3000

  - name: indian_judgment_fund_per_capita_payment_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 390 Resources, page 18, item M
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-18
              excerpt: "Per capita payments of $3,000 or less"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          3000

  - name: seminole_per_capita_share_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 390 Resources, page 18, item O
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-18
              excerpt: "except for per capita shares in excess of $3,000"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          3000

  - name: listed_tribal_payment_resource_exclusion_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 18, items I-S
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-18
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          payment_to_red_lake_band_of_chippewas
          or payment_to_saginaw_chippewa_indian_tribe_of_michigan
          or per_capita_payment_to_chippewas_of_mississippi
          or (payment_to_heir_of_deceased_indian_under_old_age_assistance_claims_settlement_act and payment_per_capita_share_amount <= old_age_assistance_claims_settlement_per_capita_share_cap)
          or (per_capita_payment_under_indian_judgment_fund_act and payment_per_capita_amount <= indian_judgment_fund_per_capita_payment_cap)
          or per_capita_payment_from_funds_held_in_trust_by_secretary_of_interior
          or per_capita_payment_or_trust_fund_for_sac_and_fox_tribes_of_oklahoma_or_mississippi_in_iowa
          or (payment_to_seminole_nation_of_oklahoma_or_florida_seminole_group and payment_per_capita_share_amount <= seminole_per_capita_share_cap)
          or payment_under_white_earth_reservation_land_settlement_act_to_white_earth_band_member
          or payment_or_fund_under_seneca_nation_settlement_act
          or payment_to_puyallup_tribe_of_washington
          or per_capita_payment_or_trust_fund_for_chippewas_of_lake_superior_listed_reservation
