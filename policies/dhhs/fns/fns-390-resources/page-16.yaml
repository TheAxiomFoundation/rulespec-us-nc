format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-16
  summary: Exclude from resources business-liened non-liquid assets that cannot be
    sold under the lien agreement, inaccessible liquid assets subject to business
    liens, Individual Development Accounts, specified Vietnam-veteran spina bifida
    child payments, heir property, burial plans/plots/spaces, lifetime estates, remainder
    interests, land and buildings including mobile homes, motor vehicles including
    boats, and ABLE accounts. Certain Indian tribe payments from submarginal land
    held in trust are excluded, including listed Bad River Band, Blackfeet Tribe,
    and Cherokee Nation of Oklahoma members.
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-390-resources/page-16#asset_excluded_from_fns_resources
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: indian_tribe_payment_excluded_from_fns_resources
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: FNS 390.15(A), page 16
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-16
          excerpt: Payments received by certain Indian tribe members
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-16
          excerpt: from certain submarginal land held in trust by the United States
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-16
          excerpt: Bad River Band
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-16
          excerpt: Blackfeet Tribe
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-16
          excerpt: Cherokee Nation of Oklahoma
  versions:
  - effective_from: '2024-10-01'
    formula: 'payment_received_by_indian_tribe_member

      and payment_from_submarginal_land_held_in_trust_by_united_states

      and (recipient_is_bad_river_band_member

      or recipient_is_blackfeet_tribe_member

      or recipient_is_cherokee_nation_of_oklahoma_member)'
