format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-7
  summary: |-
    Page 7 of FNS 390 Resources lists resource types and whether they are countable: lottery winnings in excess of $4,500 Y; lump sum, non-recurring Y; mobile homes N; mutual funds Y; NCKIDS debit cards Y; payments because of Nazi persecution N; payments counted as income N; NFIP payments N; listed pension/retirement plans N; promissory note Y; property in probate N; RECA payments N; real property including mobile homes N; remainder interest N; resulting trust N; reverse resulting trust Y; accessible retirement Y; inaccessible retirement N; savings account Y.
rules:
  - name: lottery_winnings_countable_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 390 Resources, page 7, "Lottery winnings in excess of $4,500 Y"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-7
              excerpt: "Lottery winnings in excess of $4,500 Y"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          4500

  - name: payment_is_countable_resource
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 7, countable and non-countable payment/resource rows
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-390-resources/page-7#lottery_winnings_countable_threshold
              output: lottery_winnings_countable_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          (
            (payment_is_lottery_winnings and payment_amount > lottery_winnings_countable_threshold)
            or payment_is_lump_sum_non_recurring
          )
          and not payment_is_made_because_of_status_as_victim_of_nazi_persecution
          and not payment_is_counted_as_income
          and not payment_is_national_flood_insurance_program_payment
          and not payment_is_radiation_exposure_compensation_act_payment

  - name: asset_is_countable_resource
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, page 7, countable and non-countable asset/resource rows
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-7
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          (
            asset_is_mutual_fund
            or asset_is_nckids_debit_card
            or asset_is_promissory_note
            or asset_is_reverse_resulting_trust
            or asset_is_accessible_retirement
            or asset_is_savings_account
          )
          and not asset_is_mobile_home
          and not asset_is_listed_pension_or_retirement_plan
          and not asset_is_property_in_probate
          and not asset_is_real_property_land_or_building
          and not asset_is_remainder_interest
          and not asset_is_resulting_trust
          and not asset_is_inaccessible_retirement
