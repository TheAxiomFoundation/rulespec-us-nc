format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-4
  summary: |-
    "If the FNS unit was eligible on the date of application, but ineligible due to excess resources by the date of interview and the interview is conducted during the month of application, deny the application." If the interview is in the month following application, approve the first month and deny assistance for the second month. The countable/excludable resource list marks ABLE accounts, Agent Orange settlement payments, Alaska Native Claims Settlement Act payments, Vietnam veterans' child birth-defect allowances, annuities, specified battered women's jointly owned resources, boats, buildings, and burial plans/plots/spaces as "N"; bonds are marked "Y."
rules:
  - name: application_denied_for_excess_resources_at_application_month_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-4
              excerpt: "eligible on the date of application, but ineligible due to excess resources by the date of interview and the interview is conducted during the month of application, deny the application"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          fns_unit_eligible_on_date_of_application
          and fns_unit_ineligible_due_to_excess_resources_by_interview
          and interview_conducted_during_month_of_application

  - name: first_month_approved_when_following_month_interview_excess_resources
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-4
              excerpt: "interview is conducted in the month following the month of application... approve the application for the first month"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          fns_unit_eligible_on_date_of_application
          and fns_unit_ineligible_due_to_excess_resources_by_interview
          and interview_conducted_in_month_following_month_of_application

  - name: second_month_assistance_denied_when_following_month_interview_excess_resources
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 390 Resources, Section 390 Change #02-2024, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-4
              excerpt: "interview is conducted in the month following the month of application... deny assistance for the second month"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          fns_unit_eligible_on_date_of_application
          and fns_unit_ineligible_due_to_excess_resources_by_interview
          and interview_conducted_in_month_following_month_of_application

  - name: resource_is_countable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 390.05 Countable/Excludable Reference List of Resources
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-4
              table:
                header: "COUNTABLE/EXCLUDABLE REFERENCE LIST OF RESOURCES"
                row: "Bonds"
                column: "Yes"
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-390-resources/page-4
              table:
                header: "COUNTABLE/EXCLUDABLE REFERENCE LIST OF RESOURCES"
                row: "ABLE accounts; Agent Orange Settlement payments; Alaska Native Claims Settlement Act payments; Vietnam veterans' child birth-defect allowances; Annuities; Battered Women's Resources; Boats; Buildings; Burial Plans/Plots/Spaces"
                column: "No"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          resource_is_bond
          and not resource_is_able_account
          and not resource_is_agent_orange_settlement_payment_or_similar_fund_disbursed_by_aetna
          and not resource_is_alaska_native_claims_settlement_act_payment
          and not resource_is_vietnam_veterans_child_spina_bifida_or_birth_defect_allowance
          and not resource_is_annuity
          and not resource_is_battered_womens_resource_jointly_owned_with_former_household_member_and_access_depends_on_joint_owner_agreement
          and not resource_is_boat
          and not resource_is_building
          and not resource_is_burial_plan_plot_or_space
