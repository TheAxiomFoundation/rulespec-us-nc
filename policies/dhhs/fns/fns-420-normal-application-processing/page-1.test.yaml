- name: initial_application_approved_and_access_by_required_days
  period:
    period_kind: custom
    name: day
    start: '2024-03-26'
    end: '2024-03-26'
  input:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_is_applying_for_fns_assistance: true
    ? us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_has_never_received_fns_in_north_carolina_before
    : true
    ? us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_has_previously_received_fns_in_north_carolina
    : false
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.application_approved: true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.calendar_days_from_date_of_application: 25
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_has_valid_ebt_card: true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_has_access_to_fns_benefits: true
  output:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#approval_due_calendar_day_from_application: 25
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#benefit_access_due_calendar_day_from_application: 30
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#fns_application: holds
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#normal_processing_time_frame_applies: holds
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#approval_keyed_by_required_day: holds
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#household_has_timely_ebt_and_benefit_access: holds
- name: reapplication_after_approval_deadline_not_timely
  period:
    period_kind: custom
    name: day
    start: '2024-03-27'
    end: '2024-03-27'
  input:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_is_applying_for_fns_assistance: true
    ? us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_has_never_received_fns_in_north_carolina_before
    : false
    ? us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_has_previously_received_fns_in_north_carolina
    : true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.application_approved: true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.calendar_days_from_date_of_application: 26
  output:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#fns_reapplication: holds
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#normal_processing_time_frame_applies: holds
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#approval_keyed_by_required_day: not_holds
- name: recommended_processing_after_verifications
  period:
    period_kind: custom
    name: day
    start: '2024-03-06'
    end: '2024-03-06'
  input:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.all_required_verifications_received: true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.request_for_non_required_information_expired: true
    ? us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.calendar_days_after_verification_receipt_and_information_request_expiration
    : 5
  output:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#recommended_processing_days_after_verification: 5
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#application_processed_within_recommended_period: holds
- name: denial_deadline_and_nonworkday_extension
  period:
    period_kind: custom
    name: day
    start: '2024-03-31'
    end: '2024-03-31'
  input:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.household_is_ineligible_for_benefits: true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.denial_keyed: true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.calendar_days_from_date_of_application: 30
    ? us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.thirtieth_day_from_application_falls_on_non_workday
    : true
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#input.denial_processing_due_date_is_next_workday: true
  output:
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#denial_due_calendar_day_from_application: 30
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#denial_keyed_by_required_day: holds
    us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#denial_due_date_extended_to_next_workday: holds
