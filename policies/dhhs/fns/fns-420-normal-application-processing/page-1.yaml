format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
  summary: |-
    FNS applications and reapplications must be processed (approved) by the 25th calendar day from the date of application so the household has access to a valid EBT card and FNS benefits no later than the 30th calendar day following the date of application. A household that has never received FNS in North Carolina before is an application; a household that has previously received FNS in North Carolina and is applying again is a reapplication. If the household is ineligible, the denial must be keyed by the 30th day, extended to the next workday when the 30th day falls on a non-workday.
rules:
  - name: approval_due_calendar_day_from_application
    kind: parameter
    dtype: Integer
    source: FNS 420.01; FNS 420.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "approved no later than the 25th calendar day from the date of the application"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          25

  - name: benefit_access_due_calendar_day_from_application
    kind: parameter
    dtype: Integer
    source: FNS 420.01; FNS 420.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "no later than the 30th calendar day following the date of application"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          30

  - name: recommended_processing_days_after_verification
    kind: parameter
    dtype: Integer
    source: FNS 420.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "recommended to process all applications within 5 days of receipt"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          5

  - name: denial_due_calendar_day_from_application
    kind: parameter
    dtype: Integer
    source: FNS 420.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "the denial must be keyed by the 30th day"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          30

  - name: fns_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_is_applying_for_fns_assistance
          and household_has_never_received_fns_in_north_carolina_before

  - name: fns_reapplication
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_is_applying_for_fns_assistance
          and household_has_previously_received_fns_in_north_carolina

  - name: normal_processing_time_frame_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.01; FNS 420.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          fns_application
          or fns_reapplication

  - name: approval_keyed_by_required_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.01; FNS 420.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "approved no later than the 25th calendar day from the date of the application"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#approval_due_calendar_day_from_application
              output: approval_due_calendar_day_from_application
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          normal_processing_time_frame_applies
          and application_approved
          and calendar_days_from_date_of_application <= approval_due_calendar_day_from_application

  - name: household_has_timely_ebt_and_benefit_access
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.01; FNS 420.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "access to a valid EBT card and FNS benefits ... no later than the 30th calendar day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#benefit_access_due_calendar_day_from_application
              output: benefit_access_due_calendar_day_from_application
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          normal_processing_time_frame_applies
          and household_has_valid_ebt_card
          and household_has_access_to_fns_benefits
          and calendar_days_from_date_of_application <= benefit_access_due_calendar_day_from_application

  - name: application_processed_within_recommended_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "within 5 days of receipt of all required verifications"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#recommended_processing_days_after_verification
              output: recommended_processing_days_after_verification
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          all_required_verifications_received
          and request_for_non_required_information_expired
          and calendar_days_after_verification_receipt_and_information_request_expiration <= recommended_processing_days_after_verification

  - name: denial_keyed_by_required_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "If the household is ineligible for benefits, the denial must be keyed by the 30th day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-1#denial_due_calendar_day_from_application
              output: denial_due_calendar_day_from_application
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_is_ineligible_for_benefits
          and denial_keyed
          and calendar_days_from_date_of_application <= denial_due_calendar_day_from_application

  - name: denial_due_date_extended_to_next_workday
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420.02(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-1
              excerpt: "When the 30th day falls on a non-workday, NC FAST automatically extends the processing due date to the next workday for denials."
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_is_ineligible_for_benefits
          and thirtieth_day_from_application_falls_on_non_workday
          and denial_processing_due_date_is_next_workday
