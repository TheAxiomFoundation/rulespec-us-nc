format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-6
  summary: |-
    "The FNS household failed to provide all the required information. The 30th day is July 4th. Because July 4th is a holiday the processing deadline is extended to the next workday. The processing deadline to deny the application is July 7th."
rules:
  - name: denial_processing_deadline_extended_to_next_workday
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420 Normal Application Processing, Section 420 Change #01-2024, page 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-6
              excerpt: "Because July 4th is a holiday the processing deadline is extended to the next workday."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-6
              excerpt: "The FNS household failed to provide all the required information."
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_failed_to_provide_all_required_information
          and thirtieth_day_after_application_is_holiday
          and day_is_next_workday_after_thirtieth_day_after_application
  - name: day_is_processing_deadline_to_deny_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420 Normal Application Processing, Section 420 Change #01-2024, page 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-6
              excerpt: "The processing deadline to deny the application is July 7th."
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-6#denial_processing_deadline_extended_to_next_workday
              output: denial_processing_deadline_extended_to_next_workday
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          denial_processing_deadline_extended_to_next_workday
          and day_is_july_7_deadline_for_june_4_application
