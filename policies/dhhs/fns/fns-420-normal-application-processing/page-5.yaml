format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
  summary: |-
    Processing Deadline Examples: first-time EBT card household with application May 21 has a June 17 timely-processing deadline after allowing one processing day plus two days for card receipt; retained valid EBT card households applying May 20 have a June 18 deadline, and applying June 5 have a July 3 deadline because July 4 is a holiday.
rules:
  - name: first_time_ebt_card_processing_days_allowed
    kind: parameter
    dtype: Count
    source: FNS 420, Section 420 Change #01-2024, page 5, Processing Deadline Example 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "Allow one processing day"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          1
  - name: first_time_ebt_card_receipt_days_allowed
    kind: parameter
    dtype: Count
    source: FNS 420, Section 420 Change #01-2024, page 5, Processing Deadline Example 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "plus two days for receipt of the EBT card"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          2
  - name: first_time_ebt_card_deadline_example_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420, Section 420 Change #01-2024, page 5, Processing Deadline Example 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "Date of application is May 21st"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "first time the FNS household received and will need an EBT card"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "processing deadline is June 17th to be considered timely processing"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          application_matches_first_ebt_card_example_date
          and household_first_time_receives_fns_and_needs_ebt_card
          and processing_completed_on_or_before_first_ebt_card_example_deadline
  - name: retained_valid_ebt_card_deadline_example_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420, Section 420 Change #01-2024, page 5, Processing Deadline Example 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "Date of application is May 20th"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "previously received FNS and retained their EBT card and it is valid"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "processing deadline is June 18th to be considered timely"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          application_matches_retained_card_example_date
          and household_previously_received_fns_and_retained_valid_ebt_card
          and processing_completed_on_or_before_retained_card_example_deadline
  - name: retained_valid_ebt_card_holiday_deadline_example_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 420, Section 420 Change #01-2024, page 5, Processing Deadline Example 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "Date of application is June 5th"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "previously received FNS and retained their EBT card and it is valid"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "Because July 4th is a holiday"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-5
              excerpt: "processing deadline is July 3rd to be considered timely"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          application_matches_holiday_adjusted_retained_card_example_date
          and household_previously_received_fns_and_retained_valid_ebt_card
          and next_normal_deadline_day_is_holiday
          and processing_completed_on_or_before_holiday_adjusted_retained_card_example_deadline
