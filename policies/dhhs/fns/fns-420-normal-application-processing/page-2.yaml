format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
  summary: |-
    "If the household is eligible for the month of application but ineligible for the next month, NC FAST will approve the application for the initial month only..." "If the household is ineligible for the month of application but eligible for the next month..." "If the household is ineligible on the date of application but eligible by the date of the interview..." "If the household is eligible on the date of application but ineligible by the date of the interview..." "If an application pends beyond 25th calendar day, process the application within five calendar days of receipt of the required verifications."
rules:
  - name: pending_beyond_calendar_day_threshold
    kind: parameter
    dtype: Count
    source: FNS 420.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
              excerpt: "pends beyond 25th calendar day"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          25

  - name: verification_receipt_processing_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 420.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
              excerpt: "within five calendar days of receipt of the required verifications"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          5

  - name: approve_initial_month_only_and_close_subsequent_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.02(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_eligible_for_month_of_application
          and not household_eligible_for_next_month

  - name: deny_initial_month_and_approve_subsequent_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.02(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          not household_eligible_for_month_of_application
          and household_eligible_for_next_month

  - name: certification_period_excludes_denied_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.02(E)-(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          deny_initial_month_and_approve_subsequent_month
          or approve_effective_first_calendar_day_of_second_month

  - name: approve_effective_date_of_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.02(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_ineligible_on_date_of_application
          and household_eligible_by_date_of_interview
          and interview_conducted_in_month_of_application

  - name: approve_effective_first_calendar_day_of_second_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.02(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
              excerpt: "approve the application effective the first calendar day of the second month"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_ineligible_on_date_of_application
          and household_eligible_by_date_of_interview
          and interview_conducted_in_month_following_month_of_application

  - name: deny_application_when_ineligible_by_interview_in_application_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.02(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_eligible_on_date_of_application
          and household_ineligible_by_date_of_interview
          and interview_conducted_in_month_of_application

  - name: approve_first_month_and_deny_second_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.02(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_eligible_on_date_of_application
          and household_ineligible_by_date_of_interview
          and interview_conducted_in_month_following_month_of_application

  - name: process_within_deadline_after_required_verifications_received
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
              excerpt: "If an application pends beyond 25th calendar day, process the application within five calendar days"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-2#pending_beyond_calendar_day_threshold
              output: pending_beyond_calendar_day_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-2#verification_receipt_processing_deadline_days
              output: verification_receipt_processing_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          application_pends_beyond_calendar_day_count > pending_beyond_calendar_day_threshold
          and required_verifications_received
          and application_processed_within_calendar_days_of_verification_receipt <= verification_receipt_processing_deadline_days

  - name: agency_failed_timely_action_pending_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
              excerpt: "agency failed to act timely, and the application cannot be processed by the 25th calendar day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-420-normal-application-processing/page-2#pending_beyond_calendar_day_threshold
              output: pending_beyond_calendar_day_threshold
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          eligibility_cannot_be_determined_because_agency_failed_to_act_timely
          and application_cannot_be_processed_by_calendar_day_count <= pending_beyond_calendar_day_threshold

  - name: approve_benefits_from_date_of_application_after_agency_delay
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 420.03(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-420-normal-application-processing/page-2
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          agency_failed_timely_action_pending_allowed
          and eligibility_determined
          and household_determined_eligible
