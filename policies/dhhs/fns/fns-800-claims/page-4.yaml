format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-4
  summary: |-
    "If an underissuance occurred due to client's failure to report a change, no further action is required. Do not restore benefits."
    "Establish an IHE claim if information is reported to Medicaid or Services but not Food and Nutrition Services."
    "Establish an AE claim if information is reported to Work First Family Assistance and not shared with Food and Nutrition Services."
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-800-claims/page-4#referral_must_be_closed_when_overissuance_amount_cannot_be_determined
      reason: The source imposes an administrative action on a referral, but RuleSpec has no supported Referral or case-investigation entity.
    - output: us-nc:policies/dhhs/fns/fns-800-claims/page-4#referral_must_be_closed_when_no_overissuance_occurred
      reason: The source imposes an administrative action on a referral, but RuleSpec has no supported Referral or case-investigation entity.
rules:
  - name: benefits_restoration_not_required_due_to_client_failure_to_report_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 800 Claims, Section D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-4
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          underissuance_occurred
          and underissuance_due_to_client_failure_to_report_change

  - name: ihe_claim_type_applies_when_reported_to_medicaid_or_services_only
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 800 Claims, Section E.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-4
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          information_reported_to_medicaid_or_services
          and not information_reported_to_food_and_nutrition_services
          and medicaid_and_food_and_nutrition_services_caseworker_are_not_same_person

  - name: ae_claim_type_applies_when_reported_to_work_first_and_not_shared
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 800 Claims, Section E.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-4
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          information_reported_to_work_first_family_assistance
          and not information_shared_with_food_and_nutrition_services
