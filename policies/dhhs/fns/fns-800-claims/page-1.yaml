format: rulespec/v1
module:
  status: entity_not_supported
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-1
  summary: |-
    Claims begin with referrals from any source that alleges a Food and Nutrition Services household has received or used benefits inappropriately, or has provided questionable information during the application/recertification process or when reporting a change. The Date of Discovery for all types of referrals is the date Program Integrity determines there is an actual FNS overissuance through completing a DSS-1682, Report of Erroneous Overissuance or determines there is not a FNS overissuance and unsubstantiates the referral in EPICS. The five basic types of referrals are defined below. Front End Referrals are used when information provided by the applicant is questionable or conflicting, and eligibility cannot be determined. Regular referrals apply to both active and terminated cases. Suspected IPV referrals apply to both active and terminated cases. Project Recall referrals are generated from a Project Recall verification.
  reason: |-
    The source defines and administers referral records, referral type codes, Program Integrity discovery actions, investigator duties, and EPICS/NC FAST processing. The supported RuleSpec entity set does not include a referral, case record, investigation, agency worker, or administrative system record entity capable of faithfully carrying these per-referral classifications, dates, codes, and deadlines without collapsing multiple possible referrals onto a household.
