format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
  summary: |-
    Complete a second party file review to ensure there is clear and convincing evidence to prove the client committed an Intentional Program Violation. Otherwise, establish the claim as an IHE. The difference between an IPV and an IHE is intent. If during an ADH or a determined by a judge that an IPV did not occur, establish an IHE claim. For criminal prosecution, enter claim type "P" in EPICS on the day the case is released to appropriate authorities. For Administrative Procedures, mail DSS-8556 and DSS-8588 and allow 30 calendar days notice; enter claim type "U" in EPICS on the day DSS-8556 is mailed.
rules:
  - name: administrative_disqualification_hearing_notice_days
    kind: parameter
    dtype: Integer
    source: FNS 800 Claims, page 7, item 4.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
              excerpt: "Allow 30 calendar days notice."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          30

  - name: criminal_prosecution_epics_claim_type
    kind: parameter
    dtype: String
    source: FNS 800 Claims, page 7, item 3.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
              excerpt: "Enter a claim type of “P” in EPICS"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          "P"

  - name: administrative_procedure_epics_claim_type
    kind: parameter
    dtype: String
    source: FNS 800 Claims, page 7, item 4.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
              excerpt: "Enter a claim type of ”U” in EPICS"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          "U"

  - name: intentional_program_violation_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 800 Claims, page 7, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          second_party_file_review_completed
          and clear_and_convincing_evidence_client_committed_intentional_program_violation

  - name: inadvertent_household_error_claim_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 800 Claims, page 7, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          (second_party_file_review_completed
          and not clear_and_convincing_evidence_client_committed_intentional_program_violation)
          or administrative_disqualification_hearing_determined_ipv_did_not_occur
          or judge_determined_ipv_did_not_occur

  - name: administrative_disqualification_hearing_notice_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 800 Claims, page 7, item 4.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
              excerpt: "Allow 30 calendar days notice."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          advance_notice_calendar_days >= administrative_disqualification_hearing_notice_days

  - name: individual_disqualified_for_ipv
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 800 Claims, page 7, item 4.g
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-7
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          individual_signed_waiver_of_administrative_disqualification_hearing
          or individual_found_guilty_of_ipv
