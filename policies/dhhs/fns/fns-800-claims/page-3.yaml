format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
  summary: |-
    Send a second written request to third party verification sources that did not respond to the first request within 30 days and request a reply in 15 days. If third party verification is not provided at the end of the second request period, use DSS-8231 to request information from the household, request a reply in 15 days, mail a copy to any known legal or authorized representative, and do not force cooperation. Client interviews are voluntary; the individual has stated rights, DSS-8230 notice requirements apply, and a home visit requires consent and at least three working days' notice.
rules:
  - name: third_party_first_request_nonresponse_days
    kind: parameter
    dtype: Integer
    source: Section 800.06(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
              excerpt: "did not respond to the first request within 30 days"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          30

  - name: second_third_party_reply_days
    kind: parameter
    dtype: Integer
    source: Section 800.06(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
              excerpt: "Request a reply in 15 days."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          15

  - name: household_information_reply_days
    kind: parameter
    dtype: Integer
    source: Section 800.06(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
              excerpt: "Request a reply in 15 days."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          15

  - name: home_visit_advance_notice_working_days
    kind: parameter
    dtype: Integer
    source: Section 800.06(C)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
              excerpt: "at least three (3) working days prior"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          3

  - name: second_third_party_verification_request_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 800.06(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-800-claims/page-3#third_party_first_request_nonresponse_days
              output: third_party_first_request_nonresponse_days
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          third_party_verification_source_has_not_responded_to_first_request
          and days_since_first_third_party_verification_request >= third_party_first_request_nonresponse_days

  - name: second_third_party_verification_request_has_required_reply_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 800.06(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-800-claims/page-3#second_third_party_reply_days
              output: second_third_party_reply_days
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          requested_reply_days_for_second_third_party_verification_request == second_third_party_reply_days

  - name: household_information_request_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 800.06(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          third_party_verification_not_provided_at_end_of_second_request_period

  - name: household_information_request_complies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Section 800.06(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-800-claims/page-3#household_information_reply_days
              output: household_information_reply_days
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_information_request_used_dss_8231
          and requested_reply_days_for_household_information_request == household_information_reply_days
          and (not household_has_known_legal_or_authorized_representative or copy_mailed_to_known_legal_or_authorized_representative)
          and not suspected_household_forced_to_cooperate

  - name: home_visit_notice_and_consent_complies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 800.06(C)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-800-claims/page-3#home_visit_advance_notice_working_days
              output: home_visit_advance_notice_working_days
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          client_consents_to_home_visit
          and dss_8230_mailed_before_home_visit
          and working_days_notice_before_home_visit >= home_visit_advance_notice_working_days
          and (not client_has_known_legal_or_authorized_representative or dss_8230_copy_mailed_to_known_legal_or_authorized_representative)

  - name: claim_may_be_established_without_client_interview
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 800.06(C)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          client_does_not_keep_interview_appointment
          and evidence_is_clear_and_convincing_to_prove_overissuance
