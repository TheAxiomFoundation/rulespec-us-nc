format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
  summary: "Trafficking referrals apply to cases of suspected benefit misuse or abuse\
    \ that violates USDA Federal Regulation \xA7271.2. Consider each person listed\
    \ on an USDA store disqualification charge letter a referral. Enter trafficking\
    \ referrals in EPICS with a referral type of \u201CT\u201D. Program Integrity\
    \ must create a referral in EPICS when a FNS overissuance or IPV is suspected,\
    \ within 10 business days. A Date of Discovery must be entered within 180 days\
    \ from the referral creation date."
rules:
- name: epics_trafficking_referral_type_code
  kind: parameter
  dtype: String
  source: 800.05 Trafficking Referrals
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
          excerpt: "Enter trafficking referrals in EPICS with a referral type of \u201C\
            T\u201D."
  versions:
  - effective_from: '2017-04-01'
    formula: '"T"'
- name: referral_creation_deadline_business_days
  kind: parameter
  dtype: Count
  source: 800.06 Investigation Procedures
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
          excerpt: within 10 business days
  versions:
  - effective_from: '2017-04-01'
    formula: '10'
- name: date_of_discovery_entry_deadline_days
  kind: parameter
  dtype: Count
  source: 800.06 Investigation Procedures
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
          excerpt: within 180 days from the referral creation date
  versions:
  - effective_from: '2017-04-01'
    formula: '180'
- name: trafficking_referral_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: 800.05 Trafficking Referrals
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
  versions:
  - effective_from: '2017-04-01'
    formula: 'suspected_benefit_misuse_or_abuse_violates_usda_271_2

      or listed_on_usda_store_disqualification_charge_letter'
- name: trafficking_referral_entered_with_required_epics_type
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: 800.05 Trafficking Referrals
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
  versions:
  - effective_from: '2017-04-01'
    formula: 'trafficking_referral_applies

      and epics_referral_type_code == epics_trafficking_referral_type_code'
- name: program_integrity_must_create_epics_referral
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: 800.06 Investigation Procedures
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
          excerpt: Program Integrity must create a referral in EPICS when a FNS overissuance
            or IPV is suspected, within 10 business days.
  versions:
  - effective_from: '2017-04-01'
    formula: 'fns_overissuance_suspected

      or ipv_suspected'
- name: referral_created_within_required_deadline
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: 800.06 Investigation Procedures
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
          excerpt: within 10 business days
  versions:
  - effective_from: '2017-04-01'
    formula: business_days_from_suspicion_to_referral_creation <= referral_creation_deadline_business_days
- name: date_of_discovery_entered_within_required_deadline
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: 800.06 Investigation Procedures
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
          excerpt: A Date of Discovery must be entered within 180 days from the referral
            creation date.
  versions:
  - effective_from: '2017-04-01'
    formula: days_from_referral_creation_to_date_of_discovery_entry <= date_of_discovery_entry_deadline_days
- name: eligibility_file_purged_or_lost_requires_referral_closure
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: 800.06 Investigation Procedures, A.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-800-claims/page-2
  versions:
  - effective_from: '2017-04-01'
    formula: eligibility_files_purged_or_lost_for_period_of_suspected_overissuance
