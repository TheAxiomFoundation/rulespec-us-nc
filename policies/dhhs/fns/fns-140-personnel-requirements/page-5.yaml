format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
  summary: |-
    Change 1-2021 May 1, 2021. D. Training must be provided to volunteers and to the staff of other organizations and agencies that the State or county uses for providing program information. E. State hearing officials and quality control reviewers are provided with sufficient training prior to initially assuming their duties. 140.06 DIVISION OF RESPONSIBILITIES. System functions are divided into three categories: Inquiry only; Transaction Keying Authority; Transaction Authorization. Admin Terminal Update Functions cannot be given to Individuals that have Transaction Keying Authority or Transaction Authorization.
rules:
  - name: program_information_training_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 140, page 5, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
              excerpt: "Change 1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_is_volunteer_used_by_state_or_county_for_providing_program_information
          or person_is_staff_of_other_organization_or_agency_used_by_state_or_county_for_providing_program_information
  - name: program_information_training_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 140, page 5, paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
              excerpt: "Change 1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          not program_information_training_required
          or (
            program_information_training_provided
            and program_information_training_is_in_sufficient_detail_and_frequency_to_ensure_information_accurate
          )
  - name: initial_training_required_before_assuming_duties
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 140, page 5, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
              excerpt: "Change 1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_is_state_hearing_official_initially_assuming_duties
          or person_is_quality_control_reviewer_initially_assuming_duties
  - name: initial_training_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 140, page 5, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
              excerpt: "Change 1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          not initial_training_required_before_assuming_duties
          or (
            training_provided_before_initially_assuming_duties
            and initial_training_includes_detailed_comprehensive_study_of_regulations
            and (
              not person_is_state_hearing_official_initially_assuming_duties
              or initial_training_includes_state_hearing_procedures
            )
            and (
              not person_is_quality_control_reviewer_initially_assuming_duties
              or initial_training_includes_performance_reporting_procedures
            )
          )
  - name: periodic_formal_training_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 140, page 5, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
              excerpt: "Change 1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          (
            person_is_state_hearing_official
            or person_is_quality_control_reviewer
          )
          and (
            training_need_established_by_policy_changes
            or training_need_established_by_program_deficiencies_indicated_by_performance_reporting_system
          )
  - name: periodic_formal_training_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 140, page 5, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-5
              excerpt: "Change 1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          not periodic_formal_training_required
          or formal_training_provided_periodically
