  summary: |-
    The State provides periodic FNS training to counties. County directors, through FNS supervisors, are responsible for direct orientation and day-to-day training; county training programs must cover FNS eligibility criteria, certification procedures, household rights and responsibilities, job-related certification responsibilities, data management and issuance activities, and record keeping/reporting. County agencies must maintain a training file. Employees assigned certification responsibility must receive sufficient training before initially assuming duties, and formal training must be provided periodically as needed. State and/or county may allow public attendance at formal certification training sessions and may limit public participants to observation.
