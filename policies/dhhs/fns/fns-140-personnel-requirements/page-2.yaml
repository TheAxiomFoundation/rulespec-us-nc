format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-2
  summary: |-
    "The county department may not use, in any certification-related activity, persons or organizations that are parties to a strike or lockout." Such persons may be used as a verification source only when normally best positioned to confirm the household's circumstances. Facilities of such persons or organizations may not be used in certification or as interview sites. Counties with 5,000 or more participating households must operate fraud detection units. County bilingual program-information material duties are keyed to 2,000 low-income households, 100 single-language-minority households, and five percent single-language-minority thresholds.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-140-personnel-requirements/page-2#county_fraud_detection_unit_required
      reason: The operative legal subject is the county department; the supported RuleSpec entity set has no County or county-department entity.
    - output: us-nc:policies/dhhs/fns/fns-140-personnel-requirements/page-2#county_bilingual_program_information_materials_required
      reason: The operative legal subject is the county department and county-level household counts; the supported RuleSpec entity set has no County or county-department entity.
rules:
  - name: person_disqualified_from_certification_related_activity_due_to_strike_or_lockout
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 140.02(B), Personnel and Facilities of Parties to a Strike
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-2
              excerpt: "Change 1-2021 May 1, 2021"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_is_party_to_strike_or_lockout

