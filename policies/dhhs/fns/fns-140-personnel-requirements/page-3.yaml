    corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-3
  summary: |-
    The county must provide certification materials in the appropriate language and bilingual staff or interpreters in each certification office serving an area containing approximately 100 single-language minority low-income households, and when fewer than 100 low-income households exist if a majority are single-language minority. Counties with a seasonal influx must provide bilingual materials and staff or interpreters if the influx meets the 140.04 A. and B. requirements. Certification offices contacted by a total of over 100 single-language minority households in a six-month recording period will be required to provide bilingual staff or interpreters.
