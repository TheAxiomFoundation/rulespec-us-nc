format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-6
  summary: |-
    A fee of $2.50 is debited from the client's account, for lost or stolen cards only, at the time of the status change. Staff performing eligibility determination functions for FNS are required to meet merit-based requirements. Non merit based FNS staff shall not conduct certification interviews or certify FNS cases in NC FAST, but may assist applicants excluding interviewing, secure needed verifications, and assist with ABAWD updates.
rules:
  - name: lost_or_stolen_ebt_card_replacement_fee
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 140.06(a), Change 1-2021
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-6
              excerpt: "A fee of $2.50 is debited"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          2.50

  - name: ebt_card_replacement_fee_debited
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: FNS 140.06(a), Change 1-2021
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-6
              excerpt: "for lost or stolen cards only"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-140-personnel-requirements/page-6#lost_or_stolen_ebt_card_replacement_fee
              output: lost_or_stolen_ebt_card_replacement_fee
              hash: sha256:local
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          if ebt_card_status_changed_to_lost or ebt_card_status_changed_to_stolen: lost_or_stolen_ebt_card_replacement_fee else: 0

  - name: ebt_account_inactivated_for_not_sufficient_funds
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 140.06(a), Change 1-2021
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
