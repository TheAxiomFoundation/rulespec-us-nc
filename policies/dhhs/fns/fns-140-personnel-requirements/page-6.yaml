            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-6
              excerpt: "If the account balance does not have sufficient funds"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-140-personnel-requirements/page-6
    versions:
