  summary: |-
    "The N.C. Department of Health and Human Services (DHHS) maintains a system for handling complaints filed by participants, potential participants, or other concerned individuals or groups." DHHS studies and resolves reported incidents, takes corrective or remedial action when warranted, notifies the complainant of the complaint disposition, keeps complaint records for deficiency patterns, and forwards discrimination complaints to DHHS within five calendar days. Local DSS tracks customer complaints on the state-approved customer complaint tracking log, counties analyze complaints each quarter, and logs are submitted every six months with April 30 and October 31 due dates.
