format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-1
  summary: |-
    "There are three distinct procedures for filing and processing complaints regarding operation of Food and Nutrition Services (FNS)"; fair hearings handle complaints concerning eligibility, benefit levels, inadvertent household or agency error claims, and the amount of IPV claims, but not the establishment of an IPV claim; people who believe they have been subjected to discrimination as specified in Section 115.04 may file a complaint with USDA.
rules:
  - name: fns_complaint_handled_under_fair_hearing_procedures
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 120.02 Fair Hearings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-1
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          (
            fns_complaint_concerns_program_eligibility
            or fns_complaint_concerns_benefit_level
            or fns_complaint_concerns_establishment_or_amount_of_inadvertent_household_or_agency_error_claim
            or fns_complaint_concerns_amount_of_intentional_program_violation_claim
          )
          and not fns_complaint_concerns_establishment_of_intentional_program_violation_claim
  - name: person_may_file_usda_discrimination_complaint
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 120.03A Discrimination Complaints
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_believes_subject_to_discrimination_as_specified_in_section_115_04
