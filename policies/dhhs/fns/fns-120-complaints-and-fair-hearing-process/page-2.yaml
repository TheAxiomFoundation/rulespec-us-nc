format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-2
  summary: |-
    "A complaint must be filed no later than 180 days from the alleged discrimination. However, the USDA Secretary of FNS may extend the time of filing." If an individual verbally alleges discrimination but is unable or reluctant to put allegations in writing, the USDA employee receiving the complaint will do so. Complaints are accepted even if requested information is incomplete, but investigations are conducted only if the accused location/organization, nature of the incident/action/aspect, and reason for alleged discrimination are provided.
rules:
  - name: discrimination_complaint_filing_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 120.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-2
              excerpt: "no later than 180 days from the alleged discrimination"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          180

  - name: discrimination_complaint_filing_time_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 120.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-2
              excerpt: "A complaint must be filed no later than 180 days from the alleged discrimination. However, the USDA Secretary of FNS may extend the time of filing."
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          days_from_alleged_discrimination_to_complaint_filing <= discrimination_complaint_filing_deadline_days
          or usda_secretary_of_fns_extended_filing_time

  - name: usda_employee_must_put_verbal_discrimination_complaint_in_writing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 120.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          individual_verbally_alleges_discriminatory_act
          and individual_unable_or_reluctant_to_put_allegations_in_writing
          and usda_employee_receives_complaint

  - name: discrimination_complaint_has_information_required_for_investigation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 120.03(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          accused_location_and_organization_or_office_provided
          and incident_action_or_program_administration_aspect_provided
          and alleged_discrimination_reason_provided

  - name: discrimination_complaint_accepted_by_usda_even_if_requested_information_incomplete
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 120.03(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-120-complaints-and-fair-hearing-process/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          discrimination_complaint_filed_with_usda
