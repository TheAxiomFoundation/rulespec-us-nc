format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
  summary: |-
    If the FNS household has not visited or submitted an application to the new county, the active county completes recertification and transfer follows disposition. If the household submitted an application or visited the new county in person, the new county completes recertification and must contact the active county within 3 days. When an FNS unit moves out of state, terminate without Notice of Adverse Action, provide DSS-8632, advise contact with the new state's FNS Office, and returned mail with an out-of-state forwarding address alone is not reliable information to act upon.
rules:
  - name: new_county_supervisor_contact_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 215.06, page 4, move to new county recertification procedure
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
              excerpt: "within 3 days of receipt"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          3

  - name: active_county_responsible_for_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_active_in_county
          and household_moved_to_new_county_of_residence
          and not household_visited_new_county_in_person
          and not household_submitted_application_to_new_county

  - name: active_county_transfer_after_recertification_disposed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item a.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          active_county_responsible_for_recertification
          and recertification_disposed

  - name: new_county_responsible_for_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_active_in_county
          and household_moved_to_new_county_of_residence
          and (household_submitted_application_to_new_county or household_visited_new_county_in_person)

  - name: new_county_must_contact_active_county_within_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item b.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-215-residence/page-4#new_county_supervisor_contact_deadline_days
              output: new_county_supervisor_contact_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          new_county_responsible_for_recertification
          and days_since_application_recertification_or_office_visit <= new_county_supervisor_contact_deadline_days

  - name: active_county_responsible_for_address_and_case_owner_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item b.iv
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          new_county_responsible_for_recertification

  - name: dss_2435_should_be_forwarded_to_active_county
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, note after item b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          action_pending_in_active_county
          and new_county_receives_dss_2435

  - name: out_of_state_move_termination_without_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          fns_unit_moved_out_of_state

  - name: dss_8632_confirmation_required_for_out_of_state_move
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          fns_unit_moved_out_of_state

  - name: advise_contact_new_state_fns_office_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          fns_unit_moved_out_of_state

  - name: ebt_card_may_be_used_in_new_state
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, item D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          fns_unit_moved_out_of_state
          and new_state_ebt_system_accepts_north_carolina_ebt_card

  - name: returned_mail_out_of_state_forwarding_alone_reliable_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.06, page 4, note after item D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          returned_mail_has_out_of_state_forwarding_address
          and not returned_mail_is_only_information
