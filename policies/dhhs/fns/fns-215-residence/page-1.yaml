format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-1
  summary: |-
    A Food and Nutrition Services (FNS) household must live in North Carolina. Persons in North Carolina solely for vacation purposes shall not be considered residents.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-215-residence/page-1#individual_single_fns_participation_requirement_satisfied
      reason: The duplicate-participation prohibition has an exception for residents of shelters for battered women and children who meet FNS 212.03 C special-arrangements requirements, but that cited source is not available in this task.
rules:
  - name: nc_fns_residence_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 215.01 Residence Requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_lives_in_north_carolina
          and not household_in_north_carolina_solely_for_vacation_purposes
  - name: in_person_application_county_residence_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 215.02(A)(1) In-Person
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          not application_is_in_person
          or household_lives_in_application_county
