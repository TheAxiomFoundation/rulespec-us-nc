format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
  summary: |-
    Mail, fax, email, or dropped-off applications submitted in the wrong county must be faxed to the county of residence within one business day; if not, the receiving county must process and transfer upon disposition, and the application date is the date received by the first county. Online ePASS applications must be processed by the county that receives the application regardless of residence and transferred after disposition. Non-categorical eligible FNS units must verify residency at initial application and reported change of residence; if residency cannot be verified with other verifications, use collateral contact or other documentary evidence, accept any reasonable document, and do not require a specific document type.
rules:
  - name: wrong_county_mail_fax_email_dropoff_must_be_faxed_to_residence_county
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.02.B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "Applications submitted by mail, fax, email, or dropped off in a county in which the household does not reside must be faxed to the county of residence within one business day."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          application_submitted_by_mail_fax_email_or_dropped_off
          and application_submitted_in_county_where_household_does_not_reside

  - name: receiving_county_must_process_and_transfer_after_failed_timely_fax
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.02.B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "The receiving county must process the application and transfer upon disposition if they fail to fax the application within one business day to the actual county of residence."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          application_submitted_by_mail_fax_email_or_dropped_off
          and application_submitted_in_county_where_household_does_not_reside
          and receiving_county_failed_to_fax_application_to_actual_county_of_residence_within_one_business_day

  - name: wrong_county_mail_fax_email_dropoff_application_date_is_first_county_receipt_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.02.B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "The application date is the date received by first county."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          application_submitted_by_mail_fax_email_or_dropped_off
          and application_submitted_in_county_where_household_does_not_reside
          and application_date_is_date_received_by_first_county

  - name: online_epass_application_processed_by_receiving_county
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.02.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "Applications filed online through the state website ePASS.nc.gov must be processed by the county that receives the application, regardless of the county of residence."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          application_filed_online_through_epass
          and application_processed_by_county_that_receives_application

  - name: online_epass_application_transferred_to_residence_county_after_disposition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.02.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "The receiving county must transfer the application to the county of residence after disposition."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          application_filed_online_through_epass
          and receiving_county_transfers_application_to_county_of_residence_after_disposition

  - name: non_categorical_fns_unit_residency_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.03.A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "Verify residency at initial application and reported change of residence."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_is_non_categorical_eligible_fns_unit
          and (initial_application or reported_change_of_residence)

  - name: residency_may_be_verified_with_other_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.03.A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_is_non_categorical_eligible_fns_unit
          and residency_verified_in_conjunction_with_other_verification

  - name: collateral_or_documentary_residency_evidence_required_when_not_verified_with_other_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.03.A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "If residency cannot be verified in conjunction with other verifications, use a collateral contact or other documentary evidence."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_is_non_categorical_eligible_fns_unit
          and residency_cannot_be_verified_in_conjunction_with_other_verifications
          and (collateral_contact_used_for_residency or other_documentary_evidence_used_for_residency)

  - name: reasonable_document_establishing_residency_must_be_accepted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.03.A.3.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "Accept any document that reasonably establishes the applicant's residency."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          document_reasonably_establishes_applicant_residency
          and document_accepted_for_residency

  - name: specific_residency_document_type_must_not_be_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 215.03.A.3.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-215-residence/page-2
              excerpt: "Do not request or require any specific type of document."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          residency_verification_document_requested
          and not specific_type_of_residency_document_required
