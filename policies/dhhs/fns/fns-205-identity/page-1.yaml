format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-1
  summary: |-
    "At each application or at any point an individual’s identity is found questionable, verify the identity" of the person filing the application, an authorized representative applying for an FNS unit, and in that situation the head of the FNS unit. "Do not require verification of identity for any individuals other than those listed." Accept any document that reasonably establishes identity.
rules:
  - name: identity_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 205.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          person_files_application
          or person_is_authorized_representative_applying_on_behalf_of_fns_unit
          or head_of_fns_unit_for_application_filed_by_authorized_representative
          or person_is_new_or_changed_authorized_representative_applying_at_change_or_recertification
  - name: identity_document_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 205.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          document_reasonably_establishes_applicant_identity
