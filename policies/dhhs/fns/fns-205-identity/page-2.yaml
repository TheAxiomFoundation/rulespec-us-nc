format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-2
  summary: |-
    "Request missing verification using the DSS-8650 FNS Notice of Information Needed. Do not request a specific type of document to verify identity... accept any verification that reasonably verifies identity. If documentary evidence is not available, use a collateral contact." "Once scanned into NC FAST the individual does not need to provide Identification at subsequent applications."
rules:
  - name: missing_identity_verification_request_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 205.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          not missing_identity_verification_is_requested
          or (
            dss_8650_fns_notice_of_information_needed_is_used
            and not specific_type_of_identity_document_is_requested
          )
  - name: identity_verification_must_be_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 205.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          verification_reasonably_verifies_identity
  - name: collateral_contact_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 205.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          documentary_identity_evidence_is_available
          or collateral_contact_is_used
  - name: subsequent_identity_document_not_required_after_nc_fast_scan
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 205.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-205-identity/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          identity_verification_document_scanned_into_nc_fast
          and subsequent_application
