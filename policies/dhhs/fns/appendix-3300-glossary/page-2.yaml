format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-2
  summary: |-
    Change #5-2016 October 1, 2016. “Authorized Status of individuals who have met all eligibility factors and are receiving benefits.” “Authorized Representative An individual who acts on behalf of a Food and Nutrition Services unit (FNSU).” “Boarder A person who lives in a household and pays a set amount for room and meals.”
rules:
  - name: authorized_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, “Authorized”
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-2
              excerpt: "Change #5-2016 October 1, 2016"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          has_met_all_eligibility_factors
          and is_receiving_benefits
  - name: authorized_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, “Authorized Representative”
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-2
              excerpt: "Change #5-2016 October 1, 2016"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          acts_on_behalf_of_fnsu
          and designated_in_writing_by_household_head_spouse_or_responsible_household_member
  - name: boarder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, “Boarder”
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-2
              excerpt: "Change #5-2016 October 1, 2016"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-2
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          lives_in_household
          and pays_set_amount_for_room_and_meals
