format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-9
  summary: |-
    Specified Person An individual who is age 60 or over; receives SSI benefits under Title XVI of the Social Security Act or disability or blindness payments under Titles I, II, XIV, XVI of the Social Security Act ...; receives a VA disability payment for a 100% service connected disability; or is a disabled surviving spouse or child of a Veteran.

    Spouse An individual who is married to another person , or for Food and Nutrition Services purposes, an individual who is of the opposite sex or to the same sex; if the couple is lawfully married under state law, regardless of the individual's domicile...
rules:
  - name: specified_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, p. 9, "Specified Person"
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-9
              excerpt: "Change #5-2016 October 1, 2016"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-9
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          person_is_age_60_or_over
          or person_receives_ssi_benefits_under_title_xvi
          or person_receives_disability_or_blindness_payments_under_titles_i_ii_xiv_or_xvi
          or person_certified_for_title_i_ii_xiv_or_xvi_disability_or_blindness_payments_but_initial_payments_not_received
          or person_title_i_ii_xiv_or_xvi_disability_or_blindness_checks_entirely_recouped_to_repay_prior_overpayment
          or person_receives_va_disability_payment_for_total_service_connected_disability
          or person_is_disabled_surviving_spouse_or_child_of_veteran
  - name: spouse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, p. 9, "Spouse"
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-9
              excerpt: "Change #5-2016 October 1, 2016"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-9
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          person_is_married_to_another_person
          or person_is_in_opposite_or_same_sex_couple_lawfully_married_under_state_law_for_fns_purposes
