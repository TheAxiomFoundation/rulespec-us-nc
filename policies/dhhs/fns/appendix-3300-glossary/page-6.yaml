format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-6
  summary: |-
    "Irrevocable Cannot be sold or 'cashed in.'"
    "Live-in Attendant An individual who resides in a household solely for the purpose of providing medical, housekeeping, or child care services."
    "Migrant Farm Worker A person who moves with the migrant stream in order to follow seasonal farm work employment and does not return to his permanent home each night."
    "Non-Public assistance Household A Food and Nutrition Services household in which all family members are not recipients of WFFA, SSI, or a combination of the two."
rules:
  - name: irrevocable
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, page 6, "Irrevocable"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-6
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not asset_can_be_sold
          and not asset_can_be_cashed_in
  - name: live_in_attendant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, page 6, "Live-in Attendant"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-6
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          resides_in_household
          and resides_solely_to_provide_medical_housekeeping_or_child_care_services
  - name: migrant_farm_worker
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, page 6, "Migrant Farm Worker"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-6
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          moves_with_migrant_stream_to_follow_seasonal_farm_work_employment
          and not returns_to_permanent_home_each_night
  - name: non_public_assistance_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, page 6, "Non-Public assistance Household"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-6
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          food_and_nutrition_services_household
          and not all_family_members_receive_wffa_ssi_or_combination
