format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
  summary: |-
    "Destitute Households A migrant or seasonal farm worker household whose terminated income was received prior to the date of application and/or no more than $25 will be received from a new source by the tenth day of the month of application." "Elderly A person age 60 or over." "Emancipated Minor An individual who is under age 18 who marries, becomes a member of the U. S. Armed Forces, or is declared emancipated by the court."
rules:
  - name: destitute_household_new_source_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Appendix 3300 Glossary, "Destitute Households"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
              excerpt: "no more than $25"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          25

  - name: elderly_minimum_age
    kind: parameter
    dtype: Integer
    period: Month
    source: Appendix 3300 Glossary, "Elderly"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
              excerpt: "age 60 or over"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          60

  - name: emancipated_minor_age_ceiling
    kind: parameter
    dtype: Integer
    period: Month
    source: Appendix 3300 Glossary, "Emancipated Minor"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
              excerpt: "under age 18"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          18

  - name: destitute_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, "Destitute Households"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
              excerpt: "no more than $25"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          household_is_migrant_or_seasonal_farm_worker_household
          and terminated_income_was_received_prior_to_date_of_application
          and new_source_income_to_be_received_by_tenth_day_of_application_month <= destitute_household_new_source_income_limit

  - name: elderly
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, "Elderly"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
              excerpt: "age 60 or over"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          age >= elderly_minimum_age

  - name: emancipated_minor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, "Emancipated Minor"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-4
              excerpt: "under age 18"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          age < emancipated_minor_age_ceiling
          and (person_marries or person_becomes_member_of_us_armed_forces or person_declared_emancipated_by_court)
