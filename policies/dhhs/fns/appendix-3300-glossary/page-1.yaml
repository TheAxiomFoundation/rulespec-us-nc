format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-1
  summary: |-
    Appendix 3300 Glossary, Change #5-2016, October 1, 2016. 3300.01 lists program names and descriptions including CIP, LIEAP, Medicaid, North Carolina Health Choice, Special Assistance, and Work First Family Assistance. 3300.02 defines terms including: "Able-bodied Adult without Dependent (ABAWD) Physically and mentally fit individuals from the ages of 18 through 49, included in a Food and Nutrition Services (FNS) unit that does not include a person under age 18."
rules:
  - name: able_bodied_adult_without_dependent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300.02 Definitions, Able-bodied Adult without Dependent (ABAWD)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-1
              excerpt: "Physically and mentally fit individuals"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-1
              excerpt: "ages of 18 through 49"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-1
              excerpt: "included in a Food and Nutrition Services (FNS) unit that does not include a person under age 18"
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          person_is_physically_and_mentally_fit
          and person_is_age_18_through_49
          and person_is_in_fns_unit_that_does_not_include_person_under_age_18
