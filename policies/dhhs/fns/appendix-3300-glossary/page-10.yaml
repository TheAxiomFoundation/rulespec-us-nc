format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-10
  summary: |-
    Verification means confirmation of facts and information used in determining eligibility. Verified upon receipt means information is not questionable and the provider is the primary source of the information. A household is vulnerable if it is subject to the rising cost of heating and has a heat source; not vulnerable means not subject to the cost of heating.
rules:
  - name: verified_upon_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, "Verified Upon Receipt"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-10
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          information_is_not_questionable
          and provider_is_primary_source_of_information

  - name: vulnerable_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, "Vulnerable"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-10
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          household_is_subject_to_rising_cost_of_heating
          and household_has_heat_source

  - name: not_vulnerable_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Appendix 3300 Glossary, "Not Vulnerable Household"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-10
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          not household_is_subject_to_cost_of_heating
