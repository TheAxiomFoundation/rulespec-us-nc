format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
  summary: |-
    Glossary page defining terms including "Homeless An individual who lacks a permanent or fixed residence" and "Homesite Principal place of residence owned by applicant/recipient or FNSU member."
rules:
  - name: grandfathered_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Grandfathered"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          eligible_under_previous_rules_or_regulations
          and new_rules_or_regulations_make_person_eligible_by_virtue_of_previous_eligibility
  - name: guardian
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Guardian"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          appointed_by_court
          and legally_in_charge_of_affairs_of_minor_or_person_incapable_of_taking_care_of_own_needs
  - name: homeless
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Homeless"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          lacks_permanent_residence
          or lacks_fixed_residence
  - name: incapacitated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Incapacitated"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          has_verified_mental_emotional_or_physical_impairment
          and impairment_prevents_person_from_performing_normal_duties
  - name: illegal_alien
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Illegal Alien"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          entered_united_states_without_uscis_approval
          or (entered_united_states_legally and remained_in_united_states_past_uscis_time_limit_without_authorization)
  - name: heir_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Heir Property"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          property_conveyed_to_person
          and conveyance_occurred_at_death_of_property_owner
  - name: homesite
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Homesite"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          principal_place_of_residence
          and owned_by_applicant_recipient_or_fnsu_member
  - name: individual_development_account
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Individual Development Account (IDA)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          dedicated_savings_account
          and account_use_limited_to_first_home_education_job_training_or_microenterprise
          and managed_by_community_organization
          and held_at_local_financial_institution
          and lower_income_participant_contributions_matched_using_private_and_public_sources
  - name: ida_funds_disregarded_for_federal_means_tested_assistance
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Individual Development Account (IDA)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          individual_development_account
          and account_continues_to_be_maintained
  - name: individual_retirement_account
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: Appendix 3300 glossary, p. 5, "Individual Retirement Account (IRA)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/appendix-3300-glossary/page-5
    versions:
      - effective_from: '2016-10-01'
        formula: |-
          money_set_aside_for_retirement_or_future_use
          and account_has_penalty_for_withdrawal_prior_to_retirement
