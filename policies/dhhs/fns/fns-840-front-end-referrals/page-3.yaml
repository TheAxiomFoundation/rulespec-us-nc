format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-3
  summary: |-
    When a disqualification is determined, but benefits were not issued, enter $1.00 as the value in EPICS. Document and close a Front End investigation with closure code "FU" when correct information was given at application, or "FO" when incorrect information was given, regardless of actual overissuance.
rules:
  - name: epics_disqualification_claim_value_when_no_benefits_issued
    kind: parameter
    dtype: Money
    unit: USD
    source: Section 840 Change #1-2017, D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-3
              excerpt: "enter $1.00 as the value in EPICS"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          1.00

  - name: epics_disqualification_claim_value_to_enter
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: Section 840 Change #1-2017, D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-840-front-end-referrals/page-3#epics_disqualification_claim_value_when_no_benefits_issued
              output: epics_disqualification_claim_value_when_no_benefits_issued
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          if disqualification_is_determined and benefits_were_not_issued: epics_disqualification_claim_value_when_no_benefits_issued else: 0

  - name: front_end_investigation_close_with_fu_code
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 840.05(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          applicant_gave_correct_information_at_application

  - name: front_end_investigation_close_with_fo_code
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 840.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          applicant_gave_incorrect_information_at_application
