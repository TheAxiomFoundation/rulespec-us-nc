format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
  summary: "\"Do not establish a claim less than $125.00 unless at least one of the\
    \ debtors is currently participating in the Food Stamp Program at the time the\
    \ overissuance amount is determined. This applies unless your local agency has\
    \ a State approved Claims Management Plan for a different amount. Establish a\
    \ claim when the applicant is issued ongoing benefits due to processing time limits.\
    \ Handle as a regular claim.\"\n\"The claim cannot be an agency error if emergency\
    \ or regular benefits were issued using the applicant\u2019s false statement.\""
rules:
- name: default_front_end_claim_minimum_amount
  kind: parameter
  dtype: Money
  unit: USD
  source: Section 840.03(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: Do not establish a claim less than $125.00
  versions:
  - effective_from: '2017-04-01'
    formula: '125.00'
- name: applicable_front_end_claim_minimum_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: Section 840.03(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: unless your local agency has a State approved Claims Management
            Plan for a different amount
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: Do not establish a claim less than $125.00
  versions:
  - effective_from: '2017-04-01'
    formula: 'if local_agency_has_state_approved_claims_management_plan_for_different_amount:
      state_approved_claim_minimum_amount_under_local_claims_management_plan else:
      default_front_end_claim_minimum_amount'
- name: front_end_claim_established
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: Section 840.03(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: Establish a claim when an applicant receives emergency benefits,
            and a Front End investigation later reveals the applicant was not eligible.
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: unless at least one of the debtors is currently participating
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: issued ongoing benefits due to processing time limits
  versions:
  - effective_from: '2017-04-01'
    formula: "(\n  (\n    applicant_received_emergency_benefits\n    and front_end_investigation_later_reveals_applicant_not_eligible\n\
      \  )\n  or applicant_issued_ongoing_benefits_due_to_processing_time_limits\n\
      )\nand (\n  overissuance_amount >= applicable_front_end_claim_minimum_amount\n\
      \  or at_least_one_debtor_currently_participating_in_food_stamp_program_when_overissuance_determined\n\
      )"
- name: front_end_claim_handled_as_regular_claim
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 840.03(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: Establish a claim when the applicant is issued ongoing benefits
            due to processing time limits. Handle as a regular claim.
  versions:
  - effective_from: '2017-04-01'
    formula: applicant_issued_ongoing_benefits_due_to_processing_time_limits
- name: front_end_claim_cannot_be_agency_error
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 840.03(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-2
          excerpt: "The claim cannot be an agency error if emergency or regular benefits\
            \ were issued using the applicant\u2019s false statement."
  versions:
  - effective_from: '2017-04-01'
    formula: 'emergency_benefits_issued_using_applicant_false_statement

      or regular_benefits_issued_using_applicant_false_statement'
