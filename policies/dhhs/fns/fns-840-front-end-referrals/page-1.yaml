format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-1
  summary: |-
    "Do not pend an application past 30 days due to a Front End Investigation." "Create the referral in EPICS the day it is received using the referral type code of 'F'." "Resolve the questionable or conflicting information and return the findings, application, and documentation to the caseworker within 10 calendar days."
rules:
  - name: maximum_application_pending_days_due_to_front_end_investigation
    kind: parameter
    dtype: Count
    source: FS 840.01 General Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-1
              excerpt: "Do not pend an application past 30 days due to a Front End Investigation."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          30
  - name: front_end_referral_type_code
    kind: parameter
    dtype: String
    source: FS 840.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-1
              excerpt: "using the referral type code of 'F'"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          "F"
  - name: maximum_return_findings_days
    kind: parameter
    dtype: Count
    source: FS 840.02(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-840-front-end-referrals/page-1
              excerpt: "return the findings, application, and documentation to the caseworker within 10 calendar days"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          10
