format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
  summary: |-
    Employment is unsuitable when wages are less than the highest applicable minimum or training wage, piece-rate expected hourly yield is less than the applicable hourly wage, labor-organization membership is required or barred, the site is subject to strike or lockout unless enjoined, health and safety risk is unreasonable, the member is unfit, first-30-days work is outside the member's major field, commuting is unreasonable, or hours/nature interfere with religious observances. During application, ask whether any member quit a job in the 30 days before application; if the member is exempt, voluntary quit does not apply.
rules:
  - name: fallback_federal_minimum_wage_rate
    kind: parameter
    dtype: Rate
    source: FNS 255 page 5 item A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "80% of the federal minimum wage"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          0.80

  - name: voluntary_quit_lookback_days
    kind: parameter
    dtype: Count
    source: FNS 255.05 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "quit a job in the 30 days prior to the date of application"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          30

  - name: initial_registration_major_field_days
    kind: parameter
    dtype: Count
    source: FNS 255 page 5 item G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "within the first 30 days of registration"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          30

  - name: unreasonable_commuting_hours_per_day_limit
    kind: parameter
    dtype: Decimal
    source: FNS 255 page 5 item H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "commuting exceeds two hours per day"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          2

  - name: walking_distance_round_trip_miles_limit
    kind: parameter
    dtype: Decimal
    source: FNS 255 page 5 item H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "walking distance to the job is in excess of two miles round trip"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          2

  - name: wages_below_required_minimum
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "wages are less than the highest of the federal minimum wage, State minimum wage, training wage, or 80% of the federal minimum wage if others do not apply"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5#fallback_federal_minimum_wage_rate
              output: fallback_federal_minimum_wage_rate
              hash: sha256:local
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          offered_hourly_wage < max(max(federal_minimum_wage, state_minimum_wage), max(training_wage, fallback_federal_minimum_wage_rate * federal_minimum_wage))

  - name: piece_rate_yield_below_applicable_hourly_wage
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          employment_is_piece_rate
          and average_hourly_yield_reasonably_expected_by_employee < applicable_hourly_wage

  - name: labor_organization_condition_makes_employment_unsuitable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          condition_of_employment_requires_joining_legitimate_labor_organization
          or condition_of_employment_requires_resigning_from_legitimate_labor_organization
          or condition_of_employment_requires_refraining_from_joining_legitimate_labor_organization

  - name: strike_or_lockout_site_makes_employment_unsuitable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          work_site_subject_to_strike_or_lockout_at_time_of_offer
          and not strike_enjoined_under_labor_management_relations_act_section_208
          and not injunction_issued_under_railway_labor_act_section_10

  - name: unreasonable_health_or_safety_risk
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          degree_of_risk_to_health_and_safety_is_unreasonable

  - name: member_unfit_to_perform_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          member_physically_unfit_to_perform_employment
          or member_mentally_unfit_to_perform_employment

  - name: first_registration_period_work_outside_major_field
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "within the first 30 days of registration is not in the members major field of experience"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5#initial_registration_major_field_days
              output: initial_registration_major_field_days
              hash: sha256:local
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          days_since_registration <= initial_registration_major_field_days
          and not employment_in_members_major_field_of_experience

  - name: commuting_distance_unreasonable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "commuting exceeds two hours per day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5#unreasonable_commuting_hours_per_day_limit
              output: unreasonable_commuting_hours_per_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5#walking_distance_round_trip_miles_limit
              output: walking_distance_round_trip_miles_limit
              hash: sha256:local
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          commuting_hours_per_day_not_including_child_day_care_transportation > unreasonable_commuting_hours_per_day_limit
          or (not public_transportation_available and not private_transportation_available and walking_distance_to_job_round_trip_miles > walking_distance_round_trip_miles_limit)

  - name: religious_observance_interference
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 item I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          working_hours_or_nature_of_employment_interferes_with_members_religious_observances_convictions_or_beliefs

  - name: employment_unsuitable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255 page 5 items A-I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          wages_below_required_minimum
          or piece_rate_yield_below_applicable_hourly_wage
          or labor_organization_condition_makes_employment_unsuitable
          or strike_or_lockout_site_makes_employment_unsuitable
          or unreasonable_health_or_safety_risk
          or member_unfit_to_perform_employment
          or first_registration_period_work_outside_major_field
          or commuting_distance_unreasonable
          or religious_observance_interference

  - name: quit_job_within_application_lookback
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255.05 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
              excerpt: "quit a job in the 30 days prior to the date of application"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5#voluntary_quit_lookback_days
              output: voluntary_quit_lookback_days
              hash: sha256:local
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          days_between_job_quit_and_application_date <= voluntary_quit_lookback_days

  - name: voluntary_quit_provisions_apply_to_applicant_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255.05 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-5
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          quit_job_within_application_lookback
          and not member_exempt_from_voluntary_quit_provisions
