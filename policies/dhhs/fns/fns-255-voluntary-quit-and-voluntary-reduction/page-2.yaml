format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
  summary: |-
    "First Offense - One month"; "Second Offense - Three months"; "Third and Subsequent Offenses - Six months." "No compliance activity (cure) is needed after the penalty ends." "If an individual gains a work registration exemption prior to the end of the penalty, the disqualification is ended." "If the member finds comparable employment or becomes exempt from work registration before the application is processed or before the Notice of Adverse Action period ends, do not impose the penalty." "The FNS member may cure ... if he finds a comparable job in salary or hours ... finds a job that offers benefits ... or he becomes exempt from work registration." "If the FNS member leaves the household, the penalty follows him." "If the FNS requests a fair hearing and continued benefits, and the hearing decision upholds the county's decision, begin the disqualification the month following the notice of the hearing decision." "A FNS member is exempt from voluntary quit if ... exempt from work requirements (except due to employment)."
rules:
  - name: first_offense_disqualification_months
    kind: parameter
    dtype: Count
    source: FNS 255, p. 2, voluntary quit penalty duration list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
              excerpt: "First Offense - One month"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          1

  - name: second_offense_disqualification_months
    kind: parameter
    dtype: Count
    source: FNS 255, p. 2, voluntary quit penalty duration list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
              excerpt: "Second Offense - Three months"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          3

  - name: third_or_subsequent_offense_disqualification_months
    kind: parameter
    dtype: Count
    source: FNS 255, p. 2, voluntary quit penalty duration list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
              excerpt: "Third and Subsequent Offenses - Six months"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          6

  - name: voluntary_quit_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
              excerpt: "except due to employment"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_is_exempt_from_work_requirements
          and not work_requirement_exemption_is_due_to_employment

  - name: voluntary_quit_or_reduction_disqualification_duration_months
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: FNS 255, p. 2, voluntary quit penalty duration list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          if voluntary_quit_or_reduction_is_first_offense: first_offense_disqualification_months else: if voluntary_quit_or_reduction_is_second_offense: second_offense_disqualification_months else: if voluntary_quit_or_reduction_is_third_or_subsequent_offense: third_or_subsequent_offense_disqualification_months else: 0

  - name: voluntary_quit_penalty_imposed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          member_committed_voluntary_quit_or_voluntary_reduction
          and not voluntary_quit_exemption_applies
          and not member_found_comparable_employment_before_application_processed_or_notice_period_ends
          and not member_became_exempt_from_work_registration_before_application_processed_or_notice_period_ends

  - name: voluntary_quit_penalty_cure_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          member_found_comparable_job_in_salary_or_hours_to_quit_job
          or member_found_job_offering_benefits_not_offered_by_quit_job
          or member_becomes_exempt_from_work_registration

  - name: voluntary_quit_disqualification_ended
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255, p. 2, penalty end and cure notes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          penalty_period_has_ended
          or individual_gained_work_registration_exemption_before_penalty_end
          or voluntary_quit_penalty_cure_available

  - name: voluntary_quit_penalty_follows_member_after_leaving_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          member_left_household
          and voluntary_quit_penalty_imposed

  - name: voluntary_quit_disqualification_begins_after_hearing_decision_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          hearing_decision_upholds_county_after_fair_hearing_with_continued_benefits
          and current_month_is_month_following_notice_of_hearing_decision
