format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4
  summary: |-
    255.03 GOOD CAUSE FOR VOLUNTARY QUIT AND VOLUNTARY REDUCTION

    Good cause reasons for voluntarily quitting a job include: A. Discrimination by an employer based on race, color, national origin, gender, religion, age, disability, or political beliefs. B. Work demands or conditions that render continued employment unreasonable, such as not being paid on schedule or being required to work overtime and not being paid for it. C. Acceptance of another offer of employment as long as the new job meets the minimum requirement of this provision (30 or more hours per week or earnings equivalent to federal minimum wage times 30 hours). D. Enrollment at least half-time in any recognized school, training program, or institution of higher education which requires the FNS to move.
rules:
  - name: minimum_weekly_hours_for_good_cause_new_employment
    kind: parameter
    dtype: Count
    period: Week
    source: FNS 255.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4
              excerpt: "30 or more hours per week"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          30

  - name: retirement_good_cause_maximum_age
    kind: parameter
    dtype: Count
    period: Year
    source: FNS 255.03(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4
              excerpt: "member under the age of 60"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          60

  - name: accepted_employment_offer_meets_minimum_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 255.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4
              excerpt: "30 or more hours per week or earnings equivalent to federal minimum wage times 30 hours"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          accepted_offer_weekly_hours >= minimum_weekly_hours_for_good_cause_new_employment
          or accepted_offer_weekly_earnings >= federal_minimum_wage_weekly_equivalent_for_minimum_requirement

  - name: accepted_offer_did_not_materialize_or_was_unsuitable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255.03(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          accepted_offer_of_employment_meets_minimum_requirement
          and circumstances_beyond_member_control_prevented_offer_from_materializing_or_resulted_in_unsuitable_employment

  - name: good_cause_for_voluntary_quit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 255.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4#accepted_employment_offer_meets_minimum_requirement
              output: accepted_employment_offer_meets_minimum_requirement
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-255-voluntary-quit-and-voluntary-reduction/page-4#accepted_offer_did_not_materialize_or_was_unsuitable
              output: accepted_offer_did_not_materialize_or_was_unsuitable
              hash: sha256:local
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          employer_discrimination_based_on_protected_characteristic
          or work_demands_or_conditions_render_continued_employment_unreasonable
          or accepted_employment_offer_meets_minimum_requirement
          or half_time_enrollment_requires_fns_move
          or (member_age < retirement_good_cause_maximum_age and employer_recognizes_resignation_as_retirement)
          or accepted_offer_did_not_materialize_or_was_unsuitable
          or leaving_job_in_connection_with_pattern_of_employment
          or circumstances_beyond_member_control_required_leaving_job
