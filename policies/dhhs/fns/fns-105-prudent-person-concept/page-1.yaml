    corpus_citation_path: us-nc/manual/dhhs/fns/fns-105-prudent-person-concept/page-1
  summary: |-
    "Policy contained in this manual is intended to be sufficiently flexible to allow the caseworker to exercise reasonable judgement in executing his/her responsibilities." "If a case situation only applies to a specific case, or to a limited number of cases, and is generally covered by existing policy guidelines, the caseworker should make a judgement that they can defend as reasonable and prudent and document the case record." "Use of the prudent person concept does not replace required actions of the FNS caseworker, nor does it eliminate any eligibility requirements for the FNS unit."
