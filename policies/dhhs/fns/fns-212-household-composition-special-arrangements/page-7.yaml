format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
  summary: |-
    "The individuals in a homeless shelter can participate in the program and must be treated as separate households from the others with whom they reside, subject to mandatory household combination as required by law." "At application and recertification exclude an individual who is residing away from the FNS unit on a temporary basis." "Include an absent wage earner in the FNS unit." "Individuals 'left behind' for undetermined periods of time that are 30 days or more in length may apply for Food and Nutrition Services benefits." "Consider any gain or benefit that is not in the form of money as in-kind and exclude it as income. Count any contribution made by the member to the FNS unit as unearned income."
rules:
  - name: military_left_behind_minimum_absence_days_for_application
    kind: parameter
    dtype: Count
    source: FNS 212.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
              excerpt: "30 days or more in length"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          30

  - name: homeless_shelter_individual_treated_as_separate_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, page 7, homeless shelter household treatment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          individual_resides_in_homeless_shelter
          and not mandatory_household_combination_required_for_individual

  - name: temporarily_absent_individual_excluded_from_fns_unit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212.04(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          case_is_application_or_recertification
          and individual_residing_away_from_fns_unit_on_temporary_basis

  - name: absent_wage_earner_included_in_fns_unit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212.04(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          individual_is_absent_wage_earner
          and not fns_unit_establishes_absent_wage_earner_is_not_fns_unit_member

  - name: remaining_fns_unit_may_apply_during_military_absence
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 212.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
              excerpt: "30 days or more in length may apply"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          military_personnel_stationed_away_from_household
          and left_behind_period_undetermined
          and absent_military_period_days >= military_left_behind_minimum_absence_days_for_application
          and (military_absence_is_temporary_duty or military_absence_is_permanent_change_of_station)

  - name: military_in_kind_gain_or_benefit_excluded_from_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 212.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          military_personnel_stationed_away_from_household
          and military_gain_or_benefit_not_in_form_of_money

  - name: absent_military_member_payment_counted_as_unearned_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 212.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-7
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          absent_military_member_made_contribution_to_fns_unit
          or military_allotment_sent_to_fns_unit
          or (fns_unit_shares_joint_bank_account_with_absent_military_personnel and absent_military_pay_directly_deposited_to_joint_account)
