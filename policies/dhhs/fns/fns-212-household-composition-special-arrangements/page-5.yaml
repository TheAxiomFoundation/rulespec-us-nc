  summary: |-
    "Responsibilities of the ADTC when participating in the Food and Nutrition Services Program. a. The facility must be an approved treatment center. ... b. Provide the local agency a list of clients that are currently residing and participating in the ADTC/DAA treatment center (on or around the 5th and 20th of each month). ... e. The treatment center must report changes in the FNS unit’s situation ... f. When the FNS unit leaves the treatment center, the ADTC is responsible for notifying the county of the change."
