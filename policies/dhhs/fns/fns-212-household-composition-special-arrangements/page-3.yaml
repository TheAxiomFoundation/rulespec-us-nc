format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
  summary: |-
    Residents can apply through the facility which will serve as an authorized representative. Eligibility must be determined as a one-person FNS unit; or
    The GLA may only purchase food for eligible Food and Nutrition Services recipients if the Food and Nutrition Services recipient makes someone at the GLA his/her Authorized Representative.
    Battered Women and Children's Shelter is a public or private non-profit residential facility that serves battered women and their children. If such a facility services other individuals, a portion of the facility must be set aside on a long-term basis to serve only battered women and children.
    These provisions apply to battered women and children but do not apply to battered men.
    Residents of shelters may be considered as either an individual FNS unit (including their children) or a group FNS unit.
rules:
  - name: group_living_arrangement_facility_application_fns_unit_size
    kind: parameter
    dtype: Count
    source: FNS 212, Section 210, page 3, B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
              excerpt: "one-person FNS unit"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          1

  - name: resident_may_apply_through_group_living_arrangement_facility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, B.1-B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          resident_lives_in_group_living_arrangement
          and group_living_arrangement_is_non_profit_organization
          and (
            group_living_arrangement_authorized_by_usda_to_accept_fns_benefits
            or group_living_arrangement_certified_by_state
          )

  - name: fns_unit_size_when_applying_through_group_living_arrangement_facility
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: FNS 212, Section 210, page 3, B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
              excerpt: "Eligibility must be determined as a one-person FNS unit"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          if resident_may_apply_through_group_living_arrangement_facility and resident_applies_through_group_living_arrangement_facility: group_living_arrangement_facility_application_fns_unit_size else: 0

  - name: group_living_arrangement_resident_may_apply_on_own_or_select_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          resident_may_apply_through_group_living_arrangement_facility
          and group_living_arrangement_determines_resident_has_mental_and_physical_ability_to_handle_own_affairs

  - name: fns_unit_size_when_group_living_arrangement_resident_applies_on_own_or_with_chosen_representative
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: FNS 212, Section 210, page 3, B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          if group_living_arrangement_resident_may_apply_on_own_or_select_representative: individuals_purchasing_and_preparing_meals_together_count else: 0

  - name: group_living_arrangement_may_purchase_food_for_recipient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          recipient_is_eligible_fns_recipient
          and recipient_makes_someone_at_group_living_arrangement_authorized_representative

  - name: resident_in_covered_battered_womens_shelter
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          resident_is_battered_woman_or_child
          and (
            shelter_authorized_by_usda_to_accept_ebt_benefits
            or (
              resident_lives_in_public_or_private_non_profit_residential_facility
              and facility_serves_battered_women_and_their_children
              and (
                not facility_serves_other_individuals
                or facility_has_long_term_set_aside_for_battered_women_and_children
              )
            )
          )

  - name: battered_womens_shelter_resident_individual_fns_unit_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          resident_in_covered_battered_womens_shelter
          and food_customarily_purchased_and_prepared_separately

  - name: battered_womens_shelter_resident_group_fns_unit_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          resident_in_covered_battered_womens_shelter
          and food_customarily_purchased_and_prepared_in_common_with_group

  - name: battered_womens_shelter_resident_may_appoint_authorized_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, C.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          resident_in_covered_battered_womens_shelter

  - name: battered_womens_shelter_resident_authorized_representative_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, Section 210, page 3, C.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-3
              excerpt: "though it is not required"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          resident_in_covered_battered_womens_shelter
