format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-9
  summary: |-
    Students returning home often have residence determined by where they state they eat the majority of meals, only for students eligible under FNS 235. A person under court-ordered house arrest is included in the FNS unit unless convicted of a drug-related felony. A household is ineligible if it refuses to cooperate with State and/or USDA Quality Control review, and benefits are terminated when a reviewer informs the agency of refusal; the household cannot be eligible again until it cooperates or the disqualification period ends.
rules:
  - name: student_residence_determined_by_majority_meal_location
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, page 9, G. Students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-9
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          student_attends_college
          and student_returns_home_often
          and student_eligible_under_fns_235_student_of_higher_education

  - name: person_included_in_fns_unit_while_under_house_arrest
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212, page 9, H. House Arrest
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-9
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          person_placed_under_house_arrest_by_court
          and not person_has_drug_related_felony_conviction

  - name: household_ineligible_for_fns_due_to_quality_control_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 212, page 9, I. Refusal to Cooperate with Quality Control Review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-9
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_refuses_to_cooperate_with_state_or_usda_quality_control_review

  - name: fns_benefits_terminate_due_to_quality_control_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 212, page 9, I. Refusal to Cooperate with Quality Control Review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-9
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          quality_control_reviewer_informs_agency_of_household_refusal
          and not refusal_to_cooperate_with_quality_control_occurred_in_another_state

  - name: household_may_be_determined_eligible_after_quality_control_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 212, page 9, I. Refusal to Cooperate with Quality Control Review
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-9
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_cooperates_with_quality_control_review
          or quality_control_disqualification_time_period_ended
