format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
  summary: If a client leaves the facility prior to the 16th of the month and benefits
    have not been issued on EBT card, the facility must give the client one-half of
    the monthly allotment unless issued semimonthly. If a client leaves after the
    16th of month, the facility may be required to give the client a portion of its
    allotment. Residents of public or private nonprofit shelters for homeless persons
    are allowed to use their Food and Nutrition Services benefits to purchase prepared
    meals from USDA approved homeless meal providers. A homeless shelter, however,
    cannot be the authorized representative for the homeless individual.
rules:
- name: allotment_share_for_client_leaving_facility_before_sixteenth
  kind: parameter
  dtype: Rate
  source: FNS 212, Section 210, Change
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: one-half of the monthly allotment
  versions:
  - effective_from: '2021-07-12'
    formula: 1 / 2
- name: allotment_facility_must_give_client_leaving_before_sixteenth
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: FNS 212, Section 210, Change
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: leaves the facility prior to the 16th of the month and benefits
            have not been issued on EBT card
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: unless issued semimonthly
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: must give the client one-half of the monthly allotment
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-212-household-composition-special-arrangements/page-6#allotment_share_for_client_leaving_facility_before_sixteenth
          output: allotment_share_for_client_leaving_facility_before_sixteenth
          hash: sha256:local
  versions:
  - effective_from: '2021-07-12'
    formula: 'if client_leaves_facility_prior_to_sixteenth_day and benefits_have_not_been_issued_on_ebt_card
      and not benefits_issued_semimonthly: monthly_allotment * allotment_share_for_client_leaving_facility_before_sixteenth
      else: 0'
- name: homeless_shelter_resident_may_use_fns_benefits_for_prepared_meals
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 212, Section 210, Change
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: Residents of public or private nonprofit shelters for homeless
            persons
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: USDA approved homeless meal providers
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: allowed to use their Food and Nutrition Services benefits to purchase
            prepared meals
  versions:
  - effective_from: '2021-07-12'
    formula: 'person_is_resident_of_public_or_private_nonprofit_shelter_for_homeless_persons

      and prepared_meal_provider_is_usda_approved_homeless_meal_provider'
- name: homeless_shelter_may_be_authorized_representative_for_homeless_individual
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 212, Section 210, Change
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-6
          excerpt: A homeless shelter, however, cannot be the authorized representative
            for the homeless individual.
  versions:
  - effective_from: '2021-07-12'
    formula: not homeless_shelter_would_be_authorized_representative_for_homeless_individual
