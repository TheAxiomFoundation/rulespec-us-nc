format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-1
  summary: |-
    212.01 HEAD OF THE FNS UNIT A. The FNS unit must designate an individual to be the head of the FNS unit. The person chosen as the head of the FNS unit must: 1. Have primary responsibility for the health and well-being of the FNS unit members; and/or 2. Have responsibility for the financial obligations of the FNS unit; and/or 3. Be otherwise exercising control over the FNS unit ... C. Do not use the head of the FNS unit designation to impose special requirements ... Unless otherwise stated in policy, all adult household members may complete application, recertification, or request changes. 212.02 SPECIFIED PERSON An individual meeting one of the following criteria is considered a specified person: A. An individual 60 years of age or older; or B. A person who receives supplemental security income benefits under Title XVI ... or disability or blindness payments under Titles I, II, X, XIV, or XVI ...; or C. A person who receives federally or State administered supplemental benefits under Section 1616(a) ... provided that the eligibility to receive the benefits is based upon the disability or blindness criteria used under Title XVI ...
rules:
  - name: person_satisfies_head_of_fns_unit_selection_criteria
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 212.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-212-household-composition-special-arrangements/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          primary_responsibility_for_health_and_well_being_of_fns_unit_members
          or responsibility_for_financial_obligations_of_fns_unit
          or otherwise_exercising_control_over_fns_unit
  - name: head_of_fns_unit_designation_change_available
