  - name: high_value_felony_offense_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 110 p. 2, Food and Nutrition Act section 15(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-2
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          knowingly_uses_transfers_acquires_alters_or_possesses_benefits_contrary_to_act_or_regulations
          and benefits_or_benefit_item_value >= high_value_felony_lower_threshold

  - name: intermediate_value_felony_offense_applies
