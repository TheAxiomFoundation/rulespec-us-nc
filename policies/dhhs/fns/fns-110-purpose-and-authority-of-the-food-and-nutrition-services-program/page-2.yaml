        formula: |-
          if convicted_of_felony_or_misdemeanor_violation_under_this_subsection: additional_participation_suspension_max_months else: 0

  - name: sentence_imposition_withheld_for_restitution_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 110 p. 2, Food and Nutrition Act section 15(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-2
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          individual_convicted_of_offense_under_paragraph_1
          and court_permits_work_to_provide_restitution_for_losses_from_the_offense
          and individual_agrees_to_perform_assigned_restitution_work

  - name: sentence_may_be_suspended_after_restitution_work_completion
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 110 p. 2, Food and Nutrition Act section 15(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-2
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          sentence_imposition_withheld_for_restitution_work
          and individual_successfully_completes_assigned_restitution_work
