        formula: |-
          if intermediate_value_felony_offense_applies and offense_is_second_or_subsequent_conviction: intermediate_value_felony_subsequent_min_imprisonment_months else: 0

  - name: maximum_additional_participation_suspension_months
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: FNS 110 p. 2, Food and Nutrition Act section 15(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-2
    versions:
