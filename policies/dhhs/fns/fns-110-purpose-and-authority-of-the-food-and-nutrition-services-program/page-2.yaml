format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-2
  summary: |-
    Food and Nutrition Services benefits are obligations of the United States. Whoever knowingly uses, transfers, acquires, alters, or possesses benefits contrary to the act or regulations is subject to felony or misdemeanor penalties based on benefit value; felony or misdemeanor convictions may also carry up to eighteen months of additional SNAP participation suspension. A convicted individual may perform court-approved restitution work, with sentence imposition withheld if the individual agrees and performs the assigned work.
rules:
  - name: high_value_felony_lower_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 110 p. 2, Food and Nutrition Act section 15(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-2
              excerpt: "$5000 or more"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          5000

  - name: high_value_felony_max_fine
