          if high_value_felony_offense_applies: high_value_felony_max_imprisonment_years else: if intermediate_value_felony_offense_applies: intermediate_value_felony_max_imprisonment_years else: if misdemeanor_offense_applies: misdemeanor_max_imprisonment_years else: 0

  - name: minimum_imprisonment_months_for_benefit_offense
