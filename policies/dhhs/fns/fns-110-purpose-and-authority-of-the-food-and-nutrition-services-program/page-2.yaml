          and benefits_or_benefit_item_value < misdemeanor_upper_threshold

  - name: maximum_fine_for_benefit_offense
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: FNS 110 p. 2, Food and Nutrition Act section 15(b)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-2
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          if high_value_felony_offense_applies: high_value_felony_max_fine else: if intermediate_value_felony_offense_applies: intermediate_value_felony_max_fine else: if misdemeanor_offense_applies: misdemeanor_max_fine else: 0

  - name: maximum_imprisonment_years_for_benefit_offense
