format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-3
  summary: |-
    "The value of benefits that may be provided under this act shall not be considered income or resources for any purpose..." Eligible FNS unit members and spouses who are 60 or over, housebound, physically disabled, or otherwise disabled and unable to adequately prepare all meals may use FNS benefits for authorized nonprofit delivered meals. Eligible FNS unit members 60 or over and spouses, or SSI recipients and spouses, may use benefits for communal dining facility meals.
rules:
  - name: benefit_value_excluded_from_income_or_resources
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 110.05 Benefits as Income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-3
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          payment_is_food_and_nutrition_services_benefit

  - name: delivered_meals_benefit_use_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 110.06.A Delivered Meals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-3
              excerpt: "Eligible FNS unit members and their spouses who are 60 years of age or over, housebound, physically disabled, or otherwise disabled..."
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          (person_is_eligible_fns_unit_member or person_is_spouse_of_eligible_fns_unit_member)
          and (person_is_60_years_of_age_or_over or person_is_housebound or person_is_physically_disabled or person_is_otherwise_disabled_and_unable_to_adequately_prepare_all_meals)
          and meal_is_prepared_for_and_delivered_to_person
          and meal_delivery_service_is_non_profit
          and meal_delivery_service_is_authorized_by_fns_to_accept_fns_benefits

  - name: benefits_may_be_used_at_authorized_retail_store
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 110.06.B Delivered Meals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-3
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          household_is_delivered_meals_household
          and purchase_is_food_in_authorized_retail_store

  - name: benefits_may_be_used_for_authorized_delivered_meals
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 110.06.B Delivered Meals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-3
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          household_is_delivered_meals_household
          and meal_is_delivered_by_authorized_meal_delivery_service

  - name: communal_dining_benefit_use_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 110.07 Communal Dining Facilities
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-110-purpose-and-authority-of-the-food-and-nutrition-services-program/page-3
              excerpt: "Eligible FNS unit members 60 years of age or over and their spouses, or those receiving SSI and their spouses, may use benefits..."
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          ((person_is_eligible_fns_unit_member_60_years_of_age_or_over or person_is_spouse_of_eligible_fns_unit_member_60_years_of_age_or_over)
          or (person_receives_ssi or person_is_spouse_of_person_receiving_ssi))
          and meal_is_prepared_by_communal_dining_facility
