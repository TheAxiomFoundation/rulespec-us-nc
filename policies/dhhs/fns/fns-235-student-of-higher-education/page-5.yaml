format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-5
  summary: |-
    If questionable and verification is necessary, accept any document that reasonably establishes the individual's student status. Do not require a student verification form unless enrollment information is questionable or to verify reported student income and expenses. Request missing verification using the DSS-8650 and do not request a specific type of document.
rules:
  - name: student_status_verification_must_be_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235, page 5, section B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-5
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          student_status_is_questionable
          and student_status_verification_is_necessary
          and document_reasonably_establishes_individual_student_status
  - name: student_verification_form_may_be_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235, page 5, section B note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-5
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          enrollment_information_is_questionable
          or reported_student_income_and_expenses_need_verification
  - name: missing_verification_notice_must_use_dss_8650
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235, page 5, section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-5
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          verification_is_missing
          and missing_verification_requested_using_dss_8650
  - name: specific_document_type_must_not_be_requested
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235, page 5, section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-5
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          verification_is_missing
          and specific_document_type_is_requested
