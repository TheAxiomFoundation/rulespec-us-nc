format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-1
  summary: |-
    "An individual is defined as a student of higher education if they meet the following conditions: 1. Enrolled in an institution of higher education (235.02); and 2. Enrolled at least half time as defined by the institution of higher education." Institutions include specified college, university, business, technical, trade, vocational, and special-circumstance programs. "Enrollment begins the first day of the school term" and vacation/recess status is based on the status just prior to the school break.
rules:
  - name: institution_of_higher_education_attended
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          enrolled_in_college_or_university_offering_degree_programs
          or enrolled_in_business_technical_trade_or_vocational_school_normally_requiring_high_school_diploma_or_equivalent
          or enrolled_under_special_circumstances_in_courses_providing_college_level_or_transferable_credit

  - name: enrollment_in_institution_of_higher_education
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          institution_of_higher_education_attended
          and (
            school_term_has_begun_for_the_person
            or (
              institution_is_in_vacation_or_recess
              and person_was_enrolled_just_prior_to_school_break
            )
          )

  - name: student_of_higher_education
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          enrollment_in_institution_of_higher_education
          and enrolled_at_least_half_time_as_defined_by_institution
