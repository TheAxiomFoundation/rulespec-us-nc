format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-4
  summary: |-
    "An on-the-job training program for Food and Nutrition Services purposes is one in which a participant is hired by a private or public employer and while engaged in productive work receiving training..." "The student is considered to be participating in on-the-job training only during the period of time the person is being trained by the employer." "Be participating in a State or federally financed work-study program during the regular school year." Work-study must be approved for the school term, the student must be working to earn the exemption, the exemption runs from the later of school-term start or work-study approval through the month the term stops, and it does not continue after refusal or across breaks over a month unless work-study continues during the break. Client statement is acceptable verification of student status for online and/or traditional classroom studies unless questionable.
rules:
  - name: on_the_job_training_program_for_fns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235, page 4, item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          participant_hired_by_private_or_public_employer
          and participant_engaged_in_productive_work
          and participant_receiving_training_providing_knowledge_or_skills_essential_to_full_and_adequate_job_performance
  - name: participating_in_on_the_job_training_for_fns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235, page 4, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          on_the_job_training_program_for_fns
          and person_is_being_trained_by_employer
  - name: work_study_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235, page 4, section K
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-4
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          work_study_is_state_or_federally_financed
          and regular_school_year_month
          and student_approved_for_work_study
          and work_study_approved_for_school_term
          and student_working_to_earn_work_study_exemption
          and month_is_not_before_later_of_school_term_start_or_work_study_approval
          and month_is_not_after_school_term_stops
          and not student_refused_work_study_assignment
          and not break_between_school_terms_is_more_than_a_month_without_work_study_participation
  - name: client_statement_acceptable_verification_of_student_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 235.05(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-4
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-235-student-of-higher-education/page-4
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          student_status_for_online_or_traditional_classroom_studies
          and not student_status_statement_questionable
