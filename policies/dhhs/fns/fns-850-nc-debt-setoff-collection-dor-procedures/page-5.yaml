format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-5
  summary: |-
    EPICS generates a weekly "DOR Exempt Report" of debtors who meet the selection criteria for NC Debt Setoff but were not submitted because the NC Debt Setoff field has code H, L, S, or X, or because the Appeal Indicator on the NC Debt Setoff Pending Intercept Screen has R or Y. DHHS provides a file to DOR each Tuesday, each weekly file replaces the previous week's file, and the file reflects the latest claim balance and current selection criteria.
rules:
  - name: nc_debt_setoff_field_has_exempt_code
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 850.08(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-5
              excerpt: "codes entered in the NC Debt Setoff field - H, L, S or X"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          nc_debt_setoff_field_code_is_h
          or nc_debt_setoff_field_code_is_l
          or nc_debt_setoff_field_code_is_s
          or nc_debt_setoff_field_code_is_x

  - name: nc_debt_setoff_appeal_indicator_blocks_submission
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 850.08(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-5
              excerpt: "Appeal Indicator ... has an 'R' or 'Y'"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          nc_debt_setoff_appeal_indicator_is_r
          or nc_debt_setoff_appeal_indicator_is_y

  - name: claim_debtor_on_dor_exempt_report
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 850.08(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-5
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          debtor_meets_nc_debt_setoff_selection_criteria
          and (nc_debt_setoff_field_has_exempt_code or nc_debt_setoff_appeal_indicator_blocks_submission)
