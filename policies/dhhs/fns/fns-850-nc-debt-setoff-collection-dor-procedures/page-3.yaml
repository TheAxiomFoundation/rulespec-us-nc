format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
  summary: |-
    "The debtor has 30 calendar days from the date on the notice to appeal the intercept. EPICS post the payment on the 35th day unless a waiver is signed." A debtor may waive the hearing by signing a statement; when signed, the State office enters the appropriate code and EPICS posts payment that night. A debtor may request an OAH hearing when receiving DSS-8653, unless the debt had been previously litigated. Hearing requests must be mailed prepaid and properly addressed or delivered to OAH by the 30th calendar day following the DSS-8653 date, not by telephone or by contacting county DSS.
rules:
  - name: debt_setoff_appeal_period_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 850.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
              excerpt: "30 calendar days from the date on the notice"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          30

  - name: epics_standard_payment_posting_day_after_notice
    kind: parameter
    dtype: Count
    source: FNS 850.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
              excerpt: "EPICS post the payment on the 35th day unless a waiver is signed"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          35

  - name: oah_hearing_request_deadline_calendar_days_after_notice
    kind: parameter
    dtype: Count
    source: FNS 850.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
              excerpt: "by the 30th calendar day following the date of the DSS-8653"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          30

  - name: debtor_has_hearing_right_for_intercept
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 850.06
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          debtor_received_dss_8653_notice_of_intercept
          and not debt_previously_litigated_in_court_proceeding

  - name: debtor_validly_waives_hearing_wait
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 850.04(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          debtor_signed_statement_not_wanting_epics_to_wait_30_days

  - name: epics_payment_posts_under_debt_setoff_process
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 850.04(C)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3#debtor_validly_waives_hearing_wait
              output: debtor_validly_waives_hearing_wait
              hash: sha256:local
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          debtor_validly_waives_hearing_wait
          or thirty_fifth_day_after_notice_has_arrived

  - name: oah_hearing_request_made_by_allowed_method
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 850.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          petition_mailed_prepaid_and_properly_addressed_to_oah
          or petition_delivered_to_oah

  - name: debtor_may_request_oah_hearing_for_intercept
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 850.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3#debtor_has_hearing_right_for_intercept
              output: debtor_has_hearing_right_for_intercept
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-3#oah_hearing_request_made_by_allowed_method
              output: oah_hearing_request_made_by_allowed_method
              hash: sha256:local
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          debtor_has_hearing_right_for_intercept
          and oah_hearing_request_made_by_allowed_method
          and request_made_by_30th_calendar_day_following_dss_8653_date
          and not hearing_requested_by_telephone
          and not hearing_requested_by_contacting_county_dss
