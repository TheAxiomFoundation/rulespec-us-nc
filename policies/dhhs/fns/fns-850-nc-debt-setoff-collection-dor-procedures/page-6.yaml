format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
  summary: |-
    EPICS produces the DSS-8653, 30 Day Notice, mails it to the debtor using DOR address, and waits 35 calendar days (30 days for the client to request a hearing plus 5 days for mailing). EPICS automatically applies payments 35 calendar days after the 30 Day notice date unless the setoff is appealed. The payment may be applied earlier if the debtor waives the right to a hearing.
rules:
  - name: client_hearing_request_period_days
    kind: parameter
    dtype: Integer
    source: FNS 850 NC Debt Setoff Collection Procedures, page 6, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
              excerpt: "30 days for the client to request a hearing"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          30
  - name: mailing_period_days
    kind: parameter
    dtype: Integer
    source: FNS 850 NC Debt Setoff Collection Procedures, page 6, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
              excerpt: "5 days for mailing"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          5
  - name: notice_wait_period_days
    kind: derived
    entity: Payment
    dtype: Integer
    period: Day
    source: FNS 850 NC Debt Setoff Collection Procedures, page 6, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
              excerpt: "waits 35 calendar days (30 days for the client to request a hearing plus 5 days for mailing)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6#client_hearing_request_period_days
              output: client_hearing_request_period_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6#mailing_period_days
              output: mailing_period_days
              hash: sha256:local
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          client_hearing_request_period_days + mailing_period_days
  - name: payment_application_authorized
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: FNS 850 NC Debt Setoff Collection Procedures, page 6, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
              excerpt: "automatically applies payments 35 calendar days after the 30 Day notice date unless the setoff is appealed"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
              excerpt: "may be applied earlier if the debtor waives the right to a hearing"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          debtor_waived_right_to_hearing
          or (notice_wait_period_elapsed and not setoff_is_appealed)
  - name: referral_on_pending_intercept_screen
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: FNS 850 NC Debt Setoff Collection Procedures, page 6, items 5-6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-850-nc-debt-setoff-collection-dor-procedures/page-6
              excerpt: "removed from the NC Debt Setoff Pending Intercept screen once the payment is applied"
    versions:
      - effective_from: '2010-06-01'
        formula: |-
          notice_has_been_mailed
          and not payment_has_been_applied
