format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
  summary: |-
    "Benefits will remain in the EBT account and available to the FNS household until the EBT account has been inactive for 9 consecutive months (274 days)." "NC FAST will generate a notice ... 30 days prior to the expungement." "Once expunged the benefits cannot be restored."
rules:
  - name: ebt_expungement_inactivity_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "9 consecutive months (274 days)"
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          274

  - name: expungement_notice_advance_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "30 days prior to the expungement"
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          30

  - name: reactivation_purchase_day_before_expungement
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "making a purchase on the 273rd day"
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          273

  - name: ebt_account_inactive_for_expungement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "inactive for 9 consecutive months (274 days)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2#ebt_expungement_inactivity_days
              output: ebt_expungement_inactivity_days
              hash: sha256:local
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          days_since_last_purchase_on_ebt_account >= ebt_expungement_inactivity_days

  - name: ebt_benefits_automatically_expunged
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "automatically expunged by NC FAST ... inactive for 9 consecutive months (274 days)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2#ebt_expungement_inactivity_days
              output: ebt_expungement_inactivity_days
              hash: sha256:local
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          days_since_last_purchase_on_ebt_account >= ebt_expungement_inactivity_days

  - name: ebt_benefits_cannot_be_restored_after_expungement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "Once expunged the benefits cannot be restored"
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          ebt_benefits_have_been_expunged

  - name: expungement_notice_generated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "30 days prior to the expungement"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2#expungement_notice_advance_days
              output: expungement_notice_advance_days
              hash: sha256:local
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          days_until_scheduled_expungement == expungement_notice_advance_days

  - name: ebt_account_reactivated_by_purchase
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "reactivate the EBT account by making a purchase on the 273rd day"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2#reactivation_purchase_day_before_expungement
              output: reactivation_purchase_day_before_expungement
              hash: sha256:local
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          purchase_made_on_ebt_account
          and days_since_last_purchase_on_ebt_account == reactivation_purchase_day_before_expungement

  - name: expungement_clock_restarts_after_purchase
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.03(A), Benefits Expunged After Nine (9) Consecutive Months of Inactivity
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
              excerpt: "will start over on day one after a purchase has been made"
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          purchase_made_on_ebt_account

  - name: inactive_case_claim_benefits_may_be_applied_to_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.02, Inactive Food and Nutrition Services Cases
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-2
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          fns_case_is_inactive
          and fns_case_has_outstanding_claim
          and fns_unit_agrees_to_apply_benefits_to_claim
