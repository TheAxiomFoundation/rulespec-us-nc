format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-3
  summary: |-
    "Because the household makes a purchase, they are no longer considered inactive and the benefits will not be expunged on the 10/11/2022 date. The 274th day count starts over..." "If all members of the FNS unit are deceased, all remaining FNS benefits will be automatically expunged by NC FAST from the EBT account when the FNS case is closed."
rules:
  - name: inactive_ebt_account_expungement_day_count
    kind: parameter
    dtype: Count
    source: FNS 165, page 3, inactive EBT account example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-3
              excerpt: "the 274th day count starts over"
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          274

  - name: household_purchase_stops_inactive_expungement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165, page 3, inactive EBT account example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-3
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          household_makes_purchase_from_such_ebt_account

  - name: inactive_ebt_account_day_count_restarts_after_purchase
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: FNS 165, page 3, inactive EBT account example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-3
              excerpt: "The 274th day count starts over"
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          if household_purchase_stops_inactive_expungement: inactive_ebt_account_expungement_day_count else: 0

  - name: remaining_benefits_automatically_expunged_on_death_case_closure
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.B, Death
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-3
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          all_members_of_fns_unit_are_deceased
          and fns_case_is_closed

  - name: expunged_death_case_benefits_cannot_be_restored
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 165.B, Death
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-165-inactive-electronic-benefit-transfer-ebt-accounts-report/page-3
    versions:
      - effective_from: '2022-09-24'
        formula: |-
          remaining_benefits_automatically_expunged_on_death_case_closure
