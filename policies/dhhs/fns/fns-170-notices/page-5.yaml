format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-5
  summary: |-
    "When a change is reported or becomes known in the last month of the certification period, the change will be made during the recertification process." "Void DSS-8553, Notices of Adverse Action only when" listed curing, continued-benefit hearing appeal outcome, error, Transitional FNS, or sufficient information before the effective date applies. "Use the DSS-8632 ... when a Notice of Adverse Action is not required."
rules:
  - name: change_made_during_recertification_process
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170 Notices, page 5, last month of certification period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-5
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          change_reported_or_becomes_known_in_last_month_of_certification_period

  - name: dss_8553_notice_voided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.06 Canceling or Voiding the Notice of Adverse Action (DSS-8553)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-5
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          work_requirement_noncompliance_cured_prior_to_sanction_invoked
          or hearing_requested_with_continued_benefits_and_fns_unit_wins_appeal
          or notice_of_adverse_action_issued_in_error
          or case_sent_to_transitional_food_and_nutrition_services_benefits
          or household_provides_sufficient_information_before_dss_8553_effective_date

  - name: dss_8632_used_for_voluntary_termination_confirmation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.07 Confirmation of Voluntary Termination of Benefits (DSS-8632)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-5
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          proposed_reduction_or_termination_of_benefits_within_certification_period
          and notice_of_adverse_action_not_required

  - name: dss_8632_notice_of_termination_sent_no_later_than_next_scheduled_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.07(A) Move from the State
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-5
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          fns_caseworker_receives_notification_fns_unit_moved_from_state
