format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-1
  summary: |-
    FNS units must receive notification when changes are made to the FNS case that affects eligibility or benefit amount. Timely Notices are required when an action will negatively decrease or terminate eligibility or benefit amount. Adequate Notices are required when an action positively increases or makes no change. Manual notices may only be used when the correct notice cannot be generated in NC FAST due to system error or failure, when NC FAST instructs issuance, or when state policy instructs issuance.
rules:
  - name: timely_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          action_negatively_impacts_fns_eligibility_or_benefit_amount
  - name: adequate_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.01(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          action_positively_impacts_fns_eligibility_or_benefit_amount
          or action_makes_no_change_to_fns_eligibility_or_benefit_amount
  - name: manual_notice_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.01(C)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          correct_notice_cannot_be_generated_in_nc_fast_due_to_system_error_or_failure
          or nc_fast_instructs_caseworker_to_issue_manual_notice
          or state_policy_instructs_caseworker_to_issue_manual_notice
