    corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-6
  summary: |-
    If the new address is unknown, send the notice to the last known address with a request to “please forward.” When the FNS unit requests, in writing or verbally, to reduce or terminate its benefits, send a DSS-8632 Notice of Termination. Give or mail a DSS-8550 Change Report to an FNS unit subject to Simplified Reporting at interview, recertification, and anytime a completed DSS-8550 is received. DSS-8650 is used to request required information, deductions, and schedule interviews; manual DSS-8650 line-completion, upload, and documentation duties are specified.
