format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-7
  summary: |-
    The DSS-8560A Documents Needed to Complete Your Applications must be provided to all applicant households and must explain verification requirements, examples, time period, submission methods, application consequences, and help obtaining verifications. FNS households must be notified in writing of approvals, denials, and pending status using the DSS-8551; eligible households must be informed of benefit amount/start date, certification period, fair hearing rights, and agency/caseworker contact information; ineligible households must be informed of the correct denial reason, fair hearing rights, and agency/caseworker contact information.
rules:
  - name: applicant_household_documents_needed_notice_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.10
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-7
              excerpt: "Change #21-2021 November 15, 2021"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-7
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          not household_is_fns_applicant_household
          or (
            dss_8560a_documents_needed_notice_provided
            and notice_describes_required_verification_types
            and notice_gives_document_examples
            and notice_states_verification_time_period
            and notice_explains_how_to_provide_verifications
            and notice_explains_effect_if_verifications_not_provided
            and notice_explains_how_to_get_help_obtaining_verifications
          )
  - name: eligible_household_dss_8551_notice_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.11(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-7
              excerpt: "Change #21-2021 November 15, 2021"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-7
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          not household_is_fns_eligible_household
          or (
            dss_8551_written_notice_sent_to_current_address
            and dss_8551_informs_benefit_amount_and_start_date
            and dss_8551_informs_certification_period
            and dss_8551_informs_fair_hearing_right
            and dss_8551_informs_correct_agency_and_caseworker_contact
          )
  - name: ineligible_household_dss_8551_notice_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 170.11(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-7
              excerpt: "Change #21-2021 November 15, 2021"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-170-notices/page-7
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          not household_is_fns_ineligible_household
          or (
            dss_8551_written_notice_sent_to_current_address
            and dss_8551_informs_correct_denial_reason
            and dss_8551_informs_fair_hearing_right
            and dss_8551_informs_correct_agency_and_caseworker_contact
          )
