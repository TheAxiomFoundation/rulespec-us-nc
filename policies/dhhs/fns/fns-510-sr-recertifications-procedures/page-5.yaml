format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
  summary: |-
    "Deny the recertification at any time ineligibility is established" for required or non-required verifications. If mandatory verification suggests potential ineligibility, obtain verification before denial. If mandatory verification is not provided, deny on the 30th day from recertification, or the next workday if that day is a weekend or holiday. Untimely recertifications closed for failure to interview or verify may reopen only if the interview and all required verifications are completed within the allowable time frame; if completed on or before the 30th day after certification ends, reopen and process within five calendar days and prorate from the final verification receipt date. After that 30th day, or when denied for reasons other than failure to provide information or worker error, the case cannot reopen.
rules:
  - name: mandatory_verification_failure_denial_day_count
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, D.2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
              excerpt: "deny for failure to provide information on the 30th day from the date of recertification"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30

  - name: reopen_information_deadline_day_count
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, E.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
              excerpt: "on or before the 30th day from the last day of the certification period"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30

  - name: reopened_case_processing_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, E.1.a.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
              excerpt: "process the case within five (5) calendar days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          5

  - name: recertification_denial_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, D.2.a-c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-5#mandatory_verification_failure_denial_day_count
              output: mandatory_verification_failure_denial_day_count
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          ineligibility_established_for_required_or_non_required_verification
          or (
            household_failed_to_provide_mandatory_verification
            and (
              days_from_date_of_recertification == mandatory_verification_failure_denial_day_count
              or thirtieth_day_from_recertification_falls_on_weekend_or_holiday_and_today_is_next_workday
            )
          )

  - name: mandatory_potential_ineligibility_verification_must_be_obtained_before_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, D.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          household_statement_of_mandatory_verification_indicates_potential_ineligibility

  - name: untimely_recertification_may_reopen
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, E.1-E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-5#reopen_information_deadline_day_count
              output: reopen_information_deadline_day_count
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          untimely_recertification_closed_for_failure_to_interview_or_provide_verification
          and interview_completed
          and all_required_necessary_verifications_provided
          and days_from_last_day_of_certification_period <= reopen_information_deadline_day_count
          and (
            closure_reason_is_failure_to_provide_information
            or closure_reason_is_worker_error
          )

  - name: reopened_case_processing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, E.1.a.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-5#reopened_case_processing_deadline_calendar_days
              output: reopened_case_processing_deadline_calendar_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-5#untimely_recertification_may_reopen
              output: untimely_recertification_may_reopen
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          untimely_recertification_may_reopen
          and days_since_receipt_of_required_information <= reopened_case_processing_deadline_calendar_days

  - name: reopened_case_proration_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, E.1.a.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-5#untimely_recertification_may_reopen
              output: untimely_recertification_may_reopen
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          untimely_recertification_may_reopen
          and next_cert_period_start_date_changed_to_date_final_required_verification_received

  - name: new_application_required_for_continued_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-5#reopen_information_deadline_day_count
              output: reopen_information_deadline_day_count
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          interview_completed
          and all_required_necessary_verifications_provided
          and days_from_last_day_of_certification_period > reopen_information_deadline_day_count

  - name: recertification_cannot_reopen
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 5, E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-5#reopen_information_deadline_day_count
              output: reopen_information_deadline_day_count
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          (
            interview_completed
            and all_required_necessary_verifications_provided
            and days_from_last_day_of_certification_period > reopen_information_deadline_day_count
          )
          or (
            recertification_denied
            and denial_reason_is_other_than_failure_to_provide_information
            and not denial_reason_is_worker_error
          )
