format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
  summary: |-
    A late recertification does not guarantee uninterrupted FNS benefits. All late recertifications must be tested for expedited processing. Complete the "add app" function no later than three business days from receipt of the complete DSS-2435; interview-required cases have scheduling and expedited-service loss rules, and no-interview cases require DSS-2435 testing, phone contact if needed, and DSS-8650 contact request if phone contact is unsuccessful.
rules:
  - name: late_recertification_expedited_processing_test_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 introductory paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "All late recertifications must be tested for eligibility of expedited processing."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not complete_late_recertification_received
          or expedited_processing_eligibility_tested

  - name: add_app_registration_timing_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "Complete the \"add app\" function in NC FAST no later than three (3) business days from the receipt of the complete DSS-2435."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not complete_dss_2435_received
          or add_app_completed_no_later_than_three_business_days_from_receipt

  - name: add_app_expedited_services_test_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "Determine if the late recertification is potentially eligible for expedited services based on the information entered into NC FAST \"add app\" expedited services test."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not add_app_completed_for_late_recertification
          or potential_expedited_services_determined_from_add_app_expedited_services_test

  - name: interview_scheduling_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "Schedule interview ... within three business days of receipt of the completed DSS-DSS-2435."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not fns_interview_required
          or not complete_dss_2435_received
          or interview_scheduled_within_three_business_days_of_completed_dss_2435_receipt

  - name: potential_expedited_interview_timing_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "If the FNS unit is potentially eligible for expedited service, schedule the interview timely enough to be conducted prior to the fifth (5th) day from the date of recertification."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not fns_interview_required
          or not fns_unit_potentially_eligible_for_expedited_service
          or interview_scheduled_timely_enough_to_be_conducted_prior_to_fifth_day_from_recertification

  - name: expedited_services_right_lost_for_missed_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "If the FNS unit fails to complete required interview within seven (7) days from the date of recertification, the FNS unit loses the right to expedited services."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          fns_interview_required
          and fns_unit_failed_to_complete_required_interview_within_seven_days_from_recertification

  - name: normal_application_processing_required_after_missed_expedited_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.1.b-c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "the FNS unit loses the right to expedited services. Process late recertification using normal application processing standards."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          fns_interview_required
          and fns_unit_failed_to_complete_required_interview_within_seven_days_from_recertification

  - name: expedited_indicator_change_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.1.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "The expedited indicator in NC FAST must be changed to indicate they have lost their right to expedited services prior to the seventh (7th) day."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not expedited_services_right_lost_for_missed_interview
          or expedited_indicator_changed_to_lost_right_prior_to_seventh_day

  - name: no_interview_expedited_services_test_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "If no interview is required: Test for expedited based on information provided on the DSS-2435."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          fns_interview_required
          or expedited_services_tested_based_on_dss_2435_information

  - name: telephone_information_completion_contact_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "If information provided does not allow for a determination of expedited services, contact the FNS unit by telephone to complete the needed information."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          fns_interview_required
          or dss_2435_information_allows_expedited_services_determination
          or fns_unit_contacted_by_telephone_to_complete_needed_information

  - name: dss_8650_contact_request_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.03 B.2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-6
              excerpt: "If unable to contact by phone, send DSS-8650 and request FNS household to contact the worker no later than the seventh (7th) day from the date of recertification."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          fns_interview_required
          or dss_2435_information_allows_expedited_services_determination
          or fns_unit_contacted_by_telephone_to_complete_needed_information
          or (dss_8650_sent and fns_household_requested_to_contact_worker_no_later_than_seventh_day_from_recertification)
