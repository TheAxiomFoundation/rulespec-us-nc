format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
  summary: |-
    Request missing verifications that cannot be obtained by the worker on DSS-8650 and allow the FNS unit ten calendar days. Dispose approval no later than the earliest of five days from receipt of last required verification, five days after expiration of request for non-required verifications, or the last working day of the last certification month. Deny when ineligibility is established, with mandatory-verification limits. Reopen a timely recertification closed for interview/verifications if completed and all necessary verifications are provided within the allowable time frame; if by the 30th day, process within five calendar days, keep the original date, and do not prorate benefits.
rules:
  - name: missing_verification_response_period_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 510.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
              excerpt: "allow the FNS unit ten (10) calendar days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          10

  - name: approval_disposition_limit_days
    kind: parameter
    dtype: Integer
    source: FNS 510.D.1.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
              excerpt: "Within five (5) days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          5

  - name: timely_recertification_reopen_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 510.E.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
              excerpt: "on or before the 30th day from the date of recertification"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30

  - name: reopened_case_processing_limit_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 510.E.1.a.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
              excerpt: "within five (5) calendar days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          5

  - name: missing_verification_request_response_period
    kind: derived
    entity: Household
    dtype: Integer
    period: Day
    source: FNS 510.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-2#missing_verification_response_period_calendar_days
              output: missing_verification_response_period_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if missing_verifications_cannot_be_obtained_by_worker_and_requested_on_dss_8650: missing_verification_response_period_calendar_days else: 0

  - name: recertification_approval_due_by_required_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          day_is_within_approval_disposition_limit_days_from_receipt_of_last_required_verification
          or day_is_within_approval_disposition_limit_days_of_expiration_of_request_for_non_required_verifications
          or day_is_last_working_day_of_last_month_of_certification_period

  - name: recertification_may_be_denied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          ineligibility_established_for_required_or_non_required_verifications
          or mandatory_verification_obtained_and_establishes_ineligibility
          or (household_failed_to_provide_mandatory_verification and day_is_last_workday_of_current_certification_period)

  - name: timely_recertification_may_be_reopened
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.E.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          timely_recertification_closed_for_failure_to_complete_interview_or_provide_necessary_verifications
          and interview_completed
          and all_necessary_verifications_provided
          and completed_and_verifications_provided_within_allowable_time_frame

  - name: timely_recertification_reopened_by_thirtieth_day_procedures_apply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.E.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          timely_recertification_may_be_reopened
          and interview_completed_and_all_required_verifications_provided_on_or_before_timely_recertification_reopen_day_limit

  - name: reopened_case_processing_period
    kind: derived
    entity: Household
    dtype: Integer
    period: Day
    source: FNS 510.E.1.a.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-2#reopened_case_processing_limit_calendar_days
              output: reopened_case_processing_limit_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if timely_recertification_reopened_by_thirtieth_day_procedures_apply: reopened_case_processing_limit_calendar_days else: 0

  - name: reopened_case_keeps_original_recertification_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.E.1.a.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          timely_recertification_reopened_by_thirtieth_day_procedures_apply

  - name: reopened_case_benefits_not_prorated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.E.1.a.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          timely_recertification_reopened_by_thirtieth_day_procedures_apply
