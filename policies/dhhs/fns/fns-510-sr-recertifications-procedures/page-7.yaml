format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
  summary: |-
    If an FNS household fails to contact the worker within seven days from recertification, the FNS unit loses the right to expedited services. Missing verifications requested on DSS-8650 allow 10 calendar days. Expedited benefits must be available by the seventh day from application, with disposition no later than the sixth day; normal late recertifications are processed no later than 30 days, benefits available by the 30th day, and disposition no later than the 29th day if all required information is provided.
rules:
  - name: contact_grace_period_days_for_expedited_services
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, B.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
              excerpt: "within seven (7) days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          7
  - name: missing_verification_response_days
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, C.1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
              excerpt: "allow the FNS unit 10 calendar days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          10
  - name: expedited_benefit_availability_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, D.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
              excerpt: "available ... by the seventh (7th) day"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          7
  - name: expedited_disposition_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, D.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
              excerpt: "dispositioned no later than the sixith (6th) day"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          6
  - name: normal_processing_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, D.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
              excerpt: "no later than 30 days from the date of application"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30
  - name: normal_benefit_availability_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, D.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
              excerpt: "benefits must be available by the 30th day"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30
  - name: normal_disposition_deadline_days_after_complete_information
    kind: parameter
    dtype: Count
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, D.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
              excerpt: "dispositioned no later than the 29th day"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          29
  - name: expedited_service_right_lost_for_no_timely_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, B.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#contact_grace_period_days_for_expedited_services
              output: contact_grace_period_days_for_expedited_services
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          days_since_recertification_date > contact_grace_period_days_for_expedited_services
          and not household_contacted_worker_within_recertification_contact_grace_period
  - name: expedited_indicator_must_show_lost_right_before_seventh_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, B.f
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#contact_grace_period_days_for_expedited_services
              output: contact_grace_period_days_for_expedited_services
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          days_since_recertification_date < contact_grace_period_days_for_expedited_services
          and household_lost_right_to_expedited_services
          and nc_fast_expedited_indicator_changed_to_lost_right
  - name: missing_verification_request_response_deadline_days
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, C.1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#missing_verification_response_days
              output: missing_verification_response_days
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if unable_to_contact_fns_unit_by_telephone and missing_verifications_cannot_be_obtained_by_worker: missing_verification_response_days else: 0
  - name: expedited_processing_due_date_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#expedited_benefit_availability_deadline_days
              output: expedited_benefit_availability_deadline_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#expedited_disposition_deadline_days
              output: expedited_disposition_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          household_eligible_for_expedited_processing
          and benefits_available_days_from_application <= expedited_benefit_availability_deadline_days
          and recertification_dispositioned_days_from_application <= expedited_disposition_deadline_days
          and (not interview_due_as_part_of_current_recertification or interview_completed)
  - name: normal_processing_due_date_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 Simplified Reporting Recertifications Procedures, page 7, D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#normal_processing_deadline_days
              output: normal_processing_deadline_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#normal_benefit_availability_deadline_days
              output: normal_benefit_availability_deadline_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-7#normal_disposition_deadline_days_after_complete_information
              output: normal_disposition_deadline_days_after_complete_information
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          late_recertification_processed_days_from_application <= normal_processing_deadline_days
          and (not household_eligible_for_benefits or benefits_available_days_from_application <= normal_benefit_availability_deadline_days)
          and (not all_required_information_provided or recertification_dispositioned_days_from_application <= normal_disposition_deadline_days_after_complete_information)
