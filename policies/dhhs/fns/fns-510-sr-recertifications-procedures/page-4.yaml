format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
  summary: |-
    Enter a recertification in NC FAST as "in progress" no later than three business days from receipt of the complete DSS-2435; determine whether an interview is required if none has been conducted in the last 12 months; request missing verifications on DSS-8650 and allow 10 calendar days; disposition approval by the earliest of the listed five-day or 30th-day due dates.
rules:
  - name: registration_business_day_limit
    kind: parameter
    dtype: Count
    source: FNS 510 SR Recertifications Procedures, page 4, A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
              excerpt: "no later than three (3) business days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          3
  - name: interview_lookback_month_limit
    kind: parameter
    dtype: Count
    source: FNS 510 SR Recertifications Procedures, page 4, B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
              excerpt: "in the last 12 months"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          12
  - name: missing_verification_calendar_day_response_period
    kind: parameter
    dtype: Count
    source: FNS 510 SR Recertifications Procedures, page 4, C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
              excerpt: "allow the FNS unit 10 calendar days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          10
  - name: approval_verification_due_day_limit
    kind: parameter
    dtype: Count
    source: FNS 510 SR Recertifications Procedures, page 4, D.1.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
              excerpt: "Within five (5) days"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          5
  - name: approval_recertification_day_limit
    kind: parameter
    dtype: Count
    source: FNS 510 SR Recertifications Procedures, page 4, D.1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
              excerpt: "30th day from the date of recertification"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30
  - name: recertification_registration_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 SR Recertifications Procedures, page 4, A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-4#registration_business_day_limit
              output: registration_business_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not complete_dss_2435_received
          or (recertification_entered_in_nc_fast_as_in_progress and business_days_from_complete_dss_2435_receipt_to_registration <= registration_business_day_limit)
  - name: interview_required_for_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 SR Recertifications Procedures, page 4, B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-4#interview_lookback_month_limit
              output: interview_lookback_month_limit
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          months_since_last_interview > interview_lookback_month_limit
  - name: missing_verification_request_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 SR Recertifications Procedures, page 4, C.2-C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-4#missing_verification_calendar_day_response_period
              output: missing_verification_calendar_day_response_period
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          missing_verifications_obtained_by_worker
          or (missing_verifications_requested_on_dss_8650 and calendar_days_allowed_for_fns_unit_to_provide_information >= missing_verification_calendar_day_response_period)
  - name: approval_disposition_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510 SR Recertifications Procedures, page 4, D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-4
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-4#approval_verification_due_day_limit
              output: approval_verification_due_day_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-510-sr-recertifications-procedures/page-4#approval_recertification_day_limit
              output: approval_recertification_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          days_from_last_required_verification_receipt_to_disposition <= approval_verification_due_day_limit
          and days_from_non_required_verification_request_expiration_to_disposition <= approval_verification_due_day_limit
          and days_from_recertification_date_to_disposition <= approval_recertification_day_limit
