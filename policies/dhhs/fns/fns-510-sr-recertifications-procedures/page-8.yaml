format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
  summary: |-
    "Do not deny a late recertification before the 30th day for failure to provide information." If the 30th day is a weekend or holiday, deny on the next work day. Denied recertifications for failure to provide necessary verification cannot be reopened; the FNS unit must reapply. Unless otherwise specified, the income base period is 30 calendar days before the recertification application is received.
rules:
  - name: late_recertification_information_denial_wait_day_count
    kind: parameter
    dtype: Count
    source: FNS 510.8.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
              excerpt: "before the 30th day"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30

  - name: income_base_period_calendar_day_count
    kind: parameter
    dtype: Count
    source: FNS 510.8.F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
              excerpt: "30 calendar days prior"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30

  - name: late_recertification_denial_before_wait_period_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.8.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
              excerpt: "Do not deny a late recertification before the 30th day for failure to provide information."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          late_recertification_denial_is_for_failure_to_provide_information
          and days_since_late_recertification_application_received < late_recertification_information_denial_wait_day_count

  - name: late_recertification_information_denial_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.8.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
              excerpt: "If the 30th day falls on a weekend or a holiday, deny the application for recertification on the next work day."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          late_recertification_denial_is_for_failure_to_provide_information
          and (
            (
              days_since_late_recertification_application_received == late_recertification_information_denial_wait_day_count
              and not thirtieth_day_after_late_recertification_application_received_falls_on_weekend_or_holiday
            )
            or (
              thirtieth_day_after_late_recertification_application_received_falls_on_weekend_or_holiday
              and day_is_next_work_day_after_thirtieth_day_for_late_recertification_application
            )
          )

  - name: recertification_application_reopening_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.8.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          recertification_application_denied_for_failure_to_provide_necessary_verification

  - name: fns_unit_must_reapply_for_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 510.8.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          recertification_application_denied_for_failure_to_provide_necessary_verification

  - name: income_base_period_lookback_days
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: FNS 510.8.F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-510-sr-recertifications-procedures/page-8
              excerpt: "base period for income is 30 calendar days prior"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          income_base_period_calendar_day_count
