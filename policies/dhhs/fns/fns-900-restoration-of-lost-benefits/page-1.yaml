format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-900-restoration-of-lost-benefits/page-1
  summary: |-
    "Neither restorations nor supplements can be authorized when the debtor has an active claim." A FNS Unit is entitled to restored benefits when benefits were lost due to administrative error, a reversed IPV disqualification, judicial action finds benefits were wrongfully withheld, benefits for an eligible household are severely delayed due to application or recertification processing for more than one year, or the manual specifically states restoration is due. For agency error or reversed administrative disqualification penalty, restore benefits for up to 12 months prior to the earlier of request or agency notice/discovery.
rules:
  - name: agency_error_or_reversed_disqualification_lookback_month_limit
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 900.01(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-900-restoration-of-lost-benefits/page-1
              excerpt: "restore benefits for up to 12 months"
    versions:
      - effective_from: '2021-10-08'
        formula: |-
          12

  - name: restoration_or_supplement_authorization_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 900.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-900-restoration-of-lost-benefits/page-1
    versions:
      - effective_from: '2021-10-08'
        formula: |-
          not debtor_has_active_claim

  - name: entitled_to_restored_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 900.01(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-900-restoration-of-lost-benefits/page-1
    versions:
      - effective_from: '2021-10-08'
        formula: |-
          benefits_lost_due_to_administrative_error
          or administrative_disqualification_for_ipv_was_reversed
          or judicial_action_finds_benefits_wrongfully_withheld
          or eligible_household_benefits_severely_delayed_by_application_or_recertification_processing_for_more_than_one_year
          or manual_specifically_states_unit_entitled_to_restoration

  - name: restoration_lookback_limited_to_twelve_months
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 900.01(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-900-restoration-of-lost-benefits/page-1
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-900-restoration-of-lost-benefits/page-1
              excerpt: "restore benefits for up to 12 months"
    versions:
      - effective_from: '2021-10-08'
        formula: |-
          (loss_caused_by_agency_error or administrative_disqualification_penalty_subsequently_reversed)
          and restoration_period_months_prior_to_earliest_request_or_agency_discovery <= agency_error_or_reversed_disqualification_lookback_month_limit
