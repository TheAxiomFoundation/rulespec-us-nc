  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-900-restoration-of-lost-benefits/page-5
  summary: |-
    Issue restored benefits in addition to the allotment authorized for a currently participating FNS unit. When household composition has changed and at least one original member remains active, restore lost benefits to the FNS unit containing the majority of individuals who were FNS unit members at the time of loss, even if minors; if the agency cannot determine majority, restore to the unit containing the head at the time of loss. Restored benefits must be authorized by the local agency in the county where the FNS unit resides, regardless of where it lived when benefits were lost. The worker must document the reason in NC FAST.
