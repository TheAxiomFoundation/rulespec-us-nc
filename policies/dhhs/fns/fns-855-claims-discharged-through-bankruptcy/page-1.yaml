format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-855-claims-discharged-through-bankruptcy/page-1
  summary: |-
    855.02 INSTRUCTIONS FOR COLLECTION: Do not initiate further collection action when the agency has verification that a debtor filed bankruptcy, and the food stamp debt was included in the bankruptcy, regardless of the type of claim involved. Only criminal court ordered Intentional Program Violation (IPV) claims are exempt and not dischargeable in bankruptcy. However, a bankruptcy order must be honored if a court-ordered Intentional Program Violation is included in the bankruptcy.
rules:
