    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 855.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-855-claims-discharged-through-bankruptcy/page-1
    versions:
      - effective_from: '2007-01-01'
        formula: |-
          debtor_filed_bankruptcy_verified
          and food_stamp_debt_included_in_bankruptcy
  - name: claim_not_dischargeable_in_bankruptcy
