format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
  summary: |-
    "NOTE: Do not send DSS-8554 or enter a disqualification or claim in EPICS until the client's deadline to request a State Level Hearing expires. If the client requests a State Level Hearing, do not enter a disqualification, or claim in EPICS until a final State Level Hearing decision is issued." "The individual has 15 calendar days after receiving the notice to appeal the decision to a state level hearing." "If the receipt is not returned within seven days of mailing, the 15-day appeal period starts on the eighth calendar day after mailing." "Complete and e-mail by ZixMail within five (5) calendar days of the State appeal request a DSS-1473 Request for State Appeal and a DSS-1473a, Request for State Appeal Addendum..."
rules:
  - name: state_level_hearing_appeal_period_days
    kind: parameter
    dtype: Count
    source: FNS 705, Section 705.20 notice of decision appeal period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "15 calendar days after receiving the notice to appeal"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          15
  - name: certified_receipt_waiting_period_days
    kind: parameter
    dtype: Count
    source: FNS 705, Section 705.20 certified-mail receipt rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "receipt is not returned within seven days of mailing"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          7
  - name: receipt_missing_appeal_period_start_day_after_mailing
    kind: parameter
    dtype: Count
    source: FNS 705, Section 705.20 certified-mail receipt rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "starts on the eighth calendar day after mailing"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          8
  - name: state_appeal_transmittal_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 705.21(A) State appeal request transmittal deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "within five (5) calendar days of the State appeal request"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          5
  - name: state_level_hearing_deadline_must_expire_before_dss_8554_or_epics_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705, Section 705.20 DSS-8554 and EPICS note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          client_deadline_to_request_state_level_hearing_has_expired
  - name: final_state_level_hearing_decision_required_before_disqualification_or_epics_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705, Section 705.20 DSS-8554 and EPICS note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          not client_requested_state_level_hearing
          or final_state_level_hearing_decision_has_been_issued
  - name: local_adh_state_disqualification_hearing_appeal_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705, Section 705.20 notice of decision and FNS 705.21(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "15 calendar days after receiving the notice to appeal"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "If the 15-day appeal period ends on a weekend or holiday, accept requests through the following working day."
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          state_disqualification_hearing_requested
          and (
            request_made_within_appeal_period_after_notice_received
            or request_made_through_following_working_day_after_weekend_or_holiday_deadline
          )
  - name: certified_notice_appeal_period_starts_after_return
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705, Section 705.20 returned certified notice rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          notification_returned_by_postal_service_as_refused_unclaimed_or_similar
  - name: certified_notice_appeal_period_starts_on_eighth_day_after_mailing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705, Section 705.20 missing receipt rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "If the receipt is not returned within seven days of mailing, the 15-day appeal period starts on the eighth calendar day after mailing."
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          certified_mail_receipt_not_returned_within_certified_receipt_waiting_period_days
  - name: certified_notice_appeal_period_recount_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705, Section 705.20 recounting rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          notice_certified_letter_was_accepted_after_eighth_day
  - name: state_appeal_forms_transmittal_required_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.21(A) State appeal request transmittal requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-12
              excerpt: "Complete and e-mail by ZixMail within five (5) calendar days"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          client_requested_state_disqualification_hearing
          and dss_1473_and_dss_1473a_completed_and_emailed_by_zixmail_within_state_appeal_transmittal_deadline_days
