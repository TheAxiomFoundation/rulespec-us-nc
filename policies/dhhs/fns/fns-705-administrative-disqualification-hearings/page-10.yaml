  summary: |-
    "The verbatim transcript or recording of testimony and exhibits, or an official report containing the substance of what transpired at the hearing ... and the final decision constitutes the hearing record." "Do not introduce at a hearing, or make part of the hearing record, any information considered confidential or that the client or representative would not be allowed access." "A hearing officer may rule that a medical assessment is necessary when the hearing involves medical issues ... The assessment will be completed by a source satisfactory to both the FNS unit and the local agency and made a part of the hearing record."
