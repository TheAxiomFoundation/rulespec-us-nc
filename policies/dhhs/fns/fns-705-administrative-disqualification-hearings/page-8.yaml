format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-8
  summary: |-
    The hearing officer must advise the FNS unit member or representative about document production, questioning witnesses, calling witnesses, State Level Hearing rights and deadlines, consider only hearing evidence, and render the local agency decision. The FNS unit member or representative must receive adequate opportunity before and during the hearing to examine records, present the case, contact or bring and question witnesses, advance arguments, question or refute testimony or evidence, and submit evidence.
rules:
  - name: adequate_administrative_disqualification_hearing_opportunity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-8
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          opportunity_to_examine_hearing_documents_and_records
          and opportunity_to_present_case_or_use_counsel_or_other_person
          and opportunity_to_contact_bring_and_question_witnesses
          and opportunity_to_advance_arguments_without_undue_interference
          and opportunity_to_question_or_refute_testimony_or_evidence
          and opportunity_to_submit_evidence_on_pertinent_facts_and_circumstances
  - name: hearing_officer_advisement_and_decision_obligations_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.13(H)-(L)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-8
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_officer_advised_documents_not_required_but_permitted
          and hearing_officer_advised_right_to_question_local_agency_witnesses_and_call_own_witnesses
          and hearing_officer_advised_state_level_hearing_right_and_deadline
          and hearing_officer_considered_only_hearing_evidence
          and hearing_officer_rendered_local_agency_decision_and_attached_required_notices
