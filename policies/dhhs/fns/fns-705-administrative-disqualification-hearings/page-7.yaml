    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-7
  summary: |-
    The hearing is not open to the public and should be attended only by persons directly involved with the case unless requested specifically by the individual charged with an IPV. The individual may bring friends, witnesses, and legal counsel at his expense. Conduct the hearing even if the FNS unit member fails to contact the agency by telephone or appear. The Hearing Officer will administer an oath, inquire into the individual's understanding and ability to participate, explain the local agency's burden to prove intent by clear and convincing evidence, consider relevant issues and evidence, make necessary evidence part of the record, regulate the hearing consistently with the FNS unit member's rights, order an appropriate independent assessment or evaluation where reduced mental capacity may affect intent and existing medical evidence is insufficient, and advise the FNS unit member or representative that they may refuse to answer questions.
