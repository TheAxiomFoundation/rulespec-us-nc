format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-11
  summary: |-
    A determination that the FNS unit member committed an IPV must be based on clear and convincing evidence demonstrating the member knowingly, willfully, and with deceitful intent committed an IPV as defined in Section 820. If the local agency fails to meet the burden of proof, the hearing officer must find that an IPV did not occur. The Local Agency Hearing Officer must render their decision within 5 business days.
rules:
  - name: local_hearing_decision_business_day_deadline
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 705.19(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-11
              excerpt: "must render their decision within 5 business days"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          5
  - name: local_hearing_ipv_determination_supported
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.19(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-11
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          clear_and_convincing_evidence_demonstrates_ipv
          and member_knowingly_committed_ipv
          and member_willfully_committed_ipv
          and member_acted_with_deceitful_intent
          and member_committed_ipv_as_defined_in_section_820
  - name: hearing_officer_must_find_ipv_did_not_occur
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.19(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-11
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          not local_agency_met_burden_of_proof
