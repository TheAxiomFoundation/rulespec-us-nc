format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-16
  summary: |-
    Benefits to remaining FNS unit members may not be increased due to disqualification of any individual member. All income and resources of a disqualified individual are counted as available to any remaining FNS unit members.
rules:
  - name: remaining_member_benefit_increase_due_to_member_disqualification_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705 Administrative Disqualification Hearing, Section 705, page 16, paragraph E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-16
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          fns_unit_has_disqualified_member
          and person_is_remaining_fns_unit_member
  - name: disqualified_individual_income_counted_available_to_remaining_members
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 705 Administrative Disqualification Hearing, Section 705, page 16, paragraph F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-16
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          if individual_is_disqualified: individual_income else: 0
  - name: disqualified_individual_resources_counted_available_to_remaining_members
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 705 Administrative Disqualification Hearing, Section 705, page 16, paragraph F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-16
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          if individual_is_disqualified: individual_resources else: 0
