format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-9
  summary: |-
    "The local agency representative has the same rights as the FNS unit member"; the local agency responds to relevant client/case ADH questions; notice is in the client's primary language and a translator is provided if requested. The hearing officer explains that the decision is based solely on hearing evidence and testimony, explains tentative/final decision provisions, explains the member's State Level Hearing right and deadline, and explains the member's right not to answer questions and all rights in Section 705.15.
rules:
  - name: local_agency_must_respond_to_relevant_adh_questions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.15
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-9
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          adh_question_is_from_client_or_representative
          and adh_question_is_relevant_to_client_and_case
  - name: translator_must_be_provided_for_client_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.15
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-9
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          client_requests_translator_for_notice
  - name: hearing_officer_must_explain_member_rights_at_adh
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.16(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-9
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          adh_hearing_is_being_conducted
          and participant_is_fns_unit_member
  - name: fns_unit_member_may_refuse_to_answer_questions_during_hearing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.16(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-9
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          adh_hearing_is_being_conducted
          and participant_is_fns_unit_member
