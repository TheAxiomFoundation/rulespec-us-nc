format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
  summary: |-
    "If written argument, request for a time extension to submit a written argument, or a request for oral argument is not submitted within the ten (10) calendar day timeframe, the tentative decision shall become final without further notice being given." "Send the DSS-8557 ... on the 11th business day after the date of the State Disqualification Hearing Decision notice." "The FNS unit member may appeal the case to a court within 30 days of receipt of the State Disqualification Hearing decision."
rules:
  - name: tentative_decision_response_timeframe_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 705, page 14, tentative decision response timeframe
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
              excerpt: "ten (10) calendar day timeframe"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: dss_8557_send_business_day_after_decision_notice
    kind: parameter
    dtype: Count
    source: FNS 705, page 14, DSS-8557 timing after State Disqualification Hearing Decision notice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
              excerpt: "on the 11th business day after the date"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          11

  - name: court_appeal_deadline_days_after_receipt
    kind: parameter
    dtype: Count
    source: FNS 705.23, appeal to court deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
              excerpt: "within 30 days of receipt"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          30

  - name: tentative_decision_final_without_further_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705, page 14, tentative decision finality
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          tentative_decision_has_been_issued
          and not written_argument_submitted_within_tentative_decision_response_timeframe
          and not time_extension_request_submitted_within_tentative_decision_response_timeframe
          and not oral_argument_request_submitted_within_tentative_decision_response_timeframe

  - name: agency_error_claim_must_be_established_for_late_disqualification_entry
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705, page 14, late NC FAST disqualification entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          disqualification_entered_into_nc_fast_later_than_month_prior_to_starting_month

  - name: no_further_administrative_appeal_after_adverse_state_disqualification_hearing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.23, appeal after state level hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          adverse_state_disqualification_hearing_has_occurred

  - name: fns_unit_member_may_appeal_to_court_within_deadline
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.23, court appeal after State Disqualification Hearing decision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-14
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          state_disqualification_hearing_decision_received
          and court_appeal_is_within_deadline_after_receipt
