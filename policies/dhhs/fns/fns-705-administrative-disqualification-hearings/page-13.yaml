format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
  summary: |-
    "within 15 days of receipt of the ADH decision. Allow 30 days for a client to request a State Disqualification Hearing when the ADH decision notice was returned to the local agency and not received by the client." The State Office gives notice "at least ten (10) days in advance"; a new hearing and final decision occur "within 60 days of the request." A hearing is not conducted and the ADH decision is automatically upheld when the individual or representative fails to contact or attend without good cause. A State Disqualification Hearing is rescheduled if the client contests within ten days and provides good cause. A tentative State level decision becomes final unless timely oral or written argument is requested within ten calendar days.
rules:
  - name: state_disqualification_hearing_request_deadline_days_after_receipt
    kind: parameter
    dtype: Count
    source: FNS 705.21(A), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
              excerpt: "within 15 days of receipt of the ADH decision"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          15

  - name: state_disqualification_hearing_request_deadline_days_when_notice_returned
    kind: parameter
    dtype: Count
    source: FNS 705.21(A), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
              excerpt: "Allow 30 days ... when the ADH decision notice was returned"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          30

  - name: state_disqualification_hearing_notice_minimum_days_before_hearing
    kind: parameter
    dtype: Count
    source: FNS 705.21(C), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
              excerpt: "at least ten (10) days in advance"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: state_disqualification_hearing_final_decision_deadline_days_after_request
    kind: parameter
    dtype: Count
    source: FNS 705.21(D), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
              excerpt: "final decision rendered within 60 days of the request"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          60

  - name: tentative_decision_contest_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 705.21(D), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
              excerpt: "contests the tentative decision within ten (10) days"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: state_level_argument_request_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 705.22, page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
              excerpt: "within ten (10) calendar days of the date the tentative decision was signed"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: state_disqualification_hearing_request_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.21(A), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          (adh_decision_notice_returned_to_local_agency_and_not_received_by_client and days_from_adh_decision_notice_return_to_state_hearing_request <= state_disqualification_hearing_request_deadline_days_when_notice_returned)
          or (
            not adh_decision_notice_returned_to_local_agency_and_not_received_by_client
            and days_from_adh_decision_receipt_to_state_hearing_request <= state_disqualification_hearing_request_deadline_days_after_receipt
          )

  - name: state_disqualification_hearing_notice_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.21(C), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          days_between_state_hearing_notice_and_hearing >= state_disqualification_hearing_notice_minimum_days_before_hearing

  - name: state_disqualification_hearing_final_decision_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.21(D), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          days_from_state_disqualification_hearing_request_to_final_decision <= state_disqualification_hearing_final_decision_deadline_days_after_request

  - name: state_disqualification_hearing_not_conducted_for_nonappearance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.21(D), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          individual_or_representative_failed_to_contact_by_telephone_or_attend_state_disqualification_hearing
          and not good_cause_for_failure_to_contact_or_attend

  - name: adh_decision_automatically_upheld_for_nonappearance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.21(D), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          individual_or_representative_failed_to_contact_by_telephone_or_attend_state_disqualification_hearing
          and not good_cause_for_failure_to_contact_or_attend

  - name: state_disqualification_hearing_rescheduled_after_tentative_decision_contest
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.21(D), page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          client_contests_tentative_state_hearing_decision
          and days_from_tentative_decision_to_client_contest <= tentative_decision_contest_deadline_days
          and good_cause_for_failure_to_contact_or_attend

  - name: tentative_state_level_decision_final_without_argument_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.22, page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          not (
            party_requests_oral_or_written_argument
            and days_from_tentative_decision_to_argument_request <= state_level_argument_request_deadline_days
          )

  - name: state_level_written_argument_extension_granted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.22, page 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          request_for_time_extension_to_submit_written_argument
          and days_from_tentative_decision_to_extension_request <= state_level_argument_request_deadline_days
