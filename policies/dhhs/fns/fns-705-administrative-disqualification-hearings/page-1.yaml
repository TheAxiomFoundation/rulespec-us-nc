format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-1
  summary: |-
    "Initiate an Administrative Disqualification Hearing (ADH) or referral for prosecution for cases in which the local agency has clear and convincing evidence to substantiate that an individual has committed one or more acts of Intentional Program Violation (IPV)." ADHs are appropriate where clear and convincing IPV evidence exists but prosecution is unwarranted, inconsistent with local District Attorney guidelines, declined, or not timely pursued after referral withdrawal. Do not consider current eligibility when deciding between ADH and prosecution.
rules:
  - name: adh_or_prosecution_initiation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-1
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          local_agency_has_clear_and_convincing_evidence_of_intentional_program_violation
  - name: administrative_disqualification_hearing_appropriate
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.01(A)
    metadata:
      proof:
        atoms:
