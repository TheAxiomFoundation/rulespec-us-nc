              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-1
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
