format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
  summary: |-
    "Count 90 days for the ADH decision deadline with the mailing of the second notice, if the first notice is returned." "Reschedule the hearing, allow 30 days prior notice..." "A new hearing is scheduled and conducted if the client contacts the hearing officer within ten (10) days..." "provide notification using DSS-8587... within ten (10) calendar days of receipt of the waiver." "Begin the disqualification the month following the month the DSS-8587 is mailed plus three (3) days..."
rules:
  - name: second_notice_adh_decision_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 705.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "Count 90 days for the ADH decision deadline with the mailing of the second notice"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          90
  - name: rescheduled_hearing_prior_notice_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 705.05(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "Reschedule the hearing, allow 30 days prior notice"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          30
  - name: good_cause_contact_window_days_after_decision_receipt
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 705.05(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "within ten (10) days of receipt of a hearing decision"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10
  - name: waiver_action_notice_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 705.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "within ten (10) calendar days of receipt of the waiver"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10
  - name: waiver_mail_delivery_days_before_disqualification
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 705.06(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "plus three (3) days to allow mail delivery"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          3
  - name: advance_notice_returned_not_deliverable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "returned by the postal service as “unclaimed”, “refused”, or otherwise not deliverable"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          advance_notice_returned_by_postal_service_as_unclaimed
          or advance_notice_returned_by_postal_service_as_refused
          or advance_notice_returned_by_postal_service_as_otherwise_not_deliverable
  - name: adh_decision_deadline_days_counted_from_second_notice
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: FNS 705.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "Count 90 days for the ADH decision deadline with the mailing of the second notice, if the first notice is returned."
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4#second_notice_adh_decision_deadline_days
              output: second_notice_adh_decision_deadline_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4#advance_notice_returned_not_deliverable
              output: advance_notice_returned_not_deliverable
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          if advance_notice_returned_not_deliverable: second_notice_adh_decision_deadline_days else: 0
  - name: rescheduled_hearing_uses_required_prior_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.05(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "Reschedule the hearing, allow 30 days prior notice"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4#rescheduled_hearing_prior_notice_days
              output: rescheduled_hearing_prior_notice_days
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_is_rescheduled
          and prior_notice_days_allowed >= rescheduled_hearing_prior_notice_days
  - name: new_hearing_scheduled_after_good_cause_contact
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.05(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "if the client contacts the hearing officer within ten (10) days"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "the hearing officer accepts a “good cause” reason"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4#good_cause_contact_window_days_after_decision_receipt
              output: good_cause_contact_window_days_after_decision_receipt
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          client_contacts_hearing_officer_after_receiving_hearing_decision
          and days_after_hearing_decision_receipt <= good_cause_contact_window_days_after_decision_receipt
          and hearing_officer_accepts_good_cause_for_failure_to_contact_or_appear
  - name: waiver_action_notice_due_days
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: FNS 705.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "If a waiver is signed and returned... provide notification... within ten (10) calendar days"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4#waiver_action_notice_deadline_days
              output: waiver_action_notice_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          if waiver_signed_and_returned: waiver_action_notice_deadline_days else: 0
  - name: disqualification_begin_after_waiver_notice_mail_delivery
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.06(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "Begin the disqualification the month following the month the DSS-8587 is mailed plus three (3) days"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4#waiver_mail_delivery_days_before_disqualification
              output: waiver_mail_delivery_days_before_disqualification
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          waiver_signed_and_returned
          and period_is_month_following_month_dss_8587_mailed
          and days_allowed_for_mail_delivery >= waiver_mail_delivery_days_before_disqualification
  - name: waiver_may_be_requested_only_with_adh_scheduling_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.06(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "Provide notification to the FNS unit that the hearing can be waived when mailing a notice scheduling an ADH."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-4
              excerpt: "Do not ask the individual to sign a waiver... and do not mail a waiver form prior to scheduling the ADH."
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          waiver_notification_is_mailed_with_notice_scheduling_adh
          and not waiver_requested_at_in_person_meeting
          and not waiver_requested_in_telephone_contact
          and not waiver_form_mailed_prior_to_scheduling_adh
