format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
  summary: |-
    "The burden of proof that an individual has committed an Intentional Program Violation (IPV) rests with the local agency. The proof must be clear and convincing." "Do not conduct an Administrative Disqualification Hearing (ADH) on a case that was referred to the court system for prosecution if the charges were dismissed or the individual was found not guilty by the court." "It is allowable to conduct an ADH if prosecution is declined by the appropriate legal authority, or when no action is taken within a reasonable period of time and the referral is formally withdrawn by the local agency." "Do not schedule an ADH or offer the client a Waiver of ADH if the case is being considered for criminal prosecution." "A second party review is required to ensure there is clear and convincing evidence of an IPV before scheduling an ADH or mailing a notice and waiver."
rules:
  - name: nonparticipating_household_overissuance_no_claim_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 705.02.D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
              excerpt: "over issuance is less than $125"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          125

  - name: local_agency_has_burden_to_prove_ipv_by_clear_and_convincing_proof
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.02.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          individual_is_alleged_to_have_committed_ipv
          and local_agency_has_clear_and_convincing_proof_of_ipv

  - name: administrative_disqualification_hearing_barred_after_court_result
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.02.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          case_was_referred_to_court_system_for_prosecution
          and (charges_were_dismissed_by_court or individual_was_found_not_guilty_by_court)

  - name: administrative_disqualification_hearing_allowable_after_prosecution_referral
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.02.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          (prosecution_declined_by_appropriate_legal_authority
          or (no_action_taken_within_reasonable_period and referral_formally_withdrawn_by_local_agency))
          and not administrative_disqualification_hearing_barred_after_court_result

  - name: administrative_disqualification_hearing_may_pursue_disqualification_without_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.02.D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2#nonparticipating_household_overissuance_no_claim_threshold
              output: nonparticipating_household_overissuance_no_claim_threshold
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          (front_end_investigation_demonstrates_clear_and_convincing_ipv_evidence and no_benefits_were_issued)
          or (regular_investigation_reveals_overissuance
          and household_is_nonparticipating
          and overissuance_amount < nonparticipating_household_overissuance_no_claim_threshold
          and not overissuance_due_to_trafficking
          and not overissuance_discovered_by_quality_control)

  - name: administrative_disqualification_hearing_scheduling_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.02.E-F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          local_agency_has_clear_and_convincing_proof_of_ipv
          and second_party_review_completed_to_ensure_clear_and_convincing_ipv_evidence
          and not case_is_being_considered_for_criminal_prosecution

  - name: waiver_of_administrative_disqualification_hearing_offer_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705.02.E-F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          local_agency_has_clear_and_convincing_proof_of_ipv
          and second_party_review_completed_to_ensure_clear_and_convincing_ipv_evidence
          and not case_is_being_considered_for_criminal_prosecution
          and not waiver_offered_as_means_of_avoiding_criminal_prosecution

  - name: suspected_ipv_treated_as_inadvertent_household_error_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 705, Section 705 Change #03-2022
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          suspected_ipv_case
          and not local_agency_initiates_criminal_prosecution
          and not local_agency_initiates_administrative_disqualification_hearing
