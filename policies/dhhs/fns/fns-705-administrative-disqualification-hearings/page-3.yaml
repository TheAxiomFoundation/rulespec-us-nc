format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-3
  summary: |-
    Hearing officer action must be completed within 90 days of written notice of the local agency hearing, or within 60 days of the FNS unit's State-level appeal. The member or representative is entitled to a postponement if requested at least ten days before the scheduled local agency hearing; postponements cannot exceed 30 days and the time limit is extended by the postponed days. Local ADH advance notice must be provided at least 30 days before the hearing.
rules:
  - name: local_agency_adh_action_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 705.03 Timely Action on Administrative Disqualification Hearings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-3
              excerpt: "within 90 days of the date the FNS unit member is notified in writing"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          90

  - name: state_level_appeal_adh_action_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 705.03 Timely Action on Administrative Disqualification Hearings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-3
              excerpt: "within 60 days of the date the FNS unit appeals the case to the State level"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          60

  - name: hearing_postponement_request_advance_days
    kind: parameter
    dtype: Count
    source: FNS 705.03 Timely Action on Administrative Disqualification Hearings
    metadata:
      proof:
        atoms:
