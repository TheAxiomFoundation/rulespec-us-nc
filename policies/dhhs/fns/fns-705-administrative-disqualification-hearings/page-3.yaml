              excerpt: "at least ten (10) days before the date of the scheduled local agency hearing"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: local_hearing_postponement_total_day_limit
    kind: parameter
    dtype: Count
    source: FNS 705.03 Timely Action on Administrative Disqualification Hearings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-3
              excerpt: "the hearing postponement cannot exceed a total of 30 days"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
