format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
  summary: |-
    Make reasonable efforts to schedule the hearing at a time and place convenient to the FNS unit member suspected of an IPV. Conduct the ADH without the FNS unit member present if the FNS unit member or his representative cannot be located, fails to contact the agency by telephone, or fails to appear at the hearing without good cause. Conduct a new hearing when the Hearing Officer determines that the FNS unit member or representative failed to contact the agency by telephone or appear with good cause. The FNS unit member has ten calendar days after the date of the hearing decision to present reasons indicating a good cause; allow 30 days from the date the hearing decision was received only if the DSS-8556 Advance Notice of ADH was not received. If good cause is not found, allow fifteen days from that decision to request a State Level Hearing.
rules:
  - name: standard_good_cause_presentation_period_days
    kind: parameter
    dtype: Integer
    source: FNS 705.08(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
              excerpt: "ten calendar days after the date of the hearing decision"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: notice_not_received_good_cause_presentation_period_days
    kind: parameter
    dtype: Integer
    source: FNS 705.08(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
              excerpt: "Allow 30 days from the date the hearing decision was received"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          30

  - name: state_level_hearing_request_period_after_no_good_cause_days
    kind: parameter
    dtype: Integer
    source: FNS 705.08(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
              excerpt: "allow fifteen days from the date of that decision"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          15

  - name: local_adh_may_proceed_without_fns_unit_member_present
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.07
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          fns_unit_member_or_representative_cannot_be_located
          or fns_unit_member_fails_to_contact_agency_by_telephone
          or (fns_unit_member_fails_to_appear_at_hearing and not fns_unit_member_has_good_cause_for_failure_to_appear)

  - name: new_local_adh_required_after_good_cause_for_failure_to_contact_or_appear
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.08(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_officer_determines_failure_to_contact_or_appear_with_good_cause

  - name: good_cause_presentation_deadline_days
    kind: derived
    entity: Person
    dtype: Integer
    period: Day
    source: FNS 705.08(B)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          if dss_8556_advance_notice_of_adh_was_not_received: notice_not_received_good_cause_presentation_period_days else: standard_good_cause_presentation_period_days

  - name: state_level_hearing_request_allowed_after_no_good_cause_decision
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 705.08(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_officer_finds_no_good_cause_for_failure_to_contact_or_appear

  - name: state_level_hearing_request_deadline_days_after_no_good_cause_decision
    kind: derived
    entity: Person
    dtype: Integer
    period: Day
    source: FNS 705.08(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-705-administrative-disqualification-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          if state_level_hearing_request_allowed_after_no_good_cause_decision: state_level_hearing_request_period_after_no_good_cause_days else: 0
