format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-4
  summary: |-
    The DSS-8550 indicates no further income reporting requirements when household income exceeds the 130% maximum allowable gross income limit. Households are instructed to total gross monthly income from all sources on the last day of the month. Changes are considered reported on the date received, reported by telephone/email/fax subject to non-business-hour receipt being the next business day, reported at an office visit, reported to WFFA, entered into NC FAST with a task generated, or reported by a third party.
rules:
  - name: income_reporting_gross_income_limit_rate
    kind: parameter
    dtype: Rate
    source: FNS 500.05, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-4
              excerpt: "130% maximum allowable gross income limit"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          1.30

  - name: no_further_income_reporting_required_after_exceeding_gross_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 500.05, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-4
              excerpt: "when the household's income exceeds the 130% maximum allowable gross income limit"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-4#income_reporting_gross_income_limit_rate
              output: income_reporting_gross_income_limit_rate
              hash: sha256:local
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          household_monthly_gross_income > household_size_gross_income_limit_at_certification * income_reporting_gross_income_limit_rate

  - name: monthly_income_totaled_from_all_gross_sources_on_last_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 500.05(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-4
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          household_adds_gross_amount_of_all_income_sources
          and total_is_for_last_day_of_month

  - name: change_considered_reported_on_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 500.06
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-4
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          change_report_received_on_day
          or change_reported_by_telephone_email_or_fax_during_business_hours_on_day
          or non_business_hours_telephone_email_or_fax_report_received_previous_non_business_day
          or office_visit_to_report_change_on_day
          or change_reported_to_wffa_on_day
          or changed_information_entered_into_nc_fast_and_task_generated_on_day
          or third_party_reports_change_on_day
