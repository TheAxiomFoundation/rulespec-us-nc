format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-2
  summary: Households are required to report if any member of the FNS unit receives
    lottery/gambling winnings of $4,500 or more. The receipt of lottery/gambling winnings
    of $4,500 or more results in loss of eligibility for the entire FNS unit. The
    household remains ineligible until they reapply for benefits and meet all non-categorical
    eligible financial resources and income eligibility requirements. Do not require
    or request the FNS unit to report any changes other than those listed in FNS 500.03
    A. SR households report listed changes by the 10th of the applicable following
    month.
rules:
- name: local_lottery_gambling_winnings_must_be_reported
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 500.03 A.3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-2
          excerpt: any member of the FNS unit receives lottery/gambling winnings of
            $4,500 or more
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-390-resources/page-26#lottery_gambling_winnings_reporting_threshold
          output: lottery_gambling_winnings_reporting_threshold
          hash: sha256:abf6a2e4cb80976f51aee5f1b7bdb8f4df4c5dfe0481923eaf4487f9ca08f072
  versions:
  - effective_from: '2024-10-01'
    formula: fns_unit_member_lottery_gambling_winnings >= lottery_gambling_winnings_reporting_threshold
- name: fns_unit_loses_eligibility_due_to_lottery_gambling_winnings
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 500.03 A.3.a
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-500-sr-category-and-reporting-requirements/page-2
