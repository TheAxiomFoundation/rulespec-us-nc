  summary: |-
    State hearings are generally held at the county department with the State Hearing Officer participating remotely, or in another mutually acceptable place. The location should not entail undue travel expense to the appellant, should be comfortable and private, and should account for illness, deafness, or other handicaps. The county must attach specified hearing materials to the DSS-1473 sent to Hearings and Appeals within five calendar days of receiving the hearing request, and the responsible worker has stated duties on the day of the hearing.
