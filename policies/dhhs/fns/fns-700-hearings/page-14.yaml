format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-14
  summary: |-
    "LOST BENEFITS When the decision finds that a household has been improperly denied program benefits or has been issued a lesser allotment than was due, issue supplemental benefits to the FNS unit in accordance with Section 905, Restoration of Lost Benefits. Any unpaid balance on an IPV, IHE, or AE claim shall be applied against the amount to be restored."
    "OVERISSUANCE When the Hearing Officer upholds the county department's action, a claim against the FNS unit for any overissuance shall be prepared in accordance with Section 800, Claims."
    "REMANDED HEARINGS A Hearing Officer can decide additional verification or action is necessary in order to determine eligibility and remand the case back to the county."
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-700-hearings/page-14#supplemental_benefits_to_issue_after_favorable_hearing
      reason: The supplemental-benefit amount must be issued in accordance with missing Section 905, Restoration of Lost Benefits, and the source also requires applying unpaid IPV, IHE, or AE claim balances against the amount to be restored.
    - output: us-nc:policies/dhhs/fns/fns-700-hearings/page-14#overissuance_claim_preparation_required_after_hearing
      reason: The overissuance claim must be prepared in accordance with missing Section 800, Claims.
    - output: us-nc:policies/dhhs/fns/fns-700-hearings/page-14#hearing_case_remanded_to_county
      reason: The remand provision operates on a hearing case and county action instructions, but the supported RuleSpec entity set does not include a hearing case or administrative officer/county-department action entity.
