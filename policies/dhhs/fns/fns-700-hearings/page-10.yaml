format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-10
  summary: |-
    Before the hearing, the household or representative may request a pre-hearing conference and may review the case file and hearing records. The household may represent themselves or use counsel or another spokesperson, bring witnesses, argue the case, question or refute testimony or evidence, confront and cross-examine the other party, make a closing argument, and submit evidence. The county representative has all the same rights as the claimant.
