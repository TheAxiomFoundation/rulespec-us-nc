    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-11
  summary: |-
    The Hearing Officer presides and conducts the hearing informally in an orderly and rational manner. The verbatim transcript or recording of testimony and exhibits or an official report containing the substance of what transpired at the hearing, all papers and requests filed in the proceeding, oral or written arguments received after the tentative decision, and the final decision will constitute the hearing record.
