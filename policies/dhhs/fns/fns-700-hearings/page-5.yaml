format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
  summary: |-
    700.10 DENIAL OR DISMISSAL OF REQUEST: A request for a fair hearing can be denied or dismissed if it was untimely, withdrawn in writing, the FNS unit or representative fails without good cause to appear, or the household or representative orally withdraws the request. 700.11 CONTINUATION OF BENEFITS: if the FNS unit requests a fair hearing within the ten-day advance notice period for the Notice of Adverse Action, continue benefits on the basis authorized immediately prior to the Notice of Adverse Action, as long as the certification period is not expired and the FNS unit does not waive continuation of benefits; late requests reduce or terminate benefits as proposed, unless good cause is established; mass-change reinstatement is limited to incorrect computation or misapplication/misinterpretation of federal law or policy; do not continue prior-rate benefits for recertification or after certification ends; a local conference finding for the county does not end continuation when the State Level Hearing request is not withdrawn.
rules:
  - name: fair_hearing_request_may_be_denied_or_dismissed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_request_not_received_within_specified_time_period
          or hearing_request_withdrawn_in_writing_by_fns_unit_or_representative
          or (fns_unit_or_representative_failed_to_appear_at_scheduled_hearing and not good_cause_for_failure_to_appear)
          or household_or_representative_orally_withdrew_request

  - name: continuation_of_benefits_at_prior_level_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.11 introductory paragraph and 700.11(A), (E), (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
              excerpt: "within the ten-day advance notice period"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          fair_hearing_requested_within_ten_day_advance_notice_period
          and certification_period_not_expired
          and not hearing_request_indicates_household_waived_continuation_of_benefits
          and not hearing_request_result_of_recertification

  - name: benefits_reduced_or_terminated_as_notice_proposed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.11(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_request_made_after_expiration_of_ten_day_advance_notice_period
          and not good_cause_for_failure_to_request_within_advance_notice_period

  - name: benefits_reinstated_to_prior_level_after_late_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.11(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_request_made_after_expiration_of_ten_day_advance_notice_period
          and good_cause_for_failure_to_request_within_advance_notice_period

  - name: mass_change_benefits_reinstated_to_prior_level
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.11(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          benefits_reduced_or_terminated_due_to_mass_change
          and (issue_is_eligibility_or_benefits_computed_incorrectly or issue_is_federal_law_or_policy_misapplied_or_misinterpreted)

  - name: local_conference_finding_does_not_end_continuation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.11(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-5
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          local_conference_finds_in_favor_of_county
          and not recipient_withdrew_request_for_state_level_hearing
