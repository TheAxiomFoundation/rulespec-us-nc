format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
  summary: |-
    Change #03-2022 July 01, 2022. The county DSS should complete the DSS-1473 Request for State Appeal form and forward it along with the relevant documents ... within five calendar days of receipt of the hearing request. ... a hearing must be conducted and a decision rendered within 60 calendar days from the date of the request for State Appeal. ... A request for a fair hearing must be made within 90 calendar days of the action or loss of benefits the FNS unit wishes to appeal. This includes the denial of a request for restoration of benefits lost more than 90 days but less than a year before the request. In addition, at any time within a certification period, a household may request a fair hearing to dispute its level of benefits.
rules:
  - name: dss1473_forwarding_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 700, page 4, paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "within five calendar days of receipt of the hearing request"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          5

  - name: state_appeal_hearing_and_decision_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 700, page 4, paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "within 60 calendar days from the date of the request for State Appeal"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          60

  - name: fair_hearing_request_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 700.09
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "within 90 calendar days of the action or loss of benefits"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          90

  - name: restoration_denial_lost_benefits_lower_bound_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 700.09
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "benefits lost more than 90 days"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          90

  - name: restoration_denial_lost_benefits_upper_limit_years
    kind: parameter
    dtype: Count
    source: FNS 700.09
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "less than a year before the request"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          1

  - name: county_dss1473_forwarding_deadline_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700, page 4, paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          calendar_days_from_hearing_request_receipt_to_dss1473_forwarding <= dss1473_forwarding_deadline_calendar_days

  - name: state_appeal_hearing_and_decision_deadline_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700, page 4, paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          calendar_days_from_state_appeal_request_to_hearing_conducted <= state_appeal_hearing_and_decision_deadline_calendar_days
          and calendar_days_from_state_appeal_request_to_decision_rendered <= state_appeal_hearing_and_decision_deadline_calendar_days

  - name: fair_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.09
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-4
              excerpt: "Change #03-2022 July 01, 2022"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          calendar_days_from_action_or_loss_to_hearing_request <= fair_hearing_request_deadline_calendar_days
          or (
            request_appeals_denial_of_restoration_of_benefits
            and calendar_days_from_denial_of_restoration_request_to_hearing_request <= fair_hearing_request_deadline_calendar_days
            and calendar_days_from_benefit_loss_to_hearing_request > restoration_denial_lost_benefits_lower_bound_calendar_days
            and years_from_benefit_loss_to_hearing_request < restoration_denial_lost_benefits_upper_limit_years
          )
          or (
            request_disputes_level_of_benefits
            and request_made_within_certification_period
          )
