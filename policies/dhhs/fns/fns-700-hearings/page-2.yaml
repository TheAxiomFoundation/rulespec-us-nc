format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-2
  summary: |-
    hearing decision will be required within 70 days from the date of the request for a hearing. Each FNS unit is informed on the application of its right to a hearing, of the method by which a hearing may be requested, and that its case may be presented by a FNS unit member or a representative. The county department must offer a local (agency) conference to households that wish to contest a denial of expedited service. Conferences for households contesting a denial of expedited service will be scheduled within two working days unless the household requests that it be scheduled later or states that it does not wish to have a conference.
rules:
  - name: hearing_decision_due_days
    kind: parameter
    dtype: Count
    source: FNS 700.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-2
              excerpt: "hearing decision will be required within 70 days from the date of the request"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          70

  - name: expedited_service_conference_scheduling_due_working_days
    kind: parameter
    dtype: Count
    source: FNS 700.05(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-2
              excerpt: "scheduled within two working days"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          2

  - name: local_conference_offer_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 700.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          household_wishes_to_contest_denial_of_expedited_service

  - name: expedited_service_conference_must_be_scheduled_within_due_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 700.05(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          household_wishes_to_contest_denial_of_expedited_service
          and not household_requests_later_conference
          and not household_states_no_conference_wanted

  - name: fair_hearing_right_notification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 700.04
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-2
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          fns_unit_applies
          or fns_unit_expresses_disagreement_with_county_department_action
