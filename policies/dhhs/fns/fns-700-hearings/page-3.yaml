format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-3
  summary: |-
    County agencies are required to offer agency conferences to any household wishing to contest a denial of expedited service. These conferences will be scheduled within two working days unless the household requests a later schedule or states it does not wish to have an in-person, remote telephone, or remote video conference. A hearing request is any clear oral or written expression that the household wishes to present its case to a higher authority to appeal a decision; a FNS unit member, authorized representative, or other person acting on the household's behalf may make the request. The State agency may conduct a single group hearing only when the sole issue is one of State and/or Federal law, regulation, or policy and individual issues of fact are not disputed.
rules:
  - name: expedited_service_denial_conference_scheduling_limit_working_days
    kind: parameter
    dtype: Count
    source: FNS 700.06, required agency conferences for expedited-service denial
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-3
              excerpt: "scheduled within two working days"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          2

  - name: expedited_service_denial_conference_must_be_scheduled_within_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.06, required agency conferences for expedited-service denial
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-3
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-3
              excerpt: "within two working days"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          household_wishes_to_contest_denial_of_expedited_service
          and not household_requests_later_conference_schedule
          and not household_states_it_does_not_wish_to_have_conference

  - name: hearing_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.08, hearing request definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-3
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          clear_oral_or_written_expression
          and household_wishes_to_present_case_to_higher_authority_to_appeal_decision
          and (request_made_by_fns_unit_member or request_made_by_authorized_representative or request_made_by_other_person_acting_on_household_behalf)

  - name: hearing_request_reason_clarification_should_be_contacted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.08(A), unclear hearing-request reason
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-3
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          fns_unit_reason_for_requesting_hearing_is_unclear

  - name: group_hearing_consolidation_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.07, group hearings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-3
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          household_has_individual_hearing_request_in_series
          and sole_issue_is_state_or_federal_law_regulation_or_policy
          and not individual_issues_of_fact_are_disputed
