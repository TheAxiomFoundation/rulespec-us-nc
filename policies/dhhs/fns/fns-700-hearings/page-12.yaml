format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
  summary: |-
    "The record shall be retained in accordance with 7 C.F.R. § 272.1 (f)"; the record "shall also be available to the household or its representative, at any reasonable time, for copying and inspection." Confidential or other information the FNS unit or representative cannot hear, see, and respond to "will not be introduced at the hearing nor shall it become a part of the hearing record." If the hearing involves medical issues, the Hearing Officer may rule that another medical assessment be obtained at combined federal-State expense and made part of the hearing record. The State Hearing Officer renders decisions in the name of NCDHHS, based on the hearing record, and decisions may not run contrary to federal law, regulation, or policy. A tentative decision becomes final unless either party requests oral or written argument within ten calendar days.
rules:
  - name: tentative_decision_argument_request_period_days
    kind: parameter
    dtype: Count
    source: FNS 700.25, Notification of Tentative Decision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
              excerpt: "within ten calendar days of the date of the tentative decision"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: hearing_record_available_for_copying_and_inspection
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700, page 12, paragraph A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_record_exists
          and request_is_by_household_or_representative
          and request_time_is_reasonable

  - name: information_excluded_from_hearing_record
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700, page 12, paragraph B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          information_is_confidential_or_other_hearing_information
          and fns_unit_or_representative_lacked_opportunity_to_hear_see_and_respond

  - name: medical_assessment_may_be_obtained_for_hearing_record
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.22, Medical Issues
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_involves_medical_issues
          and hearing_officer_rules_medical_assessment_will_be_obtained
          and medical_assessment_source_satisfactory_to_fns_unit_and_county

  - name: hearing_decision_valid_under_source
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.23, Hearing Decision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          decision_rendered_by_state_hearing_officer
          and decision_rendered_in_name_of_state_department_of_health_and_human_services
          and decision_considers_issues_under_appeal
          and decision_factually_based_on_hearing_record
          and not decision_runs_contrary_to_federal_law_regulation_or_policy

  - name: hearing_decision_format_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.24, Decision Format
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          decision_states_issue
          and decision_states_principal_facts_related_to_decision
          and decision_states_pertinent_federal_regulations_and_policy
          and decision_states_reasoning_that_led_to_decision

  - name: tentative_decision_becomes_final
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.25, Notification of Tentative Decision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-12
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-700-hearings/page-12#tentative_decision_argument_request_period_days
              output: tentative_decision_argument_request_period_days
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          tentative_decision_prepared_and_sent_to_household_and_county
          and days_since_tentative_decision_date > tentative_decision_argument_request_period_days
          and not household_requested_oral_or_written_argument
          and not county_requested_oral_or_written_argument
