format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-13
  summary: |-
    If a request for a time extension to submit a written argument or a request for an oral argument is received by the Chief Hearing Officer within ten (10) calendar days of the date the tentative decision was signed, an extension will be granted. If written argument, request for a time extension, or request for oral argument is not submitted within the ten (10) calendar day timeframe, the tentative decision shall become final without further notice. Final decisions can be appealed to Superior Court by the household if filed within 30 days of receipt.
rules:
  - name: tentative_decision_argument_request_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 700.26
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-13
              excerpt: within ten (10) calendar days of the date the tentative decision was signed
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10
  - name: final_decision_appeal_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 700.28
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-13
              excerpt: filed within 30 days of the date of receipt of the final decision
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          30
  - name: time_extension_for_written_argument_granted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.26
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-13
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-700-hearings/page-13#tentative_decision_argument_request_deadline_days
              output: tentative_decision_argument_request_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          request_for_time_extension_to_submit_written_argument_received_by_chief_hearing_officer
          and calendar_days_since_tentative_decision_signed <= tentative_decision_argument_request_deadline_days
  - name: oral_argument_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.26
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-13
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-700-hearings/page-13#tentative_decision_argument_request_deadline_days
              output: tentative_decision_argument_request_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          request_for_oral_argument_received_by_chief_hearing_officer
          and calendar_days_since_tentative_decision_signed <= tentative_decision_argument_request_deadline_days
  - name: tentative_decision_becomes_final_without_further_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.26
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-13
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          not written_argument_submitted_within_ten_calendar_day_timeframe
          and not request_for_time_extension_to_submit_written_argument_received_within_ten_calendar_day_timeframe
          and not request_for_oral_argument_submitted_within_ten_calendar_day_timeframe
  - name: household_superior_court_appeal_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.28
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-13
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-700-hearings/page-13#final_decision_appeal_deadline_days
              output: final_decision_appeal_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          household_appeal_to_superior_court_filed
          and calendar_days_since_receipt_of_final_decision <= final_decision_appeal_deadline_days
