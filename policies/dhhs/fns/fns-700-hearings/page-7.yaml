format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
  summary: |-
    "The county must promptly inform the claimant in writing if benefits are reduced or terminated pending a hearing decision." A State Hearing Officer schedules the hearing by the applicant's chosen in-person, telephone, or video method. The county DSS household and/or representative must be notified in writing at least 10 days prior to the hearing, unless the FNS unit requests less advance notice; the State Hearing Notice must provide contact information, warn of dismissal for failure to appear without good cause, include hearing procedures and other explanatory information, and explain that the household or representative may examine the case file before the hearing.
rules:
  - name: minimum_hearing_notice_days
    kind: parameter
    dtype: Count
    source: FNS 700.14, Notification of Time and Place of Hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
              excerpt: "at least 10 days prior to the hearing"
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          10

  - name: claimant_written_notice_required_when_benefits_reduced_or_terminated_pending_hearing
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 700.13, Notification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          claimant_benefits_reduced_or_terminated_pending_hearing_decision
          and county_promptly_informed_claimant_in_writing

  - name: hearing_scheduled_by_applicant_chosen_mode
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.14, Notification of Time and Place of Hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          state_hearing_officer_scheduled_hearing
          and hearing_mode_matches_applicant_choice_made_at_state_appeal_request

  - name: applicant_contact_information_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.14, Notification of Time and Place of Hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          applicant_provided_best_contact_numbers_or_email_for_all_persons_involved

  - name: hearing_notice_advance_timing_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.14, Notification of Time and Place of Hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-700-hearings/page-7#minimum_hearing_notice_days
              output: minimum_hearing_notice_days
              hash: sha256:local
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          fns_unit_requested_less_advance_notice_to_expedite_hearing_scheduling
          or hearing_notice_days_before_hearing >= minimum_hearing_notice_days

  - name: hearing_notice_delivery_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.14, Notification of Time and Place of Hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          county_dss_household_or_representative_notified_in_writing
          and hearing_notice_advance_timing_satisfied

  - name: state_hearing_notice_content_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.14(A)-(D), Notification of Time and Place of Hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          state_hearing_notice_advises_who_to_notify_if_unable_to_attend
          and state_hearing_notice_warns_hearing_request_dismissed_for_failure_to_appear_without_good_cause
          and state_hearing_notice_includes_hearing_procedures_and_information_for_effective_presentation
          and state_hearing_notice_explains_household_or_representative_may_examine_case_file_before_hearing

  - name: hearing_notice_requirements_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 700.14, Notification of Time and Place of Hearing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-700-hearings/page-7
    versions:
      - effective_from: '2022-07-01'
        formula: |-
          hearing_scheduled_by_applicant_chosen_mode
          and applicant_contact_information_provided
          and hearing_notice_delivery_satisfied
          and state_hearing_notice_content_satisfied
