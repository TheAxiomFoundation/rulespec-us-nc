format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-7
  summary: |-
    "An increase in FNS benefits is prohibited when an FNS unit’s countable income is reduced because of a Work First sanction for failure to perform a required action." If a Work First check is terminated due to a sanction imposed during the certification period, or the same sanction remains at reapplication/recertification, continue counting the gross payment amount. If a new sanction was imposed effective the month of application/reapplication or in a non-certified month, no Work First payment is budgeted. If a Work First or TANF payment is reduced due to a client responsible overpayment, do not increase the household's FNS allotment as a result.
rules:
  - name: work_first_gross_payment_counted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.06(A)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-7
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          work_first_check_terminated_due_to_sanction
          and (
            sanction_imposed_during_certification_period
            or same_sanction_in_place_at_reapplication_or_recertification
          )
  - name: work_first_payment_not_budgeted_due_to_sanction_timing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.06(B)(2), 515.06(C), 515.06(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-7
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          work_first_check_terminated_due_to_sanction
          and sanction_is_new_at_reapplication_or_recertification
          and (
            sanction_imposed_effective_month_of_application_or_reapplication
            or sanction_imposed_in_non_certified_month
          )
  - name: work_first_gross_payment_budgeted_due_to_certified_case_sanction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.06(B)(3), 515.06(D)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-7
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          work_first_check_terminated_due_to_sanction
          and sanction_is_new_at_reapplication_or_recertification
          and sanction_imposed_while_case_certified_to_receive_fns_benefits
  - name: fns_benefit_increase_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.06 introductory paragraph and 515.06(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-7
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          fns_unit_countable_income_reduced_because_of_work_first_sanction_for_failure_to_perform_required_action
          or work_first_or_tanf_payment_reduced_due_to_client_responsible_overpayment
