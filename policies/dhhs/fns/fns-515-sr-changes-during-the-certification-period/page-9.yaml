format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
  summary: |-
    Data match information for deceased and prisoner matches is not unclear; additional clarification is not needed unless the information is questionable and cannot be verified from Vital Records or DOC. Give or mail DSS-8650 and allow ten calendar days for requested information or verification. If the household fails to provide sufficient information to determine eligibility or benefit level, issue DSS-8553 to close the case. Do not act on unclear information if the FNS unit is not required to report. If unclear information could potentially benefit the FNS unit, give or mail DSS-8650; if sufficient information is provided, react under FNS 515, but if information or verification is not provided, take no action and document for next recertification.
rules:
  - name: requested_information_response_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, p. 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
              excerpt: "Allow ten calendar days"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          10

  - name: additional_clarification_needed_for_deceased_or_prisoner_match
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, p. 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          information_from_deceased_or_prisoner_data_match
          and information_is_questionable
          and information_cannot_be_verified_from_vital_records_or_doc

  - name: dss_8650_must_be_given_or_mailed_for_requested_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, p. 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          agency_requests_information_or_verification

  - name: dss_8650_must_be_given_or_mailed_for_potentially_beneficial_unclear_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, p. 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          information_is_unclear
          and unclear_information_could_potentially_benefit_fns_unit

  - name: case_must_be_closed_for_insufficient_requested_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, p. 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          agency_requested_information_or_verification
          and household_fails_to_provide_sufficient_information_to_determine_eligibility_or_benefit_level

  - name: no_action_on_unclear_information_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, p. 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          information_is_unclear
          and fns_unit_not_required_to_report_change

  - name: no_action_and_document_for_next_recertification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, p. 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-9
