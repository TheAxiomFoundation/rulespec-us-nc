format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
  summary: |-
    "Determine how the change affects the FNS benefits within ten calendar days of the date the change was reported to the agency." "If the Work First payment is reduced or terminated... Do not take action to increase the FNS unit's benefits until the family decides if it will request a hearing..." "When unverified information is received from a third-party source... Evaluate the changed information within ten calendar days..."
rules:
  - name: reported_change_action_deadline_calendar_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 515.08, page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
              excerpt: "within ten calendar days of the date the change was reported"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          10

  - name: third_party_change_evaluation_deadline_calendar_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 515.09(A), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
              excerpt: "within ten calendar days of the date the change was reported"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          10

  - name: reported_change_action_within_required_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.08, page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10#reported_change_action_deadline_calendar_days
              output: reported_change_action_deadline_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          calendar_days_since_change_reported_to_agency <= reported_change_action_deadline_calendar_days

  - name: benefits_increase_change_effective_next_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.08(A)(2), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          reported_change_increases_fns_benefits
          and month_is_after_month_change_reported

  - name: work_first_reduction_or_termination_blocks_fns_increase_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.08(B), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          work_first_payment_reduced_or_terminated
          and family_has_not_decided_whether_to_request_hearing_and_continued_benefits

  - name: fns_benefits_unchanged_pending_work_first_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.08(B)(1), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          family_requests_hearing
          and work_first_payment_is_continued
          and hearing_process_not_completed

  - name: work_first_no_hearing_change_processed_after_notice_expires
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.08(B)(2), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          family_does_not_request_hearing
          and work_first_notice_has_expired

  - name: third_party_changed_information_within_required_evaluation_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.09(A), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10#third_party_change_evaluation_deadline_calendar_days
              output: third_party_change_evaluation_deadline_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          unverified_information_received_from_third_party_source
          and calendar_days_since_third_party_change_reported <= third_party_change_evaluation_deadline_calendar_days

  - name: third_party_discrepancy_phone_contact_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.09(B), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          third_party_information_is_different_from_last_fns_unit_report

  - name: no_further_action_on_invalid_third_party_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.09(C), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          phone_call_determines_third_party_information_not_valid

  - name: dss_8650_required_for_unresolved_third_party_information_need
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.09(D), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
              excerpt: "at least two phone calls"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          (caseworker_made_at_least_two_phone_calls_and_could_not_reach_fns_unit
          or fns_unit_has_no_phone_or_message_contact_number
          or discrepancy_was_not_resolved_during_phone_conversation)
          and (additional_information_is_needed or verification_is_required)

  - name: dss_8650_must_allow_any_reasonable_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.09(E), page 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-10
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          dss_8650_given_or_mailed_to_fns_unit
          and notice_lists_reported_information
          and notice_gives_fns_unit_chance_to_resolve_discrepancy_by_submitting_verification
          and notice_does_not_restrict_specific_type_of_verification
