format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
  summary: |-
    Allow ten calendar days for requested verification. If the FNS unit responds to DSS-8650 but refuses sufficient information, or fails to respond, issue DSS-8553 to close the case. If failure to report specified changes results in overissuance, establish a claim; do not establish a claim if the change was not required to be reported. If the caseworker learns the FNS unit failed to report timely within the certification period, the unit is entitled to DSS-8553 before benefit reduction. Do not restore increases lost because the unit failed to report timely; restore benefits when the agency failed to act timely. If a fair hearing is requested during advance notice and certification has not expired, do not reduce or terminate benefits and continue benefits unless waived; once the notice expires, continued benefits may no longer be requested.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11#individual_disqualification_for_failure_to_report_change_allowed
      reason: The source makes individual disqualification depend on being disqualified according to FNS 710 Administrative Disqualification Hearings and FNS 800 Claims, but those cited instructions are not available in copied RuleSpec context.
rules:
  - name: requested_verification_response_period_days
    kind: parameter
    dtype: Count
    source: FNS 515.9, page 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
              excerpt: "Allow ten calendar days"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          10

  - name: gross_income_reporting_limit_rate
    kind: parameter
    dtype: Rate
    source: FNS 515.10(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
              excerpt: "exceeds the 130% maximum allowable gross income limit"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          1.30

  - name: abawd_minimum_average_monthly_work_hours
    kind: parameter
    dtype: Count
    source: FNS 515.10(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
              excerpt: "80 hours per month"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          80

  - name: dss_8553_to_close_case_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.9(F)-(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          (fns_unit_responded_to_dss_8650 and fns_unit_refuses_sufficient_information_for_eligibility_or_benefit_level)
          or fns_unit_failed_to_respond_to_dss_8650

  - name: claim_against_fns_unit_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.10(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          change_is_required_to_be_reported
          and overissuance_received
          and (
            (failed_to_report_income and unreported_income > gross_income_reporting_limit_rate * maximum_allowable_gross_income_limit)
            or (failed_to_report_abawd_stopped_working and abawd_average_monthly_hours_after_stopping_work < abawd_minimum_average_monthly_work_hours)
            or failed_to_report_gambling_or_lottery_winnings
          )

  - name: dss_8553_before_reducing_benefits_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.10(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          caseworker_learned_failure_to_report_change_timely_within_certification_period

  - name: restoration_of_increased_benefits_barred_for_untimely_failure_to_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.10(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          fns_unit_failed_to_report_change_timely
          and change_would_have_resulted_in_increased_benefits

  - name: restoration_of_lost_benefits_required_for_agency_delay
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.10(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          agency_failed_to_act_timely_processing_increase_in_benefits

  - name: continued_benefits_required_during_fair_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          fair_hearing_requested_during_advance_notice_period
          and certification_period_has_not_expired
          and
          not fns_unit_waived_continued_benefits

  - name: reduction_or_termination_action_barred_pending_fair_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          fair_hearing_requested_during_advance_notice_period
          and certification_period_has_not_expired
          and
          not fns_unit_waived_continued_benefits

  - name: continued_benefits_request_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 515.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-11
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          not notice_of_adverse_action_has_expired
