format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
  summary: |-
    "Determine if additional verification is required unless the change is considered verified upon receipt. If the information is questionable, it is not considered verified upon receipt and must be verified prior to reacting to the change. Verified upon receipt means that information is not questionable, and the provider is the primary source of the information" including listed sources such as BENDEX, SDX, SAVE, DES E&T compliance, Program Integrity IPV information, and QC non-cooperation information; SOLQ is not considered verified upon receipt.
rules:
  - name: household_change_verified_upon_receipt
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515, Section D.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "Verified upon receipt means that information is not questionable, and the provider is the primary source"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "SOLQ is not considered verified upon receipt since this is an inquiry."
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          changed_information_is_not_questionable
          and information_provider_is_primary_source
          and (
            provider_is_bendex_ssa_benefits_or_medicare_premiums_from_ssa
            or provider_is_sdx_ssi_benefits_from_ssa
            or provider_is_save_from_bcis
            or provider_is_des_employment_and_training_compliance_information
            or provider_is_program_integrity_intentional_program_disqualification_information
            or provider_is_quality_control_non_cooperation_information
          )
          and not information_is_solq_inquiry
  - name: household_change_additional_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515, Section D.2-D.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "Determine if additional verification is required unless the change is considered verified upon receipt."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "If the information is questionable, it is not considered verified upon receipt and must be verified"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          not household_change_verified_upon_receipt
  - name: household_change_must_be_verified_before_reacting
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515, Section D.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "If the information is questionable, it is not considered verified upon receipt and must be verified prior to reacting"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          information_is_questionable
  - name: valid_underpayment_should_be_approved_and_submitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515, Section C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "If underpayment is valid approve and submit for approval."
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          underpayment_is_valid
  - name: invalid_underpayment_should_be_closed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515, Section C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "If underpayment is not valid, close the underpayment case."
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          underpayment_exists
          and not underpayment_is_valid
  - name: valid_overpayment_should_be_referred_to_program_integrity
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515, Section C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "If overpayment is valid, complete and submit a referral to program integrity."
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          overpayment_is_valid
  - name: invalid_overpayment_requires_case_documentation_only
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515, Section C.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-2
              excerpt: "If overpayment is not valid, document the case to indicate it has been addressed"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          overpayment_exists
          and not overpayment_is_valid
