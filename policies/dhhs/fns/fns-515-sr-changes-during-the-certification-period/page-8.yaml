format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-8
  summary: |-
    Count the gross amount of the Work First or TANF payment as unearned income. EXCEPTION: If the Work First benefits terminate due to non-compliance or failure to meet an eligibility requirement, remove the payment from the FNS budget effective the month after the payment terminates. Benefit Diversion (BD) is not countable income. The worker is required to react to unclear information if it meets stated mandatory-verification, required-reporting-and-fewer-than-60-days-old, or conflicting-significant-information conditions.
rules:
  - name: work_first_or_tanf_payment_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 515.07 page 8, Work First/TANF payment counting rule and exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-8
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-8
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          if payment_is_benefit_diversion: 0 else: if work_first_benefits_terminated_due_to_noncompliance_or_failure_to_meet_eligibility_requirement and work_first_case_terminated and month_is_after_payment_termination_month: 0 else: if payment_is_work_first_or_tanf: gross_payment_amount else: 0
  - name: fns_unit_required_to_report_work_first_payment_or_ssa_ssi_mass_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.07 page 8, note on non-required reports
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-8
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          report_is_not_change_in_work_first_payment
          and report_is_not_ssa_or_ssi_cost_of_living_mass_change
  - name: agency_required_to_react_to_unclear_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515.07(A)(1), when to react to unclear information
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-8
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-8
              excerpt: "information is fewer than 60 days old"
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          information_is_unclear
          and (unclear_information_relates_to_mandatory_verification or (unclear_information_relates_to_required_reporting_change and verification_must_be_obtained_to_determine_required_reporting_change and information_is_fewer_than_60_days_old_relative_to_current_month_of_participation_when_discovered) or (unclear_information_conflicts_with_household_information_for_same_period and conflict_is_significant_enough_to_question_continued_eligibility))
