format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-3
  summary: |-
    If information received from Vital Records and DOC cannot be independently verified from a primary source, send the household a DSS-8650 only if the information is questionable. The DSS-8650 must state that failure to respond will result in the individual being removed from the FNS unit and benefits could be reduced or stopped. If the FNS unit fails to respond to DSS-8650, issue a DSS-8553 Notice of Adverse Action to reduce or close the case.
rules:
  - name: dss_8650_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, page 3, paragraph iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-3
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          vital_records_or_doc_information_cannot_be_independently_verified_from_primary_source
          and information_is_questionable

  - name: dss_8650_failure_consequence_statement_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, page 3, paragraph iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-3
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          dss_8650_notice_is_sent_to_household

  - name: dss_8553_adverse_action_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 515 SR Changes During the Certification Period, Section 515 Change #06-2022, page 3, paragraph iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-515-sr-changes-during-the-certification-period/page-3
    versions:
      - effective_from: '2022-10-24'
        formula: |-
          fns_unit_fails_to_respond_to_dss_8650
