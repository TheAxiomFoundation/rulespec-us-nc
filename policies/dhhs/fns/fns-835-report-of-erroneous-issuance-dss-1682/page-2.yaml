format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
  summary: |-
    Section 835 Change #1-2017 April 1, 2017. Item 8 requires information for each period of erroneous issuance. Item 8h states that if the household is over the gross limit, the net is not applicable and "NA" is entered; income amounts are not required for trafficking referrals. Item 8j states that the correct allotment is the amount of benefits for which the FNS Unit was eligible, and zero is entered if the household was ineligible or an underissuance occurred.
rules:
  - name: correct_allotment_entry
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 835, Item 8j
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "Section 835 Change #1-2017 April 1, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "If the household was ineligible or an underissuance occurred, enter zero on the line."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          if household_was_ineligible or underissuance_occurred: 0 else: benefits_for_which_fns_unit_was_eligible

  - name: correct_net_income_entry_not_applicable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 835, Item 8h
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "Section 835 Change #1-2017 April 1, 2017"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "If the household is over the gross limit, the net is not applicable. Enter NA in the net column."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          household_is_over_gross_income_limit

  - name: actual_income_amounts_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 835, Item 8g
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "Section 835 Change #1-2017 April 1, 2017"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "Income amounts are not required in this column for trafficking referrals."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          not trafficking_referral

  - name: correct_income_amounts_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 835, Item 8h
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "Section 835 Change #1-2017 April 1, 2017"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-835-report-of-erroneous-issuance-dss-1682/page-2
              excerpt: "Income amounts are not required in this column for trafficking referrals."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          not trafficking_referral
