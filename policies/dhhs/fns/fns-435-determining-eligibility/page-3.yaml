format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
  summary: |-
    "Do not require specific types of verification." "When documentary evidence cannot be obtained or is insufficient to make eligibility determination or determination of the correct benefit level, a collateral contact or home visit may be necessary." "The worker must provide applicant households with two (2) requests for missing verifications."
rules:
  - name: household_not_required_to_provide_specific_verification_type
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.02.G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          not agency_requires_specific_type_of_verification
  - name: collateral_contact_or_home_visit_may_be_necessary
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.02.H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          documentary_evidence_cannot_be_obtained
          or documentary_evidence_is_insufficient_for_eligibility_or_benefit_level
  - name: collateral_contact_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 435.02.I
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          collateral_contact_can_provide_accurate_third_party_verification
          and (collateral_contact_named_by_household or agency_chose_collateral_contact)
  - name: nc_fast_case_file_documentation_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.02.J
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          nc_fast_case_file_and_evidences_documented_to_support_determination
          and documentation_detailed_enough_for_reviewer_to_determine_accuracy
  - name: missing_verification_request_count
    kind: parameter
    dtype: Count
    source: FNS 435.03.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
              excerpt: "two (2) requests for missing verifications"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          2
  - name: household_received_required_missing_verification_requests
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.03.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-3#missing_verification_request_count
              output: missing_verification_request_count
              hash: sha256:local
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          missing_verification_requests_provided_count >= missing_verification_request_count
  - name: first_missing_verification_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.03.A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          dss_8650a_provided
          and (dss_8650a_provided_at_or_prior_to_interview or telephone_interview_and_dss_8650a_provided_by_mail)
  - name: dss_8650a_contains_required_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.03.A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          dss_8650a_describes_verification_types_required
          and dss_8650a_gives_examples_of_documents
          and dss_8650a_states_time_period_verifications_should_cover
          and dss_8650a_explains_how_applicant_can_provide_verifications
          and dss_8650a_explains_consequence_if_verifications_not_provided
          and dss_8650a_explains_how_to_obtain_help_obtaining_verifications
