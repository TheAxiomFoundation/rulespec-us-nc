format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-5
  summary: |-
    "Allow the FNS applicant 10 calendar days to provide the missing verifications." If all verifications are provided by the 10th day, process within five days of receipt, but no later than the FNS 420 deadline. If all required and mandatory verifications are returned but non-required verifications are missing or partial, process within five days of DSS-8650 expiration, but no later than the FNS 420 deadline. If required and mandatory verifications are not all returned, hold the application and deny for failure to provide information on the due date. Do not issue a new DSS-8650 with an additional 10 days unless new or changed information is reported.
rules:
  - name: dss_8650_response_period_days
    kind: parameter
    dtype: Integer
    source: FNS 435, page 5, B.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-5
              excerpt: "Allow the FNS applicant 10 calendar days"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          10

  - name: process_after_verification_event_limit_days
    kind: parameter
    dtype: Integer
    source: FNS 435, page 5, B.2-B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-5
              excerpt: "process application within five (5) days"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          5

  - name: all_verifications_provided_by_due_day_process_deadline_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 435, page 5, B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-5
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          normal_application_missing_required_or_mandatory_verifications
          and all_requested_verifications_provided_by_dss_8650_due_day
          and processing_is_within_five_days_of_receipt
          and processing_is_no_later_than_normal_application_deadline

  - name: required_and_mandatory_returned_process_deadline_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 435, page 5, B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-5
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          normal_application_missing_required_or_mandatory_verifications
          and all_required_and_mandatory_verifications_returned
          and non_required_verifications_are_none_or_partial
          and dss_8650_response_period_expired
          and processing_is_within_five_days_of_dss_8650_expiration
          and processing_is_no_later_than_normal_application_deadline

  - name: deny_for_failure_to_provide_information_on_due_date_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 435, page 5, B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-5
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          normal_application_missing_required_or_mandatory_verifications
          and dss_8650_due_date_reached
          and not all_required_and_mandatory_verifications_returned

  - name: new_dss_8650_additional_response_period_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 435, page 5, B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-5
              excerpt: "Do not issue a new DSS-8650 with an additional 10 days ... unless there is new or changed information reported."
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          new_or_changed_information_reported
