format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-1
  summary: |-
    "Mandatory Verifications: Verify all mandatory eligibility factors prior to certification, denial, reduction, or termination of FNS benefits. If verification of the following is not provided the application, recertification, or change must be denied for failure to provide information. 1. Identity; 2. Residency (Non-Categorical Eligible Households only); 3. Citizenship/Alien Status; 4. Household Size/Composition; 5. Enumeration; 6. Gross Non-exempt Income."
rules:
  - name: mandatory_verifications_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-1
    versions:
      - effective_from: '2022-03-01'
        formula: |-
          identity_verification_provided
          and (household_is_categorical_eligible or residency_verification_provided)
          and citizenship_or_alien_status_verification_provided
          and household_size_or_composition_verification_provided
          and enumeration_verification_provided
          and gross_non_exempt_income_verification_provided

  - name: denial_required_for_missing_mandatory_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 435.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-1
    versions:
      - effective_from: '2022-03-01'
        formula: |-
          application_recertification_or_change_pending
          and not mandatory_verifications_provided
