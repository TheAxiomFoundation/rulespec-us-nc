- name: all verifications provided by due day triggers five day receipt processing
    rule
  period:
    period_kind: custom
    name: day
    start: '2021-11-16'
    end: '2021-11-16'
  input:
    ? us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.normal_application_missing_required_or_mandatory_verifications
    : true
    ? us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.all_requested_verifications_provided_by_dss_8650_due_day
    : true
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.processing_is_within_five_days_of_receipt: true
    ? us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.processing_is_no_later_than_normal_application_deadline
    : true
  output:
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#dss_8650_response_period_days: 10
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#process_after_verification_event_limit_days: 5
    ? us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#all_verifications_provided_by_due_day_process_deadline_applies
    : holds
- name: required and mandatory returned with partial non required triggers expiration
    processing rule
  period:
    period_kind: custom
    name: day
    start: '2021-11-16'
    end: '2021-11-16'
  input:
    ? us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.normal_application_missing_required_or_mandatory_verifications
    : true
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.all_required_and_mandatory_verifications_returned: true
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.non_required_verifications_are_none_or_partial: true
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.dss_8650_response_period_expired: true
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.processing_is_within_five_days_of_dss_8650_expiration: true
    ? us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.processing_is_no_later_than_normal_application_deadline
    : true
  output:
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#required_and_mandatory_returned_process_deadline_applies: holds
- name: missing required or mandatory verification requires denial on due date
  period:
    period_kind: custom
    name: day
    start: '2021-11-16'
    end: '2021-11-16'
  input:
    ? us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.normal_application_missing_required_or_mandatory_verifications
    : true
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.dss_8650_due_date_reached: true
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#input.all_required_and_mandatory_verifications_returned: false
  output:
    us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-5#deny_for_failure_to_provide_information_on_due_date_applies: holds
- name: new dss 8650 additional response period depends on new or changed information
  period:
