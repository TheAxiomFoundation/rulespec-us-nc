format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
  summary: '"The DSS-8650 requests information that is specific to the applicant household''s
    situation and allows the applicant household 10 calendar days to provide the verification."
    "The FNS unit must be given the full 10 calendar days to provide verifications.
    Do not dispose the application prior to the expiration of the 10 calendar days."
    For normal applications missing non-required verifications, allow 10 calendar
    days and, when information is provided or not returned, process within five days
    subject to the FNS 420 deadline.'
rules:
- name: processing_after_receipt_or_expiration_days
  kind: parameter
  dtype: Count
  source: FNS 435.04(A)(2)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
          excerpt: process application within five (5) days of receipt
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
          excerpt: within five (5) days of expiration of the DSS-8650
  versions:
  - effective_from: '2021-11-15'
    formula: '5'
- name: dss_8650_required_for_missing_verifications
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: FNS 435 page 4, second DSS-8650 request; FNS 435.04(A)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
  versions:
  - effective_from: '2021-11-15'
    formula: application_has_missing_verifications
- name: full_verification_response_period_provided
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: FNS 435(B)-(C); FNS 435.04(A)(1)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-415-interviewing/page-7#verification_response_period_days
          output: verification_response_period_days
          hash: sha256:a6621736c97a6e24b85d22cd97c212cacbeb1c83a5f7a2868191f49a100e5832
  versions:
  - effective_from: '2021-11-15'
    formula: days_allowed_to_provide_verification >= verification_response_period_days
- name: application_may_be_disposed_after_notice_period
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: FNS 435(C)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-415-interviewing/page-7#verification_response_period_days
          output: verification_response_period_days
          hash: sha256:a6621736c97a6e24b85d22cd97c212cacbeb1c83a5f7a2868191f49a100e5832
  versions:
  - effective_from: '2021-11-15'
    formula: days_since_dss_8650_provided >= verification_response_period_days
- name: normal_application_with_missing_non_required_information_processed_timely
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: FNS 435.04(A)(2)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
      - path: versions[0].formula
        kind: import
        import:
          target: us-nc:policies/dhhs/fns/fns-435-determining-eligibility/page-4#processing_after_receipt_or_expiration_days
          output: processing_after_receipt_or_expiration_days
          hash: sha256:local
  versions:
  - effective_from: '2021-11-15'
    formula: 'normal_application_missing_only_non_required_information

      and processing_occurs_no_later_than_fns_420_deadline

      and ((non_required_information_provided and days_from_receipt_to_processing
      <= processing_after_receipt_or_expiration_days) or (not non_required_information_provided
      and days_from_dss_8650_expiration_to_processing <= processing_after_receipt_or_expiration_days))'
- name: late_verification_treated_as_change_in_situation
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: FNS 435.04(A)(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-435-determining-eligibility/page-4
  versions:
