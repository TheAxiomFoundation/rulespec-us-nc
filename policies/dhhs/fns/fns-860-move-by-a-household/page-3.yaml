format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-860-move-by-a-household/page-3
  summary: |-
    "The county may choose to transfer a claim to another state when a household moves to another state before a claim is completely paid. The other state must agree to accept the claim before it is transferred." "The claim status must be CO in order to be transferred." "Do not transfer pending referrals to another state." "A county may choose to terminate a claim if the household moves from North Carolina and cannot be located."
rules:
  - name: claim_transfer_to_another_state_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 860, Move By A Household, items 2-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-860-move-by-a-household/page-3
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-860-move-by-a-household/page-3
              excerpt: "Change # 3-2006 Jul ... y 1, 2006"
    versions:
      - effective_from: '2006-07-01'
        formula: |-
          household_moves_to_another_state
          and claim_is_not_completely_paid
          and other_state_agrees_to_accept_claim
          and claim_status_is_co
          and not pending_referral_to_another_state
  - name: claim_termination_available_when_household_unlocated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 860, Move By A Household, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-860-move-by-a-household/page-3
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-860-move-by-a-household/page-3
              excerpt: "Change # 3-2006 Jul ... y 1, 2006"
    versions:
      - effective_from: '2006-07-01'
        formula: |-
          household_moves_from_north_carolina
          and household_cannot_be_located
