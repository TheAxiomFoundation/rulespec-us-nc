    corpus_citation_path: us-nc/manual/dhhs/fns/fns-860-move-by-a-household/page-1
  summary: |-
    "Special procedures for establishing and collecting claims apply when the household moves to or from another county or state. The county where the overissuance is discovered or an investigation is started is responsible for establishing the claim and ensuring that it is properly entered in EPICS. Do not transfer a referral prior to establishment." For moves within North Carolina, participating-household claims are transferred to the county where the casehead is currently receiving benefits; non-participating-household claims may be transferred only after address verification and acceptance by the new county.
