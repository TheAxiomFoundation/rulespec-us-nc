format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
  summary: |-
    "Enter all trafficking referrals from a charge letter with a referral type 'PI Trafficking Investigation' in NC FAST." "The amount of the overissuance is the amount of the benefits trafficked." "Trafficking claims may be determined by the individual's admission, adjudication, or documentation that demonstrates trafficking." "Do not base a trafficking claim solely on the FNS charge letter." "The Charge Letter's investigation time period is around 6 months, however trafficking investigations still fall under the 6-year FNS rule."
rules:
  - name: trafficking_referral_from_charge_letter_requires_pi_trafficking_investigation_type
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 830, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          referral_is_from_charge_letter
          and referral_type_is_pi_trafficking_investigation
  - name: trafficking_claim_supported_basis
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 830, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          individual_admitted_trafficking
          or trafficking_adjudicated
          or (documentation_demonstrates_trafficking and not documentation_is_only_fns_charge_letter)
  - name: overissuance_amount_for_trafficking_claim
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 830, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          benefits_trafficked_amount
  - name: trafficking_investigation_maximum_lookback_years
    kind: parameter
    dtype: Count
    period: Year
    source: FNS 830.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
              excerpt: "trafficking investigations still fall under the 6-year FNS rule"
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          6
  - name: initial_store_transaction_review_years
    kind: parameter
    dtype: Count
    period: Year
    source: FNS 830.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
              excerpt: "Run the EBT transactions for the store for 1 year from the date the store was disqualified."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          1
  - name: extended_store_transaction_review_years
    kind: parameter
    dtype: Count
    period: Year
    source: FNS 830.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
              excerpt: "run the store's transaction for the previous 2 years"
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          2
  - name: online_ebt_data_retention_months
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 830, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
              excerpt: "Data is maintained on-line for three months."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          3
  - name: archived_ebt_data_must_be_obtained_through_data_warehouse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 830, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          ebt_data_is_older_than_online_retention_period
  - name: claim_established_in_recipient_benefit_local_agency
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 830.05(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          recipient_received_fns_benefits_in_local_agency_at_time_trafficking_occurred
          and claim_is_established_in_that_local_agency
