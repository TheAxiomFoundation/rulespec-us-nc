    corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-3
  summary: |-
    As each recipient is determined to be possibly trafficking, create a referral in NC FAST within 2 business days and do not enter a Date of Discovery into NC FAST. Do not enter a referral if it is determined another local agency will be establishing the claim. Search EBT transactions for trafficking activity, create a case file for evidence, attempt to interview the recipient, and complete DSS-1682 to establish the claim and disqualification.
