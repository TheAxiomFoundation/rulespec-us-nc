format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-1
  summary: |-
    830.01 GENERAL POLICY. Trafficking is the buying or selling of Food and Nutrition Services (FNS) benefits for cash or consideration other than eligible food; or the exchange of benefits for firearms, ammunition, explosives or controlled substances; or the attempt to buy or sell FNS benefits online and in public; or the reselling of food purchased with FNS benefits; or the purchasing of a product with FNS benefits that has a container requiring a return deposit with the intent of obtaining cash by discarding the product and returning the container for the deposit amount. Misuse of benefits is allowing someone outside the authorized FNSU to use FNS benefits and the FNSU does not benefit in return.
    830.02-830.03. Refer indications of suspicious retailer behavior in EBT records or complaints concerning retailers to the NC Division of Child and Family Well Being; do not conduct retailer investigations.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-1#recipient_trafficking_claim_established_as_ipv
      reason: The source directs use of Section 820, Intentional Program Violation Claims, to establish recipient trafficking claims as IPV when there is clear and convincing evidence; Section 820 is not available in copied context.
    - output: us-nc:policies/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-1#person_disqualified_for_misuse_of_benefits
      reason: The source directs use of Section 825, Intentional Program Violation Disqualifications, to establish disqualification for misuse of benefits when there is clear and convincing evidence; Section 825 is not available in copied context.
rules:
  - name: fns_benefit_trafficking
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: FNS 830.01 General Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-1
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          fns_benefits_bought_or_sold_for_cash
          or fns_benefits_bought_or_sold_for_consideration_other_than_eligible_food
          or fns_benefits_exchanged_for_firearms_ammunition_explosives_or_controlled_substances
          or fns_benefits_attempted_to_be_bought_or_sold_online_and_in_public
          or food_purchased_with_fns_benefits_resold
          or product_with_return_deposit_purchased_with_fns_benefits_to_obtain_cash_from_container_deposit
  - name: fns_benefit_misuse
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: FNS 830.01 General Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-1
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          person_outside_authorized_fnsu_allowed_to_use_fns_benefits
          and not fnsu_benefits_in_return
  - name: suspected_retailer_fraud_referral_required
    kind: derived
    entity: Business
    dtype: Judgment
    period: Day
    source: FNS 830.02; FNS 830.03(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-830-ebt-recipient-and-retailer-fraud/page-1
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          suspected_retailer_fraud_identified_from_source_other_than_usda_charge_letter
          and (suspicious_retailer_behavior_indicated_by_ebt_records or retailer_complaint_received_from_public_or_recipient)
