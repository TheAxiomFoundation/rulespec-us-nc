format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-6
  summary: |-
    If required verification is unavailable from the client, calculate overissuance using wage match or other readily available sources; do not establish a claim if verification cannot be obtained from any source; do not terminate or deny future participation because the claim cannot be established due to failure or refusal to cooperate; client participation in interviews is voluntary; establish a claim without a client interview when evidence is clear and convincing.
rules:
  - name: overissuance_calculation_from_readily_available_sources_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810.04, client unable/unwilling or refusal to cooperate verification actions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-6
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          client_unable_or_unwilling_to_provide_required_verification
          and readily_available_source_verifies_information

  - name: claim_establishment_prohibited_when_verification_unavailable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810.04, verification cannot be obtained from any source
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-6
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          verification_cannot_be_obtained_from_any_source

  - name: termination_or_future_participation_denial_prohibited_for_unestablished_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810.04, claim cannot be established due to failure/refusal to cooperate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-6
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_cannot_be_established_due_to_third_party_or_client_failure_or_refusal_to_cooperate

  - name: household_ineligibility_for_suspected_overissuance_months_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810.04.B, client failure/refusal to cooperate with investigator
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-6
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          client_fails_or_refuses_to_provide_verification_or_authorize_third_party_release

  - name: claim_establishment_without_client_interview_authorized
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810.05.C, client does not keep appointment and evidence is clear and convincing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-6
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          client_does_not_keep_interview_or_home_visit_appointment
          and evidence_is_clear_and_convincing_to_prove_overissuance
