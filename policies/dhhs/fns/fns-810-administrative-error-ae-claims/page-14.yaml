  summary: |-
    Terminated claims may be reactivated if a new collection method or specific event increases the likelihood of collection; EPICS automatically reactivates a claim when TOP, DOR, NCEL, or recoupment is posted. Overcollections are refunded by collection type: recoupment in restored benefits, cash payments in cash, tax intercept by the State Controller's Office, and expunged benefits are not restored. Written deletion requests are faxed to the State Office when a claim is invalidated by hearing or court, or entered in EPICS in error; claims with payment history, disqualification, or TOP-certified debtors cannot be deleted but may be adjusted and closed.
  reason: |-
    The operative legal subject is an administrative FNS claim and claim-management actions in EPICS. The supported RuleSpec entities do not include a claim or administrative claim entity, and encoding these provisions on Household, Payment, or Person would change the source-stated legal subject.
