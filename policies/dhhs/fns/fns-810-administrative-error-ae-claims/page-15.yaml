    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-15
  summary: |-
    Request an adjustment closure of claim when all debtors are deceased at least six months and the estate is exhausted or absent, all debtors' bankruptcy has discharged the debt, the system will not allow deletion under 810.08 A.4, or all debtors are in a nursing home and unlikely to pay. Deletion or closure requests must include specified claim identifiers, balances, signatures, applicable death date, and justification. AE claim records follow Section 135 retention except the last payment paying the claim in full is the last transaction date; AE records may be electronic.
