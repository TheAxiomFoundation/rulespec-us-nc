format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
  summary: |-
    Change #3, September 20, 2017. The FNS unit may give written permission on the DSS-8217 in advance for EBT debits and may revoke the agreement at any time. The DSS-8217 must state the payment amount, frequency, and covered period. Within 10 calendar days after written or oral permission, give or mail the recipient a DSS-8217 copy noting the debit amount and date and claim balance. Stale EBT benefits may repay an outstanding claim after no debit activity for six months; the FNS unit receives written notice and ten workdays to object; if it objects, do not process the debit.
rules:
  - name: dss_8217_copy_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 810, page 11, item 4(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
              excerpt: "Within 10 calendar days of obtaining the FNS unit's written or oral permission"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: stale_ebt_account_inactivity_months
    kind: parameter
    dtype: Count
    source: FNS 810, page 11, item 5(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
              excerpt: "no debit activity on an EBT account for six (6) months"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          6

  - name: stale_ebt_objection_period_workdays
    kind: parameter
    dtype: Count
    source: FNS 810, page 11, item 5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
              excerpt: "Give the FNS unit ten workdays to object"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: stale_ebt_account_debit_may_be_processed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810, page 11, item 5(a)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
              excerpt: "Stale EBT benefits may be used to repay an outstanding claim balance"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
              excerpt: "there has been no debit activity on an EBT account for six (6) months"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
              excerpt: "Give or mail the FNS unit written notification"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-11
              excerpt: "If the FNS unit objects to the EBT account debit, do not process the debit."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          months_without_debit_activity_on_ebt_account >= stale_ebt_account_inactivity_months
          and outstanding_fns_claim_balance_exists
          and written_notification_of_intent_to_apply_ebt_benefits_given_or_mailed_to_fns_unit
          and workdays_given_to_object_to_stale_ebt_debit >= stale_ebt_objection_period_workdays
          and not fns_unit_objects_to_stale_ebt_account_debit
