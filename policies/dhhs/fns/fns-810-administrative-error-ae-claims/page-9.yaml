format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
  summary: |-
    "NC FAST automatically begins an allotment reduction when the last cash payment date in EPICS is more than 60 days old." Participating households avoiding recoupment must agree to pay more than "10% of the allotment or $10, whichever is greater." For nonparticipating households, the DSS-8554 requires return of the signed notice within ten days, fair-hearing requests are limited to claim amount or paid-in-full disputes and not allowed past the 90th day, and post-hearing/remand DSS-8658 actions follow the stated ten-day contest windows.
rules:
  - name: epics_last_cash_payment_age_threshold_days
    kind: parameter
    dtype: Integer
    source: FNS 810 page 9, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "more than 60 days old"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          60

  - name: participating_cash_payment_allotment_share_threshold
    kind: parameter
    dtype: Rate
    source: FNS 810 page 9, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "more than 10% of the allotment"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          0.10

  - name: participating_cash_payment_minimum_dollar_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 810 page 9, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "$10, whichever is greater"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: dss_8554_signed_notice_return_deadline_days
    kind: parameter
    dtype: Integer
    source: FNS 810 page 9, C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "return the signed notice within ten days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: dss_8554_fair_hearing_request_deadline_days
    kind: parameter
    dtype: Integer
    source: FNS 810 page 9, C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "Do not allow a Fair Hearing request past the 90th day"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          90

  - name: fair_hearing_decision_contest_wait_days
    kind: parameter
    dtype: Integer
    source: FNS 810 page 9, C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "Mail DSS-8658 after the 10th day"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: remand_decision_contest_period_days
    kind: parameter
    dtype: Integer
    source: FNS 810 page 9, C.2 remand instructions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "does not contest the decision within 10 calendar days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: nc_fast_automatic_allotment_reduction_begins
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "last cash payment date in EPICS is more than 60 days old"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          days_since_last_cash_payment_in_epics > epics_last_cash_payment_age_threshold_days

  - name: recoupment_prevented_by_epics_appeal_indicator
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, items 4 and C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "Upon a request for a Fair Hearing, enter an 'X' in the Appeal Indicator field"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          fair_hearing_requested
          and epics_appeal_indicator_x_entered

  - name: participating_cash_payment_agreement_threshold
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 810 page 9, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "10% of the allotment or $10, whichever is greater"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          max(monthly_allotment * participating_cash_payment_allotment_share_threshold, participating_cash_payment_minimum_dollar_threshold)

  - name: participating_cash_payment_agreement_satisfies_recoupment_alternative
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "must agree to pay more than 10% of the allotment or $10"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          participating_household
          and agreed_cash_payment_amount > participating_cash_payment_agreement_threshold

  - name: recoupment_should_not_take_place_for_cash_payment_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "a 'C' is entered as the method of payment"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          participating_household
          and epics_method_of_payment_c_entered

  - name: further_collection_action_should_be_initiated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, C.1 and C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "If the notice is not returned by the deadline, initiate further collection action"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          nonparticipating_household
          and not dss_8554_signed_notice_returned
          and not fair_hearing_requested
          and days_since_dss_8554_notice > dss_8554_signed_notice_return_deadline_days

  - name: nonparticipating_fair_hearing_request_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "may only request a Fair Hearing if it disagrees"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          nonparticipating_household
          and fair_hearing_requested
          and (household_disagrees_with_claim_amount or claim_previously_paid_in_full)
          and days_since_dss_8554_notice <= dss_8554_fair_hearing_request_deadline_days

  - name: collection_action_must_cease_after_fair_hearing_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "Cease all collection action once a Fair Hearing is requested"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          nonparticipating_household
          and fair_hearing_requested

  - name: dss_8658_must_be_mailed_after_uncontested_fair_hearing_decision
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "Mail DSS-8658 after the 10th day"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          nonparticipating_household
          and local_agency_verified_debtor_did_not_contest_fair_hearing_decision
          and days_since_fair_hearing_decision > fair_hearing_decision_contest_wait_days

  - name: overissuance_must_be_recalculated_after_remand
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, C.2 remand instructions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "The local agency should recalculate the overissuance"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          nonparticipating_household
          and fair_hearing_decision_remanded_to_local_agency

  - name: post_remand_dss_8658_must_be_sent
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810 page 9, C.2 remand instructions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-9
              excerpt: "within 10 calendar days, the local agency must send a DSS-8658"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          nonparticipating_household
          and fair_hearing_decision_remanded_to_local_agency
          and local_agency_verified_debtor_did_not_contest_remand_decision
          and days_since_remand_decision > remand_decision_contest_period_days
