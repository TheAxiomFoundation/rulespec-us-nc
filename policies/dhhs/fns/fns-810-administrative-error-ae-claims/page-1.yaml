format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
  summary: |-
    "Agency Error claims are federal debts and must be collected." "A claim must be established within 12 months from the date the referral was created in Enterprise Program Integrity Control System (EPICS)." "Establish a claim for any months of overissuance which occurred within six years prior to the Date of Discovery." "Enter established claims in EPICS before the 180th day or close unsubstantiated referrals in EPICS before the 180th day." "Create a referral ... within 10 business days." "Request all necessary verifications within 30 calendar days." "Allow 30 calendar days for the return of the requested verification."
rules:
  - name: claim_establishment_deadline_months
    kind: parameter
    dtype: Count
    source: FNS 810.01 A
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "A claim must be established within 12 months"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          12

  - name: overissuance_lookback_limit_years
    kind: parameter
    dtype: Count
    source: FNS 810.01 B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "within six years prior to the Date of Discovery"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          6

  - name: epics_referral_timeliness_limit_days
    kind: parameter
    dtype: Count
    source: FNS 810.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "before the 180th day"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          180

  - name: overdue_referral_age_threshold_days
    kind: parameter
    dtype: Count
    source: FNS 810.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "referrals in a local agency are more than 180 days old"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          180

  - name: untimely_referral_share_corrective_action_threshold
    kind: parameter
    dtype: Rate
    source: FNS 810.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "more than 10% of referrals"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          0.10

  - name: referral_creation_deadline_business_days
    kind: parameter
    dtype: Count
    source: FNS 810.01 D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "within 10 business days of detection"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: verification_request_target_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 810.01 D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "within 30 calendar days of the receipt of the referral"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          30

  - name: verification_return_allowance_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 810.01 D.3
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Change #3-2017 September 20, 2017"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-1
              excerpt: "Allow 30 calendar days for the return"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          30
