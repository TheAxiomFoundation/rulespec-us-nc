format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
  summary: |-
    Request removal of the TOP and DOR blocks once the hearing decision is received and document in EPICS. Fax a request with two signatures to 919-334-1265, to the State Office/Attn: Program Integrity. Mail DSS-8658, Post Hearing Repayment Notice after the 10th day once the local agency has verified the debtor did not contest the Fair Hearing decision. Do not allow a Fair Hearing past the 90th day as written on the DSS-8554. If the debtor does not contest the remand decision within 10 calendar days, the local agency must send a DSS-8658, Post Hearing Repayment Agreement. A debtor may not appeal the DSS-8658 after a claim has been remanded back to the local agency.
rules:
  - name: fair_hearing_request_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 810 Administrative Error Claims, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
              excerpt: Do not allow a Fair Hearing past the 90th day as written on the DSS-8554.
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          90

  - name: fair_hearing_request_within_dss_8554_deadline
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 810 Administrative Error Claims, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
              excerpt: Do not allow a Fair Hearing past the 90th day as written on the DSS-8554.
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
              excerpt: 90th day
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          days_since_letter_of_overissuance <= fair_hearing_request_deadline_calendar_days

  - name: post_hearing_contest_window_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 810 Administrative Error Claims, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
              excerpt: If the debtor does not contest the decision within 10 calendar days
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: post_hearing_repayment_agreement_required_after_remand
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 810 Administrative Error Claims, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
              excerpt: If the debtor does not contest the decision within 10 calendar days
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          fair_hearing_decision_remanded_back_to_local_agency
          and local_agency_verified_debtor_did_not_contest_remand_decision
          and days_since_remand_decision > post_hearing_contest_window_calendar_days

  - name: dss_8658_appeal_bar_after_remand_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 810 Administrative Error Claims, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_has_been_remanded_back_to_local_agency

  - name: top_dor_block_removal_request_required_signatures
    kind: parameter
    dtype: Count
    source: FNS 810 Administrative Error Claims, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
              excerpt: Fax a request with two signatures
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          2

  - name: top_dor_block_removal_request_procedure_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 810 Administrative Error Claims, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-8
              excerpt: Fax a request with two signatures
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          hearing_decision_received
          and top_dor_block_removal_request_signature_count >= top_dor_block_removal_request_required_signatures
          and top_dor_block_removal_request_documented_in_epics
