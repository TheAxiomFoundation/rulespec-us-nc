format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  summary: For each month of the overissuance, verify each source of changed income
    unless previously verified and not acted on. Use actual income, do not convert.
    Use DES wage match when actual wages are not available; use gross quarterly income
    divided by three months, or if employment was less than three months, average
    over the period between start and stop dates. Include dependent care expenses
    as a deduction; allow the actual amount the FNS unit is responsible for paying.
    Means-tested assistance intended for the overissued month is counted for that
    month; other income is counted in the month received. For mailed payments, add
    three calendar days mailing time. Count actual Work First, SSI, RSDI, or VA received
    even if erroneous. Do not include lump-sum income unless it includes the current
    month's benefit payment.
rules:
- name: des_quarter_month_count
  kind: parameter
  dtype: Count
  source: FNS 810 Administrative Error Claims, page 4, DES wage match averaging
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
          excerpt: gross quarterly income, divided by three months
  versions:
  - effective_from: '2017-09-20'
    formula: '3'
- name: mailed_payment_mailing_time_days
  kind: parameter
  dtype: Count
  source: FNS 810 Administrative Error Claims, page 4, mailed payments
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
          excerpt: add three calendar days mailing time
  versions:
  - effective_from: '2017-09-20'
    formula: '3'
- name: des_average_monthly_wages_for_overissuance
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 810 Administrative Error Claims, page 4, DES wage match averaging
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
          excerpt: Use the gross quarterly income, divided by three months
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
          excerpt: If the employment was less than three months, average the gross
            amount over the period
  versions:
  - effective_from: '2017-09-20'
    formula: 'if employment_was_less_than_three_months: des_gross_income_for_employment_period
      / months_between_employment_start_and_stop else: des_gross_quarterly_income
      / des_quarter_month_count'
- name: dependent_care_deduction_for_overissuance
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 810 Administrative Error Claims, page 4, subsection E
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  versions:
  - effective_from: '2017-09-20'
    formula: actual_dependent_care_cost_fns_unit_responsible_for_paying
- name: means_tested_assistance_income_counted_for_overissued_month
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 810 Administrative Error Claims, page 4, subsection F
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  versions:
  - effective_from: '2017-09-20'
    formula: means_tested_state_and_federal_assistance_payment_intended_for_overissued_month
- name: other_income_counted_for_overissued_month
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 810 Administrative Error Claims, page 4, subsection F
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  versions:
  - effective_from: '2017-09-20'
    formula: other_income_received_in_month
- name: work_first_ssi_rsdi_or_va_income_counted_for_overissuance
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 810 Administrative Error Claims, page 4, subsection H
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  versions:
  - effective_from: '2017-09-20'
    formula: actual_work_first_ssi_rsdi_or_va_received
- name: lump_sum_income_included_in_overissuance_computation
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 810 Administrative Error Claims, page 4, subsection I
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  versions:
  - effective_from: '2017-09-20'
    formula: 'if lump_sum_includes_current_month_benefit_payment: lump_sum_current_month_benefit_payment_portion
      else: 0'
- name: overissuance_changed_income_source_verification_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 810 Administrative Error Claims, page 4, subsection C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  versions:
  - effective_from: '2017-09-20'
    formula: 'income_source_changed_for_month_of_overissuance

      and not income_source_previously_verified_and_not_acted_on'
- name: actual_changed_income_used_without_conversion
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 810 Administrative Error Claims, page 4, subsection C
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-4
  versions:
  - effective_from: '2017-09-20'
    formula: actual_changed_income
