format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
  summary: |-
    "The agency is required to act on changes within ten calendar days after the date the change becomes known." The agency must allow "ten working days' Notice of Adverse Action." For IEVS matches, the agency must act and, if appropriate, issue a Notice of Adverse Action "within 30 calendar days from the date of the match." For overissuance, verify participation, do not include months in which the household did not participate, and the claim amount is "the difference between the correct allotment and the allotment the household received."
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-810-administrative-error-ae-claims/page-3#reported_change_reaction_required
      reason: The source directs the agency to refer to FNS Manual Sections 450 and 550 to determine whether it is necessary to react to a change, but those cited sources are not available in copied context.
    - output: us-nc:policies/dhhs/fns/fns-810-administrative-error-ae-claims/page-3#adverse_action_notice_exception_applies
      reason: The source directs the agency to see exceptions to adverse action requirements in Section 635, Notices, but that cited source is not available in copied context.
    - output: us-nc:policies/dhhs/fns/fns-810-administrative-error-ae-claims/page-3#des_uib_match_requires_notice_of_adverse_action
      reason: The source requires following policy at the time of overissuance to determine whether DES/UIB matches would have been a reason to issue a Notice of Adverse Action or were verified upon receipt; the cited and time-specific policy is not available in copied context.
rules:
  - name: agency_change_action_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 810.03, page 3, change action timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "within ten calendar days after the date the change becomes known"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: adverse_action_notice_period_working_days
    kind: parameter
    dtype: Integer
    source: FNS 810.03, page 3, adverse action notice timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "ten working days' Notice of Adverse Action"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: ievs_match_action_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 810.03, page 3, Special Requirements for IEVS Data
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "within 30 calendar days from the date of the match"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          30

  - name: agency_act_on_reported_change_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 810.03, page 3, reported change action timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "within ten calendar days after the date the change becomes known"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-810-administrative-error-ae-claims/page-3#agency_change_action_deadline_calendar_days
              output: agency_change_action_deadline_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          calendar_days_after_reported_change_became_known <= agency_change_action_deadline_calendar_days

  - name: agency_allows_required_adverse_action_notice_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 810.03, page 3, Notice of Adverse Action timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "must allow the ten working days' Notice of Adverse Action"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-810-administrative-error-ae-claims/page-3#adverse_action_notice_period_working_days
              output: adverse_action_notice_period_working_days
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          adverse_action_notice_working_days_allowed >= adverse_action_notice_period_working_days

  - name: agency_act_on_ievs_match_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 810.03, page 3, Special Requirements for IEVS Data
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "within 30 calendar days from the date of the match"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-810-administrative-error-ae-claims/page-3#ievs_match_action_deadline_calendar_days
              output: ievs_match_action_deadline_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          calendar_days_after_ievs_match <= ievs_match_action_deadline_calendar_days

  - name: ievs_failure_claim_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 810.03, page 3, Special Requirements for IEVS Data
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "Failure by the agency to act results in a claim beginning the month following the month the Notice of Adverse Action would have expired."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          agency_failed_to_act_on_ievs_match
          and month_is_month_following_month_notice_of_adverse_action_would_have_expired

  - name: administrative_error_claim_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 810.03, page 3, Determining the Overissuance Amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "Do not include in the claim calculation any months in which the household did not participate."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-810-administrative-error-ae-claims/page-3
              excerpt: "The claim amount is the difference between the correct allotment and the allotment the household received."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if household_participated_in_month: max(0, allotment_household_received - correct_allotment) else: 0
