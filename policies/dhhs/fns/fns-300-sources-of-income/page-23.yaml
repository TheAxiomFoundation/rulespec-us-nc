        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
              excerpt: "Title VII Funds N -- --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_title_vii_funds

  - name: title_xx_funds_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 23, Title XX Funds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
              excerpt: "Title XX Funds N -- --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_title_xx_funds

  - name: tobacco_allotment_settlement_buyout_compensation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 23, Tobacco Allotment Settlement Buy-out
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
              excerpt: "Compensation received as cash payments as a result of the elimination of the tobacco quota or allotment system."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_cash_compensation_from_elimination_of_tobacco_quota_or_allotment_system

  - name: tobacco_allotment_settlement_buyout_countable_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 23, Tobacco Allotment Settlement Buy-out
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
              excerpt: "Include as earned income if paid in annual payments. Y E --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          tobacco_allotment_settlement_buyout_compensation
          and payment_is_paid_in_annual_payments
