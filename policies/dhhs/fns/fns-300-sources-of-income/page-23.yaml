format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
  summary: |-
    Title V of the Older Americans Act Funds ... N -- --. Title VII Funds N -- --. Title XX Funds N -- --. Tobacco Allotment Settlement Buy-out ... Include as earned income if paid in annual payments. Y E --.
rules:
  - name: title_v_older_americans_act_funds_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 23, Title V of the Older Americans Act Funds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
              excerpt: "Title V of the Older Americans Act Funds ... N -- --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_title_v_older_americans_act_funds

  - name: title_v_older_americans_act_scsep_funds_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 23, Title V funds including SCSEP
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
              excerpt: "Includes, but not limited to, Senior Community Service Employment Program (SCSEP)"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_senior_community_service_employment_program_funds

  - name: title_v_older_americans_act_named_organization_funds_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 23, organizations receiving Title V funds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
              excerpt: "Some organizations receiving these funds are but not limited to"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_from_organization_receiving_title_v_older_americans_act_funds

  - name: title_v_older_americans_act_payment_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 23, Title V of the Older Americans Act Funds
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-23
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          title_v_older_americans_act_funds_excluded
          or title_v_older_americans_act_scsep_funds_excluded
          or title_v_older_americans_act_named_organization_funds_excluded

  - name: title_vii_funds_excluded
    kind: derived
