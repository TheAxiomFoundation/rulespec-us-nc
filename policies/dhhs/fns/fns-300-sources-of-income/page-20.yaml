format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
  summary: |-
    FNS 300 page 20 income-source entries include: severance pay countable as unearned income; shared expenses not countable, with pass-through-payment exceptions noted; sick pay countable as earned income; Social Security benefits countable as unearned income, with gross Social Security counted when reduced by federal offset to repay a federal debt; Special Assistance demonstration project income countable as unearned income; and special government compensation including Alaska Native Claims Settlement Act payments not countable.
rules:
  - name: severance_pay_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 20, severance pay entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_severance_pay

  - name: shared_expenses_counted_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 20, shared expenses entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
              excerpt: "Shared Expenses (See pass-through payments for exceptions) N --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_shared_expense
          and pass_through_payment_exception_applies

  - name: sick_pay_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 20, sick pay entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_sick_pay

  - name: social_security_benefit_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 20, Social Security Benefits entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_social_security_benefit

  - name: countable_social_security_benefit_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 300 Sources of Income, page 20, Social Security Benefits note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
              excerpt: "Count the gross amount of the social security benefit if the benefits are reduced due to federal offset"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_social_security_benefit and benefit_reduced_by_federal_offset_to_repay_federal_debt: gross_social_security_benefit_amount else: if payment_is_social_security_benefit: social_security_benefit_amount_received else: 0

  - name: special_assistance_demonstration_project_income_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 20, Special Assistance Demonstration Project Income entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_special_assistance_demonstration_project_income

  - name: alaska_native_claims_settlement_act_payment_counted_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 20, Special Government Compensation entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-20
              excerpt: "Special Government Compensation Includes but not limited to payments from: • Alaska Native Claims Settlement Act N --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_alaska_native_claims_settlement_act_payment
          and special_government_compensation_counting_exception_applies
