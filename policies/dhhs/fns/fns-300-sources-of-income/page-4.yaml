                row: Cafeteria Plans and Flexible Benefits
                column: type
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_countable_fns_income
          and payment_is_cafeteria_plan_or_flexible_benefit
          and cafeteria_plan_or_flexible_benefit_is_countable_under_section_315_05
  - name: fns_countable_income_amount
    kind: derived
    entity: Payment
    dtype: Money
