          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Census Income (Permanent Employees)
                column: type
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Census Income (Temporary Employees)
                column: type
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_countable_fns_income
          and (payment_is_boarders_income
          or payment_is_bonus_pay
          or payment_is_capital_gain
          or payment_is_census_income_for_permanent_employee
          or payment_is_census_income_for_temporary_employee)
