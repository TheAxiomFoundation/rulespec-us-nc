format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
  summary: |-
    Boarders income is listed as Y and earned; bonus pay is Y and earned; BIA educational aid is N; cafeteria plans and flexible benefits are N/Y and unearned; campaign contributions are N; capital gains are Y and earned; census income for permanent and temporary employees is Y and earned.
rules:
  - name: payment_is_countable_fns_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Boarders
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Bonus Pay
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Capital Gains
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
