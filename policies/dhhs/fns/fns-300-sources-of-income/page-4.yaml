              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Census Income (Temporary Employees)
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Bureau of Indian Affairs (BIA) Educational Aid
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Campaign Contributions
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-4
              table:
                header: FNS 300 Sources of Income
                row: Cafeteria Plans and Flexible Benefits
                column: countable
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_boarders_income
          or payment_is_bonus_pay
          or payment_is_capital_gain
          or payment_is_census_income_for_permanent_employee
          or payment_is_census_income_for_temporary_employee
          or (payment_is_cafeteria_plan_or_flexible_benefit and cafeteria_plan_or_flexible_benefit_is_countable_under_section_315_05)
  - name: payment_is_earned_fns_income
    kind: derived
    entity: Payment
    dtype: Judgment
