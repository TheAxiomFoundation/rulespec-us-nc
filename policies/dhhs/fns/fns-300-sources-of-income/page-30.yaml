format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-30
  summary: |-
    Page 30 lists Indian tribal and settlement payment categories, including Keweenaw Bay Indian Community per capita payments; Lac Courte Oreilles, Lac du Flambeau, Lower Brule Sioux, Maine Indian Claims Settlement Act, Miccosukee per capita payments of $2,000 or less, Navajo payments and relocation assistance, Puyallup Settlement Act funds, Seminole per capita payments of $2,000 or less, Seneca Nation Settlement Act funds, and White Earth payments.
rules:
  - name: miccosukee_per_capita_payment_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 300 Sources of Income, page 30, Miccosukee entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-30
              excerpt: "Miccosukee Tribe of Indians of Florida (Per Capita Payments of $2,000 or Less)"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          2000
  - name: old_age_assistance_heirs_per_capita_share_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 300 Sources of Income, page 30, Old Age Assistance Claims Settlement Act entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-30
              excerpt: "Old Age Assistance Claims Settlement Act Payments to Heirs (Per Capita Shares of $2,000 or Less)"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          2000
  - name: seminole_nation_oklahoma_per_capita_payment_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 300 Sources of Income, page 30, Seminole Nation of Oklahoma entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-30
              excerpt: "Seminole Nation of Oklahoma Per Capita Payments (Per Capita Payments of $2,000 or Less)"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          2000
  - name: seminole_tribe_florida_per_capita_payment_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 300 Sources of Income, page 30, Seminole Tribe of Florida entry
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-30
              excerpt: "Seminole Tribe of Florida (Per Capita Payments of $2,000 or Less)"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          2000
  - name: listed_tribal_or_settlement_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 30, listed payment entries
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-30
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-30
              excerpt: "Per Capita Payments of $2,000 or Less"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_keweenaw_bay_indian_community_per_capita
          or payment_is_lac_courte_oreilles_band_lake_superior_chippewa_per_capita
          or payment_is_lac_du_flambeau_reservation_per_capita
          or payment_is_lower_brule_sioux_tribe_payment
          or payment_is_maine_indian_claims_settlement_act_payment
          or (payment_is_miccosukee_tribe_of_indians_of_florida_per_capita and payment_amount <= miccosukee_per_capita_payment_limit)
          or payment_is_mille_lac_reservation_minnesota_per_capita
          or payment_is_minnesota_chippewa_tribe_payment
          or payment_is_navajo_tribe_payment
          or payment_is_navajo_relocation_assistance_payment
          or payment_is_nett_lake_reservation_per_capita
          or payment_is_oglala_sioux_tribe_payment
          or (payment_is_old_age_assistance_claims_settlement_act_payment_to_heir and payment_amount <= old_age_assistance_heirs_per_capita_share_limit)
          or payment_is_papago_tribe_of_arizona_payment
          or payment_is_passamaquoddy_tribe_maine_indian_claims_settlement_act_payment
          or payment_is_penobscot_nation_maine_indian_claims_settlement_act_payment
          or payment_is_puyallup_tribe_of_indians_settlement_act_1989_fund
          or payment_is_red_cliff_reservation_per_capita
          or payment_is_red_lake_band_of_chippewa_fund
          or payment_is_rosebud_sioux_tribe_payment
          or payment_is_sac_and_fox_tribe_of_oklahoma_per_capita
          or payment_is_sac_and_fox_tribe_of_the_mississippi_in_iowa_per_capita
          or payment_is_saginaw_chippewa_indian_tribe_of_michigan_payment
          or (payment_is_seminole_nation_of_oklahoma_per_capita and payment_amount <= seminole_nation_oklahoma_per_capita_payment_limit)
          or (payment_is_seminole_tribe_of_florida_per_capita and payment_amount <= seminole_tribe_florida_per_capita_payment_limit)
          or payment_is_seneca_nation_settlement_act_1990_fund
          or payment_is_shoshone_bannock_tribes_payment
          or payment_is_st_croix_reservation_per_capita
          or payment_is_turtle_mountain_band_of_chippewas_arizona_payment
          or payment_is_white_earth_band_of_chippewa_indians_in_minnesota_payment
          or payment_is_white_earth_reservation_per_capita
