format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-28
  summary: |-
    "300.03 PAYMENTS TO CERTAIN INDIAN TRIBES The following Indian Payments are excluded as Income. Therefore, do not count Indian payments to tribes and from sources listed below as income."
rules:
  - name: certain_indian_payment_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300.03, Payments to Certain Indian Tribes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-28
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_indian_payment_to_tribe_or_from_listed_source
  - name: excluded_income_amount_for_certain_indian_payment
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 300.03, Payments to Certain Indian Tribes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-28
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if certain_indian_payment_excluded_from_income: payment_amount else: 0
