format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
  summary: |-
    Nutrition Program for the Elderly Funds: N. On-the-job Training (OJT) Payments: Y, E. Overpayments to the same source: exclude any money used to repay an overpayment to the same source. Pass through Payments: Y/N, U; count as roomer income if household receives payments for property it owns. Pay Advances: count when received; do not count again when deducted from next pay. Nazi persecution victim-status payments: N. Pell Grants: N.
rules:
  - name: nutrition_program_for_elderly_funds_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 15, Nutrition Program for the Elderly Funds row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              table:
                header: FNS 300 sources of income
                row: Nutrition Program for the Elderly Funds
                column: Count indicator N
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_nutrition_program_for_elderly_funds

  - name: on_the_job_training_payment_countable_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 15, On-the-job Training (OJT) Payments row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              table:
                header: FNS 300 sources of income
                row: On-the-job Training (OJT) Payments
                column: Count indicator Y and earned indicator E
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_on_the_job_training_payment

  - name: overpayment_repayment_to_same_source_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 15, Overpayments to the same source row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              excerpt: Exclude any money used to repay an overpayment to the same source.
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_money_used_to_repay_overpayment
          and repayment_is_to_same_source

  - name: pass_through_payment_countable_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 15, Pass through Payments row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              excerpt: Count as roomer income if household receives payments for property it owns.
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              table:
                header: FNS 300 sources of income
                row: Pass through Payments
                column: Count indicator Y/N and unearned indicator U
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_pass_through_payment
          and household_receives_payment_for_property_it_owns

  - name: pay_advance_countable_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 15, Pay Advances row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              excerpt: Count when received. Do not count again when it is deducted from the next pay.
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              table:
                header: FNS 300 sources of income
                row: Pay Advances
                column: Count indicator Y and earned indicator E
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_pay_advance
          and pay_advance_is_received
          and not pay_advance_is_being_deducted_from_next_pay

  - name: nazi_persecution_victim_status_payment_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 15, Nazi persecution victim-status payments row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              table:
                header: FNS 300 sources of income
                row: Payments made to FNS unit members because of their status as victims of Nazi persecution
                column: Count indicator N
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_made_because_of_fns_unit_member_status_as_victim_of_nazi_persecution

  - name: pell_grant_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 15, Pell Grants row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-15
              table:
                header: FNS 300 sources of income
                row: Pell Grants
                column: Count indicator N
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_pell_grant
