format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-1
  summary: |-
    Earned income is payment for labor or services rendered from paid employment or business ownership. Unearned income is all income that is not earned from one’s job or from one’s business. Earned or unearned income from any source that is received in a lump sum payment is not countable as income.
rules:
  - name: earned_income_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300.01.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-1
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_for_labor_or_services_from_paid_employment
          or payment_is_for_labor_or_services_from_business_ownership
  - name: unearned_income_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300.01.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-1
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_income
          and not payment_is_for_labor_or_services_from_paid_employment
          and not payment_is_for_labor_or_services_from_business_ownership
  - name: lump_sum_income_payment_not_countable_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300.01.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-1
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_earned_or_unearned_income
          and payment_received_in_lump_sum
