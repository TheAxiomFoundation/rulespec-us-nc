format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-2
  summary: |-
    Source of Income table: Active Corps of Executives (ACE) count N; Adoption Assistance or Subsidy count Y, type U; Adult Developmental Activities Program (ADAP) count N; Aid to Families with Dependent Children (AFDC) count Y, type U, reference 315.36; Alien Sponsor's Income count Y, type U, reference 315.02.
rules:
  - name: payment_is_countable_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 2, Source of Income table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-2
              table:
                header: Source of Income table
                row: Adoption Assistance or Subsidy
                column: Count Type
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-2
              table:
                header: Source of Income table
                row: Aid to Families with Dependent Children (AFDC)
                column: Count Type
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-2
              table:
                header: Source of Income table
                row: Alien Sponsor's Income
                column: Count Type
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_adoption_assistance_or_subsidy
          or payment_is_aid_to_families_with_dependent_children
          or payment_is_alien_sponsor_income
  - name: payment_is_not_countable_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 2, Source of Income table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-2
              table:
                header: Source of Income table
                row: Active Corps of Executives (ACE)
                column: Count Type
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-2
              table:
                header: Source of Income table
                row: Adult Developmental Activities Program (ADAP)
                column: Count Type
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_active_corps_of_executives
          or payment_is_adult_developmental_activities_program
