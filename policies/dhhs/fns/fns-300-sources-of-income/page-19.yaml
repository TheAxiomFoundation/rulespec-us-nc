format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-19
  summary: |-
    Scholarships received from civic groups, educational institutions, and athletic scholarships are marked Y and U. Section 8 Utility Assistance is marked N. Self-employment income from one's own trade, profession, or business is marked Y and E. Senior Companions Payment Program payments under Title II of the Older Americans Act are marked N.
rules:
  - name: payment_countable_as_fns_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 19
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-19
              table:
                header: FNS 300 Sources of Income
                row: Scholarships received from Civic Groups, Educational Institutions, and Athletic Scholarships
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-19
              table:
                header: FNS 300 Sources of Income
                row: Self-Employment Income from being employed in one's own trade, profession, or business; not by an employer
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-19
              table:
                header: FNS 300 Sources of Income
                row: Section 8 Utility Assistance
                column: countable
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-19
              table:
                header: FNS 300 Sources of Income
                row: Senior companions Payment Program (Title II of the Older Americans Act)
                column: countable
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          (payment_is_scholarship_from_civic_group_educational_institution_or_athletic_scholarship
          or payment_is_self_employment_income_from_own_trade_profession_or_business_not_by_employer)
          and not payment_is_section_8_utility_assistance
          and not payment_is_senior_companions_payment_program_title_ii_older_americans_act

  - name: payment_countable_as_fns_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 19
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-19
              table:
                header: FNS 300 Sources of Income
                row: Scholarships received from Civic Groups, Educational Institutions, and Athletic Scholarships
                column: earned_or_unearned
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_scholarship_from_civic_group_educational_institution_or_athletic_scholarship
          and not payment_is_section_8_utility_assistance
          and not payment_is_senior_companions_payment_program_title_ii_older_americans_act

  - name: payment_countable_as_fns_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 19
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-19
              table:
                header: FNS 300 Sources of Income
                row: Self-Employment Income from being employed in one's own trade, profession, or business; not by an employer
                column: earned_or_unearned
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_self_employment_income_from_own_trade_profession_or_business_not_by_employer
          and not payment_is_section_8_utility_assistance
          and not payment_is_senior_companions_payment_program_title_ii_older_americans_act
