format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-6
  summary: 'Page 6 lists FNS income-source treatments: contract sales Y U; contract
    wages Y E; contributions count only if recurring Y U; court ordered restitution
    Y U; CIP payments N; dependent care payments Y U; disability payments other than
    SSI or Social Security Y U; Disaster Relief Act of 1974 assistance payments N;
    domestic employment self-employment Y E; Domestic Volunteer Service Act of 1973
    payments Y U.'
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-300-sources-of-income/page-6#payment_counted_as_fns_income
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: payment_counted_as_earned_fns_income
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: FNS 300 Sources of Income, page 6
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: table_cell
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-6
          table:
            header: FNS 300 sources of income table
            row: contract wages; domestic employment self-employment
            column: earned/unearned classification
  versions:
  - effective_from: '2022-01-11'
    formula: 'payment_is_contract_wages

      or payment_is_domestic_employment_self_employment'
- name: payment_counted_as_unearned_fns_income
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: FNS 300 Sources of Income, page 6
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: table_cell
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-6
          table:
            header: FNS 300 sources of income table
            row: contract sales; contributions; court ordered restitution; dependent
              care payments; disability payments; Domestic Volunteer Service Act payments
            column: earned/unearned classification
  versions:
  - effective_from: '2022-01-11'
    formula: 'payment_is_contract_sales_installment

      or (payment_is_contribution and contribution_is_recurring)

      or payment_is_court_ordered_restitution

      or payment_received_to_care_for_fns_unit_member_due_to_disability

      or payment_is_disability_payment_other_than_ssi_or_social_security

      or payment_is_domestic_volunteer_service_act_payment'
