format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-3
  summary: |-
    Alimony / Spousal Support: Y U. Americorps Payments: N. Annuities: Y U. Attendant Care Payments: Y U. Basic Allowance for Quarters (BAQ) (Military Pay): Y E. Benefit Diversion: N. Black Lung Benefits / Brown Lung Benefits: Y U.
rules:
  - name: payment_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 3 table entries marked "Y U"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-3
              table:
                header: Sources of Income
                row: Alimony / Spousal Support; Annuities; Attendant Care Payments; Black Lung Benefits / Brown Lung Benefits
                column: Y U
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_alimony_or_spousal_support
          or payment_is_annuity
          or payment_is_attendant_care_payment
          or payment_is_black_lung_or_brown_lung_benefit
  - name: payment_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 3 table entry marked "Y E"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-3
              table:
                header: Sources of Income
                row: Basic Allowance for Quarters (BAQ) (Military Pay)
                column: Y E
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_basic_allowance_for_quarters_military_pay
  - name: payment_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 3 table entries marked "N"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-3
              table:
                header: Sources of Income
                row: Americorps Payments; Benefit Diversion
                column: N
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_americorps_payment
          or payment_is_benefit_diversion
