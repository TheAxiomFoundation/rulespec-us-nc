format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-21
  summary: |-
    State Income Tax Refunds ... N -- --. Stipends. Y U --. Stipends for educational assistance N -- --. Striker's Benefits (including picket pay) ... Does not include strike duty pay ... Y E 315.30. Student Earned Income (Students age 17 and younger who are attending elementary or secondary school and are not the head of household) N -- --.
rules:
  - name: state_income_tax_refund_excluded_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 300 Sources of Income, page 21, State Income Tax Refunds row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-21
              excerpt: "State Income Tax Refunds ... N -- --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_state_income_tax_refund: max(0, payment_amount) else: 0

  - name: countable_unearned_stipend_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 300 Sources of Income, page 21, Stipends row
