format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-18
  summary: |-
    "FNS unit member manages property under 20 hours a week considered unearned income but deductions for cost of doing business allowed"; "Representative Payments ... If funds are NOT used for care and maintenance of beneficiary, count as unearned income"; "Retirement Benefits ... Y U"; "Royalties ... Y U"; "Salary Y E"; listed Repatriated Americans Program, Civil Liberties Act restitution, RSVP Title II, and Reverse Mortgages are marked "N".
rules:
  - name: property_management_under_twenty_hours_is_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 18, property management under 20 hours
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-18
              excerpt: "manages property under 20 hours a week considered unearned income"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          fns_unit_member_manages_property_under_twenty_hours_a_week
  - name: property_management_under_twenty_hours_business_deductions_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
