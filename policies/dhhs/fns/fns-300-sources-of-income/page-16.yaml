format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-16
  summary: |-
    FNS 300 Sources of Income page 16 lists: Pensions Y U; PASS Account Deposit N; Private Disability Benefits Y E; Private Unemployment Benefits Y U; Produce Grown for the family’s own use N; Project Share Payments N; Public Service Employment Y E; Radiation Exposure Compensation Act Payments N; Railroad Retirement Y U; Refugee Income from R&P and Cuban/Haitian Entrant Programs Y U.
rules:
  - name: countable_income_source
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-16
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_pension
          or payment_is_private_disability_benefit
          or payment_is_private_unemployment_benefit
          or payment_is_public_service_employment
          or payment_is_railroad_retirement
          or payment_is_refugee_income_from_reception_and_placement_or_cuban_haitian_entrant_program
  - name: earned_income_source
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-16
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_private_disability_benefit
          or payment_is_public_service_employment
  - name: unearned_income_source
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-16
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_pension
          or payment_is_private_unemployment_benefit
          or payment_is_railroad_retirement
          or payment_is_refugee_income_from_reception_and_placement_or_cuban_haitian_entrant_program
  - name: excluded_income_source
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-16
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_pass_account_deposit
          or payment_is_produce_grown_for_family_own_use
          or payment_is_project_share_payment
          or payment_is_radiation_exposure_compensation_act_payment
