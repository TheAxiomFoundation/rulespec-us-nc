format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
  summary: |-
    In-kind donations include food, clothing, furniture contributions, in-kind military benefits, and vendor payments, but not direct cash payments. Independent Living Initiatives payments or services: N. Indian Payments (All Types): Y U, excluding per capita gaming proceeds. IDA withdrawn funds and interest paid into the IDA: N. Infrequent/irregular income that doesn't exceed $30 in a quarter: N. Inheritance: lump sums are resources; installments count as Y U.
rules:
  - name: infrequent_irregular_quarterly_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 300 Sources of Income, page 10, Infrequent/irregular row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
              excerpt: "doesn’t exceed $30 in a quarter"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          30

  - name: countable_unearned_indian_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 10, Indian Payments (All Types) row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_to_indian_tribe_member_as_permitted_by_federal_law
          and not payment_is_per_capita_gaming_proceeds

  - name: countable_unearned_inheritance_installment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 10, Inheritance row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_inheritance
          and payment_is_paid_in_installments
          and not payment_is_lump_sum

  - name: excluded_in_kind_donation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 10, in-kind donations text
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_in_kind_donation_to_applicant_or_recipient
          and not payment_is_direct_cash_payment_to_applicant_or_recipient
          and not individual_uses_business_to_pay_for_item

  - name: excluded_independent_living_initiative_payment_or_service
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 10, Independent Living Initiatives row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_or_service_is_independent_living_initiative_under_title_iv_e

  - name: excluded_ida_withdrawal_or_interest
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 10, Individual Development Accounts row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_ida_withdrawn_funds
          or (payment_is_interest_accrued_on_ida and interest_is_paid_into_ida)

  - name: excluded_infrequent_irregular_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 10, Infrequent/irregular row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-10
              excerpt: "Infrequent/irregular Income that doesn’t exceed $30 in a quarter"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-300-sources-of-income/page-10#infrequent_irregular_quarterly_income_limit
              output: infrequent_irregular_quarterly_income_limit
              hash: sha256:local
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_infrequent_or_irregular_income
          and payment_amount_in_quarter <= infrequent_irregular_quarterly_income_limit
