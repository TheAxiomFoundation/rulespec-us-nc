format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-5
  summary: |-
    Child Care Wages: Self-employment income, Y, E, 315.28. Child Nutrition Act of 1966 Assistance Value: N. Child Support: payment by an absent parent available to meet the child's basic needs, Y, U, 315.08. College Work Study: Federal Work-Study, N, 315.09. Commissions: Y, E, 315.35. Community Service Administration's Energy Crisis Assistance: N. Community Spouse/Dependent Income Allowance: Y, U.
rules:
  - name: payment_counted_as_fns_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-5
              table:
                header: FNS 300 Sources of Income
                row: Child Care Wages; Child Nutrition Act of 1966 Assistance Value; Child Support; College Work Study; Commissions; Community Service Administration's Energy Crisis Assistance; Community Spouse/Dependent Income Allowance
                column: Countable income Y/N
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          (
            payment_is_child_care_wages
            or payment_is_child_support
            or payment_is_commissions
            or payment_is_community_spouse_or_dependent_income_allowance
          )
          and not payment_is_child_nutrition_act_assistance_value
          and not payment_is_federal_work_study
          and not payment_is_community_service_administration_energy_crisis_assistance
  - name: payment_counted_as_fns_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-5
              table:
                header: FNS 300 Sources of Income
                row: Child Care Wages; Commissions
                column: Income type E
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_child_care_wages
          or payment_is_commissions
  - name: payment_counted_as_fns_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-5
              table:
                header: FNS 300 Sources of Income
                row: Child Support; Community Spouse/Dependent Income Allowance
                column: Income type U
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_child_support
          or payment_is_community_spouse_or_dependent_income_allowance
