format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
  summary: |-
    Refugee Match Grants ... Y U -- Reimbursements Includes income to compensate for expenses that do not represent a gain or benefit ... Rental Assistance paid to landlord ... Only count rental assistance if paid directly to household. N -- -- Rental Income FNS unit member manages property 20 hours or more a week. (Self-employment) Income from property owned directly by the individual ... If the claimant has an ownership interest in property that produces income, Y E/U 315.28
rules:
  - name: rental_income_self_employment_management_hours_per_week_threshold
    kind: parameter
    dtype: Decimal
    period: Week
    source: FNS 300 Sources of Income, Section 300, p. 17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "FNS unit member manages property 20 hours or more a week."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          20

  - name: refugee_match_grant_counted_as_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, Section 300, p. 17, Refugee Match Grants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_refugee_match_grant

  - name: payment_is_reimbursement
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, Section 300, p. 17, Reimbursements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_compensates_expenses_that_do_not_represent_gain_or_benefit
          or (payment_is_loan_or_promissory_note and payment_has_agreed_reimbursement_timetable)

  - name: rental_assistance_counted_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, Section 300, p. 17, Rental Assistance paid to landlord
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_rental_assistance
          and payment_paid_directly_to_household

  - name: rental_income_from_owned_property_counted_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, Section 300, p. 17, Rental Income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_rental_income
          and claimant_has_ownership_interest_in_income_producing_property

  - name: rental_income_treated_as_self_employment_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, Section 300, p. 17, Rental Income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "FNS unit member manages property 20 hours or more a week. (Self-employment)"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-17
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_rental_income
          and claimant_has_ownership_interest_in_income_producing_property
          and fns_unit_member_manages_rental_property_hours_per_week >= rental_income_self_employment_management_hours_per_week_threshold
