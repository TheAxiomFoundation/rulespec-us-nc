format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-25
  summary: |-
    Veterans Administration Benefits (VA) Including: Pension and Compensation; Aid and Attendance; Aid to the Homebound; Caregiver's Stipend Program; Reduced Improved Pension; Unreimbursed Medical Expenses. Vocational Rehabilitation.
rules:
  - name: veterans_administration_benefit
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, Section 300, page 25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-25
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_veterans_pension_or_survivor_benefit
          or payment_is_veterans_compensation
          or payment_is_aid_and_attendance
          or payment_is_aid_to_the_homebound
          or payment_is_caregiver_stipend_program
          or payment_is_reduced_improved_pension
          or payment_is_unreimbursed_medical_expense_reimbursement_from_va
  - name: vocational_rehabilitation
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, Section 300, page 25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-25
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_vocational_rehabilitation
