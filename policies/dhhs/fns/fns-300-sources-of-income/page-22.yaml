format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
  summary: |-
    FNS 300 Sources of Income page 22 lists rows including Summer Youth Employment Program (WIA) N -- 315.38; Supplemental Security Income (SSI) Y U 315.31; SSI retroactive lump-sum installments N -- --; Surplus Commodities N -- --; TANF (WFFA) Y U 315.36; TANF-EA (WFFA-EA) N -- --; Tax Intercept Payments (Support) N -- --; Telamon Payments Y U --; Tips Y E 315.35; Title IV Educational Aid N -- --.
rules:
  - name: listed_payment_counted_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 22 income-source rows coded Y
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Supplemental Security Income (SSI) ... Y U 315.31"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Temporary Assistance for Needy Families (TANF) (WFFA) Y U 315.36"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Telamon Payments Y U --"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Tips Y E 315.35"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_supplemental_security_income
          or payment_is_tanf_wffa
          or payment_is_telamon_payment
          or payment_is_tip

  - name: listed_payment_not_counted_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 22 income-source rows coded N
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Summer Youth Employment Program (WIA) N -- 315.38"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "SSI retroactive lump- sum installments payable ... N -- --"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Surplus Commodities N -- --"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "TANF-EA (WFFA-EA) N -- --"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Tax Intercept Payments (Support) N -- --"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-22
              excerpt: "Title IV, Educational Aid ... Upward Bound N -- --"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_summer_youth_employment_program_wia
          or payment_is_ssi_retroactive_lump_sum_installments_payable_on_source_stated_schedule
          or payment_is_surplus_commodities
          or payment_is_tanf_ea_wffa_ea
          or payment_is_tax_intercept_payment_support
          or payment_is_title_iv_educational_aid

