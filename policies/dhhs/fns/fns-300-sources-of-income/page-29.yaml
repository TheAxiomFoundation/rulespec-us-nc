format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-29
  summary: |-
    "Source of Payment" list includes Alaska Native Claims Settlement Act, Apache Tribe of the Mescalero Reservation Payments, Aroostook Band of Micmac Settlement Payments, Assiniboine and Sioux Tribes Payments, Bad River Band payments, Blackfeet Tribe payments, Cherokee Nation of Oklahoma Payments, Chippewas per capita payments, Hopi Tribal Relocation Assistance, Indian Child Welfare Programs Assistance, Indian Judgment Fund Act per capita payments, and Keweenaw Bay Indian Community Payments.
rules:
  - name: payment_source_listed_on_page_29
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 29, Source of Payment list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-29
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_source_is_alaska_native_claims_settlement_act
          or payment_source_is_apache_tribe_of_the_mescalero_reservation_payments
          or payment_source_is_aroostook_band_of_micmac_settlement_payments
          or payment_source_is_assiniboine_and_sioux_tribes_payments
          or payment_source_is_assiniboine_tribe_of_montana_payments
          or payment_source_is_assiniboine_tribe_of_the_fort_belknap_indian_community_montana_per_capita_and_interest_payments
          or payment_source_is_assiniboine_tribe_of_the_fort_peck_indian_reservation_montana_per_capita_and_interest_payments
          or payment_source_is_bad_river_band_of_the_lake_superior_tribe_of_chippewa_indians_of_wisconsin_payments
          or payment_source_is_blackfeet_tribe_payments
          or payment_source_is_blackfeet_tribe_of_montana_payments
          or payment_source_is_cherokee_nation_of_oklahoma_payments
          or payment_source_is_cheyenne_river_sioux_tribe_payments
          or payment_source_is_chippewas_of_lake_superior_per_capita_payments
          or payment_source_is_chippewas_of_the_mississippi_per_capita_payments
          or payment_source_is_confederated_tribes_and_bands_of_the_yakima_indian_nation_indian_claims_commission_payments
          or payment_source_is_crow_creek_sioux_tribe_payments
          or payment_source_is_devils_lake_sioux_tribe_payments
          or payment_source_is_fond_du_lac_reservation_per_capita_payments
