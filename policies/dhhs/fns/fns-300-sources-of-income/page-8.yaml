format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-8
  summary: |-
    Farm Income: self-employment income derived from farming is countable earned income. FCIC, FEMA, federal income tax refunds, food assistance, and Foster-grandparents Program payments are excluded. FECA benefits are countable unearned income. Foster care payments are countable unearned income if the child is a member of the FNS Unit; if the child is not included, exclude payments.
rules:
  - name: farm_income_countable_earned
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 300 Sources of Income, page 8, Farm Income row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-8
              table:
                header: FNS 300 Sources of Income
                row: Farm Income
                column: Y E
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_self_employment_income_derived_from_farming
  - name: fcic_payment_excluded
