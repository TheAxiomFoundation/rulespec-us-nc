format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-26
  summary: Page 26 lists FNS income-source treatment for VISTA, wages, wartime relocation
    civilian law payments, witness pay, Work First Family Assistance/TANF, WFFA-EA,
    Work First Employment Services payments, works for rent/room, work release, work
    study, worker's compensation, Workforce Investment Act, and Youthbuild. Wages
    are earned and counted gross unless garnished to repay a prior overpayment to
    the current employer; several listed sources are not counted.
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-300-sources-of-income/page-26#payment_countable_as_fns_income
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-nc:policies/dhhs/fns/fns-300-sources-of-income/page-26#payment_is_earned_fns_income
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-nc:policies/dhhs/fns/fns-300-sources-of-income/page-26#payment_is_unearned_fns_income
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: wages_counted_at_gross_amount
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: FNS 300 Sources of Income, page 26, Wages note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-300-sources-of-income/page-26
          excerpt: If wages are garnished for any reason other than to repay a prior
            overpayment to the current employer, count the gross amount.
  versions:
  - effective_from: '2022-01-11'
    formula: 'payment_is_wages

      and not wages_garnished_to_repay_prior_overpayment_to_current_employer'
