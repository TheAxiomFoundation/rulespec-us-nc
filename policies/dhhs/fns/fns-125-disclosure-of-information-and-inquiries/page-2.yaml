format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
  summary: |-
    Congressional or State-level official inquiries on behalf of a household may satisfy written agreement for review; requests originating from the household should be honored, with household contact when release wishes are doubtful. Collateral-contact disclosures required by the manual are not violations. Written household requests by a responsible member, authorized representative, or person acting on its behalf require case-file materials to be available during normal business hours, but confidential information may be withheld.
rules:
  - name: official_inquiry_request_should_be_honored
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 125.02(A), Congressional Inquiries
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          case_file_information_request_originated_from_household_inquiry
          and inquiry_is_by_congressional_or_state_level_government_official_on_behalf_of_household
          and not doubt_household_wants_information_released
  - name: household_should_be_contacted_about_release_wishes
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 125.02(A), Congressional Inquiries
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          doubt_household_wants_information_released
  - name: collateral_contact_disclosure_not_violation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 125.02(B), Collateral Contacts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          information_divulged_as_necessary_part_of_required_collateral_contact_process
  - name: case_file_material_available_for_inspection
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 125.02(C), Written Request by a Household
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          written_request_to_review_case_file_materials
          and request_made_by_responsible_household_member_or_authorized_representative_or_person_acting_on_households_behalf
          and inspection_requested_during_normal_business_hours
  - name: confidential_case_file_information_may_be_withheld
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 125.02(C), Written Request by a Household
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-2
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          information_is_confidential_information
          and (information_identifies_individual_who_disclosed_information_without_household_knowledge
          or information_concerns_nature_or_status_of_pending_criminal_prosecution)
