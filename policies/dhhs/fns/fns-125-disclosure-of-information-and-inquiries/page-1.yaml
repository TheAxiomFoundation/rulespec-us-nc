format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-1
  summary: |-
    "the agency must restrict the use of information obtained from applicant or recipient households, exclusively for the program, to" specified connected persons, certain law enforcement officials on written request, and law enforcement officers requesting address, SSN, and photograph when specified recipient-flight facts are furnished.
rules:
  - name: authorized_to_use_restricted_fns_information
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 125.01(A)-(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          directly_connected_with_fns_administration_or_enforcement
          or directly_connected_with_means_tested_federal_assistance_or_federally_assisted_state_program_administration_or_enforcement
          or directly_connected_with_ievs_required_program_administration_or_enforcement_and_fns_information_useful_for_eligibility_or_benefit_verification
          or directly_connected_with_save_immigration_status_verification_and_information_necessary_to_identify_individual
          or directly_connected_with_child_support_program_administration_under_title_iv_part_d
          or health_and_human_services_secretary_employee_needing_information_for_title_ii_or_xvi_eligibility_or_benefit_verification
          or comptroller_general_employee_for_audit_examination_authorized_by_law
          or directly_connected_with_nutrition_education_and_outreach_for_names_and_addresses_of_participating_households
          or law_enforcement_official_written_request_for_food_stamp_act_violation_investigation_meets_required_contents

  - name: law_enforcement_violation_investigation_written_request_meets_required_contents
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 125.01(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          requester_is_local_state_or_federal_law_enforcement_official
          and written_request_is_for_investigating_alleged_food_stamp_act_or_regulation_violation
          and request_includes_identity_of_individual_requesting_information
          and request_includes_requesters_authority
          and request_includes_violation_being_investigated
          and request_includes_identity_of_person_on_whom_information_is_requested

  - name: agency_must_make_recipient_address_ssn_and_available_photograph_available_to_law_enforcement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 125.01(I)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-125-disclosure-of-information-and-inquiries/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          law_enforcement_officer_including_parole_or_probation_official_makes_written_request
          and officer_furnishes_recipient_name
          and requested_person_is_active_or_inactive_fns_recipient
          and officer_notifies_agency_recipient_is_fleeing_to_avoid_felony_prosecution_custody_or_confinement
