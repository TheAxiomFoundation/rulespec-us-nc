format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-3
  summary: |-
    "Screen all applications received from SSA for entitlement to expedited service. This must be done on the day the application is received by DSS." "Determine if members of SSI households are active FNS participants prior to processing the application." "Allow SSI households to apply for FNS benefits at the agency if the household chooses to do so."
rules:
  - name: ssa_application_expedited_service_screening_required_same_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400, page 3, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-3
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          fns_application_received_from_ssa_by_dss

  - name: ssi_household_active_fns_participation_determination_required_before_processing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400, page 3, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-3
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_is_ssi_household

  - name: ssi_household_may_apply_for_fns_at_agency
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400, page 3, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-3
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_is_ssi_household
          and household_chooses_to_apply_for_fns_at_agency

  - name: ssi_household_agency_application_verification_source_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400, page 3, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-3
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_is_ssi_household
          and household_chooses_to_apply_for_fns_at_agency
          and all_required_verification_provided_by_household_sdx_bendex_or_obtained_by_dss
          and
          not all_required_verification_provided_by_ssa
