format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
  summary: |-
    If there is no adult in the household, a legally emancipated minor may make and sign the application. The SSA Office takes FNS applications for households who contain only SSI applicants/recipients and refers non-SSI households to DSS. County responsibilities include giving eligible SSI households the opportunity to purchase food within 30 days following SSA receipt, processing expedited applications within seven calendar days after DSS receipt, and forwarding wrongly sent applications and supporting documentation within one working day.
rules:
  - name: ssa_received_application_purchase_opportunity_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 400.04(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
              excerpt: "within 30 days following the date the application was received by SSA"
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          30

  - name: dss_received_expedited_application_processing_deadline_days
    kind: parameter
    dtype: Count
    source: FNS 400.04(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
              excerpt: "within seven calendar days"
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          7

  - name: wrong_dss_forwarding_deadline_working_days
    kind: parameter
    dtype: Count
    source: FNS 400.04(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
              excerpt: "within one working day of receipt"
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          1

  - name: legally_emancipated_minor_may_make_and_sign_application
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 400.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_has_no_adult
          and person_is_legally_emancipated_minor

  - name: household_is_ssa_fns_application_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400.04(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_contains_only_ssi_applicants_or_recipients

  - name: ssi_household_purchase_opportunity_deadline_days
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: FNS 400.04(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2#ssa_received_application_purchase_opportunity_deadline_days
              output: ssa_received_application_purchase_opportunity_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          if household_is_ssa_fns_application_household and household_is_eligible_for_fns: ssa_received_application_purchase_opportunity_deadline_days else: 0

  - name: expedited_application_processing_deadline_days
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: FNS 400.04(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2#dss_received_expedited_application_processing_deadline_days
              output: dss_received_expedited_application_processing_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          if household_has_expedited_service_application and household_is_eligible_for_fns: dss_received_expedited_application_processing_deadline_days else: 0

  - name: no_dss_or_fns_office_appearance_required_for_ssa_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400.04(A)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_is_ssa_fns_application_household

  - name: dss_must_process_without_dss_interview_for_ssi_only_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400.04(B)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-2
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_contains_only_ssi_applicants_or_recipients
