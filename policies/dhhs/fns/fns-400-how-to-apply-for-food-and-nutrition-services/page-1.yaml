format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-1
  summary: |-
    Households must file FNS applications by submitting a state-approved application form to a county Department of Social Services. State approved forms include DSS-8207, NC FAST guided interview application, and ePASS online application. The FNS application may be submitted in person in the county of residence, by mail, fax, email, ePASS, or through the Social Security Administration. Any adult individual in the FNS household may make an application for FNS.
rules:
  - name: state_approved_fns_application_form
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-1
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          application_uses_dss_8207_form
          or application_uses_nc_fast_guided_interview
          or application_uses_epass_online_application
  - name: fns_application_filed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-400-how-to-apply-for-food-and-nutrition-services/page-1
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          state_approved_fns_application_form
          and application_submitted_to_county_department_of_social_services
  - name: fns_application_submission_method_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 400.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
