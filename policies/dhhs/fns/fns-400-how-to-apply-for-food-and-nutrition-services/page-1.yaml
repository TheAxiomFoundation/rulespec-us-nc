    versions:
      - effective_from: '2021-08-09'
        formula: |-
          application_submitted_in_person_in_fns_office_in_county_of_residence
          or application_submitted_by_mail
          or application_submitted_by_fax
          or application_submitted_by_email
          or application_submitted_by_epass
