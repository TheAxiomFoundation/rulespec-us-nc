format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-7
  summary: |-
    If verification is provided within the certification period, adjust benefits for the month after verification is provided if time allows. If needed, offer assistance to the FNS unit in obtaining verification. Resolve any discrepancies prior to allowing the deduction. Do not request a specific type of verification; any source that reasonably verifies the deduction is acceptable.
rules:
  - name: verification_source_acceptable_for_deduction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 7, B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          source_reasonably_verifies_deduction
  - name: shelter_deduction_may_be_allowed_after_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 7, A.6 and B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          source_reasonably_verifies_deduction
          and discrepancies_resolved_prior_to_allowing_deduction
  - name: benefits_adjusted_for_month_after_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 7, A.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-7
              excerpt: "If verification is provided within the certification period (CP), adjust benefits for the month after verification is provided if time allows."
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          verification_provided_within_certification_period
          and time_allows_month_after_verification_adjustment
  - name: assistance_offered_to_obtain_verification_when_needed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 7, A.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          verification_assistance_not_needed
          or assistance_offered_to_fns_unit_in_obtaining_verification
  - name: verbal_verification_documented
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 7, C.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          verification_method_documented
          and verbal_source_identity_documented
          and verbal_verification_obtainment_method_documented
          and exact_verbal_statement_documented
  - name: shelter_expense_verification_documented
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 7, C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-7
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          verification_method_documented
          and monthly_amount_billed_or_incurred_documented
          and (not verification_is_verbal or verbal_verification_documented)
