format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-27
  summary: |-
    Do not allow an income deduction for alimony payments, spousal support payments, and property settlement payments paid by a FNS unit member. If the FNS unit member who is currently paying child support has been under an order to pay support for at least two months, verify two months of payments prior and use the average of the two months as an income deduction for the CP if child support is paid monthly. Convert child support payments paid on a weekly, bi-weekly or semi-monthly basis to a monthly amount.
rules:
  - name: prior_child_support_payment_months_to_average
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 340 Deductions, Section 340.E.1-E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-27
              excerpt: "Verify two months of payments prior"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          2

  - name: disallowed_support_settlement_payment_deduction
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340 Deductions, Section 340.C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-27
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if payment_is_alimony or payment_is_spousal_support or payment_is_property_settlement: 0 else: payment_amount

  - name: child_support_income_deduction_monthly_average
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340 Deductions, Section 340.E.1-E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-27
              excerpt: "Use the average of the two months as an income deduction"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if fns_unit_member_currently_paying_child_support and under_child_support_order_for_at_least_two_months and child_support_is_paid_monthly: (prior_month_child_support_payment_amount + second_prior_month_child_support_payment_amount) / prior_child_support_payment_months_to_average else: 0

  - name: child_support_income_deduction_anticipated_order_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340 Deductions, Section 340.F.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-27
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if fns_unit_member_currently_paying_child_support and under_child_support_order_for_less_than_two_months: legal_order_monthly_child_support_amount else: 0
