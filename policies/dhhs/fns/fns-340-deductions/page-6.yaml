format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
  summary: |-
    FNS 340 DEDUCTIONS 6 Section 340 Change #03-2025 December 1, 2025

    L. Car payment and other fees associated with living in the car, if the car is used as primary residence. 340.07 NON-ALLOWABLE HOUSING EXPENSES ... C. An expense which is reimbursed or covered by a vendor payment. ... D. Site preparation to locate a mobile home. E. Late charges or fees on mortgage or rent payments. F. Past due rent or mortgage amounts. ... H. Deposits on rental property. I. The amount of rent being recouped by HUD for a prior underpayment made by the recipient. NOTE: If a FNS unit has been granted a suspension of rent or mortgage payments (a moratorium), do not allow the rent or mortgage expense until it is incurred again. 340.08 VERIFICATION OF HOUSING EXPENSES ... Request verifications using the DSS-8650 and allow the FNS unit at least ten calendar days to provide verification. If verification is not provided within ten calendar days, process the application, and allow no deduction.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-340-deductions/page-6#housing_not_actually_occupied_expense_non_allowable
      reason: The item is non-allowable except as specified in FNS 340.06 J, and that exception source is not provided in this workspace.
    - output: us-nc:policies/dhhs/fns/fns-340-deductions/page-6#home_purchase_closing_expense_non_allowable
      reason: The item is non-allowable except as specified in FNS 340.06 H, and that exception source is not provided in this workspace.
    - output: us-nc:policies/dhhs/fns/fns-340-deductions/page-6#other_non_shelter_expense_non_allowable
      reason: The item is non-allowable except as provided in FNS 340.06 G, and that exception source is not provided in this workspace.
rules:
  - name: car_payment_or_living_in_car_fee_allowable_housing_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340.06 L
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
              excerpt: "Change #03-2025 December 1, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          expense_is_car_payment_or_fee_associated_with_living_in_car
          and car_is_used_as_primary_residence

  - name: independent_non_allowable_housing_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340.07 C-I and note
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
              excerpt: "Change #03-2025 December 1, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          expense_is_reimbursed_or_covered_by_vendor_payment
          or expense_is_site_preparation_to_locate_mobile_home
          or expense_is_late_charge_or_fee_on_mortgage_or_rent_payment
          or expense_is_past_due_rent_or_mortgage_amount
          or expense_is_deposit_on_rental_property
          or rent_amount_is_hud_recoupment_for_prior_underpayment
          or rent_or_mortgage_payment_is_suspended_under_moratorium

  - name: housing_expense_verification_min_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 340.08 A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
              excerpt: "Change #03-2025 December 1, 2025"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
              excerpt: "at least ten calendar days"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          10

  - name: housing_expense_deduction_disallowed_for_missing_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340.08 A.2-A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
              excerpt: "Change #03-2025 December 1, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-6
              excerpt: "If verification is not provided within ten calendar days"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          housing_expense_verification_calendar_days_elapsed >= housing_expense_verification_min_calendar_days
          and not housing_expense_verification_provided
