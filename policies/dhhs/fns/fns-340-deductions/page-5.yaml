format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-5
  summary: |-
    Shelter expenses include mortgage principal and interest; mobile-home lot rent or land mortgage; home improvement/home equity loans; real property taxes and listed assessments; insurance on the home structure only; condominium fees and homeowner association dues; certain taxes or insurance in mortgage closing expenses; unreimbursed repair costs after natural disaster damage; certain expenses for temporarily unoccupied homes; and separately identifiable room expenses in group homes.
rules:
  - name: payment_allowed_as_shelter_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 5, items B-K
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-5
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          payment_is_mortgage_principal_or_interest
          or payment_is_mobile_home_lot_rent
          or payment_is_mortgage_payment_on_land_for_owned_or_rented_home
          or payment_is_home_improvement_or_home_equity_loan
          or payment_is_real_property_tax_or_assessment
          or payment_is_home_structure_insurance
          or payment_is_condominium_fee_or_homeowners_association_due
          or payment_is_tax_or_insurance_itemized_in_mortgage_closing_expense
          or (payment_is_home_repair_after_substantial_natural_disaster_damage and not payment_will_be_reimbursed)
          or (payment_is_shelter_expense_for_temporarily_unoccupied_home and fns_unit_intends_to_return_to_home and not current_occupants_claim_shelter_expense_for_fns and not home_is_leased_or_rented_during_absence)
          or (fns_unit_resides_in_group_home and payment_is_room_expense_identified_separately_from_other_expenses)
  - name: mobile_home_recreational_vehicle_or_automobile_tax_or_insurance_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 5, item F.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-5
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          fns_unit_resides_in_mobile_home_recreational_vehicle_or_automobile
          and payment_is_tax_or_insurance_for_that_home_vehicle
  - name: entire_tax_or_insurance_bill_allowed_when_personal_property_not_separated
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 5, item F.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-5
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          payment_is_tax_or_insurance_bill_for_dwelling_land_and_personal_property
          and not bill_shows_personal_property_amounts_separate_from_dwelling_and_land_amounts
          and expenses_cannot_be_identified_separately
