format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-9
  summary: |-
    The utility expense allowed may be a standard amount or a telephone utility allowance. The FNS unit is eligible for the SUA if the household incurs or expects heating or cooling expenses under the listed billing, reimbursement, vendor-payment, or LIEAP elderly/disabled-member conditions. Repair or replacement expenses due to wear and tear or mechanical problems and wood-cutting costs are listed as expenses.
rules:
  - name: appliance_or_home_repair_replacement_due_to_wear_or_mechanical_problem
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 9, item B.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-9
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          repair_or_replacement_expense_is_for_appliance_or_home_portion
          and repair_or_replacement_expense_is_due_to_wear_and_tear_or_mechanical_problem
  - name: wood_cutting_cost_for_wood_heating_or_cooling
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 9, item B.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-9
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          household_heats_or_cools_with_wood
          and cost_is_connected_with_cutting_wood
  - name: eligible_for_standard_utility_allowance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section 340, page 9, item D.1-D.8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-9
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          heating_or_cooling_expense_billed_separately_from_rent_or_mortgage
          or rents_or_is_purchasing_home_and_pays_heating_or_cooling_expenses_directly_to_utility_provider
          or rents_home_with_individual_metering_for_heating_or_cooling_expense_billed_by_landlord
          or owns_or_rents_home_without_mortgage_or_rent_payment_and_incurs_heating_or_cooling_expense
          or does_not_currently_incur_heating_or_cooling_expense_but_expects_one_in_upcoming_season
          or incurs_heating_or_cooling_expenses_during_certification_period_in_excess_of_energy_assistance_reimbursements
          or incurs_heating_or_cooling_expense_not_totally_covered_by_vendor_payment
          or elderly_or_disabled_member_was_in_lieap_household_with_energy_assistance_payment_in_past_12_months
