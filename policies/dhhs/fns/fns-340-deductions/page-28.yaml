format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
  summary: |-
    If the FNS unit member has a new legally obligated child support order, anticipate the income deduction based on the new order. Do not round each child support payment paid in the base period; enter the actual total amount. If child support is paid by a disqualified FNS unit member, allow the entire payment as an income deduction for eligible members; if paid by an ineligible alien or individual ineligible for failure to provide or obtain an SSN, allow a prorata share; if paid by an ineligible student, do not allow the payment as an income deduction. North Carolina elected a deduction waiver for QC lock-out: if the waiver is signed and the FNS unit fails to report a deduction, they waive the deduction, but verified expenses should be allowed.
rules:
  - name: child_support_deduction_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340.20 and preceding child support deduction instructions, page 28
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
              excerpt: "Do not round each child support payment paid in the base period. Enter the actual total amount"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
              excerpt: "If the child support is paid by an ineligible student, do not allow"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if child_support_paid_by_ineligible_student: 0 else: if child_support_paid_by_disqualified_fns_unit_member: actual_total_child_support_paid else: if child_support_paid_by_ineligible_alien_or_ssn_ineligible_member: prorata_share_of_child_support_payment else: if member_has_new_legally_obligated_child_support_order: new_child_support_order_amount else: actual_total_child_support_paid

  - name: deduction_waived_for_qc_lock_out
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340.20(A), page 28
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
              excerpt: "if they fail to report a deduction, they waive their right to receive the deduction"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
              excerpt: "The deduction should be allowed if the expenses are verified through other resources"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          deduction_waiver_signed
          and deduction_included_on_waiver_statement
          and statement_acknowledges_deductions_explained_and_understood
          and fns_unit_failed_to_report_or_verify_expense
          and not expense_verified_through_other_resources

  - name: deduction_allowed_despite_qc_waiver
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340.20(A) note, page 28
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-28
              excerpt: "The deduction should be allowed if the expenses are verified through other resources"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          expense_verified_through_other_resources
