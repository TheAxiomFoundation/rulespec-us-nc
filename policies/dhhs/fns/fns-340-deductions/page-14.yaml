format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
  summary: |-
    "paid or incurred by a disqualified individual. Do not prorate the expenses." Applies to individuals disqualified due to IPV, felony drug conviction, fleeing felon, probation/parole violation, work registration noncompliance, voluntary quit, or transfer of resources. "Ineligible Students are not household members." For households including an ineligible student, allow the prorata share of shelter, legal support obligation, and child care expenses when payments cannot be differentiated; if differentiated, allow verified expenses eligible members are responsible for; if paid by an ineligible student, no deduction is allowed for those expenses.
rules:
  - name: individual_disqualified_for_no_proration_expense_rule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions 14, disqualified individuals ¶2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          disqualified_due_to_intentional_program_violation
          or disqualified_due_to_felony_drug_conviction
          or disqualified_as_fleeing_felon
          or disqualified_as_probation_or_parole_violator
          or disqualified_due_to_failure_to_comply_with_work_registration_requirements
          or disqualified_due_to_voluntary_quit
          or disqualified_due_to_transfer_of_resources

  - name: deductible_expense_paid_or_incurred_by_disqualified_individual
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340 Deductions 14, disqualified individuals ¶1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if individual_disqualified_for_no_proration_expense_rule: expense_paid_or_incurred_by_individual else: 0

  - name: transfer_of_resources_disqualification_follows_person_to_new_fns_unit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions 14, disqualified individuals ¶3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          household_membership_changed
          and member_of_original_household_that_transferred_resource
          and person_is_in_new_fns_unit

  - name: person_excluded_from_household_as_ineligible_student
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions 14, Ineligible Students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_ineligible_student

  - name: household_expense_deduction_blocked_by_ineligible_student_payment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions 14, Ineligible Students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
              excerpt: "Change #03-2025 December 1, 2025"
