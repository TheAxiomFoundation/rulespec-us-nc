  - name: deductible_ineligible_student_household_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340 Deductions 14, Ineligible Students
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-14
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if household_includes_ineligible_student: if household_expense_deduction_blocked_by_ineligible_student_payment: 0 else: if payments_cannot_be_differentiated_between_ineligible_student_and_eligible_household_members: prorata_share_of_shelter_legal_support_obligation_and_child_care_expenses else: shelter_legal_support_obligation_and_child_care_expenses_eligible_members_verify_responsible_for else: 0
