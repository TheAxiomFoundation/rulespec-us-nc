format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-10
  summary: |-
    Determine if the FNS unit has been billed for excess heating or cooling expenses within the last 12 months; do not consider kindling wood as a heating expense; cooling must be from central or room air conditioning, not fans. The FNS unit is ineligible for SUA when central-metered heating/cooling expenses are included in rent, when heating and cooling expenses are totally covered by vendor payment, or when reimbursed for the total amount. The FNS unit is eligible for BUA if it pays or incurs at least two non-heating/non-cooling utility expenses, including specified utilities, and those expenses are not totally covered by vendor payment or reimbursement; if the only utility expense is telephone, allow TUA instead.
rules:
  - name: eligible_for_sua_based_on_excess_heating_or_cooling_expenses
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section D.9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-10
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          lives_in_public_or_private_housing_unit_with_central_utility_meters
          and residents_are_charged_only_for_excess_heating_or_cooling_expenses
          and ((billed_for_excess_heating_expense_within_last_12_months and not excess_heating_expense_is_kindling_wood_purchase) or (billed_for_excess_cooling_expense_within_last_12_months and excess_cooling_expense_is_from_central_or_room_air_conditioning))
  - name: ineligible_for_sua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-10
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          (lives_in_public_or_private_housing_unit_with_central_utility_meters and heating_or_cooling_expenses_are_included_in_rent)
          or heating_and_cooling_expenses_totally_covered_by_vendor_payment
          or reimbursed_for_total_heating_or_cooling_expense
  - name: eligible_for_bua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, Section F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-10
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          incurs_at_least_two_non_heating_non_cooling_utility_expenses
          and not only_utility_expense_is_telephone
          and not non_heating_non_cooling_utility_expenses_totally_covered_by_vendor_payment_or_reimbursement
