format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
  summary: |-
    One-time-only expenses incurred and billed prior to the month of initial application or reapplication (old bills) are allowed as a deduction if the applicant/recipient was a specified person when incurred, the bill remains unpaid, has not been written off or paid by another source, was not incurred and billed in a prior CP unless under a repayment plan, and has never been allowed as a medical deduction for FNS purposes in a prior CP. At application, the FNS unit may prorate an old bill over the initial CP or allow it as a one-month deduction for the month of application, and an old bill reported at application is not allowed beyond the initial CP. At recertification, paid or unpaid one-time-only medical expenses incurred and billed in the CP and reported by the last month of the CP are allowed; expenses reported after the CP expires are not allowed unless under a repayment plan.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-340-deductions/page-20#expense_under_repayment_plan_treated_as_recurring
      reason: The source states that an expense under a repayment plan is treated as a recurring expense and cites 340.14, B, but the cited recurring-expense mechanics are not available in copied context.
rules:
  - name: old_bill_medical_deduction_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 20, old bills
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          one_time_only_expense_incurred_and_billed_before_initial_application_or_reapplication_month
          and applicant_or_recipient_was_specified_person_when_bill_incurred
          and bill_is_unpaid_in_full_or_in_part
          and not bill_written_off_by_medical_provider
          and not bill_paid_by_another_source
          and (not bill_incurred_and_billed_in_prior_certification_period or bill_under_repayment_plan)
          and not bill_previously_allowed_as_medical_deduction_for_fns
  - name: prior_certification_period_old_bill_first_billed_current_period_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 20, old bill first billed and reported in current CP
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          old_bill_incurred_in_prior_certification_period
          and bill_first_billed_in_current_certification_period
          and bill_reported_in_current_certification_period
  - name: application_month_medical_expense_deduction_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 20, budgeting one-time-only expenses at application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          medical_expense_incurred_and_billed_in_month_of_application
          and (medical_expense_paid or medical_expense_unpaid)
  - name: old_bill_reported_at_application_deduction_allowed_in_budget_period
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 20, old bill reported at application
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          old_bill_reported_at_application
          and (old_bill_prorated_over_initial_certification_period or old_bill_allowed_as_one_month_deduction_for_month_of_application)
          and not deduction_period_is_beyond_initial_certification_period
  - name: recertification_one_time_medical_expense_deduction_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 20, expenses reported at recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          one_time_only_medical_expense
          and medical_expense_incurred_and_billed_in_certification_period
          and medical_expense_reported_by_last_month_of_certification_period
          and (medical_expense_paid or medical_expense_unpaid)
  - name: recertification_late_reported_expense_deduction_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 20, expenses reported after CP expires
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          expense_reported_after_certification_period_expires
          and expense_under_repayment_plan
  - name: recertification_information_provided_later_deduction_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, page 20, recertification information provided later
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-20
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          expense_reported_as_part_of_recertification_process
          and expense_information_provided_later_in_certification_period
