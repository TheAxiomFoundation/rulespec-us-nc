format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-22
  summary: |-
    "Budgeting One-time-only Expense During the Certification Period a. Prorated over the remaining months of the current CP (including the month reported); or b. The entire expense is allowed in the month reported. If allowed all in one month, a supplement must be issued for the month the expense is reported." "Recurring medical expenses are those expenses that can be reasonably expected to continue... There are two types of recurring medical expenses. a. Monthly expenses, and b. Non-monthly expenses."
rules:
  - name: one_time_only_expense_budgeted_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340 Deductions, p. 22, A.8
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-22
              excerpt: "Change #03-2025 December 1, 2025"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-22
              excerpt: "Prorated over the remaining months of the current CP (including the month reported); or ... entire expense is allowed in the month reported."
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if one_time_only_expense_reported_during_certification_period and one_time_only_expense_allowed_entirely_in_month_reported and current_month_is_month_expense_reported: one_time_only_expense_amount else: if one_time_only_expense_reported_during_certification_period and one_time_only_expense_prorated_over_remaining_months_of_current_certification_period and current_month_is_in_remaining_current_certification_period_including_reported_month: one_time_only_expense_amount / remaining_months_in_current_certification_period_including_reported_month else: 0
  - name: supplement_required_when_one_time_only_expense_allowed_entirely_in_reported_month
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, p. 22, A.8.b
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-22
              excerpt: "Change #03-2025 December 1, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-22
              excerpt: "If allowed all in one month, a supplement must be issued for the month the expense is reported."
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          one_time_only_expense_reported_during_certification_period
          and one_time_only_expense_allowed_entirely_in_month_reported
          and current_month_is_month_expense_reported
