format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-2
  summary: Only allow the dependent care transportation expense for the additional
    mileage incurred by the FNS unit. Do not allow the dependent care expense if paid
    entirely through government assistance or covered by an excluded reimbursement
    through any source. Request the dependent care expense for the month prior to
    application or recertification as long as the deduction is representative of the
    ongoing deduction.
rules:
- name: dependent_care_transportation_expense
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: FNS 340 Deductions, page 2, dependent care transportation expense
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-2
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-2
  versions:
  - effective_from: '2025-12-01'
    formula: 'if dependent_care_expense_paid_entirely_through_government_assistance:
      0 else: if dependent_care_expense_covered_by_excluded_reimbursement: 0 else:
      additional_dependent_care_transportation_miles * irs_business_mileage_rate'
- name: prior_month_dependent_care_expense_usable_for_ongoing_deduction
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 340 Deductions, page 2, verification of dependent care expense
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-2
  versions:
  - effective_from: '2025-12-01'
    formula: 'dependent_care_expense_is_for_month_prior_to_application_or_recertification

      and dependent_care_expense_is_representative_of_ongoing_deduction'
- name: client_statement_of_dependent_care_transportation_mileage_accepted
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 340 Deductions, page 2, dependent care transportation mileage note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: default
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-2
  versions:
  - effective_from: '2025-12-01'
    formula: not dependent_care_transportation_mileage_is_questionable
