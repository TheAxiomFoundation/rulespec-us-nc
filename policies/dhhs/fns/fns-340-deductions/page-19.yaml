format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-19
  summary: |-
    "Give the FNS unit at least ten calendar days to provide verification." "Resolve any discrepancies prior to allowing the deduction." "If you cannot identify the amount the specified person is responsible for paying, do not allow a deduction until an amount can be determined." "One-time-only medical expenses are those expenses that cannot be reasonably expected to recur." "One-time-only medical expenses that have a repayment plan established between the customer and the medical provider are allowed as a recurring expense."
rules:
  - name: medical_expense_verification_response_period_days
    kind: parameter
    dtype: Count
    source: FNS 340.13(D)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-19
              excerpt: "at least ten calendar days"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          10

  - name: one_time_only_medical_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340.14(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-19
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          medical_expense_cannot_be_reasonably_expected_to_recur

  - name: one_time_medical_expense_allowed_as_recurring_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340.14(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-19
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          one_time_only_medical_expense
          and repayment_plan_established_between_customer_and_medical_provider

  - name: medical_expense_deduction_allowed_after_verification
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340.13(D)(8), FNS 340.13(E) Note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-19
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          amount_specified_person_is_responsible_for_paying_can_be_determined
          and discrepancies_resolved_prior_to_allowing_deduction

  - name: unaffordable_unobtained_medical_service_expense_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340.13(D)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-19
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          medical_service_was_purchased_or_obtained
          and not specified_person_reports_cannot_afford_to_purchase_or_obtain_medical_service

  - name: unaffordable_unobtained_medical_service_expense_can_be_anticipated
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340.13(D)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-19
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          medical_service_was_purchased_or_obtained
          and not specified_person_reports_cannot_afford_to_purchase_or_obtain_medical_service
