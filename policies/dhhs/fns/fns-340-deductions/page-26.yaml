format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-26
  summary: |-
    "Allow an income deduction for legally obligated child support payments, including arrearages, that the FNS unit member anticipates paying to or for a non-household FNS unit member." Legally obligated child support is court ordered, ordered through an administrative process, or ordered through a legally enforceable separation agreement. Verify both the ordered amount and the amount actually paid, and allow the amount actually paid including arrearages.
rules:
  - name: child_support_is_legally_obligated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 340.19(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          child_support_is_court_ordered
          or child_support_is_ordered_through_administrative_process
          or child_support_is_ordered_through_legally_enforceable_separation_agreement

  - name: child_support_deduction_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 340.19(A), FNS 340.19(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          child_support_is_legally_obligated
          and child_support_is_to_or_for_non_household_fns_unit_member
          and child_support_payment_is_anticipated
          and child_support_amount_ordered_is_verified
          and child_support_amount_actually_paid_is_verified

  - name: child_support_income_deduction
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 340.19(A), FNS 340.19(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-26
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          if child_support_deduction_allowed: max(0, child_support_amount_actually_paid_including_arrearages) else: 0
