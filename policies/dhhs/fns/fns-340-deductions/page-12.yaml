format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
  summary: |-
    "Allow each FNS unit the applicable SUA, BUA, or TUA for the household size. Do not prorate between the individual units..." "If all FNS units do not contribute to the heating and cooling expenses, determine the appropriate utility allowance based on the expenses each household incurs." For separate residences with a shared utility meter/expense, "Allow each FNS unit the SUA or BUA for all residents who contribute to the expense..."
rules:
  - name: shared_residence_utility_allowance_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340.10.A-C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          fns_unit_lives_in_shared_residence
          and fns_unit_is_eligible_for_sua_bua_or_tua
  - name: shared_residence_utility_allowance_based_only_on_household_expenses
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340.10.B-C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          fns_unit_lives_in_shared_residence
          and not all_fns_units_in_residence_contribute_to_heating_or_cooling_expenses
          and utility_allowance_is_determined_from_expenses_this_household_incurs
          and other_residence_members_are_excluded_from_deduction_determination
  - name: separate_residence_shared_meter_sua_or_bua_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340.11.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          fns_unit_lives_in_separate_residence_with_shared_utility_meter_or_expense
          and residents_contribute_to_shared_utility_expense
          and fns_unit_is_eligible_for_sua_or_bua
  - name: separate_residence_utility_allowance_based_on_household_expense
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340.11.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-12
              excerpt: "Change #03-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          fns_unit_lives_in_separate_residence_with_shared_utility_meter_or_expense
          and not each_fns_unit_contributes_to_heating_or_cooling_expenses
          and utility_allowance_is_determined_from_expenses_this_household_incurs
