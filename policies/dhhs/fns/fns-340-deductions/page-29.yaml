format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-29
  summary: |-
    The waiver statement must be signed and dated, must be signed at every application or recertification, and must cover the QC review period. Income deductions included in the waiver are legal child support obligations, child care expenses, medical expenses, shelter expenses, utility expenses, and operational expenses for self-employment. Deductible items left off the statement remain subject to QC review. A move to a new residence and new expenses must still be reported; when reported, issue DSS-8650 requesting expense verification.
rules:
  - name: waiver_statement_valid_for_qc_review_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, p. 29, waiver statement requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-29
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          waiver_statement_signed
          and waiver_statement_dated
          and waiver_statement_signed_at_application_or_recertification
          and waiver_statement_covers_qc_review_period

  - name: deduction_item_category_included_in_waiver
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, p. 29, Income Deductions Included in the Waiver
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-29
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          deduction_item_is_legal_child_support_obligation
          or deduction_item_is_child_care_expense
          or deduction_item_is_medical_expense
          or deduction_item_is_shelter_expense
          or deduction_item_is_utility_expense
          or deduction_item_is_self_employment_operational_expense

  - name: deduction_item_included_in_waiver
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, p. 29, waiver coverage and omitted deductible items
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-29
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-340-deductions/page-29#deduction_item_category_included_in_waiver
              output: deduction_item_category_included_in_waiver
              hash: sha256:local
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          deduction_item_category_included_in_waiver
          and deduction_item_listed_on_waiver_statement

  - name: deduction_item_subject_to_qc_review
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, p. 29, deductible items left off statement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-29
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-340-deductions/page-29#deduction_item_category_included_in_waiver
              output: deduction_item_category_included_in_waiver
              hash: sha256:local
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          deduction_item_category_included_in_waiver
          and not deduction_item_listed_on_waiver_statement

  - name: dss_8650_expense_verification_request_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 340 Deductions, p. 29, move to new residence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-340-deductions/page-29
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          fns_unit_reports_move_to_new_residence
