format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
  summary: |-
    Calculate and convert income: Use the income received 30 calendar days prior to the date of application or recertification is received. Calculate and convert the income to a monthly amount using instructions from FNS 305.06. Budget the monthly amount for the month of application and ongoing months for an initial application or reapplication, and for the first month of the new certification period and ongoing months for recertification. If a full month of payments is received in the application or recertification month and one or more payments are nonrepresentative, use only representative payments to calculate the monthly converted amount; add all income received during the month to calculate actual income for the month of application.
rules:
  - name: prior_income_lookback_days
    kind: parameter
    dtype: Count
    source: FNS 310, Section 310 Change #01-2023, p. 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
              excerpt: "Use the income received 30 calendar days prior to the date of application or recertification is received."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30

  - name: budget_monthly_income_for_application_or_reapplication
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310, Section 310 Change #01-2023, p. 3, item 1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
              excerpt: "Use the income received 30 calendar days prior to the date of application or recertification is received."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if action_is_initial_application_or_reapplication: converted_monthly_income_from_prior_lookback_period else: 0

  - name: budget_monthly_income_for_recertification
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310, Section 310 Change #01-2023, p. 3, item 1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
              excerpt: "Use the income received 30 calendar days prior to the date of application or recertification is received."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if action_is_recertification: converted_monthly_income_from_prior_lookback_period else: 0

  - name: converted_monthly_income_when_full_month_has_nonrepresentative_payment
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310, Section 310 Change #01-2023, p. 3, item B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if full_month_of_payments_received_in_application_or_recertification_month and one_or_more_payments_received_are_nonrepresentative: converted_monthly_income_from_representative_payments_received_during_month else: 0

  - name: actual_income_for_month_of_application
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310, Section 310 Change #01-2023, p. 3, item B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-3
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if full_month_of_payments_received_in_application_or_recertification_month and one_or_more_payments_received_are_nonrepresentative: all_income_received_during_month_of_application else: 0
