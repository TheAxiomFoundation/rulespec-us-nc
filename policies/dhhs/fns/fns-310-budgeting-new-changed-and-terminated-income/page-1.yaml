  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-1
  summary: |-
    Caseworkers are required to react to a change in income that is expected to continue for at least one month beyond the month in which the change is reported. A change in earned income includes a change in rate of pay, an ongoing change in work hours, a new source of income, or a terminated source of income. A change in unearned income includes a change in award amount, source, new source, or terminated source. In the base period, if the FNS unit receives a full month of income and all the income received is 30 calendar days prior, the income is considered representative; use the income received during the base period and calculate and convert it to a monthly amount using FNS 305.06.
