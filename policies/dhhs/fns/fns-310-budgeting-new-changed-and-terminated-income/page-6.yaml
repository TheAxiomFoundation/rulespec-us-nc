format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-6
  summary: |-
    "Do not count income past the base period." For terminated income with no pays after the base period, budget zero for initial application or reapplication from the month of application and ongoing, and for recertification from the first month of the new certification period and ongoing. If an individual receives a full month of income during application or recertification, verify the terminated income in the base period and calculate and convert full pays to a monthly amount using FNS 305.06.
rules:
  - name: terminated_income_no_pays_after_base_period_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 310.05(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-6
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          terminated_income_occurs_in_base_period
          and individual_will_receive_no_pays_after_base_period
          and (initial_application_or_reapplication_month_of_application_or_ongoing or recertification_first_month_of_new_certification_period_or_ongoing)
  - name: terminated_income_no_pays_after_base_period_budgeted_monthly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310.05(A)(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-6
              excerpt: "Do not count income past the base period."
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-6
              excerpt: "Budget zero"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if terminated_income_no_pays_after_base_period_applies: 0 else: 0
  - name: full_month_terminated_income_in_application_or_recertification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 310.06(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-6
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          individual_will_receive_full_month_of_income_during_month_of_application_or_recertification
          and terminated_income_occurs_in_base_period
          and full_pays_received_are_used_to_calculate_and_convert_monthly_amount
  - name: full_month_terminated_income_budgeted_monthly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310.06(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-6
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if full_month_terminated_income_in_application_or_recertification_applies: monthly_amount_calculated_and_converted_from_full_pays_under_fns_305_06 else: 0
