format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-4
  summary: '"Budget the monthly amount based on the type of action being taken. a.
    Initial application or reapplication: Budget the actual income received for the
    month of application. Budget the calculated and converted monthly amount for ongoing
    months. b. Recertification: Budget the calculated and converted monthly amount
    for the first month of the new certification period and ongoing months. C. In
    the month of application or recertification, the individual has not received any
    pays but is reasonably anticipated to receive payments during the month."'
rules:
- name: anticipated_biweekly_pay_period_income
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: FNS 310 Change
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-4
          excerpt: 32 hours X 2 weeks = 64 hours per pay period; 64 hours X $10.23
            = $654.72
  versions:
  - effective_from: '2023-01-09'
    formula: expected_work_hours_per_week * expected_weeks_per_biweekly_pay_period
      * hourly_pay_rate
- name: anticipated_biweekly_converted_monthly_income
