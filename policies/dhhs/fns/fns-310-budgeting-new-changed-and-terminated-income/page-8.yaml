format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-8
  summary: |-
    "If verification is provided timely, remove the terminated income from the budget the month after the change becomes known to the FNS worker." If verification is not provided within the 10-day period, remove it "the month after the verification is received."
rules:
  - name: terminated_income_verification_timely_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 310, page 8, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-8
              excerpt: "within the 10-day period"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          10

  - name: verification_of_terminated_income_provided_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 310, page 8, item 1 and item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-8
              excerpt: "If verification is provided timely"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-8
              excerpt: "within the 10-day period"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          terminated_income_verification_provided
          and days_between_terminated_income_verification_request_and_provision <= terminated_income_verification_timely_period_days

  - name: terminated_income_removed_from_budget
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 310, page 8, item 1 and item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-8
              excerpt: "remove the terminated income from the budget the month after the change becomes known"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-8
              excerpt: "remove the terminated income the month after the verification is received"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          individual_has_terminated_income
          and ((verification_of_terminated_income_provided_timely and current_month_is_month_after_change_became_known_to_fns_worker) or (not verification_of_terminated_income_provided_timely and current_month_is_month_after_terminated_income_verification_received))
