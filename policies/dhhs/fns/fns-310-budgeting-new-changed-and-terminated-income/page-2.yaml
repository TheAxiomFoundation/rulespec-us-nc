format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-2
  summary: |-
    Use only representative payments received during the base period to calculate and convert income to a monthly amount. For an initial application or reapplication, budget the calculated and converted amount for the month of application and ongoing months. For a recertification, budget it for the first month of the new certification period and ongoing months.
rules:
  - name: nonrepresentative_base_period_payment_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 310.03, base period with nonrepresentative payment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          payment_received_during_base_period
          and not payment_is_representative
  - name: representative_base_period_payment_used
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 310.03, calculate and convert income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          payment_received_during_base_period
          and payment_is_representative
  - name: monthly_income_budgeted_for_initial_or_reapplication
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310.03, budget monthly amount for initial application or reapplication
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if action_is_initial_application_or_reapplication and month_is_application_month_or_ongoing_month: monthly_amount_calculated_and_converted_using_representative_base_period_payments else: 0
  - name: monthly_income_budgeted_for_recertification
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 310.03, budget monthly amount for recertification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-310-budgeting-new-changed-and-terminated-income/page-2
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if action_is_recertification and month_is_first_month_of_new_certification_period_or_ongoing_month: monthly_amount_calculated_and_converted_using_representative_base_period_payments else: 0
