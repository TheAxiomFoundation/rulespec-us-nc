format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-150-commodities-programs/page-1
  summary: |-
    TEFAP provides emergency food and nutrition assistance at no cost. In North Carolina, TEFAP is handled through county DSS-administered programs in some counties and non-profit organizations in others. Regardless of delivery method, individuals eligible for FNS are also eligible for TEFAP commodities. In county DSS-administered programs, an FNS unit member must present the DSS-3449 and their EBT card or other identification.
rules:
  - name: tefap_commodities_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 150.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-150-commodities-programs/page-1
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          individual_eligible_for_fns

  - name: dss_administered_tefap_commodities_receipt_documentation_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 150.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-150-commodities-programs/page-1
    versions:
      - effective_from: '2021-06-01'
        formula: |-
          member_presents_dss_3449
          and (member_presents_ebt_card or member_presents_other_identification)
