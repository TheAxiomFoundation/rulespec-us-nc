format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-13
  summary: |-
    Section 227 Change #1-2026 February 1, 2026. Applicants for Adjustment to Permanent Resident Status, Applicants for Asylum or Withholding including CAT claims, Deferred Action (DACA) and all forms of Deferred Action, Temporary Protected Status (TPS), and Non-immigrant Visa Holders are "NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR." Pending applicants, DACA recipients, TPS holders, and non-immigrants are not eligible for FNS. For eligibility after LPR adjustment, see FNS 227.06; subject to five-year waiting period as LPR unless otherwise exempt.
rules:
  - name: not_fns_eligible_under_listed_non_lpr_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 13, eligibility column
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-13
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          (
            applicant_for_adjustment_to_permanent_resident_status
            or applicant_for_asylum_or_withholding_including_cat_claim
            or has_deferred_action_or_daca
            or has_temporary_protected_status
            or has_nonimmigrant_visa_status
          )
          and not adjusted_status_to_lpr
