format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-14
  summary: |-
    Deferred Enforced Departure, Family Unity Beneficiaries, Lawful Temporary Resident Under IRCA, Order of Supervision, Special Agricultural Workers, and Applicants for Cancellation of Removal or Suspension of Deportation are "NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR." The page states to see FNS 227.06 for eligibility after LPR adjustment and that the five-year waiting period applies as LPR unless otherwise exempt.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-14#eligibility_after_lpr_adjustment
      reason: The source directs readers to FNS 227.06 for eligibility after adjustment to LPR and the five-year waiting period determination; that upstream source is not provided in this target context.
rules:
  - name: person_in_page_14_non_lpr_classification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 14, alien classification eligibility table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-14
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          has_deferred_enforced_departure
          or has_family_unity_beneficiary_status
          or is_lawful_temporary_resident_under_irca
          or is_under_order_of_supervision
          or is_special_agricultural_worker
          or is_applicant_for_cancellation_of_removal_or_suspension_of_deportation
  - name: person_not_eligible_for_fns_unless_adjusted_to_lpr
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 14, eligibility column
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-14
              excerpt: "NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_in_page_14_non_lpr_classification
          and not adjusted_status_to_lpr
