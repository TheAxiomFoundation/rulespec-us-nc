format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-8
  summary: |-
    If the individual does not claim to have one of the statuses that makes them eligible for FNS benefits, or does not seek benefits for themselves, no further verification of the individual's immigration status is required. If the individual claims to be in an eligible immigration category AND seeks benefits for themselves: Proceed to Step 2. Under H.R. 1, only three categories of noncitizens may participate: Lawful Permanent Residents subject to Step 3, Cuban/Haitian Entrants eligible immediately, and COFA Migrants eligible immediately.
rules:
  - name: further_immigration_status_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-8
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_claims_eligible_immigration_category
          and individual_seeks_benefits_for_self

  - name: lpr_requires_step_3_waiting_period_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.05, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-8
              excerpt: "Lawful Permanent Residents (LPRs) - subject to five-year waiting period determination (Step 3)"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_is_lawful_permanent_resident

  - name: non_citizen_eligible_immediately_for_fns_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.05, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-8
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_is_cuban_haitian_entrant
          or individual_is_cofa_migrant

  - name: non_citizen_not_eligible_for_fns_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.05, page 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-8
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_is_listed_as_not_eligible
