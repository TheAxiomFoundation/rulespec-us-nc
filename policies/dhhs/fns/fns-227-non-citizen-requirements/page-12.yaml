format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-12
  summary: "Trafficking Survivors, certain Afghan nationals granted parole between\
    \ July 31, 2021, and September 30, 2023, and certain Ukrainian nationals granted\
    \ parole between February 24, 2022, and September 30, 2024 are \"NOT ELIGIBLE\
    \ UNLESS ADJUSTED STATUS TO LPR, THEN ELIGIBLE IMMEDIATELY.\" Battered Aliens\
    \ (VAWA) and Conditional Entrants admitted under INA \xA7 203(a)(7) before 4/1/1980\
    \ are \"NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR\" and are \"Subject to five-year\
    \ waiting period as LPR unless otherwise exempt.\""
rules:
- name: lpr_adjusted_status_eligible_immediately_due_to_prior_status
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 227 Non-Citizen Requirements, page 12, trafficking survivors and specified
    Afghan/Ukrainian parolees
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-12
          excerpt: NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR, THEN ELIGIBLE IMMEDIATELY
  versions:
  - effective_from: '2026-02-01'
    formula: "adjusted_status_to_lpr\nand (\n  prior_status_was_trafficking_survivor\n\
      \  or prior_status_was_certain_afghan_national_granted_parole_within_specified_period\n\
      \  or prior_status_was_certain_ukrainian_national_granted_parole_within_specified_period\n\
      )"
