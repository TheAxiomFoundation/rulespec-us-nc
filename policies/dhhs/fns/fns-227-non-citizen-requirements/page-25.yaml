format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-25
  summary: |-
    Non-citizens are subject to ALL FNS eligibility requirements, including enumeration (SSN). Do NOT include a non-citizen in the budget until enumeration is provided, except expedited service households per FNS 425. Sponsor deeming applies only to eligible LPRs whose sponsor signed a legally binding affidavit of support on or after Dec. 19, 1997. If verification is requested regarding whether a non-citizen has a sponsor, eligibility for benefits cannot be delayed, denied, reduced, or terminated pending receipt.
rules:
  - name: non_citizen_may_be_included_in_budget_for_enumeration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.08, page 25, J Enumeration Requirements for Non-Citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-25
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-25
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_non_citizen
          and (enumeration_provided or household_is_expedited_service_household_under_fns_425)

  - name: sponsored_non_citizen_subject_to_deeming
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.08 Step 5 Sponsored Non-Citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-25
              excerpt: "Deeming applies only to eligible Lawful Permanent Residents (LPRs) whose sponsor has signed a legally binding affidavit of support ... on or after Dec. 19, 1997."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_eligible_lawful_permanent_resident
          and sponsor_signed_legally_binding_affidavit_of_support_on_or_after_december_19_1997

  - name: sponsor_status_verification_pending_cannot_delay_benefits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.08 Step 5 Sponsored Non-Citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-25
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          verification_requested_regarding_whether_non_citizen_has_sponsor
