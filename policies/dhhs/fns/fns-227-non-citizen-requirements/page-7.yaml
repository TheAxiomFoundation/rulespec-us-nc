format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
  summary: |-
    227.04 DETERMINING NON-CITIZEN STATUS ... Non-citizen: Individuals who are not citizens or nationals of the United States. Ineligible non-citizen: Individuals who, by reason of their citizenship or immigration status, are not eligible to receive FNS benefits. ... Eligible non-citizen: Individuals who fall into one of the three eligible categories under H.R. 1 (LPR, Cuban/Haitian Entrant, or COFA Migrant) and meet all other eligibility requirements. ... STEP 1: INELIGIBLE NON-CITIZENS ... includes: Individuals with no current lawful status; Individuals with lawful statuses that do not confer FNS eligibility, including short-term visas, DACA, TPS, refugees, asylees, parolees unless adjusted to LPR, and many other forms of lawful presence.
rules:
  - name: non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.04, Terms used throughout the section
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
              excerpt: "Non-citizen: Individuals who are not citizens or nationals of the United States."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          not person_is_citizen_or_national_of_united_states

  - name: refugee_asylee_or_parolee_status_without_lpr_adjustment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.04, Step 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
              excerpt: "Refugees, asylees, parolees (unless adjusted to LPR)"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          (person_is_refugee or person_is_asylee or person_is_parolee)
          and not person_adjusted_to_lawful_permanent_resident

  - name: lawful_status_does_not_confer_fns_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.04, Step 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
              excerpt: "lawful statuses that do not confer FNS eligibility, including: Short-term visas ... DACA ... TPS ... Refugees, asylees, parolees ... Many other forms"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_has_short_term_visa
          or person_has_deferred_action_for_childhood_arrivals
          or person_has_temporary_protected_status
          or refugee_asylee_or_parolee_status_without_lpr_adjustment
          or person_has_other_lawful_presence_that_does_not_confer_fns_eligibility

  - name: ineligible_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.04, Terms and Step 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
              excerpt: "Ineligible non-citizen: Individuals who, by reason of their citizenship or immigration status, are not eligible to receive FNS benefits."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
              excerpt: "Individuals with no current lawful status; Individuals with lawful statuses that do not confer FNS eligibility"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          non_citizen
          and (person_has_no_current_lawful_status or lawful_status_does_not_confer_fns_eligibility)

  - name: eligible_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.04, Terms used throughout the section
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
              excerpt: "Eligible non-citizen: Individuals who fall into one of the three eligible categories under H.R. 1 (LPR, Cuban/Haitian Entrant, or COFA Migrant)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-7
              excerpt: "and meet all other eligibility requirements"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          non_citizen
          and (person_is_lawful_permanent_resident or person_is_cuban_haitian_entrant or person_is_cofa_migrant)
          and person_meets_all_other_fns_eligibility_requirements
