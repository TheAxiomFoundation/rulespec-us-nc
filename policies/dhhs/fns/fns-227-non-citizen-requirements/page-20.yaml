format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-20
  summary: Verification is required to confirm the individual's claimed non-citizen
    status and, where applicable, the date that status was obtained. County agencies
    must verify non-citizen status through SAVE at initial application and every recertification.
    Do not delay, deny, reduce, or terminate benefits pending verification results
    if the individual has provided acceptable documentation. Each unit member who
    is a non-citizen and applying for FNS benefits for himself or herself must provide
    original documentation; documentation must be verified electronically using SAVE,
    and state agencies cannot use any other method. Under H.R. 1, only LPRs, Cuban/Haitian
    Entrants, and COFA Migrants are eligible non-citizen categories; CHE and COFA
    are eligible immediately, while LPRs are subject to the 5-year waiting period
    unless exempt.
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-20#save_verification_required_for_non_citizen_applicant
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: original_non_citizen_status_documentation_requirement_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 227.07, Step 4, Verification of Non-Citizen Status
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-20
  versions:
  - effective_from: '2026-02-01'
    formula: 'person_is_non_citizen

      and person_applies_for_fns_for_self

      and person_provided_original_non_citizen_status_documentation'
- name: benefits_may_not_be_adversely_acted_on_pending_verification
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 227.07, Important note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-20
  versions:
  - effective_from: '2026-02-01'
    formula: 'verification_results_are_pending

      and individual_provided_acceptable_documentation'
- name: immediately_eligible_non_citizen_category
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 227.07(A), Verification Overview
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-20
  versions:
  - effective_from: '2026-02-01'
    formula: 'person_is_cuban_haitian_entrant

      or person_is_cofa_migrant'
- name: claimed_lpr_status_documentation_acceptable
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 227.07(B), Acceptable Verification Documents
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-20
  versions:
  - effective_from: '2026-02-01'
    formula: 'person_has_i_551_permanent_resident_card

      or person_has_unexpired_i_551_stamp_in_foreign_passport

      or person_has_i_797_notice_showing_lpr_status'
