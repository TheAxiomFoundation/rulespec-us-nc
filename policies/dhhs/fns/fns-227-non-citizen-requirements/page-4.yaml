format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-4
  summary: |-
    Effective February 1, 2026, county agencies must verify eligible immigration status of all non-citizen household members applying for FNS through SAVE after households submit USCIS documentation. County agencies cannot request or verify citizenship or immigration status for household members not seeking FNS benefits. At recertification, agencies apply H.R. 1 eligibility criteria and initiate SAVE verification for non-citizen FNS unit members seeking benefits. During an active certification period, agencies do not send Requests for Contact or take adverse action mid-certification due to prior NCFAST certification status, but act on voluntarily reported immigration-status changes and initiate SAVE.
rules:
  - name: uscis_documentation_required_for_non_citizen_applicant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227 Change #1-2026, SAVE Verification Requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-4
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_non_citizen
          and person_is_household_member_applying_for_fns
