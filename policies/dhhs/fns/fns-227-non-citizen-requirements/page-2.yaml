format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-2
  summary: |-
    COFA Migrants: Citizens of Federated States of Micronesia, Republic of Marshall Islands, or Republic of Palau ... None -- eligible immediately. Non-Citizen U.S. Nationals ... are eligible immediately with no waiting period. Categories listed under PRWORA are no longer independently eligible for FNS based on their status; eligibility is determined by current immigration status, not prior status.
rules:
  - name: cofa_migrant_immediately_eligible_for_fns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 2, COFA Migrants
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-2
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_citizen_of_federated_states_of_micronesia
          or person_is_citizen_of_republic_of_marshall_islands
          or person_is_citizen_of_republic_of_palau

  - name: non_citizen_us_national_immediately_eligible_for_fns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 2, Non-Citizen U.S. Nationals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-2
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_non_citizen_us_national

  - name: formerly_independent_qualified_alien_category
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 2, Categories No Longer Independently Eligible
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-2
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_refugee_admitted_under_ina_207
          or person_is_asylee_granted_asylum_under_ina_208
          or person_has_deportation_or_removal_withheld_under_ina
          or person_is_conditional_entrant_under_ina_203_a_7
          or person_is_parolee_admitted_under_ina_212_d_5_for_at_least_one_year
          or person_is_battered_alien_under_vawa
          or person_is_victim_of_severe_form_of_trafficking
          or person_is_amerasian_immigrant
          or person_is_iraqi_or_afghan_special_immigrant
          or person_is_certain_afghan_national_granted_parole_in_referenced_window
          or person_is_certain_ukrainian_national_granted_parole_in_referenced_window

  - name: status_no_longer_independently_eligible_for_fns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 2, Categories No Longer Independently Eligible
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-2
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          formerly_independent_qualified_alien_category
          and not person_currently_lawful_permanent_resident

  - name: adjusted_to_lpr_pathway_to_fns_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 2, Pathway to Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-2
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          formerly_independent_qualified_alien_category
          and person_currently_lawful_permanent_resident
