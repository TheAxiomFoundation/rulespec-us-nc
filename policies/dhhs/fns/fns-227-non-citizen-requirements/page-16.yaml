format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-16
  summary: |-
    Directly eligible categories under H.R. 1 Section 10108 do not need to become LPRs and are not subject to any waiting period. Cuban/Haitian Entrants and COFA Migrants are eligible immediately. LPRs must either be exempt from the waiting period, have held qualified alien status for at least five years, or have 40 qualifying quarters of work. LPRs with certain humanitarian statuses before adjusting to LPR remain exempt.
rules:
  - name: five_year_waiting_period_years
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 227.06
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-16
              excerpt: "five-year waiting period"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          5

  - name: qualifying_quarters_required
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 227.06
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-16
              excerpt: "40 qualifying quarters of work"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          40

  - name: cofa_migrant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.06(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-16
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          citizen_of_federated_states_of_micronesia
          or citizen_of_marshall_islands
          or citizen_of_palau

  - name: directly_eligible_without_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.06(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-16
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          cuban_haitian_entrant
          or cofa_migrant

  - name: lpr_exempt_from_five_year_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-16
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          lawful_permanent_resident
          and held_certain_humanitarian_status_before_adjusting_to_lpr

  - name: lpr_satisfies_waiting_period_or_quarters_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.06
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-16
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-16#five_year_waiting_period_years
              output: five_year_waiting_period_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-16#qualifying_quarters_required
              output: qualifying_quarters_required
              hash: sha256:local
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          lawful_permanent_resident
          and (
            lpr_exempt_from_five_year_waiting_period
            or years_held_qualified_alien_status >= five_year_waiting_period_years
            or qualifying_quarters_of_work >= qualifying_quarters_required
          )
