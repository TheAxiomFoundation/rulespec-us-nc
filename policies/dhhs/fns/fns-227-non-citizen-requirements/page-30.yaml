format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-30
  summary: |-
    The 40 qualifying quarters exemption under 8 U.S.C. § 1612(a)(2)(B) is unchanged by H.R. 1. LPRs who can be credited with 40 qualifying quarters of work are exempt from the 5-year waiting period and sponsor deeming, if applicable. The 40 quarters must be verified prior to participation, if the eligible non-citizen is not otherwise exempt from the waiting period. Quarter -- A period of three calendar months ending March 31, June 30, September 30, or December 31. Covered Earnings -- Wages or self-employment income which requires payment of FICA (social security) taxes.
rules:
  - name: qualifying_quarters_exemption_quarter_count
    kind: parameter
    dtype: Count
    source: FNS 227.09, Calculating 40 Qualifying Quarters
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-30
              excerpt: "40 qualifying quarters"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          40

  - name: qualifying_quarters_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.09, Calculating 40 Qualifying Quarters
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-30
              excerpt: "LPRs who can be credited with 40 qualifying quarters of work"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-30#qualifying_quarters_exemption_quarter_count
              output: qualifying_quarters_exemption_quarter_count
              hash: sha256:local
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_lawful_permanent_resident
          and credited_qualifying_quarters_of_work >= qualifying_quarters_exemption_quarter_count

