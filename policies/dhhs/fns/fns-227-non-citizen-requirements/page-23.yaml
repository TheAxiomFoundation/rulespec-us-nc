format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-23
  summary: |-
    Attachments are required for: All Level 3 SAVE verification requests; Cuban/Haitian Entrant status verification; suspected counterfeit or altered documents; and SAVE resubmission responses requiring documents. If SAVE cannot immediately verify status, proceed to Level 2 or Level 3 as indicated and document the pending verification in case notes.
rules:
  - name: save_document_attachment_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227.E, NCFAST SAVE Procedures, When Document Attachments Are Required
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-23
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          save_request_is_level_3
          or cuban_haitian_entrant_status_verification
          or suspected_counterfeit_or_altered_documents
          or save_response_indicates_resubmission_with_documents_required

  - name: save_attachment_format_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227.E, NCFAST SAVE Procedures, When Document Attachments Are Required
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-23
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          not save_document_attachment_required
          or (
            document_front_and_back_scanned
            and document_scans_merged_into_single_pdf
          )

  - name: pending_save_verification_procedure_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227.F.1, Benefits Pending Verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-23
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          not save_cannot_immediately_verify_status
          or (
            proceeded_to_level_2_or_level_3_as_indicated_by_save_response
            and pending_verification_documented_in_case_notes
          )
