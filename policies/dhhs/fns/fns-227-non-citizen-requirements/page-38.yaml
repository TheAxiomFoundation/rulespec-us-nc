format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-38
  summary: |-
    H.R. 1 changed WHO is eligible/ineligible. It did NOT change HOW we budget for households with ineligible non-citizens. NC’s Pre-H.R. 1 Election: Option 2 for Pre-PRWORA Ineligible Non-Citizens – All income for gross income test for eligibility determination, then prorate income and deductions for allotment calculations.
rules:
  - name: pre_prwora_ineligible_noncitizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.11(B)(1), Pre-PRWORA Ineligible Non-Citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-38
              excerpt: "Who: Non-citizens who were ineligible BEFORE PRWORA"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          noncitizen_was_ineligible_before_prwora

  - name: pre_prwora_ineligible_noncitizen_income_counts_in_full_for_gross_income_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 227.11(B)(1), NC’s Pre-H.R. 1 Election
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-38
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          household_has_pre_prwora_ineligible_noncitizen

  - name: pre_prwora_ineligible_noncitizen_income_and_deductions_prorated_for_allotment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 227.11(B)(1), NC’s Pre-H.R. 1 Election
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-38
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          household_has_pre_prwora_ineligible_noncitizen
