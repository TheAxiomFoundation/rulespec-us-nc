format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-31
  summary: |-
    The non-citizen's work and work by his/her parents and/or spouse (with certain exceptions) can be combined to attain the 40 qualifying quarters. Number holders whose quarters can be credited include the non-citizen individual always; biological and adoptive parents only for quarters worked before the non-citizen's 18th birthday; stepparents only while the step relationship existed and the non-citizen was under age 18; and a current spouse only for quarters worked during the spousal relationship. If a couple divorces, stop counting their quarters toward each other at next recertification, application, or reapplication.
rules:
  - name: qualifying_quarter_requirement
    kind: parameter
    dtype: Count
    source: FNS 227, Section 227.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-31
              excerpt: "attain the 40 qualifying quarters"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          40

  - name: quarters_based_on_annual_earnings
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 227, Section 227 definitions and critical concept
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-31
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          covered_earnings_assigned_to_calendar_quarter
          and annual_earnings_determine_quarters

  - name: number_holder_quarters_can_be_credited_to_noncitizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227.B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-31
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          number_holder_is_noncitizen_individual
          or (number_holder_is_biological_parent_of_noncitizen and quarters_worked_prior_to_noncitizen_18th_birthday)
          or (number_holder_is_adoptive_parent_of_noncitizen and quarters_worked_prior_to_noncitizen_18th_birthday)
          or (number_holder_is_stepparent_of_noncitizen and step_relationship_still_exists and quarters_worked_while_step_relationship_existed and quarters_worked_while_noncitizen_under_age_18)
          or (number_holder_is_current_spouse_of_noncitizen and quarters_worked_during_spousal_relationship)

  - name: former_spouse_quarters_stop_counting_at_next_certification_action
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227.B.1.e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-31
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          couple_divorced
          and next_recertification_application_or_reapplication_has_occurred
