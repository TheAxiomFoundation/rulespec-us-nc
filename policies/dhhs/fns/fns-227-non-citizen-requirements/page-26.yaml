format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
  summary: |-
    "Sponsored Non-citizen: A non-citizen admitted lawfully for permanent residence that is sponsored by an individual who has signed an affidavit of support." "The following non-citizens are NOT subject to sponsor deeming requirements:" same-household sponsor, not-required-to-have-sponsor categories, and Vietnamese Amerasians.
rules:
  - name: sponsored_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          non_citizen_admitted_lawfully_for_permanent_residence
          and sponsored_by_individual_who_signed_affidavit_of_support
  - name: individual_sponsor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "executed an affidavit of support on or after December 19, 1997"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_executed_affidavit_of_support_for_non_citizen
          and affidavit_of_support_executed_on_or_after_required_date
          and affidavit_of_support_condition_of_non_citizen_entry_or_admission
  - name: same_household_sponsor_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          non_citizen_participating_in_fns
          and non_citizen_member_of_sponsors_unit
  - name: not_required_to_have_sponsor_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "not required to have a sponsor under the Immigration and Nationality Act"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "A refugee admitted after March 31, 1980"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "conditional entrant granted status before April 1, 1980"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          refugee_admitted_after_required_date
          or parolee_admitted_under_section_212_d_5
          or granted_political_asylum
          or cuban_or_haitian_entrant
          or conditional_entrant_granted_status_before_required_date
          or held_listed_status_and_since_obtained_lpr_status
  - name: vietnamese_amerasian_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-26
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          non_citizen_from_vietnam
          and entered_us_under_foreign_operations_act
  - name: subject_to_sponsor_deeming_requirements
