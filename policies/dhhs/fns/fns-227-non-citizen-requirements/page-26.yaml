              output: same_household_sponsor_exemption
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-26#not_required_to_have_sponsor_exemption
              output: not_required_to_have_sponsor_exemption
              hash: sha256:local
          - path: versions[0].formula
