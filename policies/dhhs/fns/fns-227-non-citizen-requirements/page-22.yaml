format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-22
  summary: |-
    SAVE is used to verify immigration status. Use SAVE at application when an individual claims non-citizen status and seeks benefits, at each recertification, and at a reported change when an individual reports a change in immigration status. Cuban/Haitian Entrant status verification must be sent as a Third Level (Level 3) SAVE request with CHE documentation scanned and attached.
rules:
  - name: save_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.D.1, page 22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-22
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          (application_individual_claims_non_citizen_status and application_individual_seeks_benefits)
          or recertification_is_being_completed
          or (individual_reports_change and individual_reports_change_in_immigration_status)
  - name: save_primary_level
    kind: parameter
    dtype: Integer
    source: FNS 227.D.2.a, page 22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-22
              excerpt: "Level 1 (Primary)"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          1
  - name: save_additional_level
    kind: parameter
    dtype: Integer
    source: FNS 227.D.2.b, page 22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-22
              excerpt: "Level 2 (Additional)"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          2
  - name: save_third_level
    kind: parameter
    dtype: Integer
    source: FNS 227.D.2.c and Cuban/Haitian Entrant Verification, page 22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-22
              excerpt: "Level 3 (Third Level)"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          3
  - name: cuban_haitian_entrant_save_request_level
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: Cuban/Haitian Entrant Verification, page 22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-22
              excerpt: "must be sent to SAVE as a Third Level (Level 3)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-22#save_third_level
              output: save_third_level
              hash: sha256:local
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          if cuban_haitian_entrant_status_verification_requested: save_third_level else: 0
  - name: cuban_haitian_entrant_documentation_must_be_attached_to_save_request
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Cuban/Haitian Entrant Verification, page 22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-22
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          cuban_haitian_entrant_status_verification_requested
          and documentation_of_cuban_haitian_entrant_status_available
