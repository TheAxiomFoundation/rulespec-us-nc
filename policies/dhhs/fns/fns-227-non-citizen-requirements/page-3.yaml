format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-3
  summary: |-
    "Apply H.R. 1 non-citizen eligibility criteria at initial application and recertification effective February 1, 2026." "For FNS applications received before February 1, 2026 but processed on or after February 1, 2026, determine eligibility separately for each benefit month based on the policy in effect for that month."
rules:
  - name: h_r_1_non_citizen_criteria_apply_at_application_or_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 227.03.F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-3
              excerpt: "effective February 1, 2026"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-3
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          household_is_at_initial_application
          or household_is_at_recertification
  - name: h_r_1_non_citizen_criteria_apply_to_new_fns_applicant
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 227.03.F.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-3
              excerpt: "Effective February 1, 2026"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-3
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          household_is_new_fns_applicant
  - name: pending_application_eligibility_determined_by_benefit_month_policy
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 227.03.F.1, Pending Applications
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-3
              excerpt: "received before February 1, 2026 but processed on or after February 1, 2026"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-3
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          application_received_before_h_r_1_effective_date
          and application_processed_on_or_after_h_r_1_effective_date
          and eligibility_determined_separately_for_each_benefit_month_based_on_policy_in_effect_for_that_month
