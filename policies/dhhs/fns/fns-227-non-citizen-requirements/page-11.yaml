format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-11
  summary: |-
    "Refugee Admitted under INA § 207 ... NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR, THEN ELIGIBLE IMMEDIATELY ... No five-year waiting period if adjusted to LPR given prior refugee status." The same eligibility treatment is stated for granted withholding of deportation/removal, Iraqi or Afghan Special Immigrant status, and Hmong or Highland Laotian covered persons.
rules:
  - name: refugee_admitted_under_ina_207_eligible_after_lpr_adjustment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 11, Refugee Admitted under INA § 207
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-11
              excerpt: 'Refugee Admitted under INA § 207 ... NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR, THEN ELIGIBLE IMMEDIATELY'
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_was_refugee_admitted_under_ina_207
          and person_adjusted_status_to_lpr

  - name: withholding_of_deportation_or_removal_granted_eligible_after_lpr_adjustment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 11, Withholding of Deportation/Removal (Granted)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-11
              excerpt: 'Withholding of Deportation/Removal (Granted) ... NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR, THEN ELIGIBLE IMMEDIATELY'
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_was_granted_withholding_of_deportation_or_removal
          and person_adjusted_status_to_lpr

  - name: iraqi_or_afghan_special_immigrant_eligible_after_lpr_adjustment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 11, Iraqi or Afghan Special Immigrant (SIV)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-11
              excerpt: 'Iraqi or Afghan Special Immigrant (SIV) ... NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR, THEN ELIGIBLE IMMEDIATELY'
