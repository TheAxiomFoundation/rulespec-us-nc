  - name: hmong_or_highland_laotian_eligible_after_lpr_adjustment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 11, Hmong or Highland Laotian
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-11
              excerpt: 'Hmong or Highland Laotian And spouses, surviving spouses, unmarried dependent children. Must have assisted U.S. during Vietnam era ... NOT ELIGIBLE UNLESS ADJUSTED STATUS TO LPR, THEN ELIGIBLE IMMEDIATELY'
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_hmong_or_highland_laotian_or_covered_family_member_who_assisted_us_during_vietnam_era
          and person_adjusted_status_to_lpr
