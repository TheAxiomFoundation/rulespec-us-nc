format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-9
  summary: |-
    Cuban/Haitian Entrant: ELIGIBLE IMMEDIATELY; no five-year waiting period required; must request SAVE verification using CHE-specific button; I-220B Order of Supervision does NOT establish CHE. COFA migrants: citizens of FSM, RMI, or Palau with listed COFA documents or SAVE verification are ELIGIBLE IMMEDIATELY; no five-year waiting period required.
rules:
  - name: cuban_haitian_entrant_designation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 9, Cuban/Haitian Entrant row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-9
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          (
            i94_stamped_cuban_haitian_entrant_status_pending
            or (i94_or_passport_has_212_d_5_parole_stamp and person_is_cuban_or_haitian_national)
            or (i766_ead_coded_c11 and person_is_cuban_or_haitian_national)
            or (i766_ead_coded_a04 and person_is_cuban_or_haitian_national)
            or (i766_ead_coded_c08 and person_is_cuban_or_haitian_national)
            or (i797c_receipt_for_i589_pending_asylum and person_is_cuban_or_haitian_national)
            or (i862_notice_to_appear_removal_proceedings and person_is_cuban_or_haitian_national and not subject_to_final_removal_order)
            or (i220a_order_of_release_on_recognizance and person_is_cuban_or_haitian_national)
            or (i551_coded_cu6_cu7_ch6_or_hb6 and save_che_verification_confirms_che)
            or save_che_verification_confirms_che
          )
          and not i220b_order_of_supervision
  - name: cuban_haitian_entrant_fns_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 9, Cuban/Haitian Entrant eligibility column
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-9
              excerpt: "ELIGIBLE IMMEDIATELY"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          cuban_haitian_entrant_designation
  - name: cofa_migrant_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 9, COFA Migrants row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-9
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_citizen_of_fsm_rmi_or_palau
          and (
            passport_has_cofa_admission_stamp
            or i94_shows_duration_of_status_admission_under_cofa
            or i766_ead_coded_274a_12_a_8_or_a08
            or save_verification_confirms_cofa_status
          )
  - name: cofa_migrant_fns_eligible_immediately
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 9, COFA Migrants eligibility column
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-9
              excerpt: "ELIGIBLE IMMEDIATELY"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          cofa_migrant_status
