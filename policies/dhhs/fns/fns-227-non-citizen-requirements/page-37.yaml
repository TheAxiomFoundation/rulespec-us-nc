format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-37
  summary: |-
    Under no circumstances may a SNAP household member be reported as being unlawfully present based on race or national origin, appearance, limited English, or proficiency in another language. Local DSS offices must report only when specific EOIR evidence, such as a Final Order of Deportation, identifies non-citizens not legally present. It is a breach of confidentiality to discuss citizenship/noncitizen status with employers, landlords, etc.
rules:
  - name: local_dss_report_to_dcfw_required_for_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227, page 37, Reporting Procedures and civil rights reporting limits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-37
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-37
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          dss_has_identified_non_citizen_snap_household_member_not_legally_present_in_us
          and dss_received_specific_evidence_from_eoir_such_as_final_order_of_deportation
          and not report_is_based_on_race_national_origin_appearance_limited_english_or_other_language_proficiency
  - name: citizenship_status_confidentiality_breach
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227, page 37, Confidentiality of Citizenship/Non-citizen Status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-37
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-37
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_citizenship_or_noncitizen_status_is_discussed
          and discussion_is_with_employer_landlord_or_similar_party
