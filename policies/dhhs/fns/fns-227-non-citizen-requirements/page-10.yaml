format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-10
  summary: |-
    LPR "Green card" holder: may be eligible immediately or may be subject to 5-year waiting period; proceed to Step 3 (FNS 227.06). Certain American Indians born abroad, Amerasians, and Asylees: not eligible unless adjusted status to LPR, then eligible immediately; no five-year waiting period if adjusted to LPR.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-10#lawful_permanent_resident_fns_eligibility
      reason: The source directs LPR cases to Step 3 (FNS 227.06) to determine whether the 5-year waiting period or 40 quarters requirement applies, but that referenced computation is not provided in this source unit.
rules:
  - name: american_indian_born_abroad_lpr_adjustment_fns_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, page 10, Certain American Indians Born Abroad row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-10
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_certain_american_indian_born_abroad
          and person_adjusted_status_to_lawful_permanent_resident

