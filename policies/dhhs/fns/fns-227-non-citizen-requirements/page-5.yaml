format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-5
  summary: |-
    Individuals who lose eligibility at recertification due to H.R. 1 non-citizen eligibility changes are not subject to claims for benefits received between the H.R. 1 enactment date and their recertification date. Each applicant/recipient of FNS must be a U.S. citizen, a U.S. national, or a non-citizen in an eligible immigration category under Section 6(f) of the Food and Nutrition Act to participate in the FNS program.
rules:
  - name: fns_non_citizen_requirement_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.02 Non-Citizen Requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-5
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_us_citizen
          or person_is_us_national
          or person_is_non_citizen_in_eligible_immigration_category_under_food_and_nutrition_act_section_6_f
  - name: not_subject_to_claim_for_pre_recertification_benefits_due_to_hr1_changes
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 4, No Claims for Pre-Recertification Benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-5
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_loses_eligibility_at_recertification_due_to_hr1_non_citizen_eligibility_changes
          and benefits_were_received_between_hr1_enactment_date_and_recertification_date
