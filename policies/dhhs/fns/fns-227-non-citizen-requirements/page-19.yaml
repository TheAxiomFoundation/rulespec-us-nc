format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-19
  summary: |-
    "Veteran Dependent Child: Legally adopted or biological dependent child under 18, OR full-time student under 22, OR child dependent on veteran at death, OR disabled child 18+ if disabled before 18th birthday." Individuals lawfully residing in the U.S. on August 22, 1996 and currently age 65 or older qualify. The five-year waiting period runs from the date qualified alien status was obtained, not LPR adjustment; LPRs who have held qualified alien status for at least five years, or who have 40 qualifying quarters, are eligible if otherwise eligible.
rules:
  - name: veteran_dependent_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227 Change #1-2026, page 19, item c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-19
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          child_is_legally_adopted_or_biological_dependent_child_under_age_18
          or child_is_full_time_student_under_age_22
          or child_was_dependent_on_veteran_at_death
          or child_is_disabled_age_18_or_older_and_disabled_before_18th_birthday

  - name: lawfully_residing_age_65_plus_fns_eligible_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227 Change #1-2026, page 19, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-19
              excerpt: "lawfully residing in U.S. on August 22, 1996 AND is currently age 65 or older"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_was_lawfully_residing_in_us_on_august_22_1996
          and individual_is_currently_age_65_or_older

  - name: entered_before_august_22_1996_with_continuous_presence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227 Change #1-2026, page 19, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-19
              excerpt: "entered U.S. before August 22, 1996 and has maintained continuous presence until obtaining qualified immigrant status"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_entered_us_before_august_22_1996
          and individual_maintained_continuous_presence_until_obtaining_qualified_immigrant_status

  - name: five_year_waiting_period_completed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227 Change #1-2026, page 19, item E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-19
              excerpt: "five-year waiting period runs from the date the individual obtained qualified alien status"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_has_held_qualified_alien_status_for_at_least_five_years_from_earliest_qualifying_date

  - name: lpr_eligible_after_waiting_period_or_qualifying_quarters
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227 Change #1-2026, page 19, item F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-19
              excerpt: "Any LPR subject to the five-year waiting period ... at least five years is eligible ... Alternatively, any LPR who has earned or can be credited with 40 qualifying quarters"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_is_lawful_permanent_resident
          and individual_meets_all_other_fns_eligibility_requirements
          and (
            (individual_is_subject_to_five_year_waiting_period and five_year_waiting_period_completed)
            or individual_has_earned_or_can_be_credited_with_40_qualifying_quarters
          )
