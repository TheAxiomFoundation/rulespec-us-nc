format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
  summary: |-
    Important Restriction: None of the qualifying quarters earned after December 31, 1996 are counted if the wage earner received any federal means-tested public assistance benefit during the period for which the qualifying quarter is credited. Assessing QC Status: Always credit the non-citizen individual's own quarters first. If combined U.S. years, including commuter/overseas work, are still less than 10 years, STOP. Four quarters in each year can be credited to the non-citizen from each relevant individual.
rules:
  - name: forty_qc_exception_required_quarters
    kind: parameter
    dtype: Count
    source: FNS 227, Section 227, Change #1-2026, page 32, Assessing QC Status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "40 QC exception"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          40

  - name: qc_feasibility_years_threshold
    kind: parameter
    dtype: Count
    source: FNS 227, Section 227, Change #1-2026, page 32, Step 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "If the total equals at least 10 years, proceed to Step 3."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          10

  - name: maximum_qualifying_quarters_per_year_per_relevant_individual
    kind: parameter
    dtype: Count
    source: FNS 227, Section 227, Change #1-2026, page 32, Step 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "Four quarters in each year can be credited to the non-citizen from each relevant individual."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          4

  - name: quarter_countable_despite_public_assistance_restriction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 227, Section 227, Change #1-2026, page 32, Important Restriction
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "None of the qualifying quarters earned after December 31, 1996 are counted if the wage earner received any federal means-tested public assistance benefit during the period"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          not (
            qualifying_quarter_earned_after_restriction_date
            and wage_earner_received_federal_means_tested_public_assistance_during_quarter
          )

  - name: qc_feasibility_review_may_proceed_to_estimate
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 227, Section 227, Change #1-2026, page 32, Step 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "If the total equals at least 10 years, proceed to Step 3."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "If the total is still less than 10 years after adding any commuter/overseas work, STOP."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          combined_us_years_lived_and_credited_work_years >= qc_feasibility_years_threshold

  - name: applicant_cannot_meet_forty_qc_requirement_due_to_feasibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 227, Section 227, Change #1-2026, page 32, Step 2(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "If the total is still less than 10 years after adding any commuter/overseas work, STOP. The applicant cannot meet the 40 QC requirement."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          combined_us_years_lived_and_credited_work_years < qc_feasibility_years_threshold

  - name: estimated_qualifying_quarters_from_relevant_individual_years
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: FNS 227, Section 227, Change #1-2026, page 32, Step 3(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "Four quarters in each year can be credited to the non-citizen from each relevant individual."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          relevant_individual_years_for_qc_estimate * maximum_qualifying_quarters_per_year_per_relevant_individual

  - name: tpqy_verification_should_be_requested
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: FNS 227, Section 227, Change #1-2026, page 32, Step 3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-32
              excerpt: "Request TPQY verification if information shows the non-citizen may meet the 40 QC exception"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          information_shows_non_citizen_may_meet_forty_qc_exception
