format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-24
  summary: |-
    Policy: Do NOT delay, deny, reduce, or terminate benefits pending additional SAVE verification if the individual has provided acceptable documentation of their claimed status. If otherwise eligible based on claimed documented status and all other eligibility requirements, authorize benefits based on the documentation provided while verification is pending. If SAVE ultimately cannot verify eligible non-citizen status, determine the individual as an ineligible non-citizen. If the applicant fails to provide documentation of non-citizen status or if SAVE ultimately cannot verify eligibility, consider the non-citizen member an ineligible non-citizen.
rules:
  - name: benefits_must_continue_pending_save_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227, page 24, Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-24
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          additional_save_verification_pending
          and individual_provided_acceptable_documentation_of_claimed_status
  - name: benefits_authorized_from_documented_claimed_status_while_save_pending
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227, page 24, Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-24
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          additional_save_verification_pending
          and individual_provided_acceptable_documentation_of_claimed_status
          and otherwise_eligible_based_on_claimed_documented_status_and_all_other_eligibility_requirements
  - name: ineligible_non_citizen_due_to_status_documentation_or_save
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 227, page 24, G-H
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-24
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          applicant_fails_to_provide_documentation_of_non_citizen_status
          or save_ultimately_cannot_verify_eligible_non_citizen_status_after_usda_document_verification_requirements
