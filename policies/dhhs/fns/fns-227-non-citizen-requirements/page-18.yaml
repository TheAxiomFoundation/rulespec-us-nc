format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
  summary: |-
    C. LPRs Subject to Five-Year Waiting Period: Former Conditional Entrants; Former Battered Aliens (VAWA); Former Parolees (1+ year, not Afghan/Ukrainian); and All Other LPRs are subject to the five-year waiting period unless they meet a personal exemption in Section D.
    D. Personal Exemptions from Waiting Period (Any LPR): under age 18; blind or disabled as defined in FNS 212.02; 40 qualifying quarters of work; or U.S. military connection.
rules:
  - name: lpr_waiting_period_child_age_threshold
    kind: parameter
    dtype: Count
    source: FNS 227, page 18, Section D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "Under Age 18"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          18

  - name: qualifying_quarters_threshold
    kind: parameter
    dtype: Count
    source: FNS 227, page 18, Section D.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "40 Qualifying Quarters of Work"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          40

  - name: active_duty_minimum_continuous_years_after_rule_date
    kind: parameter
    dtype: Count
    source: FNS 227, page 18, Section D.4.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "After 9/7/1980, minimum 2 years continuous active duty required."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          2

  - name: veteran_spouse_minimum_marriage_years
    kind: parameter
    dtype: Count
    source: FNS 227, page 18, Section D.4.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "if married 1+ year"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          1

  - name: former_ukrainian_parolee_no_waiting_period_category
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, former Ukrainian parolees table row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "Former Ukrainian Parolees (2/24/22-9/30/24) (Per documentation) NO"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_former_ukrainian_parolee
          and parole_documentation_shows_parole_in_ukrainian_parolee_window

  - name: lpr_prior_status_subject_to_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section C table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          lpr_prior_status_was_former_conditional_entrant
          or lpr_prior_status_was_former_battered_alien_vawa
          or lpr_prior_status_was_former_parolee_one_year_not_afghan_or_ukrainian
          or lpr_is_family_sponsored_employment_based_diversity_or_other_lpr

  - name: under_age_lpr_waiting_period_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "All eligible children under 18 are exempt from the waiting period."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_age < lpr_waiting_period_child_age_threshold

  - name: blind_or_disabled_lpr_waiting_period_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "Blind or Disabled: As defined in FNS 212.02."
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_blind_or_disabled_as_defined_in_fns_212_02

  - name: qualifying_quarters_lpr_waiting_period_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section D.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
              excerpt: "40 Qualifying Quarters of Work"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          qualifying_quarters_of_work_count >= qualifying_quarters_threshold

  - name: active_duty_military_connection
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section D.4.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_serves_full_time_duty_in_armed_forces
          and not person_service_is_national_guard_duty
          and (
            not active_duty_service_is_after_minimum_service_rule_date
            or continuous_active_duty_years >= active_duty_minimum_continuous_years_after_rule_date
          )

  - name: veteran_surviving_spouse_military_connection
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section D.4.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_unremarried_surviving_spouse_of_deceased_veteran
          and (
            years_married_to_deceased_veteran >= veteran_spouse_minimum_marriage_years
            or person_had_child_of_marriage_with_deceased_veteran
            or child_of_marriage_was_born_before_marriage
          )

  - name: military_connection_lpr_waiting_period_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section D.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_veteran
          or active_duty_military_connection
          or veteran_surviving_spouse_military_connection
          or person_is_otherwise_eligible_spouse_or_dependent_child_of_veteran_or_active_duty_member

  - name: lpr_personal_exemption_from_five_year_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Section D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          under_age_lpr_waiting_period_exemption
          or blind_or_disabled_lpr_waiting_period_exemption
          or qualifying_quarters_lpr_waiting_period_exemption
          or military_connection_lpr_waiting_period_exemption

  - name: lpr_subject_to_five_year_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 18, Sections C-D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-18
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_lawful_permanent_resident
          and lpr_prior_status_subject_to_waiting_period
          and not lpr_personal_exemption_from_five_year_waiting_period
