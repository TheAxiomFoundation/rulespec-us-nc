format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
  summary: |-
    If the total is less than the gross income limit, the noncitizen is indigent. If indigent, process the case counting only the actual amount of cash support from the sponsor for a 12-month period beginning with the month of determination. Once a determination of indigence is made, the non-citizen remains indigent for 12 months from the date of eligibility. A sponsored non-citizen who is not indigent and not otherwise exempt from sponsor deeming must provide verification of the sponsor's income and resources; an indigent non-citizen is exempt from sponsor deeming, but cash contributions from the sponsor must be verified and counted.
rules:
  - name: sponsor_cash_support_counting_months
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 227, page 29, indigent processing and documentation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
              excerpt: "for a 12-month period beginning with the month of determination"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          12

  - name: indigence_determination_duration_months
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 227, page 29, indigence duration and renewal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
              excerpt: "remains indigent for 12 months from the date of eligibility"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          12

  - name: indigent_by_gross_income_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 29, indigent determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          indigent_test_total_is_less_than_gross_income_limit

  - name: indigent_determination_continues
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 29, duration of indigence determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
              excerpt: "Once a determination of indigence is made, the non-citizen remains indigent for 12 months from the date of eligibility"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          indigence_determination_was_made
          and within_indigence_determination_duration_months

  - name: exempt_from_sponsor_deeming_due_to_indigence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 29, indigent exemption
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          indigent_by_gross_income_limit or indigent_determination_continues

  - name: sponsor_deeming_rules_apply
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 29, verification and documentation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          sponsored_noncitizen
          and not exempt_from_sponsor_deeming_due_to_indigence
          and not otherwise_exempt_from_sponsor_deeming

  - name: sponsor_income_and_resources_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 29, verification of sponsor income and resources
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          sponsor_deeming_rules_apply

  - name: sponsor_cash_contribution_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 29, indigent cash contribution verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          exempt_from_sponsor_deeming_due_to_indigence
          and receives_cash_contributions_from_sponsor

  - name: countable_sponsor_cash_support
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 227, page 29, actual cash support counted for indigent non-citizens
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
              excerpt: "counting only the actual amount of cash support from the sponsor for a 12-month period"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          if exempt_from_sponsor_deeming_due_to_indigence and within_sponsor_cash_support_counting_period: actual_cash_support_from_sponsor else: 0

  - name: sponsored_noncitizen_ineligible_pending_sponsor_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 29, ineligibility pending verification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-29
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          sponsored_noncitizen
          and not exempt_from_sponsor_deeming_due_to_indigence
          and not sponsor_income_and_resources_verification_provided
