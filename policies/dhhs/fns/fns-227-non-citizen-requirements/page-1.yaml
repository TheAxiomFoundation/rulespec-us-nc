format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-1
  summary: |-
    Effective February 1, 2026, non-citizens must fall into one of three categories to be eligible for FNS. The visible table states Lawful Permanent Residents are subject to a 5-year waiting period unless exempt, and Cuban and Haitian Entrants have no waiting period and are eligible immediately.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-1#non_citizen_eligible_for_fns
      reason: The source states that non-citizens must fall into one of three categories, but this page excerpt provides only two visible category rows, and the LPR row depends on the exemption cross-reference to FNS 227.06, which is not available in the supplied context.
rules:
  - name: lpr_waiting_period_years
    kind: parameter
    dtype: Count
    source: FNS 227.01(C), eligible non-citizen categories table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-1
              excerpt: "Subject to 5-year waiting period unless exempt"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          5
  - name: cuban_haitian_entrant_eligible_immediately_for_fns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.01(C), eligible non-citizen categories table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-1
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_cuban_or_haitian_entrant
  - name: lawful_permanent_resident_satisfies_five_year_waiting_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.01(C), eligible non-citizen categories table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-1
              excerpt: "Subject to 5-year waiting period unless exempt"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-227-non-citizen-requirements/page-1#lpr_waiting_period_years
              output: lpr_waiting_period_years
              hash: sha256:local
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_lawful_permanent_resident
          and years_since_lawful_permanent_resident_admission >= lpr_waiting_period_years
