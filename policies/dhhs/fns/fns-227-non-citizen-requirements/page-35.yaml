  - name: individual_referred_to_ssa_for_unreported_wages_investigation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, earned but unreported wages
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          non_citizen_states_wages_were_earned_but_not_reported
