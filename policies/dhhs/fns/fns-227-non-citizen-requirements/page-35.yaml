format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
  summary: |-
    "Assume the earnings are covered if the proof submitted indicates FICA taxes were withheld." "If the query was requested after August 31st, the earnings are not lag and should be determined following the instructions in 2. below." "Whenever the non-citizen individual or any other FSU member does not agree with the response provided by the TPQY, reconcile the discrepancy." Covered employment cases with more than one SSN/SSN misuse, missing quarters, no documentation, or earned-but-not-reported wages are referred to or handled through SSA procedures.
rules:
  - name: earnings_assumed_covered_when_fica_withheld
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, lag earnings proof
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          proof_submitted_indicates_fica_taxes_were_withheld

  - name: earnings_not_lag_when_query_after_august_thirty_first
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, lag query timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
              excerpt: "If the query was requested after August 31st, the earnings are not lag"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          query_was_requested_after_august_thirty_first

  - name: tpqy_discrepancy_must_be_reconciled
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, TPQY disagreement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          non_citizen_or_fsu_member_disagrees_with_tpqy_response

  - name: ssa_responsible_for_covered_employment_discrepancy
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, covered employment discrepancy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_believes_work_was_covered_employment
          and earnings_do_not_fall_within_lag_period

  - name: individual_must_contact_local_ssa_office_for_multiple_or_shared_ssn
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, covered employment referral item i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_indicates_used_more_than_one_ssn
          or individual_indicates_allowed_others_to_use_ssn

  - name: ssn_number_holder_must_complete_ssa_7008_for_missing_quarters
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, covered employment referral item ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_indicates_missing_quarters
          and individual_is_number_holder_of_ssn

  - name: number_holder_must_complete_ssa_7008_when_non_citizen_not_number_holder
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, page 35, covered employment referral item ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-35
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          individual_indicates_missing_quarters
          and not individual_is_number_holder_of_ssn

  - name: individual_should_contact_local_ssa_office_when_no_documentation
    kind: derived
    entity: Person
