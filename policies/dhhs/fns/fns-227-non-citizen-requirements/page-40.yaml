format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-40
  summary: |-
    North Carolina intends to exercise its State discretion under 7 CFR 273.11(c)(3)(i) and 7 CFR 273.11(c)(3)(ii) to standardize income counting for all ineligible non-citizens by using prorated income for ALL purposes (gross income test, expedited screening, and benefit calculation).
rules:
  - name: prorated_income_used_for_gross_income_test
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227 Non-Citizen Requirements, Section 227, page 40
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-40
              excerpt: "using prorated income for ALL purposes (gross income test"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-40
              excerpt: "Change #1-2026 February 1, 2026"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_ineligible_non_citizen

