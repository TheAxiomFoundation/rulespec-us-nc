format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-6
  summary: |-
    Non-citizens must fall into one of three eligible categories: Lawful Permanent Resident, Cuban or Haitian Entrant, or COFA Migrant; LPRs must meet the five-year waiting period unless exempt; all must meet other FNS eligibility requirements. Applicant or FNS Unit member must certify non-citizen status by signing the application and stating status of new unit members when household composition changes. Non-applicant household members need not disclose immigration status, and county agencies cannot request or verify that status for them.
rules:
  - name: eligible_non_citizen_category
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 6(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-6
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_lawful_permanent_resident
          or person_is_cuban_or_haitian_entrant
          or person_is_cofa_migrant
  - name: lpr_waiting_period_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 6(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-6
              excerpt: "Meet the five-year waiting period requirement (LPRs only), unless exempt"
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          not person_is_lawful_permanent_resident
          or person_meets_five_year_waiting_period_requirement
          or person_is_exempt_from_five_year_waiting_period_requirement
  - name: non_citizen_meets_fns_non_citizen_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227, Section 6(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-6
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_non_citizen
          and eligible_non_citizen_category
          and lpr_waiting_period_requirement_satisfied
          and person_meets_all_other_fns_eligibility_requirements
  - name: non_citizen_status_certification_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.03(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-6
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_applicant_or_fns_unit_member
          and application_is_signed
          and non_citizen_status_of_all_included_individuals_certified_under_penalty_of_perjury
          and non_citizen_status_of_new_unit_members_stated_when_household_composition_change_reported
  - name: non_applicant_household_member_immigration_status_disclosure_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-6
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          not person_is_household_member_not_applying_for_fns_benefits_for_self
  - name: county_agency_may_request_or_verify_non_applicant_immigration_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 227.03(C) note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-227-non-citizen-requirements/page-6
    versions:
      - effective_from: '2026-02-01'
        formula: |-
          person_is_seeking_fns_benefits_for_self
