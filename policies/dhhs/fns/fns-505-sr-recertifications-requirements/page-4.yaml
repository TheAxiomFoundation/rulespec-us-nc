format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-4
  summary: |-
    A filed DSS-2435 received between the 16th calendar day and the last calendar day of the last month of the certification period is untimely; a filed DSS-2435 received anytime during the month following the last month of the certification period is late. When an FNS household moves within the state before disposition of the DSS-2435, the active county agency is responsible if the household reports the move during the last two certification months or suspense month and has not physically visited or submitted an application/recertification to the new county, or if incomplete pending actions exist in the active county during that period.
rules:
  - name: dss_2435_untimely_filed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.05, filed DSS-2435 receipt timing chart
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-4
              excerpt: "between the 16th calendar day of the month and the last calendar day of the last month of the certification period"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_2435_received_between_sixteenth_and_last_calendar_day_of_last_certification_month

  - name: dss_2435_late_filed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.05(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-4
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_2435_received_during_month_following_last_certification_month

  - name: active_county_responsible_after_move_report_without_new_county_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.06(A)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-4
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          household_moved_within_state_prior_to_dss_2435_disposition
          and household_reports_move_to_active_county_during_last_two_certification_months_or_suspense_month
          and household_moved_into_new_county
          and not household_physically_visited_or_submitted_application_or_recertification_to_new_county

  - name: active_county_responsible_due_to_incomplete_pending_actions
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.06(A)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-4
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          household_moved_within_state_prior_to_dss_2435_disposition
          and incomplete_pending_actions_in_active_county_during_last_two_certification_months_or_suspense_month

  - name: active_county_agency_responsible_for_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.06(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-4
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          active_county_responsible_after_move_report_without_new_county_contact
          or active_county_responsible_due_to_incomplete_pending_actions
