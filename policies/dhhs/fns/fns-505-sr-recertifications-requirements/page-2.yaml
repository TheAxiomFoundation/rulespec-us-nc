format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-2
  summary: |-
    Recertification filing requires the signature of an adult household member or the FNS unit's authorized representative and the applicant's name and address. Forms lacking those minimum requirements are unfiled; an unfiled DSS-2435 does not protect the household's date of recertification. The date of recertification is the date the filed DSS-2435 is received in the agency, or the next business day if received during non-business hours.
rules:
  - name: recertification_meets_minimum_filing_requirements
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.03 A and B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-2
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          recertification_has_signature_of_adult_household_member_or_authorized_representative
          and recertification_has_applicant_name_and_address
  - name: recertification_is_unfiled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.03 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-2
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          not recertification_meets_minimum_filing_requirements
  - name: submitted_dss_8207_or_epass_may_be_accepted_as_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.03 A note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-2
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          recertification_submitted_on_dss_8207_or_epass_application
          and recertification_meets_minimum_filing_requirements
  - name: date_of_recertification_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 505.04 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-2
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-2
              excerpt: "If the DSS-2435 is received during non-business hours, the date received will be the next business day."
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          filed_dss_2435_received_in_agency_on_this_day
          or day_is_next_business_day_after_filed_dss_2435_received_during_non_business_hours
