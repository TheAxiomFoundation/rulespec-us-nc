format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-1
  summary: |-
    "All Food and Nutrition Services (FNS) households must file an application for recertification at the end of their certification period to be determined eligible for continued benefits. FNS households that do not file an application for recertification are not eligible to continue participation in the FNS program." NC FAST selects active Simplified Reporting FNS households for recertification notices, with selection and mailing timing rules.
rules:
  - name: sr_recertification_selection_calendar_day
    kind: parameter
    dtype: Integer
    source: FNS 505.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-1
              excerpt: "occurs on the twelfth calendar day"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          12

  - name: address_change_notice_mailing_days_before_last_certification_month
    kind: parameter
    dtype: Integer
    period: Day
    source: FNS 505.02(B)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-1
              excerpt: "5 mailing days prior to first day"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          5

  - name: address_change_notice_mailing_days_after_reported_change
    kind: parameter
    dtype: Integer
    period: Day
    source: FNS 505.02(B)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-1
              excerpt: "within 5 days of the reported change"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          5

  - name: active_sr_household_selected_for_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-1
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          household_is_active_fns_household
          and household_is_subject_to_simplified_reporting

  - name: continuing_fns_participation_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.01(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-1
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          household_files_application_for_recertification_at_end_of_certification_period

  - name: address_change_after_selection_requires_reissued_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.02(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-1
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          household_reports_change_of_address_after_selection_date
