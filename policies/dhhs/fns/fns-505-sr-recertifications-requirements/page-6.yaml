format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-6
  summary: |-
    "Document interview appointment and interview date as an event in NC FAST"; when a filed DSS-2435 is returned and an interview is required, "Contact the FNS unit by telephone ... within 3 business days"; if the household cannot be contacted by telephone, mail a DSS-8650 with "a specific date," "a specific time," and "a method of the interview." Only ask for missing verifications indicated by the recertification form, and conduct the interview at the DSS agency or the FNS unit's residence.
rules:
  - name: telephone_contact_deadline_business_days
    kind: parameter
    dtype: Count
    source: FNS 505 SR Recertifications Requirements, p. 6, C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-6
              excerpt: "within 3 business days"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          3

  - name: telephone_contact_procedure_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 505 SR Recertifications Requirements, p. 6, C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-6
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          not filed_dss_2435_returned_to_local_dss
          or not recertification_interview_required
          or (
            telephone_contact_attempted_to_conduct_recertification_interview
            and business_days_since_receipt_of_filed_recertification <= telephone_contact_deadline_business_days
          )

  - name: dss_8650_scheduled_appointment_notice_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 505 SR Recertifications Requirements, p. 6, C.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-6
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          not filed_dss_2435_returned_to_local_dss
          or not recertification_interview_required
          or not household_cannot_be_contacted_by_telephone
          or (
            dss_8650_mailed_to_fns_unit
            and dss_8650_includes_specific_date
            and dss_8650_includes_specific_time
            and dss_8650_includes_interview_method
          )

  - name: verification_request_on_dss_8650_permitted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 505 SR Recertifications Requirements, p. 6, C.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-6
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          not worker_requests_verifications_on_dss_8650
          or (
            worker_reviewed_dss_2435
            and requested_verifications_missing_from_recertification_form
            and requested_verifications_indicated_by_recertification_form_information
          )

  - name: interview_documentation_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 505 SR Recertifications Requirements, p. 6, B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-6
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          (
            not interview_appointment_scheduled
            or interview_appointment_documented_as_nc_fast_event
          )
          and (
            not recertification_interview_held
            or interview_date_documented_as_nc_fast_event
          )

  - name: recertification_interview_location_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 505 SR Recertifications Requirements, p. 6, C.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-6
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          not simplified_reporting_recertification_interview_conducted
          or interview_at_dss_agency
          or interview_at_fns_unit_residence
