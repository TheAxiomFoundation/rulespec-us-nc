format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
  summary: |-
    "If the FNS unit fails to complete the recertification interview deny the recertification... If the client contacts the agency to complete the interview within the reopen period, the case may be reopened after the interview is completed and all required verifications are received... Allow the FNS unit ten calendar days... Process the change within five calendar days... If the requested verification is received after the extended expiration date... on or before the 30th day... reopen the case... and prorate benefits."
rules:
  - name: additional_information_response_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 505.08(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
              excerpt: "Allow the FNS unit ten calendar days"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          10

  - name: change_processing_days_after_final_verification
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 505.08(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
              excerpt: "within five calendar days of receipt of the final verification"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          5

  - name: reopen_deadline_days_after_certification_period
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 505.08(C)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
              excerpt: "on or before the 30th day from the last day of the certification period"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          30

  - name: recertification_denied_for_failure_to_complete_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.07(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          fns_unit_failed_to_complete_recertification_interview

  - name: interview_failure_recertification_may_be_reopened
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.07(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          client_contacts_agency_to_complete_interview_within_reopen_period
          and recertification_interview_completed_after_contact
          and all_required_verifications_received

  - name: changed_information_included_for_new_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.08(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          fns_unit_reports_change_before_recertification_disposition
          or change_becomes_known_to_agency_before_recertification_disposition

  - name: additional_information_requested_by_dss_8650
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.08(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-505-sr-recertifications-requirements/page-7#additional_information_response_days
              output: additional_information_response_days
              hash: sha256:local
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          changed_information_requires_additional_information
          and additional_information_response_days == 10

  - name: case_not_closed_on_last_workday
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.08(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_8650_expiration_date_extends_beyond_end_of_current_certification_period_due_to_change_report_date

  - name: change_processed_without_proration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.08(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-505-sr-recertifications-requirements/page-7#change_processing_days_after_final_verification
              output: change_processing_days_after_final_verification
              hash: sha256:local
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_8650_expiration_date_extends_beyond_end_of_current_certification_period_due_to_change_report_date
          and final_verification_provided_by_dss_8650_expiration_date
          and change_processing_days_after_final_verification == 5

  - name: case_closed_for_failure_to_provide_requested_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.08(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_8650_expiration_date_extends_beyond_end_of_current_certification_period_due_to_change_report_date
          and fns_unit_fails_to_provide_requested_verification

  - name: case_reopened_with_prorated_benefits_after_late_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.08(C)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-505-sr-recertifications-requirements/page-7#reopen_deadline_days_after_certification_period
              output: reopen_deadline_days_after_certification_period
              hash: sha256:local
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          requested_verification_received_after_extended_dss_8650_expiration_date
          and requested_verification_received_on_or_before_reopen_deadline_from_last_day_of_certification_period
          and reopen_deadline_days_after_certification_period == 30
