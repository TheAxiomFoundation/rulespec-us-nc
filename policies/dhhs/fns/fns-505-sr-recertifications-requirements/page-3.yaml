format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
  summary: |-
    A faxed or emailed DSS-2435 is acceptable. If received prior to the first day of the last month of the certification period, contact the FNS unit by telephone no later than the 3rd workday of that month, document the conversation, send DSS-8650 if unable to contact by telephone, and deny if the household does not contact the agency. For early recertifications, the date of recertification is considered the first day of the last month. Timely recertification is a filed DSS-2435 received on or before the 15th calendar day of the last month.
rules:
  - name: early_recertification_contact_workday_deadline
    kind: parameter
    dtype: Integer
    source: FNS 505.04(A)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
              excerpt: "no later than the 3rd workday"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          3

  - name: timely_recertification_calendar_day_deadline
    kind: parameter
    dtype: Integer
    source: FNS 505.05(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
              excerpt: "on or before the 15th calendar day"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          15

  - name: faxed_or_emailed_dss_2435_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.04(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_2435_received_by_fax
          or dss_2435_received_by_email

  - name: early_recertification_requires_telephone_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.04(A)(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
              excerpt: "received prior to the first day of the last month"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
              excerpt: "no later than the 3rd workday"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_2435_received_prior_to_first_day_of_last_month
          and telephone_contact_occurs_no_later_than_workday_deadline

  - name: dss_8650_required_after_failed_telephone_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.04(A)(3)(a)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_2435_received_prior_to_first_day_of_last_month
          and unable_to_contact_household_by_telephone

  - name: deny_for_failure_to_provide_information_after_no_household_contact
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.04(A)(3)(a)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_2435_received_prior_to_first_day_of_last_month
          and unable_to_contact_household_by_telephone
          and household_does_not_contact_agency

  - name: early_recertification_date_treated_as_first_day_of_last_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.04(A)(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          dss_2435_received_prior_to_first_day_of_last_month

  - name: timely_recertification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.05(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-3
              excerpt: "filed DSS-2435 that is received in the agency on or before the 15th calendar day"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          filed_dss_2435_received_in_agency
          and dss_2435_received_on_or_before_timely_recertification_calendar_day_deadline
          and received_during_last_month_of_current_certification_period
