format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-5
  summary: |-
    FNS units are required to have a face-to-face or telephone interview at least once every 12 months. Do not require an interview earlier unless the FNS unit requests one to assist with completing the DSS-2435. If the worker speaks with the FNS unit to complete unanswered questions or clarify information, an interview may be completed at that time.
rules:
  - name: required_interview_interval_months
    kind: parameter
    dtype: Count
    source: FNS 505.07(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-5
              excerpt: "at least once every 12 months"
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          12

  - name: recertification_interview_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 505.07(A)(1), (A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-5
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-505-sr-recertifications-requirements/page-5
    versions:
      - effective_from: '2021-07-26'
        formula: |-
          months_since_last_face_to_face_or_telephone_interview >= required_interview_interval_months
          or fns_unit_requests_interview_to_assist_with_dss_2435
