format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
  summary: |-
    If the household's benefits have been expunged within the previous three years, reduce the claim by the amount of the expunged benefits. Do not apply any amount which exceeds the claim balance. Delinquent debts are automatically submitted for TOP, DOR, and NCEL interception. Unspecified joint cash collections for combined public assistance/FNS recipient claims must be prorated between programs.
rules:
  - name: expungement_amount_applied_to_ihe_claim
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 815, page 14, section D.6.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
              excerpt: "reduce the claim by the amount of the expunged benefits"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
              excerpt: "Do not apply any amount which exceeds the claim balance."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
              excerpt: "expunged within the previous three years"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if household_benefits_expunged_within_previous_three_years: min(expunged_benefits_amount, ihe_claim_balance) else: 0

  - name: delinquent_debt_submitted_to_top
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, page 14, section D.7.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          debt_is_delinquent

  - name: delinquent_debt_submitted_to_dor
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, page 14, section D.8.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          debt_is_delinquent

  - name: delinquent_debt_submitted_to_ncel
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, page 14, section D.9.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          debt_is_delinquent

  - name: fns_prorated_share_of_unspecified_joint_cash_collection
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 815, page 14, section E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
              excerpt: "each program must receive its prorated share"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-14
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if unspecified_joint_cash_collection_received_for_combined_public_assistance_and_fns_recipient_claim: unspecified_joint_cash_collection_amount * fns_claim_share_of_combined_claims else: 0
