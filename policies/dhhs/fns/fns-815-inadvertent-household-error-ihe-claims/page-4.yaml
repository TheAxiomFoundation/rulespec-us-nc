  - name: verified_allowable_nonutility_deductions_used_in_claim_calculation
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 815.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
