format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
  summary: |-
    "If a change is not reported at recertification interview, the first month of overissuance is the first month of the new certification period."
    "If a change is not known or anticipated at recertification, the client is required to report the change by the 10th of the month, following the month in which the notice of eligibility is received."
    "Verify participation. Do not include in the claim calculation any months in which the household did not participate."
    "Do not allow the earned income deduction for that portion of the earned income which was not reported. If the household reports part but not all of earned income, allow the deduction on the part that was reported."
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4#allowable_utility_expense_deduction_for_overissuance_calculation
      reason: The source directs the user to Section 4080.22 for allowable utility expenses and utility deductions, but that cited source is not available in the copied context.
rules:
  - name: report_change_by_tenth_deadline_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.02, page 4, paragraph b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          change_not_known_or_anticipated_at_recertification
          and month_follows_month_notice_of_eligibility_received

  - name: first_overissuance_month_for_unreported_recertification_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.02, page 4, paragraph a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          change_not_reported_at_recertification_interview
          and month_is_first_month_of_new_certification_period

  - name: month_included_in_claim_calculation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          not household_did_not_participate_in_month

  - name: earned_income_deduction_base_for_claim_calculation
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 815.03(B), exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          reported_earned_income_amount

  - name: overissuance_budget_unreported_earnings_as_unearned_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 815.03(B), exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          unreported_earned_income_amount

  - name: actual_unreported_income_used_in_claim_calculation
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 815.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
