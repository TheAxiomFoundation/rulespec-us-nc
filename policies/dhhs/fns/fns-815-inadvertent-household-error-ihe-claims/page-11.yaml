format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
  summary: Participating households that do not wish to be recouped may make cash
    payments if they agree, prior to recoupment, to pay more than 10% of the allotment
    or $10, whichever is greater. Nonparticipating households receive DSS-8554 repayment-method
    notice and must return it within ten days; if not returned, further collection
    action may be initiated. A household may request a Fair Hearing within 90 days
    of the Notice of Overissuance only if it disputes the claim amount or asserts
    the claim was already paid in full, and collection action ceases once a Fair Hearing
    is requested.
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11#collection_action_ceases_after_fair_hearing_request
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11#fair_hearing_request_deadline_days
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: participating_cash_payment_minimum_allotment_rate
  kind: parameter
  dtype: Rate
  source: Section 815, page 11, participating household cash payment threshold
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: more than 10% of the allotment
  versions:
  - effective_from: '2017-09-20'
    formula: '0.10'
- name: participating_cash_payment_minimum_amount
  kind: parameter
  dtype: Money
  period: Month
  unit: USD
  source: Section 815, page 11, participating household cash payment threshold
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: $10, whichever is greater
  versions:
  - effective_from: '2017-09-20'
    formula: '10'
- name: participating_cash_payment_required_floor
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: Section 815, page 11, participating household cash payment threshold
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: more than 10% of the allotment or $10, whichever is greater
  versions:
  - effective_from: '2017-09-20'
    formula: max(participating_cash_payment_minimum_allotment_rate * allotment, participating_cash_payment_minimum_amount)
- name: cash_payment_agreement_prevents_recoupment
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 815, page 11, participating household cash payment option
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: must agree to pay more than 10% of the allotment or $10, whichever
            is greater prior to recoupment
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: This will stop a recoupment from occurring.
  versions:
  - effective_from: '2017-09-20'
    formula: 'household_is_participating

      and household_does_not_wish_to_be_recouped

      and agreed_cash_payment_amount > participating_cash_payment_required_floor

      and agreement_made_prior_to_recoupment'
- name: notice_return_deadline_days
  kind: parameter
  dtype: Count
  period: Day
  source: Section 815, page 11, nonparticipating household DSS-8554 return deadline
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: return the signed notice within ten days
  versions:
  - effective_from: '2017-09-20'
    formula: '10'
- name: further_collection_action_after_notice_deadline
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: Section 815, page 11, nonparticipating household DSS-8554 non-return consequence
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: If the notice is not returned by the deadline, the local agency
            will initiate further collection action
  versions:
  - effective_from: '2017-09-20'
    formula: 'household_is_nonparticipating

      and dss_8554_notice_was_sent

      and not signed_notice_returned_by_deadline'
- name: fair_hearing_request_allowed
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: Section 815, page 11, nonparticipating household Fair Hearing request grounds
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: may only request a Fair Hearing within 90 days
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: if they disagree with the amount of the claim established or that
            the claim has been previously paid in full
  versions:
  - effective_from: '2017-09-20'
    formula: 'household_is_nonparticipating

      and request_is_within_fair_hearing_deadline

      and (household_disagrees_with_claim_amount or household_claims_claim_previously_paid_in_full)'
- name: post_hearing_repayment_notice_wait_days
  kind: parameter
  dtype: Count
  period: Day
  source: Section 815, page 11, DSS-8658 post-hearing notice timing
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: after the 10th day
  versions:
  - effective_from: '2017-09-20'
    formula: '10'
- name: post_hearing_repayment_notice_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: Section 815, page 11, DSS-8658 post-hearing repayment notice
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: Mail DSS-8658 Post Hearing Repayment Notice after the 10th day
            once the local agency has verified the debtor did not contest the Fair
            Hearing decision.
  versions:
  - effective_from: '2017-09-20'
    formula: 'fair_hearing_decision_received

      and tenth_day_after_decision_has_passed

      and local_agency_verified_debtor_did_not_contest_fair_hearing_decision'
- name: remand_post_hearing_repayment_agreement_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Day
  source: Section 815, page 11, remanded Fair Hearing decision
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-11
          excerpt: If the debtor does not contest the decision within 10 calendar
            days, the local agency must send a DSS-8658
  versions:
  - effective_from: '2017-09-20'
    formula: 'fair_hearing_decision_remanded_to_local_agency

      and local_agency_recalculated_overissuance

      and debtor_did_not_contest_remand_decision_within_ten_calendar_days'
