format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
  summary: |-
    A claim must be established within 12 months from the EPICS referral creation date. Establish claims for overissuance months within six years before discovery. If an overissuance is due to an Inadvertent Household Error, establish the claim within 180 days from discovery. Referrals must be created within 10 business days; verifications requested within 30 calendar days if possible; 30 calendar days allowed for return; IPV determination made within 60 calendar days of substantiation. Corrective action is required when more than 10% of referrals in a local agency are more than 180 days old.
rules:
  - name: claim_establishment_from_epics_referral_creation_month_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "within 12 months from the date the referral was created"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          12

  - name: overissuance_claim_lookback_year_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "within six years prior to the Date of Discovery"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          6

  - name: ihe_claim_establishment_from_discovery_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "within 180 days from the Date of Discovery"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          180

  - name: epics_resolution_before_untimely_referral_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "before the 180th day"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          180

  - name: overdue_referral_age_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "more than 180 days old"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          180

  - name: local_agency_overdue_referral_corrective_action_threshold_rate
    kind: parameter
    dtype: Rate
    source: FNS 815.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "more than 10% of referrals"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          0.10

  - name: epics_referral_creation_business_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 D(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "within 10 business days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: verification_request_calendar_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 D(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "within 30 calendar days of receipt"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          30

  - name: verification_return_calendar_day_allowance
    kind: parameter
    dtype: Integer
    source: FNS 815.01 D(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "Allow 30 calendar days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          30

  - name: suspected_ipv_determination_calendar_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01 D(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "within 60 calendar days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          60

  - name: date_of_discovery_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          agency_aware_of_sufficient_facts_to_suspect_overissuance
          and dss_1682_completed

  - name: claim_established_within_epics_referral_creation_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "claim must be established within 12 months"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_was_established
          and months_from_epics_referral_creation_to_claim_establishment <= claim_establishment_from_epics_referral_creation_month_limit

  - name: overissuance_month_included_in_claim_calculation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "months of overissuance which occurred within six years"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          overissuance_occurred_in_month
          and years_between_overissuance_month_and_date_of_discovery <= overissuance_claim_lookback_year_limit

  - name: ihe_claim_established_within_discovery_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "If an overissuance is due to an Inadvertent Household Error, establish the claim within 180 days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          overissuance_due_to_inadvertent_household_error
          and claim_was_established
          and days_from_date_of_discovery_to_claim_establishment <= ihe_claim_establishment_from_discovery_day_limit

  - name: epics_referral_resolved_before_untimely_referral_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "Enter established claims in EPICS before the 180th day or close unsubstantiated referrals"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          (claim_was_established and days_from_referral_creation_to_established_claim_entry_in_epics < epics_resolution_before_untimely_referral_day_limit)
          or (referral_unsubstantiated and days_from_referral_creation_to_unsubstantiated_referral_closure_in_epics < epics_resolution_before_untimely_referral_day_limit)

  - name: potential_overissuance_referral_created_within_detection_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 D(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "Create the referral ... within 10 business days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          potential_fns_overissuance_detected
          and days_from_detection_to_epics_referral_creation <= epics_referral_creation_business_day_limit

  - name: necessary_verifications_requested_within_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 D(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "Request all necessary verifications within 30 calendar days ... if possible"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          not necessary_verification_request_possible
          or days_from_referral_receipt_to_verification_request <= verification_request_calendar_day_limit

  - name: requested_verification_return_allowance_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 D(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "Allow 30 calendar days for the return"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          days_allowed_for_requested_verification_return >= verification_return_calendar_day_allowance

  - name: suspected_ipv_determined_within_substantiation_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 D(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "Determine whether or not there is a suspected Intentional Program Violation within 60 calendar days"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          potential_overissuance_substantiated
          and days_from_potential_overissuance_substantiation_to_ipv_determination <= suspected_ipv_determination_calendar_day_limit

  - name: referral_more_than_overdue_age_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01 D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-1
              excerpt: "referrals in a local agency are more than 180 days old"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          referral_age_days > overdue_referral_age_day_limit
