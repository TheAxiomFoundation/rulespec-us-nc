  summary: |-
    "A claim is found to be invalid in an ADH or State Level Hearing" or "by the courts," or "entered in EPICS in error." Claims with payment history, disqualification, or TOP-certified debtor "cannot be deleted, but may be adjusted and closed." "Request an adjustment closure of claim when" all debtors meet the stated death/estate, bankruptcy-discharge, nursing-home, or system-deletion-bar conditions; requests must include listed claim identifiers, signatures, current balance, reason, and justification.
