format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2#post_interview_change_first_month_of_overissuance
      reason: The source requires applying the 10-10-10 timing sequence from the month after the notice of eligibility is received to identify an actual first month of overissuance; this schema has no month-valued output or date arithmetic surface for that selection.
      source_values:
        - us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2#household_change_report_due_day_of_following_month
        - us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2#caseworker_reaction_calendar_day_allowance
        - us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2#notice_of_adverse_action_work_day_allowance
  summary: |-
    "Complete a DSS-1682 and enter a Date of Discovery in EPICS within 180 days from the Creation Date. Establish the AE claim in EPICS within 180 days from the Date of Discovery."
    "Establish a claim regardless of the amount if Quality Control discovers the overissuance."
    "Do not establish a non-QC overissuance claim that is $125.00 or less unless one debtor is currently participating in FNS."
    "The Simplified Reporting Category applies to all FNS units except for: 1. A SNAP FNS unit. 2. A Transitional FNS unit."
    "The 10-10-10 rule ... allows: ... 10th of the month ... 10 calendar days ... 10 work days ..."
rules:
  - name: dss_1682_creation_to_discovery_entry_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01.D.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "within 180 days from the Creation Date"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          180

  - name: ae_claim_discovery_to_establishment_day_limit
    kind: parameter
    dtype: Integer
    source: FNS 815.01.D.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "within 180 days from the Date of Discovery"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          180

  - name: non_qc_overissuance_claim_standard_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 815.01.F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "$125.00 or less"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          125.00

  - name: household_change_report_due_day_of_following_month
    kind: parameter
    dtype: Integer
    source: FNS 815.02.B.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "10th of the month, following the month of change"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: caseworker_reaction_calendar_day_allowance
    kind: parameter
    dtype: Integer
    source: FNS 815.02.B.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "10 calendar days for the caseworker to react"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: notice_of_adverse_action_work_day_allowance
    kind: parameter
    dtype: Integer
    source: FNS 815.02.B.1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "10 work days for Notice of Adverse Action"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: applicant_post_interview_change_report_due_day_of_month
    kind: parameter
    dtype: Integer
    source: FNS 815.02.B.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "by the 10th of the month, following the month in which the notice of eligibility is received"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: dss_1682_discovery_entry_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01.D.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "Complete a DSS-1682 and enter a Date of Discovery in EPICS within 180 days from the Creation Date."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          dss_1682_completed
          and date_of_discovery_entered_in_epics
          and days_from_creation_date_to_date_of_discovery_entry <= dss_1682_creation_to_discovery_entry_day_limit

  - name: ae_claim_establishment_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01.D.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "Establish the AE claim in EPICS within 180 days from the Date of Discovery."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          ae_claim_established_in_epics
          and days_from_date_of_discovery_to_ae_claim_establishment <= ae_claim_discovery_to_establishment_day_limit

  - name: qc_overissuance_claim_must_be_established
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "Establish a claim regardless of the amount if Quality Control discovers the overissuance."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          overissuance_exists
          and quality_control_discovers_overissuance

  - name: non_qc_overissuance_claim_prohibited_by_standard_threshold
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01.F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "Do not establish a non-QC overissuance claim that is $125.00 or less unless one debtor is currently participating in FNS."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          overissuance_is_non_quality_control
          and overissuance_claim_amount <= non_qc_overissuance_claim_standard_threshold
          and not local_agency_has_state_approved_claims_management_plan_for_different_threshold_amount
          and not at_least_one_debtor_currently_participating_in_fns

  - name: multiple_debtor_epics_entry_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.01.F
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "When a claim is established and there are multiple debtors, enter all debtors in EPICS ... on the same day the claim is established."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          not claim_established
          or not claim_has_multiple_debtors
          or all_debtors_entered_in_epics_same_day_claim_established

  - name: simplified_reporting_category_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.02.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "applies to all FNS units except for: 1. A SNAP FNS unit. 2. A Transitional FNS unit."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          not household_is_snap_fns_unit
          and not household_is_transitional_fns_unit

  - name: month_is_first_overissuance_month_for_incorrect_application_interview_information
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.02.B.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "information reported incorrectly at the time of the application interview is the first month of the certification period"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          applicant_household
          and information_reported_incorrectly_at_application_interview
          and month_is_first_month_of_certification_period

  - name: applicant_post_interview_change_reporting_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815.02.B.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-2
              excerpt: "required to report changes which occur after the date of the interview, by the 10th of the month"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          not applicant_household
          or not change_occurred_after_application_interview
          or (change_reported_in_month_following_notice_of_eligibility_month and change_report_day_of_month <= applicant_post_interview_change_report_due_day_of_month)
