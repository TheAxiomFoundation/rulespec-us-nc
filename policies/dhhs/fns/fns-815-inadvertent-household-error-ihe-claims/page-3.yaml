format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
  summary: 'Ongoing cases: first month of overissuance is the first month affected
    had the change been reported timely. Ongoing households must report changes by
    the 10th of the month following the month of change; allow 10 calendar days for
    agency action and 10 working days for the Notice of Adverse Action. Simplified
    Reporting cases must report income increases over 130% of poverty and ABAWDs stopping
    work averaging 80 hours per month. Recertifications: first month of the new certification
    period is first month of overissuance when changes or anticipated changes are
    not reported.'
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3#household_change_report_due_day_of_following_month
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: simplified_reporting_gross_income_poverty_rate_limit
  kind: parameter
  dtype: Rate
  source: Section 815.3.c(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
          excerpt: 130% of the poverty level
  versions:
  - effective_from: '2017-09-20'
    formula: '1.30'
- name: abawd_average_monthly_work_hours_reporting_threshold
  kind: parameter
  dtype: Decimal
  period: Month
  source: Section 815.3.c(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
          excerpt: 80 hours per month
  versions:
  - effective_from: '2017-09-20'
    formula: '80'
- name: agency_action_calendar_day_allowance
  kind: parameter
  dtype: Integer
  period: Day
  source: Section 815.3.e
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
          excerpt: Allow ten calendar days for the agency to act
  versions:
  - effective_from: '2017-09-20'
    formula: '10'
- name: notice_of_adverse_action_working_day_allowance
  kind: parameter
  dtype: Integer
  period: Day
  source: Section 815.3.e
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
          excerpt: allow ten working days for the Notice of Adverse Action to expire
  versions:
  - effective_from: '2017-09-20'
    formula: '10'
- name: simplified_reporting_gross_income_limit
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: Section 815.3.c(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
          excerpt: maximum allowable gross income limit for its size (130% of the
            poverty level)
  versions:
  - effective_from: '2017-09-20'
    formula: simplified_reporting_gross_income_poverty_rate_limit * poverty_level_for_household_size
- name: simplified_reporting_income_increase_reportable
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 815.3.c(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
  versions:
  - effective_from: '2017-09-20'
    formula: 'household_is_simplified_reporting_case

      and household_has_increase_in_income

      and household_gross_income_after_increase > simplified_reporting_gross_income_limit'
- name: simplified_reporting_abawd_work_reduction_reportable
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 815.3.c(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
          excerpt: FNS units that include an ABAWD must report when the ABAWD stops
            working an average of 80 hours per month (non-waiver counties).
  versions:
  - effective_from: '2017-09-20'
    formula: 'household_is_simplified_reporting_case

      and fns_unit_includes_abawd

      and county_is_non_waiver_county

      and abawd_stopped_working_average_monthly_hours >= abawd_average_monthly_work_hours_reporting_threshold'
- name: ongoing_case_first_month_of_overissuance
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 815.3.a
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
  versions:
  - effective_from: '2017-09-20'
    formula: 'household_is_ongoing_case

      and month_is_first_month_affected_had_change_been_reported_timely'
- name: recertification_first_month_of_overissuance
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Section 815.4
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-3
  versions:
  - effective_from: '2017-09-20'
    formula: 'month_is_first_month_of_new_certification_period

      and recipient_did_not_report_changes_or_anticipated_changes_at_recertification'
