format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
  summary: |-
    Section 815.06 requires IHE claim collection action when claim information is entered into EPICS, sends DSS-8554 overissuance notices to debtors subject to claim-type-change limits, treats certain multiple-claim debtors as not delinquent, limits restored benefits to periods not more than 12 months old, identifies household-member debtors age 18 or older at overissuance, and pauses collection after a Fair Hearing request.
rules:
  - name: restored_benefits_lookback_limit_months
    kind: parameter
    dtype: Count
    source: Section 815.06(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
              excerpt: "Do not restore benefits for any period more than 12 months old."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          12

  - name: fair_hearing_request_deadline_days
    kind: parameter
    dtype: Count
    source: Section 815.06(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
              excerpt: "within 90 days of the DSS-8554"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          90

  - name: collection_action_initiated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_information_entered_into_epics

  - name: dss_8554_sent_to_debtor
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 815.06(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          debtor_entered_in_epics
          and (not claim_category_change_occurs or claim_type_u_or_p_changed_to_ihe)

  - name: multiple_claim_debtor_not_delinquent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 815.06(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          individual_debtor_has_multiple_claims
          and (one_claim_paid_under_repayment_agreement or one_claim_paid_through_allotment_reduction)

  - name: restored_benefits_may_be_restored
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
              excerpt: "Do not restore benefits for any period more than 12 months old."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          restored_benefit_period_age_in_months <= restored_benefits_lookback_limit_months

  - name: automated_restored_benefit_or_supplement_issuance_blocked
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          debtor_has_claim_in_epics

  - name: household_member_is_debtor_on_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Section 815.06(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
              excerpt: "All household members who were 18 years old or older at the time of the overissuance are debtors on the claim."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          household_member_was_in_household_at_time_of_overissuance
          and household_member_was_aged_18_or_older_at_time_of_overissuance

  - name: participating_household_allotment_reduction_notice_effective
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          household_is_participating
          and month_follows_month_in_which_ten_working_day_notice_expires

  - name: fair_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
              excerpt: "within 90 days of the DSS-8554"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          days_since_dss_8554 <= fair_hearing_request_deadline_days

  - name: fair_hearing_may_be_requested
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          fair_hearing_request_timely
          and (household_disagrees_with_claim_amount or household_disagrees_with_recoupment_amount or household_states_claim_previously_paid_in_full)

  - name: benefits_continue_pending_fair_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          fair_hearing_request_timely
          and household_certification_period_has_not_expired

  - name: collection_action_ceases_after_fair_hearing_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 815.06(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-9
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          fair_hearing_requested
