format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
  summary: |-
    "Any claim or any portion of a claim may be compromised (reduced) if the local agency can reasonably determine that a household's economic circumstances indicate that the claim will not be paid in three (3) years." "Do not terminate a claim against a participating household." "Terminate a claim if" the listed delinquency, low-balance, TOP, tax-intercept, or household-location conditions exist.
rules:
  - name: compromise_nonpayment_horizon_years
    kind: parameter
    dtype: Count
    source: FNS 815, Section F.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
              excerpt: "will not be paid in three (3) years"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          3
  - name: termination_low_balance_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 815, Section G.2.a.(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
              excerpt: "Balance is $25 or less"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          25
  - name: termination_low_balance_delinquency_days
    kind: parameter
    dtype: Count
    source: FNS 815, Section G.2.a.(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
              excerpt: "delinquent for 90 days or more"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          90
  - name: termination_delinquency_without_top_years
    kind: parameter
    dtype: Count
    source: FNS 815, Section G.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
              excerpt: "delinquent for three years or more"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          3
  - name: top_and_state_tax_submission_minimum_years
    kind: parameter
    dtype: Count
    source: FNS 815, Section G.2.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
              excerpt: "submitted for at least one year for TOP and State tax intercept"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          1
  - name: demand_letter_interval_months
    kind: parameter
    dtype: Count
    source: FNS 815, Section G.2.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
              excerpt: "demand letters have been sent at least once every six months"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          6
  - name: claim_may_be_compromised
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, Section F.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#compromise_nonpayment_horizon_years
              output: compromise_nonpayment_horizon_years
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          local_agency_reasonably_determines_household_economic_circumstances_show_claim_will_not_be_paid_within_years
          and claim_nonpayment_horizon_years >= compromise_nonpayment_horizon_years
  - name: compromised_claim_portion_may_be_reinstated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, Section F.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          compromised_claim_subsequently_becomes_delinquent
  - name: low_balance_delinquent_claim_termination_condition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, Section G.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#termination_low_balance_threshold
              output: termination_low_balance_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#termination_low_balance_delinquency_days
              output: termination_low_balance_delinquency_days
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_balance <= termination_low_balance_threshold
          and claim_delinquent_days >= termination_low_balance_delinquency_days
          and not other_claims_against_household_result_in_overall_balance_greater_than_low_balance_threshold
  - name: delinquent_without_top_termination_condition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, Section G.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#termination_delinquency_without_top_years
              output: termination_delinquency_without_top_years
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_delinquent_years >= termination_delinquency_without_top_years
          and not claim_will_be_pursued_through_treasury_offset_program
  - name: cannot_locate_household_termination_condition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, Section G.2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          household_cannot_be_located
  - name: top_and_tax_intercept_submission_condition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, Section G.2.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#top_and_state_tax_submission_minimum_years
              output: top_and_state_tax_submission_minimum_years
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#demand_letter_interval_months
              output: demand_letter_interval_months
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_submitted_for_top_and_state_tax_intercept_years >= top_and_state_tax_submission_minimum_years
          and demand_letters_sent_at_least_once_every_months <= demand_letter_interval_months
          and minimum_required_collection_actions_sent
  - name: claim_must_be_terminated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 815, Section G.1-G.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#low_balance_delinquent_claim_termination_condition
              output: low_balance_delinquent_claim_termination_condition
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#delinquent_without_top_termination_condition
              output: delinquent_without_top_termination_condition
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#cannot_locate_household_termination_condition
              output: cannot_locate_household_termination_condition
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-815-inadvertent-household-error-ihe-claims/page-15#top_and_tax_intercept_submission_condition
              output: top_and_tax_intercept_submission_condition
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          not household_is_participating
          and (
            low_balance_delinquent_claim_termination_condition
            or delinquent_without_top_termination_condition
            or cannot_locate_household_termination_condition
            or top_and_tax_intercept_submission_condition
          )
