format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-2
  summary: |-
    "To prorate, divide the ineligible individual's gross countable income evenly for all potential FNS unit members. Multiply the prorated share by the number of persons included in the FNS unit." For higher-education students, eligible students have all gross non-prorated income included and ineligible students' income is not included. For a child age 17 or younger, gross earned income is excluded only if the child is an elementary/secondary or half-time GED student and is not the FNS unit head; all non-excluded unearned income is counted.
rules:
  - name: ineligible_member_prorated_income_counted
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350, page 2, proration note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-2
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          ineligible_member_gross_countable_income / potential_fns_unit_member_count * fns_unit_included_member_count

  - name: higher_education_student_income_counted
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350.C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-2
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-2
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          if person_meets_fns230_definition_of_student and student_is_eligible_under_fns230: higher_education_student_gross_income else: 0

  - name: high_school_student_earned_income_excluded
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350.D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-2
              excerpt: "For a child age 17 or younger, exclude his entire gross earned income only if"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-2
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          if child_is_age_17_or_younger and child_attends_recognized_elementary_or_secondary_school_or_half_time_ged and not child_is_head_of_fns_unit: gross_earned_income else: 0

  - name: eligible_student_non_excluded_unearned_income_counted
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350.D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-2
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          if student_is_eligible: non_excluded_unearned_income else: 0
