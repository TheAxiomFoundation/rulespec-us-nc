        formula: |-
          if person_is_nonhousehold_member: 0 else: if person_is_nonqualified_ineligible_noncitizen: countable_gross_income else: if person_is_qualified_ineligible_noncitizen: prorated_income else: if person_is_ineligible_for_failure_to_provide_ssn: prorated_income else: if person_is_ineligible_abawd: prorated_income else: if person_is_disqualified_for_ipv_work_registration_drug_conviction_or_transfer_of_resources: non_excluded_income else: if person_is_ineligible_fleeing_felon_probation_parole_or_aggravated_offense_violator: non_excluded_income else: 0

