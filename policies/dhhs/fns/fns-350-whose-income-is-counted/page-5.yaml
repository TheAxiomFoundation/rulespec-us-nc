format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-5
  summary: |-
    Section 350 Change #20-2021 November 1, 2021. Consider any income given to the FNS unit as contribution income. If the FNS unit's expenses are paid to the providers such as landlord or utility company, consider the payments as vendor payments. Do not count as income and do not allow deductions for paid expenses. Reference sheet rows state countable gross, prorated, non-excluded, or no counted income for listed ineligible, disqualified, and non-household individuals.
rules:
  - name: fns_counted_income_amount_from_payment
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350, page 5, contribution income and vendor payments
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-5
              excerpt: "Change #20-2021 November 1, 2021"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-5
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          if fns_unit_expense_paid_to_provider: 0 else: if income_given_to_fns_unit: payment_amount else: 0

  - name: fns_paid_expense_deduction_disallowed_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350, page 5, vendor payments
    metadata:
