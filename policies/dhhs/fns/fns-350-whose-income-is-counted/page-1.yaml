format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
  summary: |-
    350.01 WHOSE INCOME IS COUNTED? Determine if the Food and Nutrition Services (FNS) unit members’ income is countable. Count all non-excluded gross income in a FNS unit whether earned or unearned, unless special circumstances exist as indicated below. A. Disqualified Individuals Include all non-prorated countable gross income... B. Ineligible Individuals Include prorated countable gross income...
rules:
  - name: member_disqualified_for_non_prorated_income_counting
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 350.01.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
              excerpt: "Change #20-2021 November 01, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          person_is_fns_unit_member
          and (
            member_disqualified_due_to_intentional_program_violation
            or member_disqualified_due_to_failing_to_comply_with_fns_employment_and_training_or_workfare
            or member_disqualified_due_to_voluntary_quit
            or member_disqualified_due_to_drug_felony
            or member_disqualified_due_to_transfer_of_resources
          )

  - name: individual_ineligible_due_to_listed_reason
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 350.01.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
              excerpt: "Change #20-2021 November 01, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          individual_ineligible_due_to_failing_to_meet_enumeration_requirement
          or individual_is_ineligible_abawd
          or individual_is_qualified_ineligible_alien
          or individual_is_non_qualified_ineligible_alien

  - name: individual_ineligible_for_prorated_income_counting
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 350.01.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
              excerpt: "Change #20-2021 November 01, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          individual_ineligible_due_to_failing_to_meet_enumeration_requirement
          or individual_is_ineligible_abawd
          or individual_is_qualified_ineligible_alien
          or (
            individual_is_non_qualified_ineligible_alien
            and (
              household_income_does_not_exceed_gross_income_level
              or household_is_not_subject_to_gross_income_test
            )
          )

  - name: income_counted_for_fns_unit_benefit_calculation
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
              excerpt: "Change #20-2021 November 01, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          if member_disqualified_for_non_prorated_income_counting: non_prorated_countable_gross_income else: if individual_ineligible_for_prorated_income_counting: prorated_countable_gross_income else: if person_is_fns_unit_member and not individual_ineligible_due_to_listed_reason: non_excluded_gross_income else: 0

  - name: non_qualified_ineligible_alien_income_counted_for_expedited_and_gross_income_tests
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 350.01.B.4.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-350-whose-income-is-counted/page-1
              excerpt: "Change #20-2021 November 01, 2021"
    versions:
      - effective_from: '2021-11-01'
        formula: |-
          if individual_is_non_qualified_ineligible_alien: gross_income else: 0
