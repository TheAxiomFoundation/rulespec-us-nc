format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-910-cancellation-of-benefits/page-1
  summary: |-
    "Once the benefits have been posted to the FNS unit’s account and becomes available, it cannot be cancelled. Any overissuance must be handled in accordance with FNS 800 Claims."
rules:
  - name: cancellation_of_posted_available_benefits_barred
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 910.01 Cancellation of Benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-910-cancellation-of-benefits/page-1
    versions:
      - effective_from: '2021-10-08'
        formula: |-
          benefits_have_been_posted_to_fns_unit_account
          and benefits_are_available
