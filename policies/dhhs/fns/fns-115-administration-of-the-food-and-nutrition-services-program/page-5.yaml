    corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-5
  summary: |-
    It is DHHS policy to provide services, care, benefits, and assistance to all qualified persons without regard to protected characteristics. Counties must publicize fair-hearing and discrimination-complaint procedures, display complaint forms and USDA/FNS nondiscrimination posters, provide participants and other low-income households access to nondiscrimination and rights information within ten days of request, advise applicants and recipients of Title VI and Rehabilitation Act rights, and mail verbal or written discrimination complaints to the Section 115.04 B address within five calendar days.
