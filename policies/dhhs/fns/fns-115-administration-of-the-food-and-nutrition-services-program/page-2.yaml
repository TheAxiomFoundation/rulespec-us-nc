  summary: |-
    An identifiable application is an application containing a legible name and address that has been signed. The county DSS must accept an identifiable application when submitted even if an appointment for an interview is assigned at a future date. County DSS have direct responsibility for eligibility determinations, reviews, authorizing benefits, fair hearings, application access, information materials, pamphlets, and required posters.
