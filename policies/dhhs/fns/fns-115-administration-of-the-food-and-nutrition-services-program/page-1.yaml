    corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-1
  summary: |-
    Within USDA, the Food and Nutrition Service is responsible for federal administration, provides policy and guidance to the State Division of Social Services, and the Southeast Regional Office provides technical assistance and oversight of the North Carolina FNS Program. DHHS/DSS provides State policies, procedures, and supervision through county departments. County DSS directors are responsible for certification of applicant households; county DSS must provide the current application upon request and accept an identifiable North Carolina state application when submitted.
