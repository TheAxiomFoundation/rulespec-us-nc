format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-6
  summary: |-
    "Explain to each new FNS household that card PINning instructions will be mailed along with the EBT card." "Offer assistance to households who have difficulty understanding the telephone PIN selection process." "Benefits are accessible to the FNSU once the EBT card is PINned."
rules:
  - name: new_household_ebt_pin_instructions_explanation_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 115.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-6
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          not household_is_new_fns_household
          or household_was_explained_card_pinning_instructions_will_be_mailed_with_ebt_card

  - name: telephone_pin_selection_assistance_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 115.05(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-6
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          not household_has_difficulty_understanding_telephone_pin_selection_process
          or household_was_offered_assistance_with_telephone_pin_selection_process

  - name: fns_benefits_accessible_after_ebt_card_pinned
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 115.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-6
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          household_ebt_card_is_pinned
