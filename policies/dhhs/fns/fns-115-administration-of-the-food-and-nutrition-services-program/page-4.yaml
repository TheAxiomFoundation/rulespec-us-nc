format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-4
  summary: |-
    "If the applicant gives false information about identity in order to receive FNS benefits and/or WFFA in more than one place, the applicant will not receive FNS benefits and/or WFFA for ten years"; the county must explain signature acknowledgments, EBT, and that the State and counties cannot discriminate against applicants or participants for listed protected reasons.
rules:
  - name: false_identity_duplicate_benefit_disqualification_years
    kind: parameter
    dtype: Count
    source: FNS 115, page 4, Change #1-2021
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-4
              excerpt: "for ten years"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          10

  - name: false_identity_duplicate_benefit_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 115, page 4, Change #1-2021
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-4
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-4
              excerpt: "for ten years"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          applicant_gave_false_identity_information_to_receive_fns_or_wffa_in_more_than_one_place
          and applicant_is_within_false_identity_duplicate_benefit_disqualification_period

  - name: applicant_not_to_receive_fns_or_wffa_due_to_false_identity_duplicate_benefits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 115, page 4, Change #1-2021
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-115-administration-of-the-food-and-nutrition-services-program/page-4
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          false_identity_duplicate_benefit_disqualification_applies
