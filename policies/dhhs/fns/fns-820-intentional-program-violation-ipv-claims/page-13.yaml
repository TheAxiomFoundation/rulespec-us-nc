format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-13
  summary: |-
    Do not allow a Fair Hearing past the 90th day as written on the DSS-8554. If a recoupment improperly occurs after a request for an appeal, restore the amount recouped until the appeal is resolved. If an oral or written argument was not requested within the 10 calendar days, the local agency will mail a DSS-8658 Post Hearing Repayment Notice. When a Fair Hearing decision is remanded back to the local agency, the local agency should recalculate the overissuance, take no action until verifying the debtor has not contested the remand decision, send DSS-8658 if not contested within 10 calendar days, post the DSS-8658 date in EPICS, and document in EPICS. A debtor may not appeal the DSS-8658 after a claim has been remanded back to the local agency.
