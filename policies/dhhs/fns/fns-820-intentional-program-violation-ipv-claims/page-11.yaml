format: rulespec/v1
module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-11
  summary: |-
    Notice of disqualification must be mailed for ADH decisions, state hearing decisions, ADH waivers, and court action. When a guilty decision is made by methods in 820.07 A-D, enter the disqualification and claim in EPICS; Notice of Adverse Action is not required. Disqualifications are effective the first calendar day of the month under the source-stated ADH, state hearing, waiver, or court timing rule.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-11#disqualification_effective_month
      reason: The source determines the first calendar day of a disqualification month from event dates, receipt dates, appeal timing, hearing-decision letters, waiver notification, and court orders. The supported RuleSpec schema has no date-valued output or date arithmetic needed to compute the month faithfully.
    - output: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-11#required_disqualification_notice
      reason: The source requires specific DSS notice forms for administrative and court decision routes, but the supported executable dtypes do not provide a stable document/form enumeration suitable for preserving the required notice identity without collapsing the administrative obligation.
rules: []
