format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-7
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-7#countable_income_from_ineligible_and_disqualified_members_considered
      reason: Item D requires considering countable income from certain ineligible and all disqualified household members, but the source points to Section 260 for the income rules and no copied context provides that upstream source.
  summary: |-
    D. Consider any countable income from certain ineligible and all disqualified household members. See Section 260, Income.
    E. Verify and allow dependent care expenses each month as a deduction. Allow the actual amount of dependent care cost the FNS unit is responsible for paying.
    F. Count money from means-tested State and Federal assistance payments ... intended for the overissued month ... For other income, count income in the month received.
    K. Do not include in the computation any month in which the FNS Unit received Transitional Food and Nutrition Services (TFNS) unless there was dual participation ... or an IPV disqualification was not imposed timely.
    M. The amount of the overissuance for a trafficking claim is the amount of the benefits trafficked.
rules:
  - name: dependent_care_deduction_allowed_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 820, page 7, item E
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-7
              excerpt: Change #3 -2017 September 20, 2017
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-7
              excerpt: Allow the actual amount of dependent care cost the FNS unit is responsible for paying.
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if dependent_care_expense_verified: actual_dependent_care_cost_household_responsible_for_paying else: 0

