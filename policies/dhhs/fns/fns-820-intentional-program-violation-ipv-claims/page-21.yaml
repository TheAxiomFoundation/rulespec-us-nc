  summary: |-
    Do not terminate a claim against a participating household. Terminate a claim if listed conditions exist, including low-balance delinquency, delinquency for three years or more without TOP pursuit, household cannot be located, sustained TOP/state tax intercept efforts with demand letters, or all adult debtors deceased with no estate collection planned.
