    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: Section 820.09(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-22
    versions:
