format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-22
  summary: |-
    Terminated claims may be reactivated if a new collection method or a specific event increases the likelihood of collecting the claim. Overcollections appear in EPICS. When a claim is overcollected via recoupment, refund any overcollection to the household in benefits; via cash payments, refund in cash; via tax or lottery intercept, the State Controller's Office issues the refund; via expunged benefits, do not restore benefits. Written deletion requests are sent when claims are found invalid or entered in error, but claims with payment history, disqualification, or a debtor certified for TOP cannot be deleted and may be adjusted and closed.
