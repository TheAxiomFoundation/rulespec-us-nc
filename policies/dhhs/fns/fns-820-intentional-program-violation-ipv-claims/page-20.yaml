format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
  summary: |-
    Section 820 Change #3 -2017 September 20, 2017. Delinquent debts are automatically submitted to the NC Education Lottery for interception of lottery winnings. When an unspecified joint cash collection is received for a combined public assistance/Food and Nutrition Services recipient claim, each program must receive its prorated share of the amount collected. Any claim not under a current court order, or any portion of a claim not under a current court order, may be compromised if the local agency can reasonably determine the claim will not be paid in three (3) years. Apply restored benefits or supplements to the full amount of the claim, including any compromised amount. If a compromised claim not under a current court order subsequently becomes delinquent, the compromised portion may be re-instated and subject to collection.
rules:
  - name: delinquent_debt_submitted_to_ncel_for_lottery_interception
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820, page 20, D.10.a
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "Change #3 -2017 September 20, 2017"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "Delinquent debts are automatically submitted to the NC Education Lottery for interception of lottery winnings."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          household_has_delinquent_debt

  - name: food_and_nutrition_services_prorated_joint_cash_collection_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 820, page 20, E
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "Change #3 -2017 September 20, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "each program must receive its prorated share of the amount collected"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if unspecified_joint_cash_collection_received_for_combined_public_assistance_fns_recipient_claim and total_combined_claim_amount > 0: collection_amount * food_and_nutrition_services_claim_amount / total_combined_claim_amount else: 0

  - name: local_agency_may_compromise_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820, page 20, F.2
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "Change #3 -2017 September 20, 2017"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "may also be compromised (reduced) if the local agency can reasonably determine ... the claim will not be paid in three (3) years"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          claim_or_claim_portion_not_under_current_court_order
          and local_agency_can_reasonably_determine_household_economic_circumstances_indicate_claim_will_not_be_paid_within_three_years

  - name: claim_amount_to_which_restored_benefits_or_supplements_apply
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 820, page 20, F.4
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "Change #3 -2017 September 20, 2017"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "Apply restored benefits or supplements to the full amount of the claim, including any claim amount that was compromised"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if restored_benefits_or_supplements_are_to_be_applied_to_claim: full_claim_amount else: 0

  - name: compromised_claim_portion_may_be_reinstated_and_collected
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820, page 20, F.5
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "Change #3 -2017 September 20, 2017"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-20
              excerpt: "If a compromised claim not under a current court order subsequently becomes delinquent, the compromised portion of the claim may be re-instated and subject to collection."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          compromised_claim_not_under_current_court_order_subsequently_became_delinquent
