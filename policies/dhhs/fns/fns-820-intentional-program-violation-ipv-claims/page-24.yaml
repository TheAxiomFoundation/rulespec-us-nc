format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
  summary: |-
    A debtor may not request a Fair Hearing if restitution is determined by the courts. Do not pursue collection against any financially responsible individual if the court orders no restitution or indicates a “zero” on the court order for the amount of restitution. Pursue other means of collection if the individual fails to pay as ordered, and the court order expires. Once the probation period has ended, enter a VRA into EPICS. The date of the Court Order will be the “DATE SIGNED”. List payment method as “R” and divide the original overpayment amount by 36 and to determine the PAYMENT AMOUNT. The DUE DATE will be the 15th of the following month from the DATE ENTERED.
rules:
  - name: post_probation_vra_payment_month_divisor
    kind: parameter
    dtype: Integer
    source: FNS 820 IPV Claims, page 24, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
              excerpt: "divide the original overpayment amount by 36"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          36

  - name: post_probation_vra_due_day_of_following_month
    kind: parameter
    dtype: Integer
    source: FNS 820 IPV Claims, page 24, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
              excerpt: "The DUE DATE will be the 15th of the following month"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          15

  - name: fair_hearing_unavailable_for_court_restitution
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 24
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          restitution_is_determined_by_courts

  - name: collection_barred_by_zero_court_restitution
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 24
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
              excerpt: "court orders no restitution or indicates a “zero”"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          court_orders_no_restitution
          or court_order_indicates_zero_restitution

  - name: other_collection_means_may_be_pursued_after_expired_order
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 24, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          individual_fails_to_pay_as_ordered
          and court_order_expires
          and not probation_officer_verified_court_order_was_extended

  - name: post_probation_vra_payment_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 820 IPV Claims, page 24, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
              excerpt: "divide the original overpayment amount by 36 and to determine the PAYMENT AMOUNT"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24#post_probation_vra_payment_month_divisor
              output: post_probation_vra_payment_month_divisor
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if probation_period_has_ended: original_overpayment_amount / post_probation_vra_payment_month_divisor else: 0

  - name: court_ordered_allotment_reduction_may_begin
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 24, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          probation_officer_provides_verification_order_amended_for_allotment_reduction

  - name: collection_after_failed_probation_and_active_sentence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 24, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-24
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          restitution_is_condition_of_probation
          and individual_fails_to_complete_probation_successfully
          and individual_serves_active_sentence_for_crime
          and claim_blocks_removed
