format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
  summary: |-
    "Apply the following rules for applications and recertifications to determine the first month of overissuance." The "10th-10-10 rule" allows the 10th of the month following the month of change for household reporting, 10 calendar days for caseworker reaction, and 10 work days for Notice of Adverse Action. Applicant-household and ongoing-case first-month rules are stated, and Simplified Reporting reportable changes include income above 130% of poverty and ABAWD work below an average of 80 hours per month in non-waiver local agencies.
rules:
  - name: household_report_deadline_day_of_month
    kind: parameter
    dtype: Integer
    period: Month
    source: FNS 820.B.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
              excerpt: "10th of the month, following the month of change"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: caseworker_reaction_calendar_day_limit
    kind: parameter
    dtype: Count
    source: FNS 820.B.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
              excerpt: "10 calendar days for the caseworker to react"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: notice_adverse_action_work_day_limit
    kind: parameter
    dtype: Count
    source: FNS 820.B.1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
              excerpt: "10 work days for Notice of Adverse Action"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: simplified_reporting_gross_income_limit_poverty_ratio
    kind: parameter
    dtype: Rate
    source: FNS 820.B.3.c.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
              excerpt: "130% of the poverty level"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          1.30

  - name: abawd_average_monthly_work_hours_threshold
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 820.B.3.c.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
              excerpt: "80 hours per month"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          80

  - name: change_processed_within_10_10_10_rule
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          report_day_of_month_following_change <= household_report_deadline_day_of_month
          and caseworker_calendar_days_to_react_to_change <= caseworker_reaction_calendar_day_limit
          and notice_of_adverse_action_work_days <= notice_adverse_action_work_day_limit

  - name: applicant_interview_incorrect_information_first_month_of_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.B.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          applicant_household
          and information_reported_incorrectly_at_application_interview
          and current_month_is_first_month_of_certification_period

  - name: applicant_post_interview_change_first_month_of_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.B.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          applicant_household
          and change_occurred_after_application_interview
          and current_month_is_first_month_after_applying_10_10_10_from_month_after_eligibility_notice_received

  - name: ongoing_case_first_month_of_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.B.3.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          ongoing_case
          and current_month_is_first_month_affected_had_change_been_reported_timely

  - name: simplified_reporting_income_increase_reportable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.B.3.c.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          simplified_reporting_case
          and income_increase_occurred
          and gross_income_after_increase > poverty_level_for_fns_unit_size * simplified_reporting_gross_income_limit_poverty_ratio

  - name: simplified_reporting_abawd_work_reduction_reportable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.B.3.c.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          simplified_reporting_case
          and fns_unit_includes_abawd
          and local_agency_is_non_waiver
          and abawd_average_monthly_work_hours < abawd_average_monthly_work_hours_threshold

  - name: participant_awareness_month_default
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.B.3.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-4
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          unable_to_determine_month_participant_first_became_aware_of_change
          and (current_month_is_month_participant_started_work or current_month_is_month_participant_received_first_check)
