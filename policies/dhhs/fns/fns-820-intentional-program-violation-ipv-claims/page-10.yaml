format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-10
  summary: '"If the household is not participating, flag the case"; "Calculate the
    overissuance using information verified through any readily available source";
    if verification cannot be obtained and a claim cannot be established, document
    and flag the record and claims file. Client interviews are voluntary; home-visit
    notice must be mailed "at least three working days prior"; continue the investigation
    if the client does not cooperate, and establish a claim without an interview if
    the appointment is missed and evidence is clear and convincing. A claim is an
    IPV if an individual is found guilty of, or agrees to guilt by, listed methods.'
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-10#claim_is_intentional_program_violation
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
