format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-2
  summary: '"Create a referral in the Enterprise Program Integrity Control System
    (EPICS) within 10 business days of detection of a potential overissuance." "Request
    all necessary verifications within 30 calendar days" and "Allow 30 calendar days"
    for return. "Complete a DSS-1682 and enter a Date of Discovery into EPICS within
    180 days from the Creation Date" and "Establish the claim in EPICS within 180
    days from the Date of Discovery." ADH, waiver, DCA, or court action must be initiated
    within 90 days of the U/P Creation Date, and the disqualification must be determined
    and entered within 90 days of the U/P Creation Date. Establish a claim regardless
    of amount if Quality Control discovers the overissuance, if the overissuance results
    from trafficking, or if at least one debtor is in an active FNS case. Establish
    a claim for a non-participating household if the overpayment amount is more than
    $125.00 unless a State-approved Claims Management Plan sets a different amount.'
rules:
