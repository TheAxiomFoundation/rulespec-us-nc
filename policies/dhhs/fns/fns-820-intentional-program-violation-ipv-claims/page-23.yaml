  summary: |-
    "Request an adjustment closure of claim when" all debtors meet stated deceased-estate, bankruptcy-discharge, nursing-home-nonpayment, or system-deletion conditions. The request for deletion or closure must include claim identifiers, category, dates, reason, submitter, balance, signatures, date of death if applicable, and justification. The page also begins court-action collection instructions.
