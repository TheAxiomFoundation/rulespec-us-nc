format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-25
  summary: |-
    "Pursue collection against the individual and/or any financially responsible person when a parole board remits restitution and the individual has a civil liability." When a court orders community service in lieu of restitution, "Send a letter to the household" explaining notice duties and repayment of any unfinished overissuance balance. Completed community service is entered by "compromising the claim to zero"; incomplete work requires payment for the difference by dividing hours worked by hours required, multiplying by the total claim amount, subtracting that result from the claim amount, and sending a demand letter.
rules:
  - name: collection_pursuit_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820, page 25, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-25
              excerpt: "Pursue collection against the individual and/or any financially responsible person when a parole board remits restitution and the individual has a civil liability."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          parole_board_remits_restitution_for_individual_with_civil_liability
          and person_is_the_individual_or_financially_responsible_for_that_liability

  - name: household_community_service_completion_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820, page 25, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-25
              excerpt: "Take the following actions when a court orders community service in lieu of restitution. Send a letter to the household."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          court_orders_community_service_in_lieu_of_restitution

  - name: completed_community_service_value_to_offset
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 820, page 25, item 7(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-25
              excerpt: "When the community service work is completed, enter the total value of the work completed by compromising the claim to zero."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if community_service_work_completed_under_court_order: total_claim_amount else: 0

  - name: partial_community_service_value_to_offset
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 820, page 25, item 7(b), steps 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-25
              excerpt: "Divide the hours worked by the hours required to be worked. Multiply the result by the total claim amount."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if client_under_court_order_does_not_fulfill_total_work_obligation_within_court_specified_time_frame: (community_service_hours_worked / community_service_hours_ordered) * total_claim_amount else: 0

  - name: partial_community_service_claim_balance_to_collect
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 820, page 25, item 7(b), steps 1-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-25
              excerpt: "Request payment for the difference between the overissuance and the amount of work performed ... Subtract the result from the total claim amount."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          if client_under_court_order_does_not_fulfill_total_work_obligation_within_court_specified_time_frame: max(0, total_claim_amount - partial_community_service_value_to_offset) else: 0

  - name: partial_community_service_demand_letter_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820, page 25, item 7(b), step 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-25
              excerpt: "Request payment for the difference ... if the client does not fulfill the total work obligation within the court specified time frame. ... Send a demand letter for the claim balance."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          client_under_court_order_does_not_fulfill_total_work_obligation_within_court_specified_time_frame
