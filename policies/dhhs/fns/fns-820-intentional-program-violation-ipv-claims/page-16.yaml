format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16
  summary: |-
    Wage Garnishment should only be used after all other means of collecting payments have been exhausted. If the claim is being recouped or cash payments are being made, garnishment is not allowed. Garnishment is not an option when an individual has been found guilty of an IPV in criminal court and ordered by the court to pay restitution. The local agency must obtain a civil judgment prior to garnishment, may petition district court, and the petition must verify the proposed garnishment does not exceed 20% of net earned income.
rules:
  - name: maximum_garnishment_rate_of_net_earned_income
    kind: parameter
    dtype: Rate
    source: FNS 820, page 16, Petition for Order of Garnishment item (9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16
              excerpt: "does not exceed 20% of the individual’s net earned income"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          0.20

  - name: proposed_garnishment_within_net_income_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820, page 16, Petition for Order of Garnishment item (9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16
              excerpt: "does not exceed 20% of the individual’s net earned income"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16#maximum_garnishment_rate_of_net_earned_income
              output: maximum_garnishment_rate_of_net_earned_income
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          proposed_garnishment_amount <= individual_net_earned_income * maximum_garnishment_rate_of_net_earned_income

  - name: wage_garnishment_allowed_for_ipv_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820, page 16, wage garnishment limits and prerequisites
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16#proposed_garnishment_within_net_income_limit
              output: proposed_garnishment_within_net_income_limit
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          all_other_collection_means_exhausted
          and local_agency_has_civil_judgment_for_fraudulent_benefits_and_action_costs
          and proposed_garnishment_within_net_income_limit
          and not claim_is_being_recouped
          and not cash_payments_are_being_made
          and not individual_found_guilty_of_ipv_in_criminal_court_and_ordered_to_pay_restitution

  - name: petition_for_order_of_garnishment_complete
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820, page 16, Petition for Order of Garnishment required contents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16#proposed_garnishment_within_net_income_limit
              output: proposed_garnishment_within_net_income_limit
              hash: sha256:local
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          petition_indicates_person_is_former_recipient
          and petition_explains_public_assistance_programs_involved
          and petition_states_fraudulent_overpayment_amount
          and petition_explains_fraudulent_benefit_circumstances
          and petition_states_administrative_collection_methods_exhausted_unsuccessfully
          and petition_verifies_civil_judgment_and_attaches_copy
          and petition_states_garnishee_name_and_address
          and petition_states_individual_net_earned_income
          and proposed_garnishment_within_net_income_limit

  - name: petition_service_complete
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 820, page 16, service of Petition for Order of Garnishment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-16
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          petition_served_on_individual
          and petition_served_on_garnishee
          and service_complies_with_rule_4
