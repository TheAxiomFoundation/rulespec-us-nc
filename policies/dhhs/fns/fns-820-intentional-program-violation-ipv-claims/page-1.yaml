format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-1
  summary: |-
    A claim must be established within 12 months from the referral created in EPICS. Establish claims for overissuance months within six years prior to discovery. Initiate IPV disqualification procedures within 180 days of discovery; enter disqualification within 90 days after "U" or "P" is entered. Agencies receive a 35% incentive for IPV claims and 20% for IHE claims; corrective action is required when more than 10% of referrals are over 180 days old.
rules:
  - name: claim_establishment_deadline_months_from_epics_referral
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 820.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-1
              excerpt: "A claim must be established within 12 months from the date the referral was created in Enterprise Program Integrity Control System (EPICS)."
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          12

  - name: overissuance_claim_lookback_limit_years_from_discovery
    kind: parameter
    dtype: Count
    period: Year
    source: FNS 820.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-1
              excerpt: "within six years prior to the Date of Discovery"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          6

  - name: disqualification_procedures_initiation_deadline_days_from_discovery
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 820.01(D)
    metadata:
      proof:
        atoms:
