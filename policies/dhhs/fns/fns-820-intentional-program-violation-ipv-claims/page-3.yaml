format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-3
  summary: Collect the overissuance from all adult members of the FNS Unit when one
    member of the FNS Unit is found guilty of trafficking Food and Nutrition Services.
    Collect the overissuance only from the individual found guilty of trafficking
    when that individual is outside the FNS Unit and no one in the FNS Unit had knowledge
    of the trafficking. Trafficking claims are independent of the issuance and certification
    process. A claim is an IPV if an individual has been found guilty by ADH, waiver
    of ADH, Court Action, or Disqualification Consent Agreement handled by the District
    Attorney. The Simplified Reporting Category applies to all FNS units except SNAP
    FNS units and Transitional FNS units.
rules:
- name: person_found_guilty_by_trafficking_claim_method
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: FNS 820, page 3, Sections J and 820.02
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-3
  versions:
  - effective_from: '2017-09-20'
    formula: 'individual_admitted_by_signing_adh_waiver

      or individual_found_guilty_by_administrative_disqualification_hearing

      or individual_found_guilty_by_subsequent_state_level_hearing

      or individual_adjudicated_by_court

