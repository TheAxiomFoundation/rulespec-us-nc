format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
  summary: |-
    "Once the month of change is established, allow the household until the 10th of the following month to report. Allow ten calendar days for the agency to act on the change... Also, allow ten working days for the Notice of Adverse Action to expire." At recertification, the first month of the new certification period is the first month of overissuance when a change is not reported at the recertification interview; if the change was not known or anticipated, it must be reported by the 10th of the month following receipt of the notice of eligibility. "Do not include in the claim calculation any months in which the household did not participate."
rules:
  - name: simplified_reporting_change_report_due_day_of_following_month
    kind: parameter
    dtype: Integer
    source: FNS 820 IPV Claims, page 5, simplified reporting change reporting deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
              excerpt: "until the 10th of the following month to report"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: recertification_later_change_report_due_day_following_notice_month
    kind: parameter
    dtype: Integer
    source: FNS 820 IPV Claims, page 5, recertifications paragraph 4.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
              excerpt: "by the 10th of the month, following the month in which the notice of eligibility is received"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: agency_action_calendar_days_allowed
    kind: parameter
    dtype: Integer
    source: FNS 820 IPV Claims, page 5, agency action allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
              excerpt: "Allow ten calendar days for the agency to act on the change"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: adverse_action_notice_working_days_allowed
    kind: parameter
    dtype: Integer
    source: FNS 820 IPV Claims, page 5, Notice of Adverse Action expiration allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
              excerpt: "allow ten working days for the Notice of Adverse Action to expire"
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          10

  - name: simplified_reporting_change_report_is_late
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 5, simplified reporting reporting deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          month_of_change_established
          and (
            not household_reported_change
            or change_reported_day_of_following_month > simplified_reporting_change_report_due_day_of_following_month
          )

  - name: simplified_reporting_ten_ten_ten_periods_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 5, 10-10-10 timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          calendar_days_since_report_due_date >= agency_action_calendar_days_allowed
          and working_days_since_adverse_action_notice_start >= adverse_action_notice_working_days_allowed

  - name: simplified_reporting_first_month_of_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 5, simplified reporting overissuance timing example and instructions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          simplified_reporting_change_report_is_late
          and simplified_reporting_ten_ten_ten_periods_satisfied
          and month_is_first_month_after_notice_of_adverse_action_expiration

  - name: recertification_known_change_first_month_of_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 5, recertifications paragraph 4.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          change_known_or_anticipated_at_recertification
          and not change_reported_at_recertification_interview
          and month_is_first_month_of_new_certification_period

  - name: recertification_later_change_report_is_late
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 5, recertifications paragraph 4.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          change_not_known_or_anticipated_at_recertification
          and (
            not household_reported_later_change
            or later_change_reported_day_of_following_notice_month > recertification_later_change_report_due_day_following_notice_month
          )

  - name: recertification_later_change_first_month_of_overissuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820 IPV Claims, page 5, recertifications paragraph 4.b example and instructions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          recertification_later_change_report_is_late
          and calendar_days_since_later_change_report_due_date >= agency_action_calendar_days_allowed
          and working_days_since_later_change_adverse_action_notice_start >= adverse_action_notice_working_days_allowed
          and month_is_first_month_after_later_change_notice_expiration

  - name: claim_calculation_month_excluded_for_nonparticipation
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 820.04.A, verifying participation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-820-intentional-program-violation-ipv-claims/page-5
    versions:
      - effective_from: '2017-09-20'
        formula: |-
          not household_participated_in_month
