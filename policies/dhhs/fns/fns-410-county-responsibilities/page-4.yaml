format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-4
  summary: |-
    For additional applications received before disposition of the first application, document receipt, honor the original application date, review changed circumstances, and determine eligibility and/or benefit level using combined information. After eligibility, review new applications for changed circumstances, treat reportable changes as change reports, and deny the new application to prevent dual participation. The county must act on any application submitted after a denial notice if it contains a name, address, and signature.
rules:
  - name: additional_application_before_first_disposition_processing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 410 County Responsibilities, page 4, section A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          additional_application_received_before_first_application_disposition
  - name: additional_application_combined_information_used_for_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 410 County Responsibilities, page 4, section A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          additional_application_received_before_first_application_disposition
          and additional_applications_reviewed_for_changed_circumstances
          and known_situation_changes_identified
  - name: post_eligibility_application_denial_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 410 County Responsibilities, page 4, section B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          application_received_after_household_determined_eligible
  - name: post_eligibility_application_treated_as_change_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 410 County Responsibilities, page 4, section B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          application_received_after_household_determined_eligible
          and new_application_contains_reportable_change
  - name: post_conversion_reported_change_must_be_processed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 410 County Responsibilities, page 4, section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          snap_application_received_after_automated_snap_conversion
          and individual_or_authorized_representative_reports_change
          and reported_change_affects_snap_benefit_amount_or_eligibility
  - name: county_must_act_on_application_after_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 410 County Responsibilities, page 4, section D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          application_submitted_after_denial_notice
          and application_contains_name
          and application_contains_address
          and application_contains_signature
