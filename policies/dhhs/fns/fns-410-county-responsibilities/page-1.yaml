format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-1
  summary: |-
    County DSS must make FNS application forms readily accessible and provide them on request; post signs explaining processing standards and the right to file on the day of initial contact; include same-day filing information in outreach materials and the application form; make other arrangements for individuals unable to come to the office and lacking a representative; encourage same-day filing; and, when a household requests a mailed application after telephone contact, mail the application and DSS-8650A the same date and inform the household that a mailed application is not filed until signed and returned.
rules:
  - name: mailed_application_not_filed_until_signed_and_returned
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 410.01(F)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          application_form_delivered_by_mail
          and (not application_is_signed or not application_returned_to_agency)

  - name: mailed_application_filed_with_agency
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 410.01(F)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          application_form_delivered_by_mail
          and application_is_signed
          and application_returned_to_agency
