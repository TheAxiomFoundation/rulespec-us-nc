  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-2
  summary: |-
    If a household submits a written request for FNS, the county DSS must mail an application on the same day. If the household contacts or mails an application to the wrong office, the FNS office has same-day filing, forwarding, or processing duties. If a household attempts to apply outside its county of residence, the worker must either direct the household to its residence county/online portal or complete a started NC FAST application and transfer it upon approval. If the agency attempts to divert Work First applicants, it must encourage continuing the FNS application and explain Work First restrictions do not apply to FNS.
  unsupported_reason: |-
    The source imposes administrative duties on county DSS offices, FNS offices, workers, and agencies. Those legal subjects are not supported RuleSpec entities for executable rules in this artifact.
