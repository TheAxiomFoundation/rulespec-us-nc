format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-3
  summary: |-
    "Inform households that receiving FNS does not affect Work First time limits"; the date of application is the earlier of the interview date if signed then, or the date the signed minimum-information application is received in the FNS office, with non-business-hours receipt treated as next business day; all FNS applications must be registered within three workdays from filing.
rules:
  - name: fns_receipt_does_not_affect_work_first_time_limits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 410, page 3, subsection c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          household_receives_fns
  - name: fns_application_registration_deadline_workdays
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 410.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-3
              excerpt: "registered within three (3) workdays"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          3
  - name: fns_application_registration_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 410.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-3
              excerpt: "All FNS applications must be registered within three (3) workdays from the time the application is filed."
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-410-county-responsibilities/page-3#fns_application_registration_deadline_workdays
              output: fns_application_registration_deadline_workdays
              hash: sha256:local
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          fns_application_is_filed
          and workdays_from_filing_to_registration <= fns_application_registration_deadline_workdays
  - name: fns_application_date_is_interview_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 410.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          interview_occurs_on_same_date_application_is_signed
  - name: fns_application_date_is_office_receipt_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 410.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          signed_application_with_minimum_required_information_received_in_fns_office
          and office_receipt_date_is_prior_to_interview_date
  - name: non_business_hours_receipt_treated_as_next_business_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 410.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-410-county-responsibilities/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          application_received_during_non_business_hours
          and receipt_date_used_is_next_business_day
