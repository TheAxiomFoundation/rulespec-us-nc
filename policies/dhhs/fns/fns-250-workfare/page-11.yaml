format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-11
  summary: |-
    "A qualifying ABAWD E&T activity maintains FNS eligibility for individuals subject to ABAWD time limits. Qualifying activities include participation in: a. Workfare b. Job search, during the first 30 days after initial certification, before assignment to a Workfare position. c. 20 hours or more each week in qualifying activities in a program under: i. Title I of the Workforce Investment Act of 1998 ii. Section 236 of the Trade Act of 1974"
rules:
  - name: initial_certification_job_search_day_limit
    kind: parameter
    dtype: Count
    source: FNS 250 Workfare, page 11, qualifying ABAWD E&T activity note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-11
              excerpt: "Job search, during the first 30 days after initial certification"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          30

  - name: qualifying_activity_weekly_hours_minimum
    kind: parameter
    dtype: Count
    period: Week
    source: FNS 250 Workfare, page 11, qualifying ABAWD E&T activity note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-11
              excerpt: "20 hours or more each week"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          20

  - name: qualifying_abawd_et_activity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 250 Workfare, page 11, qualifying ABAWD E&T activity note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-11
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-11
              excerpt: "first 30 days after initial certification"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-11
              excerpt: "20 hours or more each week"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          participates_in_workfare
          or (participates_in_job_search
          and days_after_initial_certification <= initial_certification_job_search_day_limit
          and before_assignment_to_workfare_position)
          or (weekly_hours_in_qualifying_title_i_workforce_investment_act_activity >= qualifying_activity_weekly_hours_minimum)
          or (weekly_hours_in_qualifying_trade_act_section_236_activity >= qualifying_activity_weekly_hours_minimum)

  - name: fns_eligibility_maintained_by_qualifying_abawd_et_activity
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: FNS 250 Workfare, page 11, qualifying ABAWD E&T activity note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-11
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-250-workfare/page-11#qualifying_abawd_et_activity
              output: qualifying_abawd_et_activity
              hash: sha256:local
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_subject_to_abawd_time_limits
          and qualifying_abawd_et_activity
