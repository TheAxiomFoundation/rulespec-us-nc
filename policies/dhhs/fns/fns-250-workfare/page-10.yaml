format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-10
  summary: |-
    "A volunteer is automatically terminated from volunteer Workfare status when the FNS unit fails to apply for recertification within 30 days after the end of its certification period." The county DSS must submit a quarterly report to the Division of Social Services by the 15th of the month following the end of the calendar quarter, including specified volunteer counts and total hours worked.
rules:
  - name: recertification_application_day_limit
    kind: parameter
    dtype: Count
    source: FNS 250 Workfare, page 10, automatic termination from volunteer Workfare status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-10
              excerpt: "within 30 days after the end of its certification period"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          30

  - name: volunteer_workfare_status_automatically_terminated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 250 Workfare, page 10, automatic termination from volunteer Workfare status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-10
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-10
              excerpt: "within 30 days after the end of its certification period"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_volunteer_in_workfare_status
          and days_after_certification_period_end_before_fns_unit_applies_for_recertification > recertification_application_day_limit
