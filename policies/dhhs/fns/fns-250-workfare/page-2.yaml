format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
  summary: |-
    If information on a new or renewal referral form changes, DSS-8616 is used to notify the Workfare unit within 10 calendar days. The county DSS Workfare operating agency establishes and monitors job sites and volunteer participants. The Workfare worker arranges jobs only in public or private non-profit agencies; contractual agreements must establish job slots and benefit responsibilities. Workfare participants receive job-related benefits provided to similar non-Workfare employees, firm-related benefits need not be provided, workers compensation insurance must be provided, and participants are notified of reporting details, hours, and job duties.
rules:
  - name: workfare_referral_change_notice_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: FNS 250, page 2, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
              excerpt: within 10 calendar days
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          10

  - name: workfare_referral_change_notice_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 250, page 2, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          workfare_referral_information_changed
          and workfare_unit_notified_using_dss_8616
          and days_after_referral_information_change <= workfare_referral_change_notice_deadline_days

  - name: workfare_job_site_allowed
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Day
    source: FNS 250.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          job_site_is_public_agency
          or job_site_is_private_non_profit_agency

  - name: workfare_job_contract_required_terms_present
    kind: derived
    entity: Employer
    dtype: Judgment
    period: Day
    source: FNS 250.02(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          county_dss_has_contractual_agreement_with_job_provider
          and contractual_agreement_designates_job_slots_available
          and contractual_agreement_assigns_responsibility_for_required_benefits

  - name: workfare_participant_job_related_benefit_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 250.02(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_workfare_participant
          and similar_non_workfare_employee_receives_benefit
          and benefit_is_related_to_specific_job
          and not benefit_is_related_only_to_being_employed_by_firm

  - name: workfare_participant_firm_related_benefit_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 250.02(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_workfare_participant
          and similar_non_workfare_employee_receives_benefit
          and not benefit_is_related_to_specific_job
          and not benefit_is_related_only_to_being_employed_by_firm

  - name: workfare_participant_workers_compensation_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 250.02(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_workfare_participant

  - name: workfare_participant_job_assignment_notice_complete
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 250.02(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-2
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          person_is_workfare_participant
          and participant_notified_where_to_report
          and participant_notified_when_to_report
          and participant_notified_whom_to_report
          and participant_notified_number_of_hours_to_work
          and participant_provided_brief_description_of_job_duties
