format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
  summary: |-
    250.04(A)-(C): An individual disqualified for failure to comply with E&T or Workfare requirements who moves counties remains disqualified until the applicable minimum disqualification period is served, unless the individual became exempt from work requirements after non-compliance. A Workfare-to-Workfare move also requires compliance with Workfare requirements. If otherwise eligible, the person can participate after the applicable minimum period ends.
rules:
  - name: one_month_minimum_disqualification_period
    kind: parameter
    dtype: Count
    source: FNS 250.04(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "minimum disqualification period (1, 3, or 6 months)"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          1

  - name: three_month_minimum_disqualification_period
    kind: parameter
    dtype: Count
    source: FNS 250.04(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "minimum disqualification period (1, 3, or 6 months)"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          3

  - name: six_month_minimum_disqualification_period
    kind: parameter
    dtype: Count
    source: FNS 250.04(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "minimum disqualification period (1, 3, or 6 months)"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          6

  - name: minimum_disqualification_period_month_count_is_authorized
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250.04(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "minimum disqualification period (1, 3, or 6 months)"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          applicable_minimum_disqualification_period_months == one_month_minimum_disqualification_period
          or applicable_minimum_disqualification_period_months == three_month_minimum_disqualification_period
          or applicable_minimum_disqualification_period_months == six_month_minimum_disqualification_period

  - name: individual_remains_disqualified_after_county_transfer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250.04(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          (
            individual_disqualified_for_failure_to_comply_with_et_requirements
            and individual_moved_to_workfare_county
            and individual_applies_for_benefits
            and not individual_became_exempt_from_work_requirements_since_noncompliance
            and not minimum_disqualification_period_served
          )
          or (
            individual_disqualified_for_failure_to_comply_with_workfare_requirements
            and individual_moved_to_et_county_or_county_with_no_des_contract
            and individual_applies_for_benefits
            and not individual_became_exempt_from_work_requirements_since_noncompliance
            and not minimum_disqualification_period_served
          )
          or (
            individual_disqualified_for_failure_to_comply_with_workfare_requirements
            and individual_moved_from_one_workfare_county_to_another_workfare_county
            and individual_applies_for_benefits
            and (
              not workfare_requirements_compliance_met
              or not minimum_disqualification_period_served
            )
          )

  - name: individual_can_participate_after_county_transfer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250.04(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-7
              excerpt: "September 20, 2021"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_applies_for_benefits
          and otherwise_eligible
          and (
            (
              individual_disqualified_for_failure_to_comply_with_et_requirements
              and individual_moved_to_workfare_county
              and (
                individual_became_exempt_from_work_requirements_since_noncompliance
                or minimum_disqualification_period_served
              )
            )
            or (
              individual_disqualified_for_failure_to_comply_with_workfare_requirements
              and individual_moved_to_et_county_or_county_with_no_des_contract
              and (
                individual_became_exempt_from_work_requirements_since_noncompliance
                or minimum_disqualification_period_served
              )
            )
          )
