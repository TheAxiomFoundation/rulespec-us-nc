format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-4
  summary: |-
    If a disqualified individual of an ongoing Workfare household wishes to comply during the certification period, the county sends notices and requests a cure. If the Workfare worker returns DSS-8628 indicating compliance, treat it as a change in situation. Add the individual back after the cured non-compliance or after the minimum disqualification period, depending on when compliance occurs. If the individual becomes exempt from work requirements during the certification period, the disqualification ends and the minimum disqualification period does not have to be served.
rules:
  - name: workfare_cure_request_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250 Workfare, page 4, Section A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_is_disqualified_from_workfare
          and individual_is_in_ongoing_workfare_household
          and individual_wishes_to_comply_with_workfare_requirements_during_certification_period

  - name: add_back_after_cure_following_minimum_disqualification_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250 Workfare, page 4, Section B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          workfare_worker_returned_dss_8628_indicating_compliance_during_certification_period
          and individual_served_minimum_disqualification_period
          and individual_complied_after_minimum_disqualification_period
          and all_other_fns_eligibility_requirements_are_met
          and month_is_after_non_compliance_is_cured

  - name: add_back_after_minimum_period_when_cure_occurs_during_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250 Workfare, page 4, Section B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          workfare_worker_returned_dss_8628_indicating_compliance_during_certification_period
          and individual_complied_during_disqualification_period
          and all_other_fns_eligibility_requirements_are_met
          and month_is_after_minimum_disqualification_period_is_served

  - name: workfare_disqualification_ends_due_to_work_requirements_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250 Workfare, page 4, Section C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-4
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_is_disqualified_from_workfare
          and individual_becomes_exempt_from_work_requirements_during_certification_period
