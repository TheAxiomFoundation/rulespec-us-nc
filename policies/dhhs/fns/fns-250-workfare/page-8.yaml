format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
  summary: |-
    If the individual became exempt from work requirements at any time since the non-compliance occurred, the disqualification ends. Otherwise, participation may resume after the non-compliance is cured and the minimum disqualification period ends. If the individual moves back to the original Workfare county and applies for benefits, the individual remains disqualified until compliance is met and the minimum disqualification period (1, 3, or 6 months) is served. Volunteer applicants and recipients who participate in Workfare must be reimbursed for incurred expenses, subject to section limits.
rules:
  - name: first_workfare_minimum_disqualification_period_months
    kind: parameter
    dtype: Count
    source: FNS 250.04.D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
              excerpt: "minimum disqualification period (1, 3, or 6 months)"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          1

  - name: second_workfare_minimum_disqualification_period_months
    kind: parameter
    dtype: Count
    source: FNS 250.04.D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
              excerpt: "minimum disqualification period (1, 3, or 6 months)"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          3

  - name: subsequent_workfare_minimum_disqualification_period_months
    kind: parameter
    dtype: Count
    source: FNS 250.04.D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
              excerpt: "minimum disqualification period (1, 3, or 6 months)"
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          6

  - name: workfare_disqualification_ends_due_to_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250.04.C-D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          became_exempt_from_work_requirements_since_non_compliance_occurred

  - name: workfare_disqualification_continues_after_return_to_original_county
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250.04.D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          individual_is_disqualified_for_failure_to_comply_with_workfare_requirements
          and individual_moved_back_to_original_workfare_county_and_applies_for_benefits
          and not compliance_with_workfare_requirements_met
          and not minimum_disqualification_period_served
          and not workfare_disqualification_ends_due_to_exemption

  - name: workfare_participation_after_non_compliance_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250.04.C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          otherwise_eligible_for_fns
          and non_compliance_with_workfare_requirements_cured
          and minimum_disqualification_period_ended

  - name: volunteer_workfare_expense_reimbursement_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 250.05.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-250-workfare/page-8
    versions:
      - effective_from: '2021-09-20'
        formula: |-
          is_volunteer_applicant_or_recipient
          and participates_in_workfare_program
          and incurred_workfare_participation_expenses
