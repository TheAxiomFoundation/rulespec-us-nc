format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-1
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-230-social-security-enumeration/page-1#person_may_be_included_in_fns_budget
      reason: The source states not to include an individual in the FNS budget until enumeration is provided, except as provided in Section 320, Expedited Service; Section 320 is not available in copied context.
    - output: us-nc:policies/dhhs/fns/fns-230-social-security-enumeration/page-1#enumeration_required_for_fns_unit_member
      reason: The source states enumeration is required for each participating or applying FNS unit member unless good cause can be determined per FNS 230.06, which is not available in copied context.
  summary: |-
    Each household member participating or applying for participation in FNS is required to provide enumeration. Do not include an individual in the FNS budget until enumeration is provided for each individual who does not have an SSN except as provided in Section 320, Expedited Service. When a SSN or verification of application of a SSN is provided for an individual, the individual is considered enumerated. Enumeration occurs when the member provides the SSN verbally or in writing, SSA signs and dates the DSS-8174 referral, SSA signs and dates the SSN application receipt and the agency date stamps it, or the household provides a birth document showing block 17 checked “yes.”
rules:
  - name: person_enumerated
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.02 A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-1
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          ssn_provided_verbally_or_in_writing
          or dss_8174_referral_for_ssn_application_signed_and_dated_by_social_security_administration_and_received_by_agency
          or receipt_for_ssn_application_signed_and_dated_by_social_security_administration_and_date_stamped_when_received_by_agency
          or household_provided_birth_document_showing_child_enumerated_at_birth
  - name: all_social_security_numbers_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.02 B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-1
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          household_member_has_more_than_one_ssn
  - name: ssn_verification_may_be_provided_until_next_recertification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.02 B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-1
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          person_enumerated
          and not next_recertification_has_occurred
