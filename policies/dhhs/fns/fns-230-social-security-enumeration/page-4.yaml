format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
  summary: |-
    "When the FNS unit states that a child was enumerated at birth" request reasonable verification, do not include the child until verification is provided, and advise reporting the newborn's SSN "no later than six months following the date of the child's birth or at the next scheduled recertification, whichever is later." For good cause, documentary or collateral evidence of application or every effort is good cause; illness, lack of transportation, or temporary absence are not. A member with good cause may participate for one month in addition to the month of application, with good cause determined monthly.
rules:
  - name: newborn_ssn_reporting_deadline_months_after_birth
    kind: parameter
    dtype: Count
    source: FNS 230.05(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
              excerpt: "no later than six months following the date of the child's birth"
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          6

  - name: additional_participation_months_for_good_cause
    kind: parameter
    dtype: Count
    source: FNS 230.06(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
              excerpt: "allow that member to participate for one month in addition to the month of application"
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          1

  - name: child_enumerated_at_birth_verification_provided
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.05(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          fns_unit_states_child_was_enumerated_at_birth
          and reasonable_verification_proves_child_was_enumerated_at_birth

  - name: child_may_be_included_after_birth_enumeration_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.05(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          child_enumerated_at_birth_verification_provided

  - name: good_cause_for_failure_to_enumerate
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.06(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          (documentary_or_collateral_evidence_household_applied_for_ssn
          or documentary_or_collateral_evidence_household_made_every_effort_to_supply_information)
          and not delay_due_to_illness
          and not delay_due_to_lack_of_transportation
          and not delay_due_to_temporary_absence

  - name: member_may_participate_for_good_cause_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.06(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          good_cause_for_failure_to_enumerate
          and participation_month_is_within_additional_good_cause_months

  - name: newborn_disqualified_for_failure_to_enumerate
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.05(D)-(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-4
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          newborn_ssn_not_received_by_later_of_next_recertification_or_six_months_after_birth
          and not good_cause_for_failure_to_enumerate
