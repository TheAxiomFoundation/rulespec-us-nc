format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-5
  summary: |-
    230.07(A) Do not call or write the local Social Security Office to verify that an individual has applied for a SSN; this is not acceptable verification. 230.07(B) Complete the DSS 8174 for each individual for whom a SSN is needed. 230.07(D)(1) documents are returned based on ownership noted on DSS-8174; if ownership is not documented, they are returned to the applicant. 230.07(D)(4) addresses DSS-8173 release signatures and refusals when the county sends forms. 230.08 permits a representative to apply when an individual cannot go to the local Social Security Office and requires DSS 8174 and SS-5 if there is no representative.
