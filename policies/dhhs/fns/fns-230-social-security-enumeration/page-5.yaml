    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.07(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-5
              excerpt: "FNS 230 Change #8-2021 July 21, 2021"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-5
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          verification_of_ssn_application_is_by_call_to_local_social_security_office
          or verification_of_ssn_application_is_by_written_request_to_local_social_security_office
