format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-2
  summary: |-
    Once the individual provides a SSN, the individual has until the next recertification to provide verification of the SSN. The Social Security Administration issues three types of Social Security cards. All cards show the name and Social Security Number (SSN).
rules:
  - name: ssn_verification_may_be_provided_by_next_recertification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.04, verification after SSN provided
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-2
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          individual_provided_ssn

  - name: type_1_social_security_card_issued
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.04(A), Type 1 Social Security card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-2
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          person_is_us_citizen
          or person_lawfully_admitted_to_united_states_on_permanent_basis

  - name: type_2_social_security_card_issued
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.04(A), Type 2 Social Security card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-2
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          person_lawfully_admitted_to_united_states_on_temporary_basis
          and person_has_dhs_authorization_to_work

  - name: type_3_social_security_card_issued
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230.04(A), Type 3 Social Security card
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-2
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          (person_lawfully_admitted_to_united_states_without_dhs_work_authorization
          and person_has_valid_non_work_reason_for_needing_ssn)
          or person_needs_ssn_because_federal_law_requires_ssn_to_get_benefit_or_services
