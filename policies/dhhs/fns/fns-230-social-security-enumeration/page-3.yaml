format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-3
  summary: |-
    Verify each SSN provided by the FNS unit at initial certification whenever possible. If not completed then, complete verification at or before the next recertification; do not delay initial certification of an otherwise eligible household. If verification is not received at next recertification or reapplication, do not deny the case; explore good cause and, if good cause is not found, disqualify the individual(s) who fail to provide verification. Once verified in NC FAST, verification is not needed again. SSN may be verified by a social security card or verified official document, Bendex/SDX/SOLQ or Enumeration Data Sheet, WFFA or Medicaid verification, or automatic addition to the NC FAST case record.
rules:
  - name: reported_ssn_verified_by_acceptable_method
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230 B.4 and C.1-C.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-3
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          social_security_card_viewed
          or official_document_containing_verified_ssn_viewed
          or ssn_appears_in_bendex_sdx_solq_or_enumeration_data_sheet
          or ssn_verified_by_wffa_or_medicaid_unit
          or ssn_automatically_added_to_nc_fast_case_record
          or verified_ssn_entered_in_nc_fast_person_page

  - name: ssn_verification_required_before_next_recertification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230 B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-3
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          individual_provided_ssn_to_fns_unit
          and not reported_ssn_verified_by_acceptable_method
          and initial_certification_verification_not_completed

  - name: otherwise_eligible_household_initial_certification_may_not_be_delayed_for_missing_ssn_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 230 B.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-3
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          household_is_otherwise_eligible
          and ssn_verification_not_received_at_initial_certification

  - name: individual_disqualified_for_missing_ssn_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230 B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-3
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          verification_not_received_at_next_recertification_or_reapplication
          and individual_failed_to_provide_verification
          and not good_cause_found_for_failure_to_provide_verification

  - name: subsequent_ssn_reverification_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 230 B.4 Note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-230-social-security-enumeration/page-3
    versions:
      - effective_from: '2021-07-21'
        formula: |-
          verified_ssn_entered_in_nc_fast_person_page
          and subsequent_change_recertification_or_reapplication
