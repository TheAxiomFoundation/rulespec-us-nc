format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-4
  summary: |-
    Change #05-2022 October 1, 2022. "An IPV disqualification can be pursued even when a claim will not be established, unless the violation is trafficking." "Do not consider a client's ability to pay. Selective prosecution is not allowed." "Do not discuss the Waiver of ADH with a recipient that meets your local agency's criteria for criminal prosecution." A Disqualification Consent Agreement "Must be handled by the District Attorney's Office in conjunction with deferred prosecution" and "Requires prior notice of the disqualification be given to the recipient."
rules:
  - name: ipv_disqualification_pursuit_without_claim_established_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.03, Establishing an IPV Disqualification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-4
              excerpt: "An IPV disqualification can be pursued even when a claim will not be established, unless the violation is trafficking."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          intentional_program_violation_occurred
          and claim_will_not_be_established
          and not violation_is_trafficking

  - name: local_agency_ipv_case_routing_criteria_compliant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.03, Establishing an IPV Disqualification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-4
              excerpt: "Do not consider a client's ability to pay. Selective prosecution is not allowed."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          not client_ability_to_pay_considered
          and not selective_prosecution_used

  - name: waiver_of_adh_discussion_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.03(B), Waiver of ADH
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-4
              excerpt: "Do not discuss the Waiver of ADH with a recipient that meets your local agency's criteria for criminal prosecution."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          not recipient_meets_local_agency_criminal_prosecution_criteria

  - name: disqualification_consent_agreement_requirements_met
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.03(C), Disqualification Consent Agreement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-4
              excerpt: "Must be handled by the District Attorney's Office in conjunction with deferred prosecution... Requires prior notice of the disqualification be given to the recipient."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          disqualification_consent_agreement_handled_by_district_attorney_with_deferred_prosecution
          and prior_notice_of_disqualification_given_to_recipient
