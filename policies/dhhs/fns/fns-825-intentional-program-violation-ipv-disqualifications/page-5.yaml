format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
  summary: |-
    "Enter a disqualification only when a deferred prosecution case includes a Disqualification Consent Agreement." "Begin the disqualification effective the date ordered by the court." If the court orders disqualification or finds the individual guilty but gives no start date, impose it effective the first day of the month following the court order. For an ADH hearing decision, the client has 15 calendar days from receipt to request a State Level Hearing; allow the 15 days before applying the penalty and begin the disqualification the month following the month the 15 days expire.
rules:
  - name: state_level_hearing_request_period_days
    kind: parameter
    dtype: Integer
    source: FNS 825.04(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
              excerpt: "15 calendar days from the date of receipt of the ADH hearing decision"
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          15

  - name: deferred_prosecution_disqualification_may_be_entered
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.03, deferred prosecution and DCA note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          deferred_prosecution_case_includes_disqualification_consent_agreement

  - name: court_ordered_start_date_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 825.04(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          court_orders_disqualification
          and court_specifies_disqualification_start_date
          and day_is_date_ordered_by_court

  - name: court_order_no_start_date_month_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.04(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          court_orders_disqualification
          and not court_specifies_disqualification_start_date
          and month_is_month_following_date_of_court_order

  - name: court_guilty_no_disqualification_order_month_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          court_finds_individual_guilty
          and not court_addresses_disqualification
          and month_is_month_following_date_of_court_order

  - name: adh_waiting_period_complete
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 825.04(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
              excerpt: "Allow the 15 days before applying the disqualification penalty."
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5#state_level_hearing_request_period_days
              output: state_level_hearing_request_period_days
              hash: sha256:local
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          adh_hearing_decision_received
          and state_level_hearing_request_period_days == elapsed_calendar_days_since_receipt_of_adh_hearing_decision
          and not client_requested_state_level_hearing

  - name: adh_month_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.04(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-5#adh_waiting_period_complete
              output: adh_waiting_period_complete
              hash: sha256:local
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          adh_waiting_period_complete
          and month_is_month_following_month_waiting_period_expires
