format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
  summary: |-
    Permanent Disqualification. - Third or subsequent offense of fraudulently misrepresenting identity or residence in order to receive or attempt to receive multiple FNS. Base each disqualification penalty on the total number of offenses, regardless of the length of the disqualification assigned to prior offenses. Count all offenses which occurred prior to April 1, 1983, as a first offense. Impose the next level of disqualification when an individual commits a second or third IPV after proper notice of all prior disqualifications. Do not impose a higher-level disqualification when the individual commits an IPV prior to proper notification of a prior disqualification(s). The judge decides the length of disqualification for participants found guilty of an IPV through the court system; the period imposed cannot be shorter than the prescribed periods listed in Section 825.01, A, 1-7. Fraud offenses determined before October 23, 1996: First Offense - 6 Months; Second Offense - 12 Months; Third Offense - Permanent Disqualification.
rules:
  - name: pre_1996_first_fraud_offense_disqualification_period
    kind: parameter
    dtype: Integer
    period: Month
    source: FNS 825.01(B)(1), fraud offenses determined before October 23, 1996
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
              excerpt: "First Offense - 6 Months."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          6
  - name: pre_1996_second_fraud_offense_disqualification_period
    kind: parameter
    dtype: Integer
    period: Month
    source: FNS 825.01(B)(1), fraud offenses determined before October 23, 1996
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
              excerpt: "Second Offense - 12 Months."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          12
  - name: pre_1996_first_fraud_offense_disqualification_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: FNS 825.01(B)(1), fraud offenses determined before October 23, 1996
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
              excerpt: "First Offense - 6 Months."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          if fraud_offense_was_determined_before_october_23_1996 and current_fraud_offense_is_first_offense: pre_1996_first_fraud_offense_disqualification_period else: 0
  - name: pre_1996_second_fraud_offense_disqualification_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: FNS 825.01(B)(1), fraud offenses determined before October 23, 1996
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
              excerpt: "Second Offense - 12 Months."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          if fraud_offense_was_determined_before_october_23_1996 and current_fraud_offense_is_second_offense: pre_1996_second_fraud_offense_disqualification_period else: 0
  - name: pre_1996_third_fraud_offense_permanent_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.01(B)(1), fraud offenses determined before October 23, 1996
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
              excerpt: "Third Offense - Permanent Disqualification."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          fraud_offense_was_determined_before_october_23_1996
          and current_fraud_offense_is_third_offense
  - name: higher_level_ipv_disqualification_applies_after_notice
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825 note on prior disqualifications
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          current_ipv_is_second_or_third_ipv
          and individual_received_proper_notice_of_all_prior_disqualifications_before_current_ipv
  - name: multiple_fns_identity_or_residence_fraud_permanent_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.01(A)(9)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          current_offense_is_third_or_subsequent_offense
          and offense_is_fraudulent_misrepresentation_of_identity_or_residence_to_receive_or_attempt_to_receive_multiple_fns
          and individual_received_proper_notice_of_all_prior_disqualifications_before_current_ipv
  - name: court_ordered_ipv_disqualification_period_meets_minimum
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.01(A)(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-2
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          participant_found_guilty_of_ipv_through_court_system
          and court_imposed_disqualification_period_is_not_shorter_than_prescribed_periods_in_section_825_01_a_1_through_7
