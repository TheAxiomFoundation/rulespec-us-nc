format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-3
  summary: |-
    "When NC FAST identifies a FNS unit member with a current out-of-state disqualification" the investigator must verify the status, "Disqualify the FNS unit member for any remaining months in the DQ period if he agrees with the other state's verbal verification," and obtain written verification. A matched member may request a Fair Hearing to contest the length or adverse action, but "cannot request a hearing to challenge the fact that there is an out-of-state disqualification." If the member disagrees, "do not disqualify the FNS unit member without written verification." Establish a client responsible claim for benefits received in North Carolina while under a disqualification penalty, and correct incorrectly imposed disqualifications by key change.
rules:
  - name: remaining_out_of_state_disqualification_period_must_be_imposed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.02(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-3
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          fns_unit_member_has_current_out_of_state_disqualification
          and member_agrees_with_other_states_verbal_verification
  - name: disqualification_without_written_verification_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.02(B)(1)
    metadata:
