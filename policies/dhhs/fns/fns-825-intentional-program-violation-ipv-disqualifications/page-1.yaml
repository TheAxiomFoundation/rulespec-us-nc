format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
  summary: |-
    825.01 DISQUALIFICATION PENALTIES: First Offense - 12 Months; Second Offense - 24 Months; Third Offense - Permanent Disqualification; 24 Months for first court conviction involving sale of a controlled substance; Permanent for second such conviction, trafficking involving $500.00 or more, or first-time court finding of purchasing firearms, ammunition, or explosives with FNS; Ten-year Disqualification for first or second offense of fraudulent misrepresentation of identity or residence, with a false statement or misrepresentation needed.
rules:
  - name: first_ipv_offense_disqualification_months
    kind: parameter
    dtype: Count
    source: FNS 825.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
              excerpt: First Offense - 12 Months
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          12
  - name: second_ipv_offense_disqualification_months
    kind: parameter
    dtype: Count
    source: FNS 825.01(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
              excerpt: Second Offense - 24 Months
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          24
  - name: first_controlled_substance_sale_conviction_disqualification_months
    kind: parameter
    dtype: Count
    source: FNS 825.01(A)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
              excerpt: 24 Months Disqualification. - First court conviction
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          24
  - name: identity_residence_fraud_disqualification_years
    kind: parameter
    dtype: Count
    source: FNS 825.01(A)(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
              excerpt: Ten-year Disqualification
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          10
  - name: trafficking_permanent_disqualification_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 825.01(A)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
              excerpt: involving $500.00 or more
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          500
  - name: nonpermanent_ipv_disqualification_months
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: FNS 825.01(A)(1), (2), (4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          if person_has_first_court_conviction_using_or_receiving_fns_in_controlled_substance_sale_transaction: first_controlled_substance_sale_conviction_disqualification_months else: if person_has_second_ipv_offense: second_ipv_offense_disqualification_months else: if person_has_first_ipv_offense: first_ipv_offense_disqualification_months else: 0
  - name: identity_residence_fraud_disqualification_period_years
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: FNS 825.01(A)(8) and note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
              excerpt: false statement or misrepresentation is needed
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          if person_has_first_or_second_offense_fraudulent_misrepresentation_identity_or_residence_to_receive_or_attempt_multiple_fns and person_made_false_statement_or_misrepresentation_for_identity_or_residence_multiple_fns: identity_residence_fraud_disqualification_years else: 0
  - name: permanent_ipv_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.01(A)(3), (5), (6), (7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-1
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          person_has_third_ipv_offense
          or person_has_second_court_conviction_using_or_receiving_fns_in_controlled_substance_sale_transaction
          or (
            person_has_court_conviction_of_trafficking_including_drugs
            and trafficking_transaction_value_usd >= trafficking_permanent_disqualification_threshold
          )
          or person_has_first_time_court_finding_purchasing_firearms_ammunition_or_explosives_with_fns
