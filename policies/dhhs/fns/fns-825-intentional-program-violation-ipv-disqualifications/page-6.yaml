format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-6
  summary: |-
    Impose the disqualification effective the month following the month the client is notified of a disqualification due to signing the DSS-8588. Enter disqualifications in NC FAST only when the person disqualified has a valid SSN. Cancel a disqualification from NC FAST when there is proof that the disqualified recipient died, or an appropriate court overrules a disqualification. The 10-year disqualification for dual participation applies when an applicant makes a false statement or representation regarding identity and/or residence in order to receive multiple food stamp benefits.
rules:
  - name: waiver_mail_delivery_allowance_days
    kind: parameter
    dtype: Count
    source: FNS 825.04.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-6
              excerpt: "Allow three (3) days for mail delivery."
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          3

  - name: dual_participation_disqualification_years
    kind: parameter
    dtype: Count
    source: FNS 825.06.A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-6
              excerpt: "The 10-year disqualification for dual participation"
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          10

  - name: waiver_disqualification_effective_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.04.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-6
    versions:
      - effective_from: '2022-10-01'
        formula: |-
          client_was_notified_of_disqualification_due_to_signing_dss_8588_in_prior_month

  - name: notice_of_adverse_action_not_required_for_waiver_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 825.04.E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-825-intentional-program-violation-ipv-disqualifications/page-6
    versions:
      - effective_from: '2022-10-01'
