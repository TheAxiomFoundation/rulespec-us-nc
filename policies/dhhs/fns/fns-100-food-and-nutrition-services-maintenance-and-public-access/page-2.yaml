  summary: |-
    "Upon request the county department of social services must inform the public of the location to view the FNS certification manual online."
    "The county department of social services must make the manual available for examination by the public on regular workdays during regular office hours."
    "Current copies of this manual and other policy issuance are available from DHHS upon request and without charge" to qualifying groups or organizations.
