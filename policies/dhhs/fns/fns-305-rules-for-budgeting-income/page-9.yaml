format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
  summary: |-
    "Divide the total base period income by the number of times the income was received ... Multiply the average income by the following formulas to convert or project incomes to a monthly amount. If received weekly, multiply by 4.3 ... bi-weekly ... 2.15 ... semi-monthly ... 2 ... quarterly, divide by 3 ... monthly, use the monthly gross ... semi-annually, divide by 6 ... annually, divide by 12. NOTE: Income received on a daily or sporadic basis ... verify the income received during the prior month. Use this income as a monthly amount. Do not convert the income."
rules:
  - name: weekly_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: FNS 305, Section 305, page 9, Step 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
              excerpt: "If received weekly, multiply by 4.3"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          4.3

  - name: biweekly_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: FNS 305, Section 305, page 9, Step 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
              excerpt: "If received bi-weekly, multiply by 2.15"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          2.15

  - name: semimonthly_monthly_conversion_factor
    kind: parameter
    dtype: Decimal
    source: FNS 305, Section 305, page 9, Step 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
              excerpt: "If received semi-monthly, multiply by 2"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          2

  - name: quarterly_monthly_conversion_divisor
    kind: parameter
    dtype: Decimal
    source: FNS 305, Section 305, page 9, Step 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
              excerpt: "If received quarterly, divide by 3"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          3

  - name: semiannually_monthly_conversion_divisor
    kind: parameter
    dtype: Decimal
    source: FNS 305, Section 305, page 9, Step 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
              excerpt: "If received semi-annually, divide by 6"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          6

  - name: annually_monthly_conversion_divisor
    kind: parameter
    dtype: Decimal
    source: FNS 305, Section 305, page 9, Step 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
              excerpt: "If received annually, divide by 12"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          12

  - name: averaged_base_period_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 305, Section 305, page 9, Step 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          total_base_period_income / number_of_times_income_was_received

  - name: projected_monthly_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 305, Section 305, page 9, Step 4 and NOTE
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-9
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-9#averaged_base_period_income
              output: averaged_base_period_income
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-9#weekly_monthly_conversion_factor
              output: weekly_monthly_conversion_factor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-9#biweekly_monthly_conversion_factor
              output: biweekly_monthly_conversion_factor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-9#semimonthly_monthly_conversion_factor
              output: semimonthly_monthly_conversion_factor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-9#quarterly_monthly_conversion_divisor
              output: quarterly_monthly_conversion_divisor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-9#semiannually_monthly_conversion_divisor
              output: semiannually_monthly_conversion_divisor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-9#annually_monthly_conversion_divisor
              output: annually_monthly_conversion_divisor
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          if income_is_daily_or_sporadic: prior_month_income else: if income_is_weekly: averaged_base_period_income * weekly_monthly_conversion_factor else: if income_is_biweekly: averaged_base_period_income * biweekly_monthly_conversion_factor else: if income_is_semimonthly: averaged_base_period_income * semimonthly_monthly_conversion_factor else: if income_is_quarterly: averaged_base_period_income / quarterly_monthly_conversion_divisor else: if income_is_monthly: monthly_gross_income else: if income_is_semiannually: averaged_base_period_income / semiannually_monthly_conversion_divisor else: if income_is_annually: averaged_base_period_income / annually_monthly_conversion_divisor else: best_available_monthly_income
