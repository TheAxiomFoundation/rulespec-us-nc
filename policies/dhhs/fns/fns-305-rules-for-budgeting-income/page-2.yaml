format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-2
  summary: |-
    305.02 Base Periods A. Representative Income: Determine the base period for representative income based on the type of income. Certain types of income require special base periods, as listed in FNS 315 Special Budgeting Procedures. Application and Reapplication: Unless otherwise specified, the base period for income is 30 calendar days prior to the date the application is received. Recertification: Unless otherwise specified, the base period for income is 30 calendar days prior to the date the recertification is received.
rules:
  - name: default_representative_income_base_period_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 305.02(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-2
              excerpt: "30 calendar days prior"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          30

  - name: application_or_reapplication_default_base_period_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 305.02(A)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-2#default_representative_income_base_period_calendar_days
              output: default_representative_income_base_period_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          income_is_for_application_or_reapplication
          and not income_has_special_base_period_specified
          and calendar_days_prior_to_application_received_date >= 1
          and calendar_days_prior_to_application_received_date <= default_representative_income_base_period_calendar_days

  - name: recertification_default_base_period_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 305.02(A)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-2#default_representative_income_base_period_calendar_days
              output: default_representative_income_base_period_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          income_is_for_recertification
          and not income_has_special_base_period_specified
          and calendar_days_prior_to_recertification_received_date >= 1
          and calendar_days_prior_to_recertification_received_date <= default_representative_income_base_period_calendar_days
