format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-7
  summary: |-
    Requirements: Applications and recertifications must verify all statements concerning mandatory and required verifications made by the FNS unit prior to certification, including statements regarding terminated, ongoing, new, or change income received or expected in the base period, month of application, or reasonably anticipated during the certification period. At recertification, unless information is incomplete, inaccurate, inconsistent, or outdated, verification is not required if the source has not changed and the amount is unchanged or has changed by $50 or less.
rules:
  - name: recertification_income_change_verification_tolerance
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: FNS 305.B.2.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-7
              excerpt: "changed by $50 or less"
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          50

  - name: application_income_statement_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305.B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-7
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          statement_concerns_mandatory_and_required_verification
          and statement_concerns_terminated_ongoing_new_or_changed_income
          and (
            income_received_or_expected_in_base_period
            or income_received_or_expected_in_month_of_application
            or income_reasonably_anticipated_during_certification_period
          )

  - name: recertification_income_information_exception_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305.B.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-7
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not income_information_is_incomplete_inaccurate_inconsistent_or_outdated
          and income_source_has_not_changed
          and income_amount_change <= recertification_income_change_verification_tolerance

  - name: recertification_income_statement_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305.B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-7
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-7
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          statement_concerns_mandatory_and_required_verification
          and statement_concerns_terminated_ongoing_new_or_changed_income
          and (
            income_received_or_expected_in_base_period
            or income_received_or_expected_in_month_of_application
            or income_reasonably_anticipated_during_certification_period
          )
          and not recertification_income_information_exception_applies
