format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
  summary: |-
    "The base period for child support, spousal support and alimony is the three months prior to the month of application or redetermination." "If the income is received annually or from self-employment, the base period is 12 months." "If the income received during the base period is not representative... Explore alternative budgeting methods..." "Unless otherwise noted, use standard rounding procedures to round to two decimals (cents)."
rules:
  - name: monthly_support_income_base_period_months
    kind: parameter
    dtype: Count
    source: FNS 305.02(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
              excerpt: "The base period for child support, spousal support and alimony is the three months prior to the month of application or redetermination."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          3
  - name: annual_or_self_employment_income_base_period_months
    kind: parameter
    dtype: Count
    source: FNS 305.02(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
              excerpt: "If the income is received annually or from self-employment, the base period is 12 months."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          12
  - name: monthly_support_income_base_period_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 305.02(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          income_is_child_support_or_spousal_support_or_alimony
          and income_is_received_monthly
          and month_is_application_or_redetermination_month
  - name: annual_or_self_employment_income_base_period_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 305.02(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          income_is_received_annually
          or income_is_from_self_employment
  - name: alternative_budgeting_methods_must_be_explored
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305.02(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          base_period_income_is_not_representative_of_expected_certification_period_income
  - name: representative_budgeting_method_must_be_determined
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305.02(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          base_period_income_is_not_representative_of_expected_certification_period_income
  - name: nonrepresentative_income_documentation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305.02(B)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          base_period_income_is_not_representative_of_expected_certification_period_income
  - name: standard_rounding_to_cents_applies
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 305.03
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-4
              excerpt: "Unless otherwise noted, use standard rounding procedures to round to two decimals (cents)."
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          not source_otherwise_notes_different_rounding_procedure
