format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-5
  summary: |-
    "The following information must be documented: A. Applicant's statements regarding available income; including client's statement of no income... B. The source, amount, frequency, and type of income, and a collateral contact if one is necessary... Collateral contact verification must include: a. The date... b. The name... c. The title... if applicable... d. The method of contact... e. The exact information that was verified. C. Copies of correspondence and documents, forms, and notifications if available. D. Any changes to income which are anticipated... E. Other facts, information, or dates used to support your eligibility decision."
rules:
  - name: no_income_statement_documented_by_accepted_application_signature
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305, Section 305, page 5, item A note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-5
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          household_reports_no_income
          and fns_unit_signature_on_dss_8207_or_dss_2435_or_nc_fast_application
  - name: collateral_contact_verification_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305, Section 305, page 5, item B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-5
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          collateral_contact_date_documented
          and collateral_contact_person_name_documented
          and (not collateral_contact_person_has_applicable_title or collateral_contact_person_title_documented)
          and collateral_contact_method_documented
          and collateral_contact_exact_information_verified_documented
  - name: required_income_documentation_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 305, Section 305, page 5, items A-E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-5
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          applicant_available_income_statement_documented
          and income_source_amount_frequency_type_documented
          and (not collateral_contact_necessary or collateral_contact_verification_complete)
          and (not correspondence_documents_forms_notifications_available or correspondence_documents_forms_notifications_copied)
          and anticipated_income_changes_during_certification_period_documented
          and other_supporting_facts_information_or_dates_documented
