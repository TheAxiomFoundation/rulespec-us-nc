format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-1
  summary: |-
    305.01 GENERAL RULES FOR BUDGETING INCOME ... All income shall be counted in the calendar month the household receives the income unless it is otherwise noted. ... Representative income is income received during the base period that is considered reflective of the FNS unit's future income. ... Nonrepresentative Income is income received during the base period that is irregular, changed, new, or terminated and cannot be reasonably expected to be available ... Exclude any money used to repay an overpayment to the same source.
rules:
  - name: countable_gross_income_after_same_source_repayment_exclusion
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 305.01(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-1
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-1
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          max(0, gross_income_amount - amount_used_to_repay_overpayment_to_same_source)
  - name: income_received_in_calendar_month_counts_for_that_month
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 305.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-1
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          payment_received_in_calendar_month
          and not otherwise_noted_for_income_timing
  - name: representative_income_for_certification_period
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 305.01(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-1
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          income_received_during_base_period
          and income_reflective_of_fns_unit_future_income
  - name: nonrepresentative_income_for_certification_period
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 305.01(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-305-rules-for-budgeting-income/page-1
    versions:
      - effective_from: '2023-01-09'
        formula: |-
          income_received_during_base_period
          and income_is_irregular_changed_new_or_terminated
          and not income_can_be_reasonably_expected_available_during_certification_period
