- name: income received in month counts absent other timing rule
  period: 2023-02
  input:
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.payment_received_in_calendar_month: true
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.otherwise_noted_for_income_timing: false
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_received_during_base_period: true
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_reflective_of_fns_unit_future_income: true
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_is_irregular_changed_new_or_terminated: false
    ? us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_can_be_reasonably_expected_available_during_certification_period
    : true
  output:
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#income_received_in_calendar_month_counts_for_that_month: holds
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#representative_income_for_certification_period: holds
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#nonrepresentative_income_for_certification_period: not_holds
- name: nonrepresentative income when base-period income is changed and not reasonably
    expected
  period: 2023-02
  input:
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.payment_received_in_calendar_month: true
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.otherwise_noted_for_income_timing: true
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_received_during_base_period: true
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_reflective_of_fns_unit_future_income: false
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_is_irregular_changed_new_or_terminated: true
    ? us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.income_can_be_reasonably_expected_available_during_certification_period
    : false
  output:
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#income_received_in_calendar_month_counts_for_that_month: not_holds
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#representative_income_for_certification_period: not_holds
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#nonrepresentative_income_for_certification_period: holds
