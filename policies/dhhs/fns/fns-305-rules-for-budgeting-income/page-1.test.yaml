  input:
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.gross_income_amount: 100
    us-nc:policies/dhhs/fns/fns-305-rules-for-budgeting-income/page-1#input.amount_used_to_repay_overpayment_to_same_source: 150
