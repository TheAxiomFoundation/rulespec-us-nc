format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-4
  summary: |-
    Do not require verification from categorical eligible households for resources, gross and net income, residency, and enumeration. Resources automatically pass the resource test and the unit is exempt from the gross and net income limits test. Verify the type of assistance received and authorization period, including WFFA, Benefit Diversion, specified Work First Employment Services, or SSI Benefits.
rules:
  - name: resource_verification_not_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220.05(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-4
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          household_is_categorically_eligible_for_fns

  - name: household_automatically_passes_resource_test
