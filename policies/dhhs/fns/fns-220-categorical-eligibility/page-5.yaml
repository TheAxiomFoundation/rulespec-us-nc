format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
  summary: |-
    Change #02-2024 October 01, 2024. If the household's income is at or below the 200% maximum allowable gross income limit the household meets the categorical eligibility criteria and the application is processed. If categorical eligibility cannot be established due to pending WFFA, SSI, or Work First Employment Services and the unit does not meet the 200% limit, pend until the 30th day unless expedited. If WFFA or SSI approval can be reasonably anticipated, include the monthly payment amount as income; do not include payments intended for prior months. Do not deny a potentially categorically eligible household until the 30th calendar day following application if pending for an eligibility factor related to categorical eligibility.
rules:
  - name: broad_based_categorical_income_limit_multiplier
    kind: parameter
    dtype: Rate
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "200% maximum allowable gross income limit"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          2.00

  - name: pending_application_deadline_day_count
    kind: parameter
    dtype: Count
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "pend the FNS application until the 30th day"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          30

  - name: denial_wait_calendar_day_count
    kind: parameter
    dtype: Count
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "until the 30th calendar day following the date of application"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          30

  - name: categorically_eligible_due_to_income_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "income is at or below the 200% maximum allowable gross income limit"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          household_gross_income <= maximum_allowable_gross_income_limit * broad_based_categorical_income_limit_multiplier

  - name: fns_application_should_be_pended_until_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "cannot be established due to a pending WFFA, SSI, or Work First Employment Services application"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          categorical_eligibility_cannot_be_established_due_to_pending_wffa_ssi_or_work_first_employment_services_application
          and categorical_eligibility_needed_to_establish_fns_eligibility
          and not entitled_to_expedited_service
          and not categorically_eligible_due_to_income_limit

  - name: fns_application_pending_deadline_day
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "pend the FNS application until the 30th day unless the FNS unit is entitled to expedited service"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if fns_application_should_be_pended_until_deadline: pending_application_deadline_day_count else: 0

  - name: wffa_or_ssi_approval_reasonably_anticipated
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.A.5
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Reasonably anticipated means that the WFFA application-processing deadline is approaching and no processing delays are expected or an SSI award letter has been issued."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          (wffa_application_processing_deadline_approaching and no_wffa_processing_delays_expected) or ssi_award_letter_issued

  - name: countable_wffa_or_ssi_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.A.5-A.7
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "If the WFFA or SSI approval can be reasonably anticipated, include the monthly payment amount as income."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Do not include WFFA or SSI payments intended for prior months as income."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if wffa_or_ssi_payment_intended_for_prior_months: 0 else: if wffa_or_ssi_approval_reasonably_anticipated and amount_and_date_of_initial_wffa_or_ssi_benefits_can_be_reasonably_anticipated: wffa_or_ssi_payment_amount else: 0

  - name: pending_work_first_employment_services_categorical_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.A.8
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "not categorically eligible until at least one member ... is authorized ... If authorization can be reasonably anticipated, consider the FNS unit categorically eligible."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          pending_work_first_employment_services_application
          and not categorically_eligible_due_to_income_limit
          and (at_least_one_member_authorized_for_work_first_employment_services or work_first_employment_services_authorization_can_be_reasonably_anticipated)

  - name: categorically_eligible_after_program_approval
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.A.4
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Once WFFA, SSI, or Work First Employment Services is approved, the FNS unit is considered categorically eligible if all other eligibility criteria are met."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          (wffa_approved or ssi_approved or work_first_employment_services_approved) and all_other_eligibility_criteria_met

  - name: regular_fns_rules_apply_when_other_program_verification_missing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "provided sufficient verification to meet FNS verification requirements but has failed to provide sufficient verification for WFFA, SSI, or Work First Employment Services approval"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          fns_verification_requirements_met and insufficient_verification_for_wffa_ssi_or_work_first_employment_services_approval

  - name: fns_application_denial_barred_before_categorical_eligibility_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Do not deny the application of a potentially categorically eligible household until the 30th calendar day following the date of application if pending for an eligibility factor that is related to categorical eligibility."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          potentially_categorically_eligible and pending_for_eligibility_factor_related_to_categorical_eligibility and before_categorical_eligibility_denial_deadline

  - name: application_denial_wait_calendar_days_if_barred
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: FNS 220 Categorical Eligibility, Section 220 Change #02-2024, p. 5.B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "Change #02-2024 October 01, 2024"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-5
              excerpt: "until the 30th calendar day following the date of application"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          if fns_application_denial_barred_before_categorical_eligibility_deadline: denial_wait_calendar_day_count else: 0
