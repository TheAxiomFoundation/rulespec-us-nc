format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
  summary: |-
    If an FNS unit files a joint application and is determined categorically eligible after being denied FNS benefits under regular program rules, prorate FNS benefits from the later of the FNS application date or the PA authorization date. Categorically eligible one- or two-person FNS units are entitled to a minimum monthly allotment; there is no minimum allotment for categorically eligible households with three or more members. Effective July 1, 2010, categorically eligible households that suspend due to ineligibility for a payment are terminated.
rules:
  - name: categorically_eligible_unit_minimum_monthly_allotment_entitlement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220.06(D)(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
              excerpt: "All categorically eligible one or two-person FNS unit's are entitled to a minimum monthly allotment."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
              excerpt: "There is no minimum allotment for categorically eligible households with three or more members."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          household_is_categorically_eligible
          and household_member_count <= 2

  - name: no_minimum_allotment_due_to_three_or_more_members
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220.06(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
              excerpt: "There is no minimum allotment for categorically eligible households with three or more members."
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          household_is_categorically_eligible
          and household_member_count >= 3

  - name: categorically_eligible_household_may_be_ineligible_due_to_zero_allotment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220.06(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
              excerpt: "FNS budgeting procedures may determine these households ineligible based on a zero allotment amount"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          no_minimum_allotment_due_to_three_or_more_members
          and household_has_zero_allotment_based_on_income_level

  - name: joint_application_categorical_eligibility_proration_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220.06(C)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
              excerpt: "files a joint application and is determined categorically eligible after being denied FNS benefits under regular program rules"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          household_files_joint_application
          and household_is_determined_categorically_eligible_after_denial_under_regular_program_rules

  - name: prorate_from_later_of_application_or_pa_authorization_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 220.06(C)(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
              excerpt: "from the date of the FNS application or the date the public assistance (PA) benefits are authorized, whichever is later"
    versions:
      - effective_from: '2024-10-01'
        formula: |-
          joint_application_categorical_eligibility_proration_applies
          and day_is_later_of_fns_application_date_or_pa_benefits_authorization_date

  - name: categorically_eligible_suspended_case_terminated_for_payment_ineligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 220.07
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-220-categorical-eligibility/page-7
              excerpt: "Effective July 1, 2010, if categorically eligible households suspend due to ineligibility for a payment, the case will be terminated."
    versions:
      - effective_from: '2010-07-01'
        formula: |-
          household_is_categorically_eligible
          and household_suspends_due_to_ineligibility_for_payment
