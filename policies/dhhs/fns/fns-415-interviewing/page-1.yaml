format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
  summary: |-
    415.01 requires all applicant households to have an interview before FNS benefits are issued; interviews may be in person, by telephone, or by video conference; in-person interviews must be provided on request and must not be required when hardship exists. The interview must be conducted by a qualified eligibility worker before initial certification. 415.02 lists interviewer duties to advise rights and responsibilities, explain processing time standards, and inform households of change-reporting responsibility.
rules:
  - name: application_interview_required_before_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 415.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
              excerpt: "Change #21-2021 November 15, 2021"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          household_is_fns_applicant_household

  - name: proposed_interview_method_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 415.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          proposed_interview_is_in_person
          or proposed_interview_is_by_telephone
          or proposed_interview_is_by_video_conference

  - name: proposed_interview_location_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 415.01(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          proposed_location_is_fns_office
          or proposed_location_is_other_mutually_acceptable_location
          or proposed_location_is_household_residence

  - name: in_person_interview_must_be_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 415.01(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          applicant_or_authorized_representative_requests_in_person_interview

  - name: in_person_interview_may_be_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 415.01(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          not in_person_interview_would_be_hardship_for_household

  - name: interview_conducted_by_qualified_worker_before_initial_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 415.01(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          interview_is_conducted_by_qualified_eligibility_worker
          and interview_is_held_before_initial_certification

  - name: person_may_be_interviewed_for_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 415.01(G)-(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          person_is_head_of_household
          or person_is_spouse
          or person_is_other_adult_household_member
          or person_is_authorized_representative_under_fns_175
          or (household_has_no_adult and person_is_emancipated_minor)

  - name: applicant_may_include_chosen_person_in_interview
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 415.01(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          applicant_chooses_person_to_include_in_interview

  - name: interviewer_required_responsibilities
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 415.02(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-1
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          interviewer_advises_household_of_rights_and_responsibilities
          and interviewer_explains_application_processing_time_standards
          and interviewer_informs_household_of_change_reporting_responsibility
