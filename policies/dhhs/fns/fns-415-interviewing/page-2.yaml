format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-2
  summary: |-
    Conduct the interview as an official and confidential discussion; protect privacy; document the interview date in NC FAST; provide DSS-8227 and DSS-8650A. The Screener's Guide section must be completed at each application and reapplication. If interviewed the same day, prescreening may be waived and the expedited screening guide must be completed during the interview. If not interviewed the same day, the prescreening section must be completed to determine potential expedited-service eligibility.
rules:
  - name: same_day_prescreening_may_be_waived
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.03(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-2
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          applicant_will_be_interviewed_on_same_day

  - name: expedited_screening_guide_must_be_completed_during_same_day_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.03(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-2
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          applicant_will_be_interviewed_on_same_day

  - name: prescreening_section_must_be_completed_for_delayed_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.03(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-2
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          applicant_will_not_be_interviewed_on_same_day

  - name: screener_guide_section_must_be_completed_at_application_or_reapplication
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-2
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          household_is_applying
          or household_is_reapplying
