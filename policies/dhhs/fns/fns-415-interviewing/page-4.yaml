format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
  summary: |-
    "Households who request expedited service but are not entitled to the service shall have their applications processed according to normal processing standards." The agency must schedule interviews for applicant households not interviewed on the application day, use DSS-8650 for potentially expedited or normal-processing interviews, and for potentially expedited service schedule no later than three calendar days from application filing without requesting verifications before the interview.
rules:
  - name: expedited_purchase_opportunity_days
    kind: parameter
    dtype: Count
    source: FNS 415.04(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
              excerpt: "within 7 days of the application date"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          7

  - name: expedited_interview_schedule_deadline_calendar_days
    kind: parameter
    dtype: Count
    source: FNS 415.04(C)(1)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
              excerpt: "no later than three calendar days from the date the applicant files the application"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          3

  - name: normal_purchase_opportunity_days
    kind: parameter
    dtype: Count
    source: FNS 415.04(D)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
              excerpt: "within 30 days of the application date"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          30

  - name: expedited_request_processed_under_normal_standards
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415, page 4, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          household_requested_expedited_service
          and not household_entitled_to_expedited_service

  - name: interview_must_be_scheduled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.04(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          applicant_household_submitted_application_with_minimum_required_information
          and not applicant_household_interviewed_on_application_submission_day

  - name: expedited_interview_notice_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.04(C)(1)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          prescreening_indicates_potentially_eligible_for_expedited_service
          and dss_8650_used_to_schedule_interview
          and dss_8650_includes_specific_date
          and dss_8650_includes_specific_time
          and dss_8650_includes_interview_method

  - name: expedited_interview_scheduling_complies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.04(C)(1)(d)-(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          expedited_interview_notice_complete
          and interview_scheduled_as_soon_as_possible
          and interview_scheduled_calendar_days_after_application_filing <= expedited_interview_schedule_deadline_calendar_days
          and not verifications_requested_prior_to_interview

  - name: normal_interview_notice_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415.04(D)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-4
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          not prescreening_indicates_potentially_eligible_for_expedited_service
          and dss_8650_used_to_schedule_interview
          and dss_8650_includes_specific_date
