format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
  summary: |-
    If a mail or fax application cannot be completed by telephone, the DSS-8650 must be sent no later than the day after receipt scheduling the interview within 3 calendar days. If a household fails to complete the interview process within the seven-day processing period, it loses entitlement to expedited service. When prescreening indicates potential expedited eligibility and an in-person applicant cannot stay, schedule an interview for the next workday. When prescreening indicates ineligibility, inform the applicant, schedule an interview no later than ten days from application, and hold a local conference within two workdays unless a later date is requested.
rules:
  - name: expedited_mail_or_fax_interview_calendar_day_limit
    kind: parameter
    dtype: Count
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item 2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
              excerpt: "scheduling the interview within 3 calendar days"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          3

  - name: expedited_service_processing_day_limit
    kind: parameter
    dtype: Count
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item 2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
              excerpt: "within the seven-day processing period"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          7

  - name: regular_interview_calendar_day_limit_after_application
    kind: parameter
    dtype: Count
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
              excerpt: "no later than ten days from the date of application"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          10

  - name: local_conference_workday_limit
    kind: parameter
    dtype: Count
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item E.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
              excerpt: "within two workdays unless the household requests a later date"
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          2

  - name: mail_or_fax_unreached_notice_and_interview_scheduling_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item 2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-415-interviewing/page-3#expedited_mail_or_fax_interview_calendar_day_limit
              output: expedited_mail_or_fax_interview_calendar_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          application_submitted_by_mail_or_fax
          and unable_to_contact_client_by_telephone
          and dss_8650_notice_sent_no_later_than_day_after_application_received
          and calendar_days_from_application_receipt_to_scheduled_interview <= expedited_mail_or_fax_interview_calendar_day_limit

  - name: expedited_service_entitlement_retained_by_interview_completion
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item 2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-415-interviewing/page-3#expedited_service_processing_day_limit
              output: expedited_service_processing_day_limit
              hash: sha256:local
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          interview_process_completed
          and calendar_days_from_application_to_interview_completion <= expedited_service_processing_day_limit

  - name: potential_expedited_in_person_next_workday_interview_scheduled
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item D.1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          applicant_or_authorized_representative_submits_application_in_person
          and prescreening_indicates_household_potentially_eligible_for_expedited_service
          and applicant_does_not_want_to_stay_for_interview
          and applicant_unable_to_stay_for_interview
          and interview_scheduled_for_next_workday_following_application_filing

  - name: expedited_ineligibility_interview_scheduling_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-415-interviewing/page-3#regular_interview_calendar_day_limit_after_application
              output: regular_interview_calendar_day_limit_after_application
              hash: sha256:local
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          prescreening_indicates_household_ineligible_for_expedited_service
          and calendar_days_from_application_to_scheduled_interview <= regular_interview_calendar_day_limit_after_application

  - name: expedited_ineligibility_local_conference_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item E.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-415-interviewing/page-3#local_conference_workday_limit
              output: local_conference_workday_limit
              hash: sha256:local
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          household_disagrees_with_expedited_service_ineligibility_decision
          and (household_requests_later_local_conference_date or workdays_from_local_conference_request_to_conference <= local_conference_workday_limit)

  - name: fair_hearing_request_required_after_local_conference_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 415 Interviewing, Section 415 Change #21-2021, p.3, item E.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-415-interviewing/page-3
    versions:
      - effective_from: '2021-11-15'
        formula: |-
          local_conference_requested
          and not household_withdraws_fair_hearing_request_in_writing
