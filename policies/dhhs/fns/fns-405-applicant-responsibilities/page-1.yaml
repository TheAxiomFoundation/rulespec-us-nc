format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-405-applicant-responsibilities/page-1
  summary: |-
    Households wishing to participate in FNS must make this desire known and provide enough information regarding household income, resources, and circumstances to make an eligibility determination. A filed application requires the applicant's name, address, and signature of an adult household member or authorized representative. Households must complete and sign the application, be interviewed, and verify certain information; if the household refuses to cooperate, deny the application at the time of refusal.
rules:
  - name: filed_application_minimum_information_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 405.02, minimum filed application information
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-405-applicant-responsibilities/page-1
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          applicant_name_provided
          and applicant_address_provided
          and (application_signed_by_adult_household_member or application_signed_by_authorized_representative)
  - name: application_process_cooperation_completed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 405.03(A), applicant cooperation and information
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-405-applicant-responsibilities/page-1
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          application_form_completed_and_signed
          and household_or_authorized_representative_interviewed
          and certain_application_information_verified
  - name: refusal_to_cooperate_determined
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 405.03(B)(1), refusal to cooperate determination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-405-applicant-responsibilities/page-1
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_able_to_cooperate
          and household_clearly_demonstrates_will_not_take_required_actions_to_complete_certification_process
  - name: application_denied_due_to_refusal_to_cooperate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 405.03(B), deny application at time of refusal
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-405-applicant-responsibilities/page-1
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          refusal_to_cooperate_determined
