format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-200-eligibility-requirements-overview/page-1
  summary: |-
    Eligibility for the Food and Nutrition Services Program (FNS) is based on certain non-financial and financial requirements. Each applicant household and recipient of FNS benefits must meet the requirements. Verification requirements and types are discussed within the specific section for each eligibility requirement. Documentation is critical when determining eligibility and benefit levels for the FNS Program.
rules:
  - name: fns_eligibility_requirements_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 200.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-200-eligibility-requirements-overview/page-1
              excerpt: "Each applicant household and recipient of FNS benefits must meet the requirements."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-200-eligibility-requirements-overview/page-1
              excerpt: "Change #6-2021 July 12, 2021"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          household_meets_identity_requirement
          and household_meets_household_composition_requirement
          and household_meets_household_composition_special_arrangements_requirement
          and household_meets_residency_requirement
          and household_meets_categorical_eligibility_requirement
          and household_meets_citizenship_requirement
          and household_meets_non_citizen_requirement
          and household_meets_social_security_enumeration_requirement
          and household_meets_student_of_higher_education_requirement
          and household_meets_work_registration_requirement
          and household_meets_resources_requirement
          and household_meets_income_requirement
          and household_meets_second_party_review_and_quality_control_requirement
          and household_meets_controlled_substance_felons_requirement
