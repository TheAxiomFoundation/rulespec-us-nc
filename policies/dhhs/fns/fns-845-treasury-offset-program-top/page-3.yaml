format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-3
  summary: |-
    Once the debtor has been certified for TOP, if the debtor becomes an active recipient, no interception will occur in the same month of recoupment. The debtor will be recertified and re-submitted for TOP if recoupment stops, the debtor fails to make payments in accordance with the information in the repayment approach screen. EPICS looks at "Methods of Collection" (payments) for the past 30 days. To determine if a VRA can be accepted: if no 60 Day Notice has been sent, a VRA can be accepted; if the 60 day period has not expired, a VRA can be accepted; if, during the 60 day period, the client did not sign a VRA or become an active FNS recipient, a VRA cannot be accepted.
rules:
  - name: pre_offset_notice_period_days
    kind: parameter
    dtype: Integer
    source: FNS 845 Treasury Offset Program, page 3, question E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-3
              excerpt: "60 Day Notice"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          60

  - name: payment_collection_lookback_days
    kind: parameter
    dtype: Integer
    source: FNS 845 Treasury Offset Program, page 3, paragraph C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-3
              excerpt: "past 30 days"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          30

  - name: top_interception_barred_same_month_of_recoupment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845 Treasury Offset Program, page 3, item 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          debtor_certified_for_top
          and debtor_becomes_active_recipient

  - name: top_recertification_resubmission_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845 Treasury Offset Program, page 3, item 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          recoupment_stops
          and debtor_fails_to_make_payments_in_accordance_with_repayment_approach_screen

  - name: vra_can_be_accepted_before_or_during_notice_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845 Treasury Offset Program, page 3, questions E.1-E.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          not pre_offset_notice_sent
          or (pre_offset_notice_sent and not pre_offset_notice_period_expired)

  - name: vra_acceptance_barred_after_expired_notice_without_timely_vra_or_active_recipient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845 Treasury Offset Program, page 3, question E.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-3
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          pre_offset_notice_sent
          and pre_offset_notice_period_expired
          and not client_signed_vra_during_notice_period
          and not client_became_active_fns_recipient_during_notice_period
