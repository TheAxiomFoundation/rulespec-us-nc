format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-4
  summary: |-
    845.03 DEBTORS NOT INCLUDED FOR TOP: A debtor is not referred for TOP if participating in FNS; debtors are not included when they have a local agency approved repayment agreement entered in EPICS and are paying according to it; bankruptcy claims included in bankruptcy are blocked; and prosecuted debtors under court judgment are not submitted while court ordered payments are being met. 845.04(A): Each month EPICS submits delinquent FNS claims not previously submitted to TOP for a pre-offset address request.
rules:
  - name: debtor_excluded_from_top_referral
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845.03(A)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-4
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          debtor_is_participating_in_fns
          or debtor_has_local_agency_approved_repayment_agreement_entered_in_epics_and_is_paying_according_to_agreement
          or debtor_has_filed_bankruptcy_and_claim_is_included_in_bankruptcy
          or debtor_was_prosecuted_and_ordered_to_pay_under_court_judgment_and_court_ordered_payments_are_being_met

  - name: debtor_may_be_referred_for_top
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845.03(A)-(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-4
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          not debtor_excluded_from_top_referral

  - name: claim_selected_for_pre_offset_address_request
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 845.04(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-4
              excerpt: "Change #1-2017 April 1, 2017"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          claim_is_delinquent_fns_claim
          and not claim_previously_submitted_to_top
