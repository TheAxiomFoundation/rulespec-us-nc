format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-8
  summary: |-
    "Administrative offset is defined as the withholding of funds payable by the federal government to an individual to satisfy a claim." "TOP may intercept up to 15% of a monthly social security payment from individuals. Debtors are entitled to keep up to $750.00 of their social security benefits per month."
rules:
  - name: social_security_monthly_offset_rate_limit
    kind: parameter
    dtype: Rate
    source: FNS 845.08(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-8
              excerpt: "TOP may intercept up to 15% of a monthly social security payment"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          0.15
  - name: social_security_monthly_protected_benefit_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 845.08(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-8
              excerpt: "Debtors are entitled to keep up to $750.00 of their social security benefits per month."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          750
  - name: maximum_top_intercept_from_monthly_social_security_payment
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: FNS 845.08(E)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-8
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-8#social_security_monthly_offset_rate_limit
              output: social_security_monthly_offset_rate_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-8#social_security_monthly_protected_benefit_amount
              output: social_security_monthly_protected_benefit_amount
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          min(
            monthly_social_security_payment_amount * social_security_monthly_offset_rate_limit,
            max(0, monthly_social_security_payment_amount - social_security_monthly_protected_benefit_amount)
          )
