format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
  summary: |-
    EPICS selects debtors for submission to the Treasury Department when the claim is in Collection or Terminated status, claim type is IPV, IHE, AE, or SIE, total selected claim current balances for each debtor are $25.00 or more, the debtor is not in Recoupment Status, and the debtor is delinquent. EPICS will not read a repayment agreement amount less than $25.00. All debts must be paid in full within 36 months, or 60 months if hardship is determined.
rules:
  - name: top_minimum_selected_claim_current_balance
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 845.02(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
              excerpt: "must be $25.00 or more"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          25.00
  - name: epics_minimum_repayment_agreement_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: FNS 845.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
              excerpt: "less than $25.00"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          25.00
  - name: standard_full_payment_month_limit
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 845.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
              excerpt: "within 36 months"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          36
  - name: hardship_full_payment_month_limit
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 845.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
              excerpt: "60 months if it is determined there is a hardship"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          60
  - name: debtor_selected_for_top_submission
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845.02(A)(1)-(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
              excerpt: "must be $25.00 or more"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          (claim_referral_status_is_collection or claim_referral_status_is_terminated)
          and (claim_type_is_ipv or claim_type_is_ihe or claim_type_is_ae or claim_type_is_sie)
          and total_selected_claim_current_balance >= top_minimum_selected_claim_current_balance
          and not debtor_in_recoupment_status
          and debtor_is_delinquent
  - name: repayment_agreement_readable_by_epics
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 845.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
              excerpt: "less than $25.00"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          voluntary_repayment_agreement_amount >= epics_minimum_repayment_agreement_amount
  - name: debt_payment_plan_within_required_month_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 845.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-1
              excerpt: "within 36 months (60 months if it is determined there is a hardship)"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          (hardship_determined and months_to_pay_debt_in_full <= hardship_full_payment_month_limit)
          or (not hardship_determined and months_to_pay_debt_in_full <= standard_full_payment_month_limit)
