format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-6
  summary: |-
    The 60 Day Notice DSS-8605 notifies that a debtor has the right to request a TOP Review if the debtor believes the debt is not owed, or that all or part of the debt is not past due or legally enforceable. A TOP Review may be requested during and after the 60 day period; if requested within the 60 day period, the debtor will not be submitted to TOP and no interception should occur. All TOP Reviews must be in writing. If requested within the 60 Day Notice appeal period, the local agency faxes a request to the State Office to block the TOP and DOR indicators; after the appeal period, no blocks are applied. The local conference determines whether the claim is legally enforceable by evidence of bankruptcy including the claim, evidence the payment was not past due, or payment of an acceptable amount during the appeal period.
rules:
  - name: dss_8605_notice_review_period_days
    kind: parameter
    dtype: Count
    source: Section 845.D, TOP Local and Federal Reviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-6
              excerpt: "The 60 Day Notice DSS-8605"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          60

  - name: top_review_request_right_exists
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 845.D, TOP Local and Federal Reviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-6
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          debtor_believes_debt_not_owed
          or debtor_believes_debt_not_past_due
          or debtor_believes_debt_not_legally_enforceable

  - name: top_review_request_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 845.D, TOP Local and Federal Reviews
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-6
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          top_review_request_right_exists
          and top_review_request_is_in_writing

  - name: top_review_request_within_notice_period_prevents_top_submission
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Section 845.D, TOP Local and Federal Reviews
    metadata:
      proof:
