format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
  summary: |-
    Notify the debtor of the Local TOP Review decision within 5 business days using DSS-8606 by certified mail. The debtor has 30 calendar days from the decision date to request USDA review; wait 30 calendar days before changing the appeal indicator or removing EPICS blocks. Enter “R” for a requested Local TOP Review, “Y” when the TOP Review decision favors the debtor, “N” when Local or Federal Review favors the local agency after the waiting period, and “W” when the debtor waives Local or Federal TOP Review in writing. FRD-452 lists claims exempt from TOP offset because specified Federal Tax Intercept Indicator codes apply, and Federal Tax Appeal Indicator Codes “R” and “Y” appear on the report.
rules:
  - name: local_top_review_decision_notice_business_day_deadline
    kind: parameter
    dtype: Integer
    source: FNS 845, page 7, paragraph c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
              excerpt: "Notify the debtor of the decision within 5 business days."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          5

  - name: usda_further_review_request_calendar_day_period
    kind: parameter
    dtype: Integer
    source: FNS 845, page 7, paragraph c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
              excerpt: "The debtor has 30 calendar days from the decision date"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          30

  - name: local_top_review_requested_appeal_indicator_code
    kind: parameter
    dtype: String
    source: FNS 845, page 7, paragraph 2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
              excerpt: "Enter an “R” when a debtor has received a 60 Day Notice and requests a Local Top Review"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          "R"

  - name: debtor_favorable_review_appeal_indicator_code
    kind: parameter
    dtype: String
    source: FNS 845, page 7, paragraph 2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
              excerpt: "Enter a “Y” when the TOP Review decision is in favor of the debtor."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          "Y"

  - name: local_agency_favorable_review_appeal_indicator_code
    kind: parameter
    dtype: String
    source: FNS 845, page 7, paragraph 2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
              excerpt: "Enter a “N” when the TOP Local or Federal Review is in favor of the local agency."
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          "N"

  - name: review_waived_appeal_indicator_code
    kind: parameter
    dtype: String
    source: FNS 845, page 7, paragraph 2.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
              excerpt: "Enter a “W” if at any time the debtor waives his right"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          "W"

  - name: federal_tax_intercept_appeal_indicator_code
    kind: derived
    entity: Person
    dtype: String
    period: Day
    source: FNS 845, page 7, paragraph 2 and paragraphs c-e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-7#local_top_review_requested_appeal_indicator_code
              output: local_top_review_requested_appeal_indicator_code
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-7#debtor_favorable_review_appeal_indicator_code
              output: debtor_favorable_review_appeal_indicator_code
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-7#local_agency_favorable_review_appeal_indicator_code
              output: local_agency_favorable_review_appeal_indicator_code
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-7#review_waived_appeal_indicator_code
              output: review_waived_appeal_indicator_code
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          if debtor_waives_local_or_federal_top_review_in_writing_kept_in_file: review_waived_appeal_indicator_code else: if debtor_requested_usda_further_review_and_usda_review_not_complete: local_top_review_requested_appeal_indicator_code else: if top_review_decision_in_favor_of_debtor: debtor_favorable_review_appeal_indicator_code else: if top_local_or_federal_review_in_favor_of_local_agency and local_top_review_thirty_calendar_day_wait_complete: local_agency_favorable_review_appeal_indicator_code else: if debtor_received_sixty_day_notice_and_requests_local_top_review: local_top_review_requested_appeal_indicator_code else: ""

  - name: claim_appears_on_claims_exempt_from_top_offset_report
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: FNS 845.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-7
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          federal_tax_intercept_indicator_is_h
          or federal_tax_intercept_indicator_is_l
          or federal_tax_intercept_indicator_is_s
          or federal_tax_intercept_indicator_is_x
          or federal_tax_intercept_indicator_is_p
          or federal_tax_intercept_indicator_is_f
          or federal_tax_intercept_indicator_is_i
          or federal_tax_intercept_indicator_is_d
          or federal_tax_intercept_indicator_is_e
          or federal_tax_appeal_indicator_is_r
          or federal_tax_appeal_indicator_is_y
