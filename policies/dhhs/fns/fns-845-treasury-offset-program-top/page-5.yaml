format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
  summary: |-
    EPICS rechecks TOP selection criteria and sends a 60 Day Notice to individuals who still meet the criteria. The DSS-8605 tells the debtor that the debtor has 60 days to contact the local agency and set up a repayment agreement or the debtor will be certified for TOP. Once the 60 day period has expired no further VRA's can be accepted and the debtor is delinquent until the claim is paid in full. A debt is certified for TOP when a hearing decision was against the debtor, the debtor waived appeal, or the debtor never responded to the 60 Day Notice.
rules:
  - name: sixty_day_notice_response_period_days
    kind: parameter
    dtype: Integer
    source: FNS 845 Treasury Offset Program TOP, page 5, Section B.3-B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
              excerpt: "has 60 days to contact the local agency"
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          60

  - name: sixty_day_notice_sent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 845 Treasury Offset Program TOP, page 5, Section A.4 and B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          top_returned_valid_address_for_claim
          and claim_still_meets_top_selection_criteria

  - name: debtor_may_contact_agency_to_set_up_repayment_agreement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 845 Treasury Offset Program TOP, page 5, Section B.3-B.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-5#sixty_day_notice_response_period_days
              output: sixty_day_notice_response_period_days
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          sixty_day_notice_sent
          and days_since_sixty_day_notice < sixty_day_notice_response_period_days

  - name: further_vra_may_be_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 845 Treasury Offset Program TOP, page 5, Section B.4 and C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-5#sixty_day_notice_response_period_days
              output: sixty_day_notice_response_period_days
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          sixty_day_notice_sent
          and days_since_sixty_day_notice < sixty_day_notice_response_period_days
          and not debtor_has_become_delinquent

  - name: debt_certified_for_top
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 845 Treasury Offset Program TOP, page 5, Section C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          hearing_decision_was_against_debtor
          or debtor_waived_right_for_appeal
          or debtor_never_responded_to_sixty_day_notice

  - name: certified_debt_sent_to_top_for_intercept
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 845 Treasury Offset Program TOP, page 5, Section C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-5#debt_certified_for_top
              output: debt_certified_for_top
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          debt_certified_for_top

  - name: debtor_delinquent_until_claim_paid_in_full
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 845 Treasury Offset Program TOP, page 5, Section B.4 and C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-845-treasury-offset-program-top/page-5
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-5#sixty_day_notice_response_period_days
              output: sixty_day_notice_response_period_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-845-treasury-offset-program-top/page-5#debt_certified_for_top
              output: debt_certified_for_top
              hash: sha256:local
    versions:
      - effective_from: '2017-04-01'
        formula: |-
          not claim_paid_in_full
          and ((sixty_day_notice_sent and days_since_sixty_day_notice >= sixty_day_notice_response_period_days) or debt_certified_for_top)
