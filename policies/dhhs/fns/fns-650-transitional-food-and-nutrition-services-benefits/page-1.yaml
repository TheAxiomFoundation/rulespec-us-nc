format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1
  summary: |-
    "TFNS benefits are five months of extended Food and Nutrition Services (FNS) benefits for families who become ineligible to receive Work First Family Assistance (WFFA)." "There are only a few situations in which a household cannot receive TFNS."
rules:
  - name: tfns_benefit_duration_months
    kind: parameter
    dtype: Count
    source: FNS 650.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1
              excerpt: "TFNS benefits are five months of extended Food and Nutrition Services (FNS) benefits"
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          5

  - name: tfns_benefits_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 650.01 and 650.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          household_becomes_ineligible_to_receive_wffa
          and wffa_terminates
          and not fns_unit_contains_member_currently_disqualified_from_fns_or_wffa
          and not wffa_case_closes_due_to_child_support_or_mra_sanction
          and not wffa_unit_moves_out_of_north_carolina
          and not fns_unit_was_receiving_more_than_one_wffa_payment_and_at_least_one_payment_continues
          and not fns_unit_over_fns_gross_income_limits_due_to_loss_of_categorical_eligibility
          and not wffa_case_approved_as_benefit_diversion_case

  - name: tfns_benefit_month_count
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: FNS 650.01 and 650.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1#tfns_benefit_duration_months
              output: tfns_benefit_duration_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1#tfns_benefits_eligible
              output: tfns_benefits_eligible
              hash: sha256:local
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          if tfns_benefits_eligible: tfns_benefit_duration_months else: 0

  - name: tfns_face_to_face_recertification_required_in_last_certification_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 650.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          household_is_tfns_unit
          and month_is_last_month_of_certification_period

  - name: tfns_unit_may_be_recertified_as_tfns_case
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 650.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-1
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          household_is_tfns_unit
          and not during_last_month_of_tfns_certification_period
