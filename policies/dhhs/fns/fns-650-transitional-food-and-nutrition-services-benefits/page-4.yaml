format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-4
  summary: |-
    "A FNS unit member receives an Intentional Program Violation disqualification during the TFNS period. If this occurs, impose the disqualification but do not terminate the TFNS." "It is acceptable to reduce the allotment amount due to a recoupment." "A household receiving TFNS begins receiving WFFA cash assistance again during the transitional period. The household must be recertified..." "A Food and Nutrition Services Notice of Expiration and Interview Recertification Form, DSS-2435I, will be generated in the fourth month of the TFNS period."
rules:
  - name: member_ipv_disqualification_imposed_during_tfns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 650, page 4, item E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-4
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          person_is_fns_unit_member
          and person_receives_intentional_program_violation_disqualification_during_tfns_period
  - name: tfns_not_terminated_due_to_member_ipv_disqualification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 650, page 4, item E
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-4
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          household_receiving_tfns
          and fns_unit_member_receives_intentional_program_violation_disqualification_during_tfns_period
  - name: tfns_allotment_reduction_due_to_recoupment_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
