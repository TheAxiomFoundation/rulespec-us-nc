format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-2
  summary: |-
    Act within 10 calendar days of notification of WFFA termination. Use the date the DSS-8125 was processed in NC FAST to terminate the WFFA case as the date the change was known to WFFA. Add 10 calendar days for Food and Nutrition Services to act to determine the initial transitional month. Work requirements and ABAWD status do not apply during the TFNS period. Do not budget new or increased income that made the FNS unit ineligible for WFFA. Use the prior month's FNS budget less the WFFA payment to determine the TFNS benefit amount. If there is a pending Notice of Adverse Action (NOAA), do not make the change. Base the allotment on the prior month's allotment less the Work First payment.
rules:
  - name: wffa_termination_action_deadline_days
    kind: parameter
    dtype: Count
    source: Section 650.03(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-2
              excerpt: "Act within 10 calendar days of notification of WFFA termination."
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          10
  - name: fns_initial_transitional_month_action_days
    kind: parameter
    dtype: Count
    source: Section 650.03(A)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-2
              excerpt: "Add 10 calendar days for Food and Nutrition Services to act"
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          10
  - name: tfns_work_requirements_apply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 650.03(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-2
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          not household_is_in_tfns_period
  - name: tfns_abawd_status_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 650.03(A)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-2
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          not household_is_in_tfns_period
  - name: tfns_transfer_change_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Section 650.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-2
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          household_is_transferring_fns_case_to_tfns
          and not pending_notice_of_adverse_action
  - name: tfns_benefit_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Section 650.03(A)(6), 650.03(B), 650.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-650-transitional-food-and-nutrition-services-benefits/page-2
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          if pending_notice_of_adverse_action: max(0, prior_month_fns_allotment - work_first_payment) else: max(0, prior_month_fns_budget - wffa_payment)
