format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-2
  summary: |-
    Only employees or agents with assigned duties or agency approval shall have access to record storage areas, and only authorized individuals may remove a client record from storage. Volunteers, interns and contract employees are treated the same as county DSS employees for confidentiality and security of records. Documentation means the type of verification and a summary of information obtained has been entered in appropriate evidences and/or case notes in NC FAST, and must be detailed enough for reviewer assessment.
rules:
  - name: person_authorized_to_access_record_storage_area
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 130, page 2, record storage access
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_is_employee_or_agent_with_assigned_record_storage_duties
          or person_is_approved_by_agency_for_record_storage_access
  - name: person_authorized_to_remove_client_record_from_storage_area
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 130, page 2, record removal from storage area
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_is_authorized_by_agency_to_remove_client_record_from_storage_area
  - name: nonemployee_person_treated_as_county_dss_employee_for_confidentiality_and_security
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: FNS 130.02(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_is_volunteer
          or person_is_intern
          or person_is_contract_employee
  - name: case_record_documentation_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 130.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          verification_type_entered_in_nc_fast_evidences_or_case_notes
          and verification_information_summary_entered_in_nc_fast_evidences_or_case_notes
  - name: case_record_documentation_detailed_for_reviewer_reasonableness_review
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 130.03(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          documentation_allows_county_state_or_federal_reviewer_to_determine_reasonableness
  - name: case_record_updated_to_reflect_program_requirements_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 130.03(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          case_record_updated_for_application_redetermination_or_change_processing
          and case_record_reflects_all_program_requirements_met
