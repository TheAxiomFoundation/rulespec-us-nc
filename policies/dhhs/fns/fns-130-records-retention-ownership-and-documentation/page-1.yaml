format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
  summary: |-
    Certification records are available for review and audit by FNS or USDA for three years from the month of origin; records with an IPV disqualification and/or IPV claim are retained indefinitely. Fiscal records and accountable documents are retained for three years from fiscal or administrative closure. Client files are county DSS property and must be safeguarded with secure, controlled-access storage.
rules:
  - name: certification_record_review_retention_years
    kind: parameter
    dtype: Integer
    source: FNS 130.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
              excerpt: "for a period of three years from the month of origin"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          3
  - name: fiscal_record_retention_years
    kind: parameter
    dtype: Integer
    source: FNS 130.01(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
              excerpt: "must be retained for three years from the date of fiscal or administrative closure"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          3
  - name: certification_record_required_retention_years
    kind: derived
    entity: Asset
    dtype: Integer
    period: Month
    source: FNS 130.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1#certification_record_review_retention_years
              output: certification_record_review_retention_years
              hash: sha256:local
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          if asset_is_certification_record: certification_record_review_retention_years else: 0
  - name: fiscal_record_required_retention_years
    kind: derived
    entity: Asset
    dtype: Integer
    period: Month
    source: FNS 130.01(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1#fiscal_record_retention_years
              output: fiscal_record_retention_years
              hash: sha256:local
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          if asset_is_fiscal_record_or_accountable_document: fiscal_record_retention_years else: 0
  - name: certification_record_available_for_fns_or_usda_review
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 130.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
              excerpt: "available for review and audit by FNS or the United States Department of Agriculture (USDA)"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          asset_is_certification_record
          and period_is_within_three_years_from_record_month_of_origin
  - name: record_must_be_retained_indefinitely_for_ipv
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 130.01(A)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
              excerpt: "Records containing an Intentional Program Violation (IPV) disqualification and/or an IPV claim must be retained indefinitely."
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          asset_contains_ipv_disqualification
          or asset_contains_ipv_claim
  - name: client_file_is_county_dss_property
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 130.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
              excerpt: "All client files are the property of the county DSS"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          asset_is_client_file
  - name: client_file_confidentiality_must_be_safeguarded
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 130.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          asset_is_client_file
  - name: record_storage_must_be_secure_with_controlled_access
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 130.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-130-records-retention-ownership-and-documentation/page-1
              excerpt: "provide a secure place or places with controlled access for the storage of records"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          asset_is_record
