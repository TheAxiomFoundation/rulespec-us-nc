format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
  summary: |-
    Steps 6-25 compute gross monthly income, earned income deduction at 20%, total allowable deductions, net monthly income before shelter, excess shelter costs, and final net monthly income after all allowable deductions; if final net monthly income is more than the net income eligibility limit, deny or terminate the case.
rules:
  - name: earned_income_deduction_rate
    kind: parameter
    dtype: Rate
    source: FNS 360, page 7, step 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
              excerpt: "Multiply line 4, gross monthly earned income, by 20%"
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0.20
  - name: shelter_income_share_divisor
    kind: parameter
    dtype: Decimal
    source: FNS 360, page 7, step 23
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
              excerpt: "Divide line 21 by 2."
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          2
  - name: education_income_after_tuition_and_fees
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, steps 6-7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          education_income_before_monthly_tuition_and_mandatory_fees - monthly_tuition_and_mandatory_fees
  - name: monthly_income_before_unearned_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, step 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          gross_monthly_earned_income + education_income_after_tuition_and_fees
  - name: monthly_income_before_farm_loss
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, step 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          monthly_income_before_unearned_income + total_countable_monthly_unearned_income
  - name: gross_monthly_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, steps 10-11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          monthly_income_before_farm_loss - farm_loss
  - name: earned_income_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, step 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
              excerpt: "Multiply line 4, gross monthly earned income, by 20%"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-360-determining-benefit-levels/page-7#earned_income_deduction_rate
              output: earned_income_deduction_rate
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          gross_monthly_earned_income * earned_income_deduction_rate
  - name: allowable_medical_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, steps 14-16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          total_allowable_medical_expenses - medical_threshold_amount
  - name: total_allowable_deductions_except_shelter
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, steps 12-20
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          earned_income_deduction + monthly_standard_deduction_based_on_household_size + allowable_medical_expenses + allowable_dependent_care_expenses + legally_obligated_child_support + homeless_shelter_deduction
  - name: net_monthly_income_after_deductions_except_shelter
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, step 21
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          gross_monthly_income - total_allowable_deductions_except_shelter
  - name: half_net_income_after_deductions_except_shelter
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, step 23
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
              excerpt: "Divide line 21 by 2."
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-360-determining-benefit-levels/page-7#shelter_income_share_divisor
              output: shelter_income_share_divisor
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          net_monthly_income_after_deductions_except_shelter / shelter_income_share_divisor
  - name: excess_shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, steps 22-24
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          total_shelter_and_utility_expenses - half_net_income_after_deductions_except_shelter
  - name: net_monthly_income_after_all_allowable_deductions
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 360, page 7, step 25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          net_monthly_income_after_deductions_except_shelter - excess_shelter_costs
  - name: net_income_within_eligibility_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 360, page 7, step 25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          net_monthly_income_after_all_allowable_deductions <= net_income_eligibility_limit
  - name: case_denied_or_terminated_for_net_income
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 360, page 7, step 25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-7
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          net_monthly_income_after_all_allowable_deductions > net_income_eligibility_limit
