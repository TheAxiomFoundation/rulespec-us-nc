format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
  summary: '"Enter maximum allotment for FNS unit size. Multiply line 25 by 30%. Subtract
    line 27 from line 26. Round the result down to the whole dollar." "All one and
    two-person FNS units must receive a minimum monthly allotment of $24 before proration
    of the initial monthly allotment." "The first month''s benefits are not prorated
    when" the listed circumstances apply. Manual proration uses "(31 - Date of Application)
    x Full Month''s Benefits / 30 = Prorated Allotment"; an application on the 31st
    is treated as filed on the 30th.'
rules:
- name: fns_allotment_income_reduction_rate
  kind: parameter
  dtype: Rate
  source: FNS 360.04(E), line 27
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: Multiply line 25 by 30%.
  versions:
  - effective_from: '2025-10-01'
    formula: '0.30'
- name: minimum_monthly_allotment_for_one_or_two_person_units
  kind: parameter
  dtype: Money
  period: Month
  unit: USD
  source: FNS 360.04(E), minimum allotment sentence
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: minimum monthly allotment of $24
  versions:
  - effective_from: '2025-10-01'
    formula: '24'
- name: minimum_monthly_allotment_unit_size_limit
  kind: parameter
  dtype: Count
  source: FNS 360.04(E), minimum allotment sentence
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: one and two-person FNS units
  versions:
  - effective_from: '2025-10-01'
    formula: '2'
- name: standard_proration_month_days
  kind: parameter
  dtype: Count
  source: FNS 360.04(F)(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: Use a standard 30-day calendar month.
  versions:
  - effective_from: '2025-10-01'
    formula: '30'
- name: proration_formula_total_days_in_month
  kind: parameter
  dtype: Count
  source: FNS 360.04(F)(3), proration formula
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: (31 - Date of Application)
  versions:
  - effective_from: '2025-10-01'
    formula: '31'
- name: last_application_day_for_proration
  kind: parameter
  dtype: Count
  source: FNS 360.04(F)(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: applying on the 31st of a month is treated as though it applied
            on the 30th
  versions:
  - effective_from: '2025-10-01'
    formula: '30'
- name: income_reduction_for_allotment
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 360.04(E), line 27
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: Multiply line 25 by 30%.
  versions:
  - effective_from: '2025-10-01'
    formula: line_25_amount * fns_allotment_income_reduction_rate
- name: monthly_allotment_before_initial_proration
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 360.04(E), lines 26-29 and minimum allotment sentence
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: Subtract line 27 from line 26. Round the result down to the whole
            dollar.
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: one and two-person FNS units must receive a minimum monthly allotment
            of $24
  versions:
  - effective_from: '2025-10-01'
    formula: 'if fns_unit_size <= minimum_monthly_allotment_unit_size_limit: max(minimum_monthly_allotment_for_one_or_two_person_units,
      max(0, floor(maximum_allotment_for_fns_unit_size - income_reduction_for_allotment)))
      else: max(0, floor(maximum_allotment_for_fns_unit_size - income_reduction_for_allotment))'
- name: first_month_benefits_not_prorated
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: FNS 360.04(F)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: The first month's benefits are not prorated when
  versions:
  - effective_from: '2025-10-01'
    formula: 'adding_new_member_to_participating_fns_unit

      or migrant_or_seasonal_fns_unit_participated_in_prior_benefit_month

      or recertification_application_reopened_because_information_provided_within_initial_period'
- name: application_day_for_manual_proration
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: FNS 360.04(F)(3)(a)-(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: applying on the 31st of a month is treated as though it applied
            on the 30th
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: For proration purposes, change the date of application to the date
            the information is received.
  versions:
  - effective_from: '2025-10-01'
    formula: "if application_reopened_after_fns_unit_delay_with_required_action_taken_within_reopening_period:\n\
      \  if information_received_day_of_month == proration_formula_total_days_in_month:\n\
      \    last_application_day_for_proration\n  else:\n    information_received_day_of_month\n\
      else:\n  if date_of_application_day_of_month == proration_formula_total_days_in_month:\n\
      \    last_application_day_for_proration\n  else:\n    date_of_application_day_of_month"
- name: manual_initial_month_allotment
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: FNS 360.04(F)(2)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: 'Change #01-2025 October 1, 2025'
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: (31 - Date of Application) x Full Month's Benefits = Prorated Allotment
            / 30
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-360-determining-benefit-levels/page-8
          excerpt: The first month's benefits are not prorated when
  versions:
  - effective_from: '2025-10-01'
    formula: 'if first_month_benefits_not_prorated: monthly_allotment_before_initial_proration
      else: max(0, ((proration_formula_total_days_in_month - application_day_for_manual_proration)
      * monthly_allotment_before_initial_proration) / standard_proration_month_days)'
