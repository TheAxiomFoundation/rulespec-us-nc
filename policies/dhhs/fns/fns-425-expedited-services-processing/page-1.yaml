format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
  summary: |-
    "If eligible for expedited service, the initial application or reapplication must be processed (approved) by the fourth (4th) calendar day from the date of the application ... no later than the seventh calendar day following the date of application." "A household must be eligible for expedited service in the first eligible month of its certification period."
rules:
  - name: expedited_service_approval_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 425.01; FNS 425.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
              excerpt: "processed (approved) by the fourth (4th) calendar day"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          4
  - name: expedited_service_benefit_access_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 425.01; FNS 425.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
              excerpt: "no later than the seventh calendar day following the date of application"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          7
  - name: fns_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_has_never_received_fns_in_north_carolina_before
  - name: fns_reapplication
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_has_previously_received_fns_in_north_carolina
          and household_is_applying_for_assistance_again
  - name: expedited_service_application_type
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          fns_application
          or fns_reapplication
  - name: expedited_service_approval_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.01; FNS 425.02
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-1#expedited_service_application_type
              output: expedited_service_application_type
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_eligible_for_expedited_service
          and expedited_service_application_type
  - name: expedited_service_first_eligible_month_requirement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_eligible_for_expedited_service_in_first_eligible_month_of_certification_period
  - name: normal_application_processing_required_when_not_expedited_in_application_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.02(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-1
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_eligible_for_fns_benefits
          and not household_entitled_to_expedited_service_in_month_it_applies
