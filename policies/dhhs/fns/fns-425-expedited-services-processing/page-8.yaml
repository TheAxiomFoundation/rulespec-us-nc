format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
  summary: |-
    The household has until the last workday of the month following the month of application to provide necessary verifications. If postponed verification is not provided by the end of the second month, terminate the case; the household is not eligible for expedited service again until postponed verification is provided. Do not reopen an application when postponed verification is provided after the second benefit month. Unless the household misrepresented application or case-file information, there is no over issuance if the expedited decision was correct based on application information and identity was verified. During the postponed verification period, allotment-increasing changes require DSS-8650 and ten calendar days; if verification is not provided, do not terminate or increase benefits. Allotment-decreasing or terminating changes are made based on the client statement and verified before next recertification.
rules:
  - name: case_termination_required_for_missing_postponed_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.06(G)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
              excerpt: "If the household fails to provide postponed verification by the end of the second month, terminate the case."
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_failed_to_provide_postponed_verification_by_end_of_second_month

  - name: expedited_service_again_bar_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.06(G)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          not previous_postponed_verification_provided

  - name: reapplication_processed_under_normal_standards
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.06(G)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_reapplies
          and not previous_postponed_verification_provided

  - name: application_reopening_bar_applies_after_late_postponed_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.06(H)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
              excerpt: "Do not reopen the application when the household provides the postponed verification after the second benefit month."
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_provided_postponed_verification_after_second_benefit_month

  - name: no_overissuance_for_correct_expedited_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.06(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          expedited_service_decision_correct_based_on_application_information
          and agency_verified_identity_of_head_of_household_and_authorized_representative_if_applicable
          and not household_misrepresented_information_on_application_or_in_case_file

  - name: allotment_increase_change_requires_dss_8650_request
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.07(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          reportable_change_requiring_action_occurs_while_waiting_for_postponed_verification
          and change_will_result_in_increase_in_allotment

  - name: benefits_must_not_terminate_or_increase_when_increase_change_verification_not_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.07(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          reportable_change_requiring_action_occurs_while_waiting_for_postponed_verification
          and change_will_result_in_increase_in_allotment
          and not requested_change_verification_provided_within_ten_calendar_days

  - name: allotment_decrease_or_termination_change_made_on_client_statement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.07(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-8
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          reportable_change_requiring_action_occurs_while_waiting_for_postponed_verification
          and change_will_result_in_decrease_in_allotment_or_termination_of_benefits
