format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-14
  summary: |-
    Application June 11 with prior FNS household retaining a valid EBT card has processing deadline June 17. Application December 22 with prior FNS household whose EBT card is lost or damaged allows one processing day plus two days for receipt of the replacement EBT card; processing deadline is December 23.
rules:
  - name: lost_or_damaged_ebt_card_processing_days
    kind: parameter
    dtype: Count
    source: FNS 425 Expedited Service Processing, Section 425 Change #1-2024, p. 14, example 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-14
              excerpt: "Allow one processing day"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          1
  - name: replacement_ebt_card_receipt_days
    kind: parameter
    dtype: Count
    source: FNS 425 Expedited Service Processing, Section 425 Change #1-2024, p. 14, example 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-14
              excerpt: "plus two days for receipt of the replacement EBT card"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          2
  - name: lost_or_damaged_ebt_card_total_allowance_days
    kind: derived
    entity: Household
    dtype: Count
    period: Day
    source: FNS 425 Expedited Service Processing, Section 425 Change #1-2024, p. 14, example 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-14
              excerpt: "Allow one processing day plus two days for receipt of the replacement EBT card"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-14#lost_or_damaged_ebt_card_processing_days
              output: lost_or_damaged_ebt_card_processing_days
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-14#replacement_ebt_card_receipt_days
              output: replacement_ebt_card_receipt_days
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          lost_or_damaged_ebt_card_processing_days + replacement_ebt_card_receipt_days
