format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-4
  summary: |-
    Identity is the only eligibility factor that must be verified to approve expedited FNS benefits. If an authorized representative applies, the identity of the authorized representative and the head of household must be verified. If the household's identity cannot be verified within the expedited service time frame, the household is not entitled to expedited service. Before approval, the household must meet other eligibility factors known to the agency and provide sufficient information to determine eligibility.
rules:
  - name: identity_verification_required_for_expedited_approval
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425, page 4, introductory identity verification paragraph and paragraph A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-4
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          (authorized_representative_applies_on_behalf_of_household and authorized_representative_identity_verified and head_of_household_identity_verified)
          or (not authorized_representative_applies_on_behalf_of_household and household_identity_verified)
  - name: expedited_service_entitlement_identity_requirement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425, page 4, paragraph C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-4
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          identity_verification_required_for_expedited_approval
          and household_identity_verified_within_expedited_service_time_frame
  - name: expedited_service_approval_known_eligibility_requirement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425, page 4, paragraph D and items 2-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-4
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_meets_other_eligibility_factors_known_to_agency
          and household_provides_sufficient_information_to_determine_eligibility
          and agency_obtained_as_much_verification_as_possible_during_interview
  - name: expedited_service_may_be_approved
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425, page 4, identity verification paragraph and paragraph D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-4
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          expedited_service_entitlement_identity_requirement
          and expedited_service_approval_known_eligibility_requirement
  - name: income_verification_may_be_postponed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425, page 4, paragraph E.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-4
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          income_is_eligibility_factor_requiring_verification
  - name: no_income_statement_accepted_for_income_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425, page 4, paragraph E.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-4
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_has_no_income
          and household_states_household_has_no_income
