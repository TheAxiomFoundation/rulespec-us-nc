format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
  summary: |-
    425.03: If the agency discovers that a household is entitled to expedited service as the result of a change, the agency must provide expedited service within expedited processing standards, calculate four calendar days beginning the day after discovery, and allow access no later than the seventh calendar day. If entitlement is lost before processing, process under normal procedures. 425.04: Households applying between the 1st and 15th receive expedited benefits for the application month; households applying after the 15th receive a combined allotment for the application month and following month.
rules:
  - name: change_discovery_processing_standard_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 425.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
              excerpt: "Calculate four (4) calendar days"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          4

  - name: change_discovery_access_deadline_calendar_days
    kind: parameter
    dtype: Integer
    source: FNS 425.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
              excerpt: "no later than the seventh calendar day"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          7

  - name: expedited_service_required_after_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.03(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          agency_discovers_household_entitled_to_expedited_service_as_result_of_change
          and not household_loses_entitlement_to_expedited_service_before_processing

  - name: normal_application_processing_required_after_lost_expedited_entitlement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.03(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_loses_entitlement_to_expedited_service_before_processing

  - name: expedited_change_processing_standard_calendar_days
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: FNS 425.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-3#change_discovery_processing_standard_calendar_days
              output: change_discovery_processing_standard_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          if expedited_service_required_after_change: change_discovery_processing_standard_calendar_days else: 0

  - name: expedited_change_access_deadline_calendar_days
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: FNS 425.03(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-3#change_discovery_access_deadline_calendar_days
              output: change_discovery_access_deadline_calendar_days
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          if expedited_service_required_after_change: change_discovery_access_deadline_calendar_days else: 0

  - name: expedited_benefits_issued_for_application_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.04(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
              excerpt: "apply between the 1st and 15th of the month"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_applies_between_first_and_fifteenth_of_month
          and household_otherwise_eligible_for_fns

  - name: expedited_combined_allotment_issued_for_application_and_following_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.04(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-3
              excerpt: "apply after the 15th of the month"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_applies_after_fifteenth_of_month
          and household_determined_eligible_for_fns
