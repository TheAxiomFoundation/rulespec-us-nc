format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
  summary: |-
    "Use the DSS-8650 to request additional information if needed. The FNS Unit has ten days to provide the information." "For applications made after the 15th of the month, a combined allotment with expedited service for the month of application and the month after will be issued." "For applications made between the 1st and 15th of the month, the household will only receive the initial allotment." "The third month's allotment will not be authorized until all postponed verifications are provided." "A household was not eligible for expedited service at the time the application was taken. A change in situation occurs during the 25-day application processing period that makes the household eligible for expedited service."
rules:
  - name: fns_unit_additional_information_response_deadline_days
    kind: parameter
    dtype: Integer
    source: FNS 425 page 9, change-processing additional information request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
              excerpt: "The FNS Unit has ten days to provide the information."
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          10

  - name: expedited_application_midmonth_cutoff_day
    kind: parameter
    dtype: Integer
    source: FNS 425.08(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
              excerpt: "after the 15th of the month"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          15

  - name: expedited_application_processing_period_days
    kind: parameter
    dtype: Integer
    source: FNS 425.9(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
              excerpt: "during the 25-day application processing period"
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          25

  - name: additional_information_request_uses_dss_8650
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 425 page 9, change-processing additional information request
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          additional_information_needed_for_change_processing

  - name: change_affecting_eligibility_requires_effect_of_change_or_adverse_action_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 425 page 9(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          change_affects_eligibility

  - name: combined_allotment_for_application_month_and_following_month_issued
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.08(A), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-9#expedited_application_midmonth_cutoff_day
              output: expedited_application_midmonth_cutoff_day
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          application_day_of_month > expedited_application_midmonth_cutoff_day
          and household_determined_eligible_for_fns
          and household_qualifies_for_expedited_service

  - name: second_month_allotment_authorization_requires_postponed_verifications_for_early_month_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.08(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-9#expedited_application_midmonth_cutoff_day
              output: expedited_application_midmonth_cutoff_day
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          application_day_of_month >= 1
          and application_day_of_month <= expedited_application_midmonth_cutoff_day
          and all_postponed_verifications_provided

  - name: third_month_allotment_authorization_requires_postponed_verifications_for_after_midmonth_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.08(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-425-expedited-services-processing/page-9#expedited_application_midmonth_cutoff_day
              output: expedited_application_midmonth_cutoff_day
              hash: sha256:local
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          application_day_of_month > expedited_application_midmonth_cutoff_day
          and all_postponed_verifications_provided

  - name: following_month_only_expedited_benefits_issued_when_application_month_ineligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 425.08(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_not_eligible_for_fns_benefits_for_month_of_application
          and household_eligible_for_fns_benefits_for_following_month
          and household_qualifies_for_expedited_service_for_following_month

  - name: regulatory_delay_good_cause_due_to_change_during_processing_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 425.9(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-425-expedited-services-processing/page-9
    versions:
      - effective_from: '2024-03-01'
        formula: |-
          household_not_eligible_for_expedited_service_when_application_was_taken
          and change_in_situation_occurs_during_application_processing_period
          and change_makes_household_eligible_for_expedited_service
