format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-27
  summary: |-
    315.37 WORK FIRST FAMILY ASSISTANCE (WFFA) NON-COMPLIANCE: Do not increase a FNS unit's benefits when a WFFA payment is reduced, terminated, or not issued because of a penalty or sanction and the household is certified for benefits when the sanction is imposed. Child Only and Work Eligible WFFA household rules specify when to continue counting, delete, or not budget the WFFA payment.
rules:
  - name: countable_wffa_payment_under_noncompliance_policy
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    source: FNS 315.37 A-B
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-27
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-27
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-27
              excerpt: "continue to count the payment for the full penalty period"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-27
              excerpt: "delete the payment effective with the month after the case terminates"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if child_only_wffa_household:
            if wffa_case_terminated_due_to_penalty_or_sanction_during_certification_period and current_month_is_month_after_wffa_case_terminates: 0 else: if wffa_payment_terminated_due_to_penalty_or_sanction_imposed_effective_application_reapplication_or_non_certified_month: 0 else: if wffa_payment_not_released_due_to_penalty_or_sanction_during_certification_period: max(0, wffa_payment_amount) else: if same_penalty_or_sanction_in_place_at_reapplication_or_recertification: max(0, wffa_payment_amount) else: if new_penalty_or_sanction_in_place_at_reapplication_or_recertification and penalty_or_sanction_imposed_while_case_certified_for_fns: max(0, wffa_payment_amount) else: 0
          else:
            if work_eligible_wffa_household:
              if wffa_payment_terminated and current_month_is_month_after_wffa_payment_terminates and client_has_not_reapplied_and_been_reapproved: 0 else: if wffa_payment_not_released_due_to_mra_noncompliance and household_certified_for_fns_at_time_of_mra_noncompliance: max(0, wffa_payment_amount) else: 0
            else:
              0
