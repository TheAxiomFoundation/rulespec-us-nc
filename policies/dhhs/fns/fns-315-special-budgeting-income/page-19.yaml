format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
  summary: |-
    Additional verification of deductions is not required if the previous year's tax records are used. If last year's tax records are not available, request business income and expense records for the previous 12 months; if the business has not operated for 12 months, request records for the period operated. If records are not representative due to an increase or decrease in business, average and anticipate income for the certification period based on the most accurate information available. When first working with a household applying for FNS, if prior tax or business records are unavailable, anticipate income and expenses based on the best available information from the self-employed individual. If the business has existed at least one year and the household states this is representative, obtain previous-year verification and subtract allowable and reasonable costs.
rules:
  - name: additional_deduction_verification_not_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, additional verification of deductions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          previous_year_tax_records_used
  - name: previous_twelve_month_business_records_requested
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, paragraph a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
              excerpt: "If last year's tax records are not available, request business income and expense records for the previous 12 months."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          last_year_tax_records_not_available
  - name: period_operated_business_records_requested
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, paragraph b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
              excerpt: "If the business has not been in operation for 12 months, request income and expense records for the period of time the business has operated."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          business_has_not_operated_for_twelve_months
  - name: anticipate_income_from_most_accurate_information
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, paragraph 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          records_not_representative_due_to_business_increase_or_decrease
  - name: initial_contact_self_employment_anticipation_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          first_working_with_household_applying_for_fns
          and previous_year_tax_records_not_available
          and business_records_not_available
  - name: expense_receipts_required_when_tax_records_unavailable
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, paragraph 3.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          tax_records_not_available
  - name: business_records_mileage_and_receipts_required
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, paragraph 3.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          business_records_used_for_mileage_deduction
  - name: previous_year_self_employment_verification_required
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 19, C.1.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          business_has_existed_at_least_one_year
          and household_states_records_are_representative
  - name: net_self_employment_income_after_allowable_costs
    kind: derived
    entity: Business
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315 page 19, C.1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-19
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          max(0, self_employment_gross_income - allowable_reasonable_costs_of_producing_income)
