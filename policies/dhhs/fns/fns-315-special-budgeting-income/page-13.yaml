format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
  summary: |-
    "Count the income for the month it is intended to cover if payment is made monthly."
    "Convert income to a monthly amount if income is received more frequently than monthly."
    "Prorate the contract income over the period it is intended to cover if received less than annually but not in monthly installments or converted to a monthly amount."
    "Crop insurance settlements and insurance settlements on stock-in-trade held for resale (but not settlements on property...) are earned income subject to the cost of doing business."
    "Money that is otherwise payable to a member of the FNS unit, but is diverted by the provider of the payment to a third party for a household expense, shall be counted as income and not excluded."
    "Payments specified by a court order or other legally binding agreement to go directly to a third party rather than the FNS unit are excluded as income..."
rules:
  - name: income_counted_for_intended_month
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315 page 13, item B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_made_monthly: monthly_payment_amount_intended_for_month else: 0

  - name: monthly_converted_income_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315 page 13, item C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if income_received_more_frequently_than_monthly: income_converted_to_monthly_amount else: 0

  - name: prorated_contract_income_monthly_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315 page 13, note after item C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if contract_income_received_less_than_annually_but_not_monthly_or_converted: contract_income_payment_amount / contract_income_period_month_count else: 0

  - name: insurance_settlement_subject_to_self_employment_income_treatment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          insurance_settlement_is_crop_or_stock_in_trade_held_for_resale
          and
          not insurance_settlement_is_for_property_such_as_building_or_vehicle

  - name: insurance_settlement_self_employment_earned_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.22
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if insurance_settlement_subject_to_self_employment_income_treatment: max(0, insurance_settlement_amount - costs_incurred_in_attempted_production_of_income) else: 0

  - name: legally_obligated_money_counted_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.23 A-B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_specified_by_court_order_or_binding_agreement_to_go_directly_to_third_party_rather_than_fns_unit: 0 else: if money_otherwise_payable_to_fns_unit_member_and_diverted_by_provider_to_third_party_for_household_expense: diverted_payment_amount else: 0

  - name: legally_obligated_money_excluded_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.23 B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-13
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_specified_by_court_order_or_binding_agreement_to_go_directly_to_third_party_rather_than_fns_unit: direct_third_party_payment_amount else: 0
