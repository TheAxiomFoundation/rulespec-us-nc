format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-28
  summary: |-
    If WFFA is terminated effective the month of application/reapplication or in a non-certified month, do not count the WFFA payment. Child Support sanctions during certification continue to count for the full sanction period. Substance Abuse Treatment penalties may require gross or actual payment budgeting depending on certification timing. Client-responsible WFFA overpayments continue to count gross, excluding Benefit Diversion. WIA/WIOA on-the-job training earnings are earned income except specified youth summer employment; other WIA allowances, earnings, payments, and reimbursements are excluded.
rules:
  - name: wffa_budgeted_unearned_income_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315 Special Budgeting, page 28, WFFA sanctions, penalties, and overpayments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-28
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_wffa_benefit_diversion: 0 else: if not payment_is_wffa: 0 else: if wffa_terminated_effective_month_of_application_or_reapplication_or_in_non_certified_month: 0 else: if wffa_payment_not_released_due_to_child_support_noncompliance_sanction and household_was_certified_for_fns_at_time_of_child_support_noncompliance and wffa_child_support_sanction_period_is_active and not month_after_wffa_payment_terminates_without_reapplication_and_reapproval: wffa_gross_payment_amount else: if wffa_payment_not_released_due_to_child_support_noncompliance_sanction and month_after_wffa_payment_terminates_without_reapplication_and_reapproval: 0 else: if wffa_payment_reduced_due_to_substance_abuse_treatment_noncompliance_penalty and (substance_abuse_penalty_imposed_during_fns_certification_period or (reduction_penalty_in_place_at_reapplication_or_recertification and penalty_is_same_penalty)): wffa_gross_payment_amount else: if wffa_payment_reduced_due_to_substance_abuse_treatment_noncompliance_penalty and penalty_is_new_penalty and substance_abuse_penalty_imposed_when_case_not_certified_for_fns: wffa_actual_payment_amount else: if wffa_payment_reduced_due_to_client_responsible_overpayment: wffa_gross_payment_amount else: 0
  - name: wia_or_wioa_on_the_job_training_earnings_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.38 Work Force Investment Act or Work Force Innovation and Opportunity Act
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-28
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_wia_or_wioa_on_the_job_training_earnings and not (recipient_is_under_age_19 and recipient_under_parental_control_of_adult_fns_unit_member and recipient_participates_in_summer_youth_employment_opportunities_program): payment_amount else: 0
  - name: wia_or_wioa_other_program_payment_excluded_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.38 Work Force Investment Act or Work Force Innovation and Opportunity Act
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-28
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if individual_participates_in_other_wia_or_wioa_program and payment_is_wia_or_wioa_allowance_earning_payment_or_reimbursement_from_other_program: payment_amount else: 0
