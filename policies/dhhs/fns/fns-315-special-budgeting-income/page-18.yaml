format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
  summary: |-
    “‘S’ and ‘LLC’ corporations: If the business is incorporated as a ‘LLC’ or ‘S’ corporation budget the income the same as self-employment income.” “‘C’ corporation: If the business is incorporated as a ‘C’ corporation do not use self-employment budgeting, count income received from the business as wages.” “‘C’ corporation assets are not countable to the household but stock which represents the value of non-income producing corporate property is not excluded.” “Accept any verification that reasonably verifies the required information.”
rules:
  - name: llc_or_s_corporation_income_budgeted_as_self_employment
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: FNS 315, Section 315, page 18, item A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          business_incorporated_as_llc or business_incorporated_as_s_corporation

  - name: llc_or_s_corporation_income_annualized
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: FNS 315, Section 315, page 18, item A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          business_incorporated_as_llc or business_incorporated_as_s_corporation

  - name: c_corporation_income_counted_as_wages
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: FNS 315, Section 315, page 18, item A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if business_incorporated_as_c_corporation: income_received_from_business else: 0

  - name: c_corporation_uses_self_employment_budgeting
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: FNS 315, Section 315, page 18, item A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          not business_incorporated_as_c_corporation

  - name: c_corporation_distributions_counted_as_earned_income
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: FNS 315, Section 315, page 18, item A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if business_incorporated_as_c_corporation: checks_made_out_for_cash_from_corporate_checking_accounts + household_expenses_paid_from_corporate_checking_accounts else: 0

  - name: c_corporation_asset_countable_to_household
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 315, Section 315, page 18, item A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          asset_related_to_c_corporation
          and (asset_is_stock_representing_value_of_non_income_producing_corporate_property or corporate_asset_not_registered_clearly_in_name_of_corporation)

  - name: self_employment_records_reasonably_verify_required_information
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: FNS 315, Section 315, page 18, item B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          records_verify_total_business_income
          and records_verify_business_expenses

  - name: previous_year_tax_records_requested
    kind: derived
    entity: Business
    dtype: Judgment
    period: Year
    source: FNS 315, Section 315, page 18, item B.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-18
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          previous_year_tax_records_are_representative
