format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-8
  summary: |-
    "New or changed child support income. Use the court order or documentary evidence to project a representative monthly amount. Only count if it can be reasonably anticipated that the absent parent will begin paying. Terminated child support income. Count actual child support in month received. Do not count child support past the last month of receipt. College Work Study: Do not count College Work Study as a source of income when administered under Title IV of the Higher Education Act or the Bureau of Indian Affairs. Count other College Work Study benefits as earned income. Project over the period of time it is intended to cover."
rules:
  - name: new_or_changed_child_support_countable_monthly_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.08, items 2.a-2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-8
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-8
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if child_support_is_new_or_changed and absent_parent_payment_can_be_reasonably_anticipated: representative_monthly_amount_from_court_order_or_documentary_evidence else: 0

  - name: terminated_child_support_countable_monthly_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.08, items 3.a-3.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-8
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-8
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if child_support_is_terminated and month_is_month_of_receipt: actual_child_support_received else: 0

  - name: college_work_study_countable_earned_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.09
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-8
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-8
              excerpt: "Change #01-2022 January 11, 2022"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if college_work_study_is_administered_under_title_iv or college_work_study_is_administered_by_bureau_of_indian_affairs: 0 else: other_college_work_study_monthly_amount_projected_over_intended_period
