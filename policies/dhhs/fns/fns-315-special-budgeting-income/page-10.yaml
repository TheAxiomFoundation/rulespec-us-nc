format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
  summary: |-
    315.12 COURT-ORDERED RESTITUTION: Do not count reimbursements for losses or damages incurred. If court-ordered restitution is a lump sum for pain and suffering, do not count as income and count as a resource in the month of receipt. All ongoing court-ordered payments are counted as unearned income unless excluded in FNS 300 Sources of Income.
    315.13 DEPENDENT CARE PAYMENTS: Count dependent care payments as earned income when received as wages by an FNS unit member for care provided to a non-FNS unit member; treat outside-source dependent care payments paid between FNS unit members as earned income to the care provider; do not count member-to-member own-pocket payments as income and do not allow a child care deduction; count payments received as wages for care provided to a dependent FNS unit member by a non-FNS unit member as earned income.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-315-special-budgeting-income/page-10#ongoing_court_ordered_payment_unearned_income_amount
      reason: Ongoing court-ordered payments are counted as unearned income unless excluded in FNS 300 Sources of Income, but no executable RuleSpec target for that cited exclusion source is available.
rules:
  - name: court_ordered_restitution_reimbursement_not_counted_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.12(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Do not count reimbursements for losses or damages incurred."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if court_ordered_restitution_anticipated_to_be_received_by_fns_unit_member and payment_reimburses_loss_or_damages_incurred: payment_amount else: 0
  - name: court_ordered_restitution_lump_sum_pain_and_suffering_not_counted_income_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.12(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "lump sum for pain and suffering: 1. Do not count as income."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if court_ordered_restitution_anticipated_to_be_received_by_fns_unit_member and payment_is_lump_sum_for_pain_and_suffering: payment_amount else: 0
  - name: court_ordered_restitution_lump_sum_pain_and_suffering_resource_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.12(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Count as a resource in the month of receipt."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if court_ordered_restitution_anticipated_to_be_received_by_fns_unit_member and payment_is_lump_sum_for_pain_and_suffering and payment_received_in_month: payment_amount else: 0
  - name: dependent_care_payment_earned_income_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.13(A), 315.13(B)(1), and 315.13(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Count these payments as earned income."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_dependent_care_payment and ((payment_received_as_wages_by_fns_unit_member and care_provided_to_non_fns_unit_member) or (payment_paid_by_one_fns_unit_member_to_another_member_within_same_fns_unit and dependent_care_payment_provided_by_outside_source) or (payment_received_as_wages_by_fns_unit_member and care_provided_to_dependent_fns_unit_member_by_non_fns_unit_member)): payment_amount else: 0
  - name: dependent_care_member_to_member_own_pocket_not_counted_income_amount
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.13(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "do not count payments to the member providing the care as income."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_dependent_care_payment and payment_paid_by_one_fns_unit_member_to_another_member_within_same_fns_unit and dependent_care_payment_provided_by_fns_unit_member_from_own_pocket: payment_amount else: 0
  - name: dependent_care_member_to_member_own_pocket_child_care_deduction_not_allowed
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.13(B)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "Change #01-2022 January 11, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-10
              excerpt: "A deduction for child care would not be allowed in this situation."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_dependent_care_payment
          and payment_paid_by_one_fns_unit_member_to_another_member_within_same_fns_unit
          and dependent_care_payment_provided_by_fns_unit_member_from_own_pocket
