format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-17
  summary: |-
    "If a single payment is intended for both FNS unit and non-FNS unit members, any identifiable portion of the payment intended and used for the care and maintenance of the non-FNS unit household member must be excluded as income for the FNS unit." If the non-FNS unit member's portion cannot be readily identified, evenly prorate the payment among intended FNS unit and non-FNS unit members and count the prorated share for all FNS unit members. Unincorporated self-employment includes FNS unit members engaged in an enterprise for gain; business income/resources are treated as self-employment income/resources to the owner, and partnerships are allocated proportionally.
rules:
  - name: identifiable_mixed_payment_fns_counted_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.27.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-17
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-17
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_intended_for_both_fns_unit_and_non_fns_unit_members and non_fns_portion_can_be_readily_identified: max(0, payment_amount - identifiable_non_fns_portion_intended_and_used_for_care_and_maintenance) else: 0
  - name: prorated_mixed_payment_fns_counted_income
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.27.D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-17
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-17
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_intended_for_both_fns_unit_and_non_fns_unit_members and not non_fns_portion_can_be_readily_identified: payment_amount * intended_fns_unit_member_count / intended_fns_and_non_fns_member_count else: 0
  - name: unincorporated_business_income_treated_as_self_employment_income
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315.28.A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-17
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          business_is_unincorporated and business_owner_is_fns_unit_member
  - name: self_employed_due_to_own_tax_responsibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 315.28.A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-17
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          individual_responsible_for_paying_own_fica_and_other_taxes
