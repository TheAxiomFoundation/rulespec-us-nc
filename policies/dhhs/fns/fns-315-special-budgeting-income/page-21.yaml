format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-21
  summary: |-
    If the average of previous records is not representative due to an increase or decrease in business, average and anticipate income based on the most accurate information available and document why. When the FNS unit reports an increase or decrease expected to continue for more than one month, react to the change. Do not consider normal business or seasonal fluctuations as a change. Allowable costs include specified business-place, loan, tax, repair, maintenance, and employee labor costs; payments on principal cannot be allowed except as separately listed for income-producing equipment and property loans.
rules:
  - name: records_not_representative_due_to_business_change
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 21, item 3 and note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-21
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          previous_records_average_not_representative_due_to_business_increase_or_decrease
          and not normal_business_or_seasonal_fluctuation
  - name: unrepresentative_records_income_determination_compliant
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 21, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-21
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          not records_not_representative_due_to_business_change
          or (
            income_averaged_and_anticipated_based_on_most_accurate_information_available
            and unrepresentative_records_reason_and_countable_income_determination_documented
          )
  - name: reported_business_change_requires_reaction
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 21, item 4 and note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-21
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          fns_unit_reports_business_increase_or_decrease_expected_to_continue_more_than_one_month
          and not normal_business_or_seasonal_fluctuation
  - name: reported_business_change_reaction_steps_compliant
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: FNS 315 page 21, item 4(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-21
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          not reported_business_change_requires_reaction
          or (
            annual_income_and_expenses_estimated_from_most_accurate_information_available
            and income_averaged_and_anticipated_for_remainder_of_certification_period
            and anticipated_averaged_monthly_income_entered_in_nc_fast
          )
  - name: allowable_cost_of_doing_business
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315 page 21, section D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-21
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          (
            cost_maintains_place_of_business_other_than_residence
            or cost_identified_for_part_of_home_used_exclusively_for_business
            or cost_is_prorata_share_of_household_expenses_for_home_business_when_business_expenses_not_separately_identifiable
            or loan_principal_or_interest_used_to_purchase_income_producing_equipment_or_property
            or tax_paid_on_income_producing_property
            or repair_or_maintenance_related_to_business
            or employee_labor_cost
          )
          and not principal_payment_not_allowed_as_cost_of_doing_business
