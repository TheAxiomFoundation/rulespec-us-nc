format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
  summary: '315.10 CONTRACT WAGES: Prorate contract income that represents the FNS
    unit''s annual support over 12 months unless the income is paid hourly or on a
    piecework basis. Prorate contract income that is not the FNS unit''s annual income
    over the period it is intended to cover unless paid hourly or piecework. Count
    hourly or piecework income derived by contract that can be anticipated in the
    month received using base period as an indicator. Do not consider contract wages
    unless a written or verbal agreement exists.

    315.11 CONTRIBUTIONS: Determine if the contribution is infrequent/irregular income
    as defined in 315.07; do not count irregular/infrequent income. Charitable contributions
    of $300 or less during a calendar quarter from a non-profit organization are excluded;
    if the contribution exceeds $300, count the amount over $300 that can be anticipated
    during the certification period as unearned income and prorate over the entire
    certification period.'
  deferred_outputs:
  - output: us-nc:policies/dhhs/fns/fns-315-special-budgeting-income/page-9#contribution_counted_unearned_income
    reason: Final contribution counting depends on determining whether the contribution
      is infrequent or irregular income as defined in FNS 315.07, which is not provided
      in the copied context.
rules:
- name: contract_income_annual_proration_months
  kind: parameter
  dtype: Count
  source: FNS 315.10(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
          excerpt: Prorate contract income that represents the FNS unit's annual support
            over 12 months
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
          excerpt: 'Change #01-2022 January 11, 2022'
  versions:
  - effective_from: '2022-01-11'
    formula: '12'
- name: nonprofit_charitable_contribution_quarterly_exclusion
  kind: parameter
  dtype: Money
  unit: USD
  source: FNS 315.11(B)(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
          excerpt: Charitable contributions of $300 or less during a calendar quarter
            from a non-profit organization are excluded
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
          excerpt: 'Change #01-2022 January 11, 2022'
  versions:
  - effective_from: '2022-01-11'
    formula: '300'
- name: contract_wages_counted_income
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: FNS 315.10(A)-(C) and Note
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
          excerpt: 'Change #01-2022 January 11, 2022'
  versions:
  - effective_from: '2022-01-11'
    formula: "if contract_has_written_or_verbal_agreement:\n  if contract_income_is_hourly_or_piecework:\n\
      \    if contract_hourly_or_piecework_income_can_be_anticipated_in_month_received:\n\
      \      anticipated_hourly_or_piecework_contract_income_in_month_received\n \
      \   else:\n      0\n  else:\n    if contract_income_represents_fns_unit_annual_support:\n\
      \      annual_contract_income_amount / contract_income_annual_proration_months\n\
      \    else:\n      contract_income_intended_period_amount / contract_income_intended_period_month_count\n\
      else:\n  0"
- name: nonprofit_contribution_excess_over_calendar_quarter_exclusion
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: USD
  source: FNS 315.11(B)(1)-(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
          excerpt: If the contribution from a non-profit organization exceeds $300,
            count the amount over $300
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-9
          excerpt: 'Change #01-2022 January 11, 2022'
  versions:
  - effective_from: '2022-01-11'
    formula: 'if contribution_received_from_nonprofit_organization: max(0, nonprofit_contribution_amount_during_calendar_quarter
      - nonprofit_charitable_contribution_quarterly_exclusion) else: 0'
