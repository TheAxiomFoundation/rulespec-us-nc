format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
  summary: |-
    "The amount withheld is counted as earned income as the money is legally obligated and otherwise payable to the employee." "The actual capital gain from the sale of capital goods or equipment is included as income." Capital gain is computed by subtracting depreciation from purchase price to establish adjusted basis, then subtracting adjusted basis from sales price; budget the gain as self-employment income prorated over 12 months.
rules:
  - name: capital_asset_minimum_expected_life_months
    kind: parameter
    dtype: Count
    source: FNS 315.06(A)(1)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
              excerpt: "Other items expected to last at least 12 months."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          12
  - name: capital_gain_proration_month_count
    kind: parameter
    dtype: Count
    source: FNS 315.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
              excerpt: "Prorate the gain over 12 months."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          12
  - name: asset_is_capital_asset
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: FNS 315.06(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          asset_is_real_property
          or asset_is_equipment
          or asset_is_machinery
          or asset_expected_life_months >= capital_asset_minimum_expected_life_months
  - name: withheld_expense_amount_counted_as_earned_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315, Section 315 Change #01-2022, page 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if employee_has_use_or_lose_employer_expense_withholding_pay_plan: employer_withheld_expense_amount else: 0
  - name: capital_asset_adjusted_basis
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.06(A)(4)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          original_purchase_price - depreciation_claimed
  - name: actual_capital_gain
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.06(A), FNS 315.06(A)(4)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if asset_is_capital_asset and asset_sold_or_transferred and capital_gain_realized_from_sale_or_transfer: sales_price - capital_asset_adjusted_basis else: 0
  - name: monthly_self_employment_income_from_capital_gain
    kind: derived
    entity: Asset
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-4
              excerpt: "Budget a capital gain in the same manner as self-employment income. Prorate the gain over 12 months."
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          actual_capital_gain / capital_gain_proration_month_count
