format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-3
  summary: |-
    Attendant care payments between FNS unit members from a member's own pocket are not income; attendant care wages paid by a non-FNS unit member to a unit member are earned income; outside-source payments to a provider for care of a FNS unit member are not counted. Bonus/vacation pay is counted when reasonably anticipated and prorated if less frequent than monthly. Cafeteria-plan credits that cannot be taken as cash and are lost if unused are not income.
rules:
  - name: attendant_care_payment_counted_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.03 C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-3
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_attendant_care
          and payment_received_as_wages_by_fns_unit_member
          and care_provided_to_fns_unit_member
          and payment_paid_by_non_fns_unit_member
  - name: attendant_care_payment_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.03 B.2, D
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-3
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_attendant_care
          and (
            payment_from_fns_unit_member_to_another_fns_unit_member_from_own_pocket
            or outside_source_paid_provider_for_care_of_fns_unit_member
          )
  - name: bonus_vacation_pay_counted_in_month_of_receipt
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.04 A.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-3
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_bonus_or_vacation_pay
          and amount_and_date_of_receipt_can_be_reasonably_anticipated
  - name: monthly_bonus_vacation_pay_anticipated_for_certification_month
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.04 A.2-A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-3
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_bonus_or_vacation_pay
          and payment_was_received_in_base_period
          and base_period_payment_is_representative
          and payment_will_be_received_monthly
  - name: less_frequent_bonus_vacation_pay_prorated_over_certification_period
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: FNS 315.04 A.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-3
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          if payment_is_bonus_or_vacation_pay and payment_received_less_frequently_than_monthly and payment_anticipated_during_next_certification_period: anticipated_gross_bonus_vacation_pay_over_certification_period / certification_period_month_count else: 0
  - name: cafeteria_plan_credits_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-3
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_cafeteria_plan_or_flexible_benefit_credit
          and credit_shows_on_pay_stub
          and credit_cannot_be_received_as_cash
          and unused_credit_is_lost
