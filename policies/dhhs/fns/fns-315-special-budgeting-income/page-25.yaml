format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-25
  summary: '"Count periodic disbursements or dividends as unearned income received
    by the FNS unit member from the trust fund when these amounts can be anticipated
    with reasonable certainty." "Vendor payments are not considered countable income."
    "Payments made with money that is legally obligated to the FNS unit are not considered
    vendor payments." "If the FNS unit member was receiving Public Assistance ...
    or FNS at the time he joined VISTA, do not count as income. If he was not a recipient,
    count as earned income." "Wages, salaries, and tips received for performing services
    as an employee of an employer."'
rules:
- name: trust_fund_disbursement_or_dividend_countable_unearned_income
  kind: derived
  entity: Payment
  dtype: Money
  period: Month
  unit: USD
  source: FNS 315.32
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-25
  versions:
  - effective_from: '2022-01-11'
    formula: 'if payment_is_periodic_trust_fund_disbursement_or_dividend and payment_received_by_fns_unit_member
      and trust_fund_amount_can_be_anticipated_with_reasonable_certainty: payment_amount
      else: 0'
- name: vendor_payment
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: FNS 315.33
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-25
  versions:
  - effective_from: '2022-01-11'
    formula: 'payment_made_in_money_on_behalf_of_household_or_individual_by_outside_party

      and not payment_made_with_money_legally_obligated_to_fns_unit'
- name: vendor_payment_countable_income
  kind: derived
  entity: Payment
  dtype: Money
  period: Month
  unit: USD
  source: FNS 315.33
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-25
  versions:
  - effective_from: '2022-01-11'
    formula: 'if vendor_payment: 0 else: payment_amount'
- name: vista_payment_countable_income
  kind: derived
  entity: Payment
  dtype: Money
  period: Month
  unit: USD
  source: FNS 315.34
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-25
  versions:
  - effective_from: '2022-01-11'
    formula: 'if payment_is_vista_income and payment_received_by_fns_unit_member and
      not fns_unit_member_was_receiving_public_assistance_or_fns_when_joined_vista:
      payment_amount else: 0'
- name: vista_payment_countable_earned_income
  kind: derived
  entity: Payment
  dtype: Money
  period: Month
  unit: USD
  source: FNS 315.34
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-25
  versions:
  - effective_from: '2022-01-11'
    formula: 'if payment_is_vista_income and payment_received_by_fns_unit_member and
      not fns_unit_member_was_receiving_public_assistance_or_fns_when_joined_vista:
      payment_amount else: 0'
- name: wages_salaries_tips_earned_income
  kind: derived
  entity: Payment
  dtype: Money
  period: Month
  unit: USD
  source: FNS 315.35
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-25
  versions:
  - effective_from: '2022-01-11'
    formula: 'if payment_is_wages_salaries_or_tips_for_services_as_employee_of_employer
      or payment_is_sick_pay or payment_is_vacation_pay or payment_is_held_wages or
      payment_is_pay_advance or payment_is_attendant_care_payment or payment_is_commercial_fisherman_payment
      or payment_is_contract_wages: payment_amount else: 0'
