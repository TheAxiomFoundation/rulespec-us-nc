format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
  summary: |-
    If military pay is received from someone stationed away from the FNS unit, determine the length of absence. If absent less than 30 days, continue to include the member in the FNS unit and count his income. If absent 30 days or more, do not include the individual or their income in the FNS unit. Count any contributions made to the FNS unit as unearned income. Pass through payments for shared expenses received from and used on behalf of a third party are not considered income, except for a residence owned or being purchased by the FNS unit, where payments count as earned roomer income. Reimbursements are not counted except for normal living expenses.
rules:
  - name: military_stationed_away_absence_threshold_days
    kind: parameter
    dtype: Count
    source: FNS 315.24(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
              excerpt: "If absent 30 days or more"
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          30

  - name: military_member_stationed_away_included_in_fns_unit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 315.24(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          military_pay_received_from_person_stationed_away_from_fns_unit
          and military_stationed_away_absence_days < military_stationed_away_absence_threshold_days

  - name: military_member_stationed_away_income_counted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 315.24(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          military_pay_received_from_person_stationed_away_from_fns_unit
          and military_stationed_away_absence_days < military_stationed_away_absence_threshold_days

  - name: contribution_from_excluded_military_member_is_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.24(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_contribution_from_military_member_stationed_away_from_fns_unit
          and military_stationed_away_absence_days >= military_stationed_away_absence_threshold_days

  - name: joint_account_deposit_from_excluded_military_member_is_unearned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.24(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_deposit_to_joint_account_from_military_member_stationed_away_from_fns_unit
          and military_stationed_away_absence_days >= military_stationed_away_absence_threshold_days

  - name: shared_expense_pass_through_payment_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_for_shared_expense
          and payment_received_from_and_used_on_behalf_of_third_party
          and not payment_is_social_security_benefit
          and not payment_is_supplemental_security_benefit
          and not payment_is_child_support
          and not residence_owned_or_being_purchased_by_fns_unit

  - name: owned_residence_shared_expense_payment_is_earned_roomer_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.25 Exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_for_shared_expense
          and payment_received_from_and_used_on_behalf_of_third_party
          and residence_owned_or_being_purchased_by_fns_unit

  - name: reimbursement_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.26
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_reimbursement_for_out_of_pocket_expense
          and not reimbursement_is_for_normal_living_expense

  - name: job_or_training_expense_reimbursement_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.26(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_reimbursement_or_flat_allowance_for_job_or_training_expense

  - name: migrant_or_seasonal_farm_worker_travel_reimbursement_excluded_from_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: FNS 315.26(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-315-special-budgeting-income/page-15
    versions:
      - effective_from: '2022-01-11'
        formula: |-
          payment_is_travel_expense_reimbursement_for_migrant_or_seasonal_farm_worker
