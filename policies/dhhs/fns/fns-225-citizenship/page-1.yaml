format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-1
  summary: |-
    225.01 CITIZENSHIP REQUIREMENT Each applicant/recipient of FNS must be a U.S. citizen or a non-citizen lawfully admitted into the U.S. under specific immigration status. United States Citizenship Requirement: any person (other than the child of a foreign diplomat) born in the continental U.S., Alaska, Hawaii, Puerto Rico, Guam, U.S. Virgin Islands, Northern Mariana Islands, American Samoa, or Swains Islands; any person who is a naturalized citizen of the U.S.; a child born outside the U.S. when either parent is a citizen of the U.S., provided one of the requirements in 225.03 are met. 225.02 The applicant or FNS Unit member must certify, under penalty of perjury, citizenship of themselves and all individuals included in the FNS unit. 225.03 Unless questionable, accept the applicant's certification as verification of citizenship.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-225-citizenship/page-1#child_born_outside_us_has_us_citizenship_requirement
      reason: The source points to requirements in 225.03 for a child born outside the U.S. when either parent is a U.S. citizen, but the supplied source slice ends before stating those requirements.
rules:
  - name: person_born_in_us_or_listed_territory
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.01(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          person_born_in_continental_us
          or person_born_in_alaska
          or person_born_in_hawaii
          or person_born_in_puerto_rico
          or person_born_in_guam
          or person_born_in_us_virgin_islands
          or person_born_in_northern_mariana_islands
          or person_born_in_american_samoa
          or person_born_in_swains_islands

  - name: person_is_us_citizen_for_fns
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          (person_born_in_us_or_listed_territory and not person_is_child_of_foreign_diplomat)
          or person_is_naturalized_us_citizen

  - name: fns_citizenship_certification_made
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.02(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          applicant_or_fns_unit_member_certifies_own_citizenship_under_penalty_of_perjury
          and applicant_or_fns_unit_member_certifies_all_fns_unit_members_citizenship_under_penalty_of_perjury

  - name: head_or_adult_unit_member_meets_certification_method
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.02(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          person_is_head_of_household_or_adult_fns_unit_member
          and person_signed_application_or_recertification
          and person_stated_citizenship_of_all_new_fns_unit_members_when_household_composition_change_reported

  - name: citizenship_certification_accepted_as_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-1
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          fns_citizenship_certification_made
          and not citizenship_statement_is_questionable
