format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-3
  summary: |-
    Section 225 Change #6-2021 July 12, 2021 lists citizenship verification documents including I-197/I-179, Northern Mariana Identification Card, U.S. consular officer statement, American Indian Card with classification code "KIC", or two listed records/statements; if the applicant cannot provide verification of citizenship, request documentation using regular request for information policy in FNS 170 Notices.
rules:
  - name: citizenship_verification_document_from_page_3
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225 United States Citizenship, Section C.12-C.16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          has_united_states_citizen_identification_card_i_197_or_i_179
          or has_northern_mariana_identification_card
          or has_us_consular_officer_statement_certifying_us_citizenship_without_fs_240_fs_545_or_ds_1350
          or has_american_indian_card_with_kic_classification_and_texas_band_of_kickapoos_statement
          or has_two_citizenship_records_from_page_3
  - name: has_two_citizenship_records_from_page_3
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225 United States Citizenship, Section C.16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-3
              excerpt: "Two of the following: a. School records; b. Bible records; c. Hospital, physician, or health department records; d. Court records; e. U.S. census record...; f. Evidence of civil service employment...; g. A witnessed statement..."
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          (has_school_records and has_bible_records)
          or (has_school_records and has_hospital_physician_or_health_department_records)
          or (has_school_records and has_court_records)
          or (has_school_records and has_us_census_record_showing_name_us_citizenship_or_us_birthplace_and_birth_date_or_age)
          or (has_school_records and has_evidence_of_us_civil_service_employment_before_june_1_1976)
          or (has_school_records and has_witnessed_statement_with_required_birth_knowledge_details)
          or (has_bible_records and has_hospital_physician_or_health_department_records)
          or (has_bible_records and has_court_records)
          or (has_bible_records and has_us_census_record_showing_name_us_citizenship_or_us_birthplace_and_birth_date_or_age)
          or (has_bible_records and has_evidence_of_us_civil_service_employment_before_june_1_1976)
          or (has_bible_records and has_witnessed_statement_with_required_birth_knowledge_details)
          or (has_hospital_physician_or_health_department_records and has_court_records)
          or (has_hospital_physician_or_health_department_records and has_us_census_record_showing_name_us_citizenship_or_us_birthplace_and_birth_date_or_age)
          or (has_hospital_physician_or_health_department_records and has_evidence_of_us_civil_service_employment_before_june_1_1976)
          or (has_hospital_physician_or_health_department_records and has_witnessed_statement_with_required_birth_knowledge_details)
          or (has_court_records and has_us_census_record_showing_name_us_citizenship_or_us_birthplace_and_birth_date_or_age)
          or (has_court_records and has_evidence_of_us_civil_service_employment_before_june_1_1976)
          or (has_court_records and has_witnessed_statement_with_required_birth_knowledge_details)
          or (has_us_census_record_showing_name_us_citizenship_or_us_birthplace_and_birth_date_or_age and has_evidence_of_us_civil_service_employment_before_june_1_1976)
          or (has_us_census_record_showing_name_us_citizenship_or_us_birthplace_and_birth_date_or_age and has_witnessed_statement_with_required_birth_knowledge_details)
          or (has_evidence_of_us_civil_service_employment_before_june_1_1976 and has_witnessed_statement_with_required_birth_knowledge_details)
  - name: citizenship_documentation_request_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225 United States Citizenship, Section D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-3
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          applicant_cannot_provide_verification_of_citizenship
