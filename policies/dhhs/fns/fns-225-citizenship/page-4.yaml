format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-4
  summary: |-
    "If no documentation is available, refer the applicant to the local USCIS..." and "Treat this individual as an ineligible non-citizen until verification is provided." Verification sources and supporting documents are documented in NC FAST.
rules:
  - name: individual_treated_as_ineligible_non_citizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.03, page 4, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-4
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-4
              excerpt: "Change #6-2021 July 12, 2021"
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          no_documentation_available
          and
          not verification_provided
