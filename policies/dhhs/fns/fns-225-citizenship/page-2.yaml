format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-2
  summary: |-
    The claim of citizenship is questionable when inconsistent with statements made by the applicant, information on current or previous applications, or information received from another source. Lack of proficiency in speaking or writing English is not sufficient cause to question citizenship. If the applicant's statement is questionable, citizenship is verified using listed documents, including birth records, parent citizenship and biological-child proof, USCIS citizenship or naturalization certificates, a qualifying U.S. passport, birth-abroad reports, Work First verification, Social Security Administration records, and specified Department of State or USCIS documents.
rules:
  - name: citizenship_statement_questionable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.02.B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          citizenship_claim_inconsistent_with_applicant_statements
          or citizenship_claim_inconsistent_with_current_or_previous_application_information
          or citizenship_claim_inconsistent_with_information_from_another_source

  - name: english_proficiency_not_sufficient_cause_to_question_citizenship
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.02.B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          lack_of_proficiency_in_speaking_or_writing_english

  - name: citizenship_verification_evidence_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.02.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-2
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          birth_certificate_shows_birth_in_us_or_area_indicated_in_225_01_a
          or hospital_or_doctor_record_established_at_time_of_birth
          or hospital_issued_birth_certificate
          or parent_us_citizenship_document_and_biological_child_proof
          or certificate_of_citizenship_or_naturalization_issued_by_uscis
          or qualifying_us_passport
          or report_of_birth_abroad_fs_240
          or work_first_receipt_verified_citizenship
          or social_security_administration_record
          or certificate_of_naturalization_n_550_or_n_570
          or certificate_of_birth_fs_545
          or certification_of_report_of_birth_ds_1350
          or certificate_of_citizenship_n_560_or_n_561

  - name: citizenship_verified_when_statement_questionable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 225.02.C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-225-citizenship/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-225-citizenship/page-2#citizenship_statement_questionable
              output: citizenship_statement_questionable
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-225-citizenship/page-2#citizenship_verification_evidence_acceptable
              output: citizenship_verification_evidence_acceptable
              hash: sha256:local
    versions:
      - effective_from: '2021-07-12'
        formula: |-
          citizenship_statement_questionable
          and citizenship_verification_evidence_acceptable
