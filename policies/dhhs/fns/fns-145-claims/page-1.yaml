format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-145-claims/page-1
  summary: |-
    "Handle cases where a participating household received an overissuance of benefits in accordance with Section 800, Claims." North Carolina G.S. 108A-53 is repeated: fraud involving food stamps or authorization cards not entitled in the amount of $400 or less is a Class 1 misdemeanor; more than $400 is a Class I felony; specified presentation, receipt, and prohibited-exchange conduct is a Class 1 misdemeanor.
  deferred_outputs:
    - output: us-nc:policies/dhhs/fns/fns-145-claims/page-1#participating_household_overissuance_claim_handled_in_accordance_with_claims
      reason: The source directs household overissuance claims to be handled in accordance with Section 800, Claims, but that upstream claims source is not available in copied context.
rules:
  - name: fraudulent_obtaining_or_transfer_misdemeanor_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: FNS 145.01; N.C. Gen. Stat. 108A-53(a) as repeated
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-145-claims/page-1
              excerpt: "four hundred dollars ($400.00) or less"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          400

  - name: class_1_misdemeanor_for_fraudulent_obtaining_or_transfer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 145.01; N.C. Gen. Stat. 108A-53(a) as repeated
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-145-claims/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-145-claims/page-1#fraudulent_obtaining_or_transfer_misdemeanor_limit
              output: fraudulent_obtaining_or_transfer_misdemeanor_limit
              hash: sha256:local
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_knowingly_obtains_attempts_or_aids_obtaining_food_stamps_or_authorization_cards_by_false_statement_impersonation_nondisclosure_or_unauthorized_manner
          and person_transfers_with_intent_to_defraud_food_stamps_or_authorization_cards_not_entitled
          and fraudulent_obtaining_or_transfer_amount <= fraudulent_obtaining_or_transfer_misdemeanor_limit

  - name: class_i_felony_for_fraudulent_obtaining_or_transfer
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 145.01; N.C. Gen. Stat. 108A-53(a) as repeated
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-145-claims/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-145-claims/page-1#fraudulent_obtaining_or_transfer_misdemeanor_limit
              output: fraudulent_obtaining_or_transfer_misdemeanor_limit
              hash: sha256:local
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_knowingly_obtains_or_attempts_obtaining_food_stamps_or_authorization_cards_by_false_statement_impersonation_nondisclosure_or_unauthorized_manner
          and person_transfers_with_intent_to_defraud_food_stamps_or_authorization_cards_not_entitled
          and fraudulent_obtaining_or_transfer_amount > fraudulent_obtaining_or_transfer_misdemeanor_limit

  - name: class_1_misdemeanor_for_presenting_unlawfully_received_transferred_or_used_benefits_for_redemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 145.01; N.C. Gen. Stat. 108A-53(b) as repeated
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-145-claims/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_presents_or_causes_to_be_presented_food_stamps_or_authorization_cards_for_payment_or_redemption
          and person_knows_food_stamps_or_authorization_cards_were_received_transferred_or_used_in_violation_of_food_stamp_law_or_regulations

  - name: class_1_misdemeanor_for_receiving_food_stamps_for_consumable_item_knowing_fraudulent_procurement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 145.01; N.C. Gen. Stat. 108A-53(c) as repeated
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-145-claims/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_receives_food_stamps_for_consumable_item
          and person_knows_food_stamps_were_procured_fraudulently_under_subsections_a_or_b

  - name: class_1_misdemeanor_for_receiving_food_stamps_for_usda_prohibited_exchange_item
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 145.01; N.C. Gen. Stat. 108A-53(d) as repeated
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-145-claims/page-1
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          person_receives_food_stamps_for_consumable_item
          and consumable_item_exchange_is_prohibited_by_usda
