format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
  summary: |-
    "State rules require counties to conduct second-party reviews." Reviews apply to "all households with five or more members applying for initial certification or recertification"; households with "four or fewer members" are subject to second-party review as determined by the division director, and counties may voluntarily implement additional reviews. "A household is ineligible to participate in the FNS if it refuses to cooperate with State and/or USDA staff who conduct QC Reviews."
rules:
  - name: second_party_review_large_household_member_threshold
    kind: parameter
    dtype: Count
    source: FNS 135.01(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
              excerpt: "households with five or more members"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          5

  - name: second_party_review_small_household_member_ceiling
    kind: parameter
    dtype: Count
    source: FNS 135.01(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
              excerpt: "households with four or fewer members"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          4

  - name: household_subject_to_second_party_review
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 135.01
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
              excerpt: "Change #1-2021 May 1, 2021"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1#second_party_review_large_household_member_threshold
              output: second_party_review_large_household_member_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1#second_party_review_small_household_member_ceiling
              output: second_party_review_small_household_member_ceiling
              hash: sha256:local
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          (
            household_member_count >= second_party_review_large_household_member_threshold
            and (household_applying_for_initial_certification or household_applying_for_rec_certification)
          )
          or (
            household_member_count <= second_party_review_small_household_member_ceiling
            and division_director_determines_second_party_review_required_based_on_future_error_prone_profiles
          )
          or county_agency_voluntarily_requires_additional_second_party_review_for_household

  - name: household_refuses_to_cooperate_with_quality_control_review
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 135.02(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
              excerpt: "Change #1-2021 May 1, 2021"
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          household_refuses_to_be_available_for_quality_control_personal_interview
          or household_refuses_to_provide_quality_control_requested_information
          or household_otherwise_refuses_to_cooperate_with_state_or_usda_quality_control_review_staff

  - name: household_ineligible_for_fns_due_to_quality_control_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 135.02(B)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1
              excerpt: "Change #1-2021 May 1, 2021"
          - path: versions[0].formula
            kind: import
            import:
              target: us-nc:policies/dhhs/fns/fns-135-second-party-review-and-quality-control/page-1#household_refuses_to_cooperate_with_quality_control_review
              output: household_refuses_to_cooperate_with_quality_control_review
              hash: sha256:local
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          household_refuses_to_cooperate_with_quality_control_review
