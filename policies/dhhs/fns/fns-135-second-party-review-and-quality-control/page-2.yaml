format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-2
  summary: |-
    "Terminate FNS benefits if a State or Federal QC Reviewer informs the agency of a household's refusal to cooperate"; a terminated household may reapply at any time but cannot be determined eligible until it cooperates or the disqualification period ends; do not terminate based on failure to cooperate with QC in another state.
rules:
  - name: fns_benefits_termination_required_for_qc_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 135, Second Party Review & Quality Control, item 2 and 2(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-2
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          state_or_federal_qc_reviewer_informs_agency_household_refused_to_cooperate
          and not fns_unit_failed_to_cooperate_with_qc_in_another_state

  - name: household_may_reapply_after_qc_refusal_termination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 135, Second Party Review & Quality Control, item 2(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          household_terminated_for_refusal_to_cooperate_with_qc_reviewer

  - name: household_barred_from_eligible_determination_after_qc_refusal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 135, Second Party Review & Quality Control, item 2(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          household_terminated_for_refusal_to_cooperate_with_qc_reviewer
          and not household_cooperates_with_qc_reviewer
          and not qc_refusal_disqualification_time_period_ended

  - name: qc_referral_indicates_maximum_refusal_disqualification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 135, Second Party Review & Quality Control, item 2(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-135-second-party-review-and-quality-control/page-2
    versions:
      - effective_from: '2021-05-01'
        formula: |-
          household_has_qc_referral_for_refusal_to_cooperate
