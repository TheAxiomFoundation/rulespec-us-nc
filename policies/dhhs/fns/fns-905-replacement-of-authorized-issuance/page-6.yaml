format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-6
  summary: |-
    "A home visit prior to replacing food destroyed that was purchased with FNS. Do not require a specific verification source; however, the source must be knowledgeable of the FNS unit’s circumstances." Examples replace "the amount of food loss (up to the full amount of the original allotment)." "If the United States Department of Agriculture issues a disaster declaration and the FNS unit is eligible for disaster FNS, the FNS unit cannot receive both the disaster allotment and a replacement allotment for destroyed food."
rules:
  - name: destroyed_fns_food_loss_verified
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 905.04 C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-6
              excerpt: "A home visit prior to replacing food destroyed that was purchased with FNS. Do not require a specific verification source; however, the source must be knowledgeable"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          food_destroyed_was_purchased_with_fns
          and (verification_source_is_knowledgeable_of_fns_unit_circumstances
          or agency_conducted_home_visit_before_replacement)

  - name: replacement_allotment_for_destroyed_food_denied_due_to_disaster_fns
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 905.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-6
              excerpt: "If the United States Department of Agriculture issues a disaster declaration and the FNS unit is eligible for disaster FNS"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          usda_disaster_declaration_issued
          and fns_unit_eligible_for_disaster_fns

  - name: replacement_allotment_for_destroyed_food_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 905.04 C; FNS 905.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-6
              excerpt: "prior to replacing food destroyed that was purchased with FNS"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-6
              excerpt: "cannot receive both the disaster allotment and a replacement allotment for destroyed food"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          destroyed_fns_food_loss_verified
          and not replacement_allotment_for_destroyed_food_denied_due_to_disaster_fns

  - name: replacement_allotment_for_destroyed_food_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 905.04 C examples; FNS 905.05
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-6
              excerpt: "replaces the amount of food loss (up to the full amount of the original allotment)"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-6
              excerpt: "The request for replacement allotment should be denied and only the disaster allotment is issued"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          if replacement_allotment_for_destroyed_food_allowed: min(destroyed_food_loss_amount, original_allotment_amount) else: 0
