format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-5
  summary: |-
    "Document each request for replacement in the case file." Documentation should include the date, reason, verification, and whether replacement was provided or denied. DSS-1678 and DSS-8644 affidavits must be completed, signed, and retained in NC FAST. Verify the FNS unit misfortune, stolen electronic benefits, EBT fraud loss, or disaster through collateral contact, documentary evidence from a community agency, or EBT fraud loss attestation via signed affidavit, collateral contacts and/or documentary evidence including EBT processor, EBT call center, and benefit information data.
rules:
  - name: replacement_request_case_file_documentation_complete
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 905.04(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-5
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          replacement_request_documented_in_case_file
          and replacement_request_documentation_includes_date
          and replacement_request_documentation_includes_reason
          and replacement_request_documentation_includes_verification
          and replacement_request_documentation_includes_replacement_provided_or_denial_reason
          and dss_1678_replacement_affidavit_completed_signed_and_retained_in_nc_fast
          and dss_8644_stolen_electronic_benefits_affidavit_completed_signed_and_retained_in_nc_fast

  - name: replacement_request_verified_through_allowed_method
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 905.04(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-5
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          verified_by_collateral_contact
          or verified_by_documentary_evidence_from_community_agency
          or ebt_fraud_loss_request_verified_by_attestation_via_signed_affidavit
          or ebt_fraud_loss_request_verified_by_collateral_contacts
          or ebt_fraud_loss_request_verified_by_documentary_evidence_including_ebt_processor_call_center_or_benefit_information_data
