format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-2
  summary: |-
    "EBT fraud loss request will be considered for replacement when benefits are reported loss via card skimming, card cloning, or other similar fraudulent methods on or after October 1, 2022. Only EBT fraud loss requested during the period of October 1, 2022, through September 30, 2024, are eligible for replacement... EBT fraud loss requested prior to October 1, 2022, but discovered loss after October 1, 2022, are not eligible for replacement."
rules:
  - name: ebt_fraud_loss_request_eligible_for_replacement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 905.02, Electronic Benefits Transfer (EBT) Fraud Loss Request
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-2
              excerpt: "Section 905 Change 03-2023 September 1, 2023"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-2
              excerpt: "reported loss via card skimming, card cloning, or other similar fraudulent methods"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-2
              excerpt: "on or after October 1, 2022"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-2
              excerpt: "October 1, 2022, through September 30, 2024"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-905-replacement-of-authorized-issuance/page-2
              excerpt: "requested prior to October 1, 2022, but discovered loss after October 1, 2022, are not eligible"
    versions:
      - effective_from: '2023-09-01'
        formula: |-
          (benefits_reported_lost_via_card_skimming
          or benefits_reported_lost_via_card_cloning
          or benefits_reported_lost_via_other_similar_fraudulent_method)
          and benefits_reported_lost_on_or_after_ebt_fraud_replacement_start
          and ebt_fraud_loss_request_made_during_temporary_replacement_period
          and not ebt_fraud_loss_request_made_before_replacement_start_and_loss_discovered_after_start
