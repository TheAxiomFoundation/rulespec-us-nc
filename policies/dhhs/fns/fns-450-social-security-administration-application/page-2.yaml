  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-2
  summary: |-
    Verify those items that can be verified at the time of the interview from either SSA records or documents provided by the applicant. Forward the completed application and available information to the appropriate county DSS within one federal workday after the application is accepted and the interview is conducted, unless a telephone interview is conducted. If expedited service applies, SSA immediately sends the application to DSS by fax and mails the original within one federal workday. For pre-release applications, SSA staff complete joint SSI and FNS applications for residents of public institutions and forward the completed FNS application to the proposed county of residence within one federal workday after the application is taken.
