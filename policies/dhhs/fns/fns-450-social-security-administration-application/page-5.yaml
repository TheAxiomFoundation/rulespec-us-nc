format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-5
  summary: |-
    If the FNS unit applied jointly for FNS and SSI but the SSI is denied during the Certification Period, mail the FNS unit a DSS-8650 notice if necessary. The FNS unit is responsible for reporting changes; DSS must monitor SDX/BENDEX data, process mass changes affecting FNS benefit amounts, and restore benefits lost due to SSA and/or DSS errors during joint application processing.
rules:
  - name: dss_8650_notice_required_after_ssi_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 450.07(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-5
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          fns_unit_applied_jointly_for_fns_and_ssi
          and ssi_denied_during_certification_period
          and dss_8650_notice_necessary

  - name: fns_unit_change_reporting_responsibility_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 450.08(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-5
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          fns_unit_subject_to_simplified_reporting

  - name: sdx_bendex_monitoring_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 450.08(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-5
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          sdx_bendex_data_available_for_fns_benefit_amount

  - name: mass_change_processing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: FNS 450.08(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-5
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          mass_change_affects_fns_benefit_amount

  - name: benefits_to_restore_due_to_joint_application_error
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: FNS 450.08(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-5
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          if benefits_lost_due_to_ssa_or_dss_error_during_joint_application_process: max(0, fns_benefits_lost_due_to_joint_application_error) else: 0
