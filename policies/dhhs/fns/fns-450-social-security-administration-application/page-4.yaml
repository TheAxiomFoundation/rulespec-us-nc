format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
  summary: |-
    "Screen all applications received from SSA for entitlement to expedited service. This must be done on the day the application is received by DSS." "Determine if members of SSI households are active FNS participants prior to processing the application." "Allow SSI households to apply for FNS benefits at the agency if the household chooses to do so." "SSA notifies DSS of the applicant's release date from the institution. If DSS is not notified of the release date in a timely manner, restore benefits back to the date of release." "Verify all required eligibility factors prior to certification." "Do not reverify SDX and BENDEX data unless questionable."
rules:
  - name: application_received_from_ssa_screened_for_expedited_service_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 450.05(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          application_received_from_ssa
          and screened_for_expedited_service_on_day_received_by_dss

  - name: ssi_household_active_fns_participation_determined_before_processing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 450.05(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_is_ssi_household
          and members_active_fns_participation_determined_prior_to_processing

  - name: ssi_household_may_apply_at_agency
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 450.05(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_is_ssi_household
          and household_chooses_to_apply_for_fns_at_agency

  - name: agency_application_verification_source_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 450.05(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          household_is_ssi_household
          and household_chooses_to_apply_for_fns_at_agency
          and (
            verification_provided_by_household
            or verification_provided_by_sdx_or_bendex
            or verification_obtained_by_dss
          )
          and not verification_provided_by_ssa

  - name: prerelease_household_eligibility_determined_for_timely_food_purchase
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 450.06(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
              excerpt: "within 30 days following the date of the applicant's release"
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          resident_of_public_institution_applies_jointly_for_ssi_and_fns
          and eligibility_determined_so_household_can_purchase_food_within_30_days_after_release

  - name: prerelease_benefits_restored_back_to_release_date_when_release_notice_untimely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: FNS 450.06(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-450-social-security-administration-application/page-4
    versions:
      - effective_from: '2021-08-09'
        formula: |-
          ssa_release_date_notice_not_timely
          and benefits_restored_back_to_date_of_release

  - name: required_eligibility_factors_verified_prior_to_certification
    kind: derived
