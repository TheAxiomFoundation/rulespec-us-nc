        formula: |-
          ssi_benefits_verified_through_sdx
          or ssi_benefits_verified_through_bendex
          or ssi_benefits_verified_through_solq
          or ssi_benefits_verified_through_household_verification

  - name: sdx_bendex_data_reverification_allowed
    kind: derived
