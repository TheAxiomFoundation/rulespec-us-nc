format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
  summary: |-
    "FNS 240 WORK REGISTRATION"; "Change #02-2025 December 1, 2025"; workers must explain that non-exempt household members must register at application and every 12 months, participate in E&T or Workfare if assigned, and not voluntarily quit or reduce a 30-or-more-hour job without good cause. Exempt age categories include age 60 or older, younger than age 16, and specified age 16 or 17 head-of-household statuses.
rules:
  - name: work_registration_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 240 Work Registration, Section C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
              excerpt: "every 12 months after initial registration"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          12

  - name: work_effort_hours_threshold
    kind: parameter
    dtype: Count
    period: Week
    source: FNS 240 Work Registration, Section C.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
              excerpt: "30 or more hours a week or reduce work effort to less than 30 hours a week"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          30

  - name: elderly_age_exemption_threshold
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 240.03(A)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
              excerpt: "Age 60 or older"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          60

  - name: youth_age_exemption_threshold
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 240.03(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
              excerpt: "Younger than age 16"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          16

  - name: minor_head_age_lower_bound
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 240.03(A)(3)-(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
              excerpt: "Age 16 or 17"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          16

  - name: minor_head_age_upper_bound
    kind: parameter
    dtype: Count
    period: Month
    source: FNS 240.03(A)(3)-(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
              excerpt: "Age 16 or 17"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          17

  - name: person_exempt_from_work_requirements_due_to_age
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240.03(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_age >= elderly_age_exemption_threshold
          or person_age < youth_age_exemption_threshold
          or (
            person_age >= minor_head_age_lower_bound
            and person_age <= minor_head_age_upper_bound
            and not person_is_head_of_household
          )
          or (
            person_age >= minor_head_age_lower_bound
            and person_age <= minor_head_age_upper_bound
            and person_is_head_of_household
            and person_is_in_school_at_least_half_time
          )
          or (
            person_age >= minor_head_age_lower_bound
            and person_age <= minor_head_age_upper_bound
            and person_is_head_of_household
            and person_is_in_employment_or_training_program
          )

  - name: person_must_register_for_work_periodically
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, Section C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_non_exempt_household_member

  - name: person_must_participate_in_et_program_if_assigned
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, Section C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_non_exempt_household_member
          and person_is_assigned_to_fns_employment_and_training_program

  - name: person_must_participate_in_workfare_if_assigned
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, Section C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_non_exempt_household_member
          and person_is_assigned_to_workfare_program

  - name: person_complies_with_job_quit_and_work_effort_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, Section C.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-2
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          not person_voluntarily_without_good_cause_quit_job_of_threshold_hours
          and not person_voluntarily_without_good_cause_reduced_work_effort_below_threshold_hours
