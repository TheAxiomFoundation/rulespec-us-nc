format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
  summary: |-
    Section 240 Change #02-2025 December 1, 2025: a parent or other FNS unit member responsible for care of a child under age six is exempt, with only one parent claiming if both parents are in the home; a parent responsible for a child over age 5 and under age 12 is exempt when child care is unavailable to allow work or work study; the child need not be in the FNS unit or residence, but the exemption does not apply if another household where the child resides provides care. A FNS unit member who has applied for, is receiving, or is awaiting appeal on UIB is exempt, except Workfare participants; denial or termination for failing DES job search requirements can cause disqualification unless another non-UIB/non-Work First exemption applies.
rules:
  - name: care_responsibility_under_six_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, page 3, item 1 and item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_parent_or_fns_unit_member_responsible_for_daily_child_care
          and child_is_under_age_six
          and (not both_parents_are_in_home or person_is_the_one_parent_claiming_care_exemption)
          and not child_resides_in_another_household_that_provides_the_care

  - name: register_caregiver_at_next_recertification_after_child_sixth_birthday
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, page 3, item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
              excerpt: "If the child has his sixth birthday within the certification period, register the individual responsible for the care of the child at the next recertification, unless otherwise exempt."
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_responsible_for_care_of_child_with_sixth_birthday_within_certification_period
          and not person_is_otherwise_exempt_from_work_registration

  - name: child_care_unavailable_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, page 3, item 2 and item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_parent_responsible_for_child_over_age_five_and_under_age_twelve
          and child_care_is_not_available_to_allow_parent_to_work_or_join_work_study
          and not child_resides_in_another_household_that_provides_the_care

  - name: uib_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, page 3, subsection C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          (person_has_applied_for_uib or person_is_receiving_uib or person_is_in_uib_appeal_status_awaiting_final_determination)
          and not person_is_participating_in_workfare

  - name: disqualified_for_failure_to_comply_with_des_job_search
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240 Work Registration, page 3, subsection C
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-3
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          uib_denied_or_ongoing_case_terminated_because_member_failed_des_job_search_requirements
          and not person_is_exempt_from_work_requirements_for_reason_other_than_uib_or_work_first
