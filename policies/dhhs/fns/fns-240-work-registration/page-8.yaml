              excerpt: "Change #02-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          uib_noncompliance_disqualification_ends
          and person_is_otherwise_eligible
          and fns_case_is_active
          and month_is_month_following_month_disqualification_ends

