format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-8
  summary: |-
    Change #02-2025, December 1, 2025. For failure to comply with UIB or WFFA Employment Services without another work requirement/work registration exemption other than UIB or WFFA, the minimum disqualification period must be served even if the individual later complies. During the disqualification, if the individual becomes exempt for reasons other than application or receipt of UIB or WFFA, the disqualification ends and the minimum period need not be served. If otherwise eligible, add the individual back to the active FNS case the month following the month the disqualification ends; if the case is not active, the individual must reapply. Individuals currently disqualified for non-compliance with E&T, Career Start, or Workfare program requirements prior to 07/01/09 must serve the minimum disqualification period even if they comply.
rules:
  - name: uib_noncompliance_disqualification_ends
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: FNS 240, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-8
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-nc/manual/dhhs/fns/fns-240-work-registration/page-8
              excerpt: "Change #02-2025 December 1, 2025"
    versions:
      - effective_from: '2025-12-01'
        formula: |-
          person_is_disqualified_for_failure_to_comply_with_uib
          and (
            minimum_disqualification_period_served
            or person_becomes_work_requirement_exempt_for_reason_other_than_application_or_receipt_of_uib_or_wffa
          )

  - name: add_back_after_uib_noncompliance_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
