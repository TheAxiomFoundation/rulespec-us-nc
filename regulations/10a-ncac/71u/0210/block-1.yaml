format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/regulation/10a-ncac/71u/0210/block-1
  summary: |-
    Income exclusions set forth in 7 CFR 273.9(c) are hereby incorporated by reference. In addition, earned income for census employment or educational assistance, except scholarships offered by civic groups or institutions, or athletic scholarships, shall be excluded from determining eligibility.
rules:
  - name: educational_assistance_is_excepted_scholarship
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 10A NCAC 71U .0210 (additional exclusions clause)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/regulation/10a-ncac/71u/0210/block-1
              excerpt: "except scholarships offered by civic groups or institutions, or athletic scholarships"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          educational_assistance_is_scholarship_from_civic_group_or_institution
          or educational_assistance_is_athletic_scholarship
  - name: additional_excluded_earned_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 10A NCAC 71U .0210 (additional exclusions clause)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/regulation/10a-ncac/71u/0210/block-1
              excerpt: "earned income for census employment or educational assistance, except scholarships offered by civic groups or institutions, or athletic scholarships shall be excluded"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, earned_income_for_census_employment)
          + (if educational_assistance_is_excepted_scholarship: 0 else: max(0, educational_assistance_amount))
