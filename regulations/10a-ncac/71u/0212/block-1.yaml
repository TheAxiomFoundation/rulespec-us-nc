format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-nc/regulation/10a-ncac/71u/0212/block-1
  summary: |-
    Households shall receive transitional FNS benefits for a period of five
    months when they lose their Work First benefits. FNS benefits shall be no
    less than the amount received by the household prior to the termination of
    Work First benefits. The only adjustments to income shall be the deletion
    of the Work First benefits. Other sources of income shall not be
    re-calculated. A household is not eligible for transitional FNS benefits if
    it loses Work First benefits for any of the following reasons: [list].
    A household may reapply for FNS benefits during the transitional period
    with benefits determined according to current circumstances.
rules:
  - name: transitional_fns_benefit_period_months
    kind: parameter
    dtype: Integer
    source: 10A NCAC 71U .0212 (transitional FNS benefits for a period of five months)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-nc/regulation/10a-ncac/71u/0212/block-1
              excerpt: "for a period of five months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: household_eligible_for_transitional_fns_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 10A NCAC 71U .0212 (transitional FNS benefits when households lose Work First benefits; not eligible if loss is for enumerated disqualifying reason)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-nc/regulation/10a-ncac/71u/0212/block-1
              excerpt: "Households shall receive transitional FNS benefits ... when they lose their Work First benefits. A household is not eligible for transitional FNS benefits if it loses Work First benefits for any of the following reasons"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_lost_work_first_benefits
          and household_is_within_transitional_fns_benefit_period
          and not household_lost_work_first_benefits_for_disqualifying_reason
  - name: transitional_fns_benefit_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10A NCAC 71U .0212 (FNS benefits shall be no less than the amount received prior to termination of Work First; only adjustment is deletion of Work First benefits; other income not recalculated)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-nc/regulation/10a-ncac/71u/0212/block-1
              excerpt: "FNS benefits shall be no less than the amount received by the household prior to the termination of Work First benefits. The only adjustments to income shall be the deletion of the Work First benefits. Other sources of income shall not be re-calculated."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_eligible_for_transitional_fns_benefits: max(fns_benefit_amount_with_work_first_income_deleted, fns_benefit_amount_received_prior_to_work_first_termination) else: 0
